  const st=boss.state, T=boss.stateT;
  if(st==='dying'){                          /* --- staged KILL ANIMATION --- */
    /* stage hits: three shuddering impacts, then collapse, then a burst of soul-light */
    const p=proj(boss.z), bx=laneX(boss.x,p.t);
    const marks=[0.25,0.55,0.85];
    for(let i=0;i<marks.length;i++){
      if(boss._stg===i&&T>=marks[i]){ boss._stg++;
        boss.hurtT=0.12; SFX.slash(); shake(6,.15); stopTime(.04);
        burst(bx+rnd(-30,30),p.y-rnd(30,90)*p.s,14,['#ffe37a','#ff4d3a','#ffffff'],220,120,4,.5); }
    }
    if(boss._stg===3&&T>=1.7){ boss._stg=4;   // the body bursts into embers + rising soul wisps
      SFX.hit(); flash('#e8e2d0',.45); shake(10,.4);
      burst(bx,p.y-50*p.s,46,['#3a3646','#ff4d3a','#ffe37a','#e8e2d0'],300,150,5,1.1);
      for(let i=0;i<14;i++) particles.push({x:bx+rnd(-40,40),y:p.y-rnd(20,90)*p.s,
        vx:rnd(-14,14),vy:rnd(-90,-40),life:1.4,maxLife:1.4,size:rnd(2,5),col:'#cfe0ff',grav:-16}); }
    if(T>2.5){
      if(pack>0){ floater(VW/2,340,activeMinibossDefinition().byeLine,'#9ecbff',17); }
      pack=0; packTypes=[];                     // its debt is paid — the beast returns to its wild
      if(hasRelic('idol')){ gold+=40; floater(VW/2,368,'GOLDEN IDOL +40','#ffd23a',17); }
      boss=null; giveRelic();                    // keep the now-empty defeated arena behind rewards
    }

  }

/* THE PACK LEAP: a tamed miniboss arcs into the stage boss, strikes, and returns */
function updatePackLeap(dt){
  if(!packLeap||!boss) return;
  const L=packLeap; L.t+=dt;
  if(L.phase==='fly'&&L.t>=0.5){ L.phase='maul'; L.t=0;

    floater(laneX(boss.x,p.t),p.y-150*p.s,packEncounter(L.idx).fangLine,'#9ecbff',24);
    spawnSlash(laneX(boss.x,p.t),p.y-60*p.s,rnd(-0.6,0.6),'#9ecbff');
    shake(6,.2); stopTime(.05);
  }
  else if(L.phase==='maul'&&L.t>=0.35){ L.phase='back'; L.t=0; }
  else if(L.phase==='back'&&L.t>=0.4){ packLeap=null; }
}
function drawPackLeap(){

function updateProjectiles(dt){

/* ============================== SHARED MINIBOSS COUNTER DUELS ==============================
   ADDING A MINIBOSS:
   1. Draw one renderer with species-owned joint/pose names.

/* Combat telegraphs: lane hit hue plus one small action arrow in each lane. */
function drawTelegraphs(){
  const telegraphActor=boss&&mode==='boss'?boss:(mode==='miniboss'?minibossFight:null);
  if(telegraphActor&&(telegraphActor.state==='tele'||telegraphActor.state==='strike')&&telegraphActor.attack&&telegraphActor.hazardLanes){
    const cue=telegraphActor===boss?currentBossMove():currentMiniMove();
    if(!cue) return;
    const height=cue.height;
    const pulse=telegraphActor.state==='strike'?.72:0.42+Math.sin(perfNow*16)*0.16;
    for(const lane of telegraphActor.hazardLanes) drawLaneHitHue(lane,pulse);
    if(height==='low') cue.centerJumpCue?drawCenterJumpArrow(pulse):drawActionArrows(true,pulse);
    else if(height==='high') drawActionArrows(false,pulse);
  }
}
/* The only combat cues: red light beneath hit lanes and one small directional arrow per lane. */
function drawLaneHitHue(lane,alpha){
  const x=laneX(lane,1);
  g.save();
  g.globalAlpha=alpha; g.fillStyle='#ff2638'; g.shadowColor='#ff2638'; g.shadowBlur=18;
  g.beginPath(); g.ellipse(x,ATTACK_GROUND_Y,CFG.FIGHT_HIT_HALF,11,0,0,TAU); g.fill();
  g.shadowBlur=0; g.globalAlpha=alpha*0.85; g.fillStyle='#ff7a82';
  g.fillRect(x-CFG.FIGHT_HIT_HALF,ATTACK_GROUND_Y-3,CFG.FIGHT_HIT_HALF*2,3);
  g.restore();
}
function drawActionArrows(up,alpha){
  /* Keep the three posture cues below both the knight and the red contact hue.
     They remain readable even when a large character or jump pose fills the lane. */
  const y=ATTACK_GROUND_Y+24;
  g.save(); g.globalAlpha=alpha; g.fillStyle=up?'#fff0a6':'#ffbf82';
  for(let lane=0;lane<3;lane++){
    const x=laneX(lane,1);
    g.beginPath();
    if(up){ g.moveTo(x,y-7); g.lineTo(x-6,y); g.lineTo(x-2.5,y); g.lineTo(x-2.5,y+7); g.lineTo(x+2.5,y+7); g.lineTo(x+2.5,y); g.lineTo(x+6,y); }
    else { g.moveTo(x,y+7); g.lineTo(x-6,y); g.lineTo(x-2.5,y); g.lineTo(x-2.5,y-7); g.lineTo(x+2.5,y-7); g.lineTo(x+2.5,y); g.lineTo(x+6,y); }
    g.closePath(); g.fill();
  }
  g.restore();
}
function drawCenterJumpArrow(alpha){
  /* Closing attacks ask for one precise centre jump, not three generic posture
     cues. Its larger arrow sits below the centre contact hue and rider. */
  const x=laneX(1,1), y=ATTACK_GROUND_Y+29;
  g.save(); g.globalAlpha=Math.min(1,alpha+.16); g.fillStyle='#fff0a6';
  g.shadowColor='#ffe37a'; g.shadowBlur=10;
  g.beginPath(); g.moveTo(x,y-17); g.lineTo(x-13,y-3); g.lineTo(x-5,y-3);
  g.lineTo(x-5,y+14); g.lineTo(x+5,y+14); g.lineTo(x+5,y-3); g.lineTo(x+13,y-3);
  g.closePath(); g.fill(); g.shadowBlur=0; g.restore();
}
/* Move-lab instrumentation deliberately reads the same contact positions and
   footprint sizes as resolveSweepHazard(). Red is physical death contact; the
   gold bracket is the wider last-moment input tolerance. The resolver prints the
   final HIT / PERFECT / SAFE verdict, but never damages or counters in a lab. */
function drawMoveLabMarkers(){
  const actor=boss&&boss._moveLab?boss:(minibossFight&&minibossFight._moveLab?minibossFight:null);
  if(!actor) return;
  const lab=actor._moveLab;
  g.save();
  g.textAlign='center'; g.font='bold 12px monospace';
  g.fillStyle='#ff6a5a'; g.fillText('RED = HIT',VW/2-72,176);
  g.fillStyle='#ffe37a'; g.fillText('GOLD = PERFECT EDGE',VW/2+70,176);
  g.fillStyle='#cfd4e2'; g.font='11px monospace';
  g.fillText('perfect input '+Math.round((perfectWin()+(actor===minibossFight ? minibossPerfectBonus() : 0))*1000)+' ms',VW/2,192);
  if(lab.lastResult&&lab.lastResult.until>perfNow){
    g.globalAlpha=clamp((lab.lastResult.until-perfNow)*2,0,1);
    g.font='bold 21px monospace'; g.fillStyle=lab.lastResult.col;
    g.fillText(lab.lastResult.kind,VW/2,220);
  }
  g.restore();

  if((actor.state!=='tele'&&actor.state!=='strike')||!actor.attack||!actor.hazardLanes) return;
  const move=actor===boss?currentBossMove():currentMiniMove();
  if(!move) return;
  const contacts=moveContactXs(actor,move,actor.hazardLanes);
  const strikeK=actor.state==='strike'?clamp(actor.stateT/move.travel,0,1):0;
  g.save(); g.lineCap='square';
  for(let i=0;i<contacts.length;i++){
    const sweep=move.sweeps?move.sweeps[i]:move.sweep;
    const hitHalf=sweep?(sweep.hitHalf||34):CFG.FIGHT_HIT_HALF;
    const perfectHalf=sweep?(sweep.perfectHalf||70):hitHalf;
    let height=move.height;
    if(sweep&&sweep.collision==='pincer')
      height=actor.state==='strike'&&Math.abs(sweepLaneAt(sweep,strikeK)-sweep.to)<=.34?'low':'mid';
    const x=contacts[i], y=attackImpactY(height), pulse=.72+Math.sin(perfNow*20)*.12;
    g.globalAlpha=.72*pulse; g.strokeStyle='#ffe37a'; g.lineWidth=2;
    g.beginPath();
    g.moveTo(x-perfectHalf,y-11); g.lineTo(x-perfectHalf,y+11);
    g.moveTo(x+perfectHalf,y-11); g.lineTo(x+perfectHalf,y+11);
    if(perfectHalf>hitHalf){
      g.moveTo(x-perfectHalf,y); g.lineTo(x-hitHalf,y);
      g.moveTo(x+hitHalf,y); g.lineTo(x+perfectHalf,y);
    }
    g.stroke();
    g.globalAlpha=.28*pulse; g.fillStyle='#ff2638';
    g.fillRect(x-hitHalf,y-7,hitHalf*2,14);
    g.globalAlpha=.9*pulse; g.strokeStyle='#ff6a5a'; g.lineWidth=2;
    g.strokeRect(x-hitHalf,y-7,hitHalf*2,14);
  }
  g.restore();
}

/* ============================== update per mode ============================== */
function update(dt){
  perfNow+=dt; modeT+=dt; lastDt=dt;
  updateJuice(dt);
  updateAmbient(dt);
  if(mode==='menu'||mode==='score'||mode==='relicdex'||mode==='debugcfg'||mode==='changelog'){ dist+=dt*6; roadScroll+=dt*6; return; }   // world drifts behind menus
  if(mode==='dying'){ if(modeT>1.4){ setMode('score'); } return; }

  updatePlayer(dt);
  if(mode==='run') runTime+=dt;                            // survival score only during the stage ride
  if(mode==='run'){
    const mv=speed()*dt; dist+=mv; roadScroll+=mv;
    /* Preserve the previous depth so infinite late-run speed cannot tunnel an
       obstacle or pickup through its narrow contact window in one frame. */
    for(const o of obstacles){ o.prevZ=o.z; o.z-=mv; }
    for(const c of pickups){ c.prevZ=c.z; c.z-=mv; }
    for(const t of trees) t.z-=mv;
    /* roots stay alive until their TALL upper arm has fully cleared the screen —
       they slide off the bottom organically like everything else (the extended
       phone-bottom included: nothing may vanish while still visible) */
    cullBehind(trees,-6);
    if(mode==='run'){
      spawnLoopEntities();
      updateRunCollisions();
      /* the waiting stage miniboss: meet its lane to accept the optional duel */
      for(const o of obstacles){
        if(o.type.encounterGate&&!o.resolved&&o.z<2.4){
          o.resolved=true;
          if(Math.round(player.x)===o.lane) startMiniboss(o.lane);
          else { o.flee=perfNow; playEncounterSound();
            floater(VW/2,180,activeMinibossDefinition().fleeLine,'#8b8fa0',14); }
        }
      }
      if(dist>=CFG.LOOP_DIST) startBoss();
    } else {
      /* keep spawning scenery trees so the safe ride still looks alive */
      while(dist+SPAWN_FAR > nextTreeAt){
        trees.push({z:nextTreeAt-dist, off:(Math.random()<.5?-1:1)*rnd(2.6,3.8), v:Math.random()});
        if(Math.random()<0.7)                       // the outer flank line
          trees.push({z:nextTreeAt-dist+rnd(0.5,1.6), off:(Math.random()<.5?-1:1)*rnd(4.6,6.6), v:Math.random()});
        nextTreeAt+=rnd(1.7,3.4);
      }
    }
    /* Cull only after swept collision checks; at extreme speeds an entity may
       already be behind the camera on the same frame it crosses the rider. */
    cullObstacles(); cullBehind(pickups,-7);
  }
  else if(mode==='bossintro'){
    /* the bear stalks out of the forest, shouldering through the treeline */
    if(boss&&boss.entering){
      const step=dt*2.1;
      boss.x+=boss.x<1?step:-step;
      if(Math.abs(boss.x-1)<=step*1.2){ boss.x=1; boss.entering=false; SFX.roar(); shake(8,.4); }
      else if(Math.random()<dt*7){                     // heavy footfalls kick up dirt
        const p=proj(boss.z);
        burst(laneX(boss.x,p.t)+rnd(-16,16),p.y+2,3,['#6a5a40','#3a2f20'],70,110,3,.5);
        if(Math.random()<0.35) shake(2,.08);
      }
    }
    if(modeT>2.6&&!(boss&&boss.entering)){ setMode('boss'); boss.state='idle'; boss.stateT=0; }
  }
  else if(mode==='boss'){ updateBoss(dt); updateProjectiles(dt); updatePackLeap(dt); updateHazards(); }
  else if(mode==='miniboss'){ updateMiniboss(dt); updateHazards(); }
  /* during fights the run pauses, but the forest keeps drifting slowly so it feels alive */
  if(mode==='boss'||mode==='bossintro'||mode==='miniboss'){
    const mv=dt*5;
    if(mode==='miniboss') roadScroll+=mv; // the duel is stationary in stage progress, not in the world
    for(const t of trees) t.z-=mv;
    for(const c of pickups) c.z-=mv;
    for(const o of obstacles) if(o.kind!=='minibossGate') o.z-=mv;
    cullBehind(trees,-6); cullBehind(pickups,-5);
    if(mode==='miniboss'){
      /* The duel freezes stage distance, so tree rows advance on visual travel.
         They enter from the normal far depth at the normal spacing. */
      minibossTreeTravel-=mv;
      while(minibossTreeTravel<=0){
        spawnMinibossTreeRow(SPAWN_FAR);
        minibossTreeTravel+=rnd(1.7,3.4);
      }
    }
    if(mode==='miniboss'){                       // new trees keep marching in — the duel never empties the wood
      let far=0; for(const t of trees) far=Math.max(far,t.z);
      while(false&&far<CFG.Z_FAR-2){ far+=rnd(1.7,3.2);
        trees.push({z:far,off:(Math.random()<.5?-1:1)*rnd(2.6,3.8),v:Math.random()});
        if(Math.random()<0.55)                   // outer flank line
          trees.push({z:far+0.6,off:(Math.random()<.5?-1:1)*rnd(4.6,6.6),v:Math.random()}); }
    }
  }
}

/* ============================== render ============================== */
const DRAW_QUEUE=[],DRAW_ITEM_POOL=[],FRONT_OBSTACLES=[];
let drawItemCount=0;
function queueWorldDraw(z,draw,ref=null){
  let item=DRAW_ITEM_POOL[drawItemCount];
  if(!item) item=DRAW_ITEM_POOL[drawItemCount]={z:0,draw:null,ref:null};
  drawItemCount++; item.z=z; item.draw=draw; item.ref=ref; DRAW_QUEUE.push(item);
}
function drawStageBeyond(z,stage){ stage.beyondDraw(z); }
function drawStageMouth(z,stage){ stage.mouthDraw(z); }
function drawTreeEntity(t,stage){
  worldA=t.gnd?clamp((78-t.z)/10,0,1):clamp((SPAWN_FAR-t.z)/26,0,1);
  if(worldA<=0){ worldA=1; return; }
  const raw=(CFG.FOCAL+CFG.Z_FAR)/(CFG.FOCAL+Math.max(t.z,CFG.Z_FAR));
  const grow=t.z>CFG.Z_FAR?.10+raw*.90:1;
  const p=proj(Math.min(t.z>CFG.Z_FAR?CFG.Z_FAR-6*(1-raw):t.z,CFG.Z_FAR));
  const slide=1+Math.max(0,p.t-1)*.6, sc=linS(p.t)*3.2*grow;
  const xx=VW/2+t.off*lerp(24,150,p.t)*1.2*grow*slide;
  if(xx+110*sc<0||xx-110*sc>VW){ worldA=1; return; }
  g.globalAlpha=worldA;
  if(t.gnd){ if(stage.ground) stage.ground(xx,p.y+6,sc*.55,t.v); }
  else stage.scenery(xx,p.y+6,sc,t.v);
  worldA=1; g.globalAlpha=1;
}
function drawObstacleEntity(o,stage){
  const p=proj(o.z);
  if(o.type.encounterGate){
    worldA=spawnFade(o.z); if(worldA<=0){worldA=1;return;} g.globalAlpha=worldA;
    const fleeT=o.flee?clamp((perfNow-o.flee)*1.4,0,1):0;
    const def=activeMinibossDefinition();
    def.draw(laneX(o.lane,p.t),p.y,p.s*1.55,o.flee?def.fleeAnim:def.gateAnim,fleeT,false);
    if(!o.flee){ g.font='bold '+Math.max(10,18*p.s)+'px monospace'; g.textAlign='center';
      g.fillStyle='#ffd23a'; g.fillText('!',laneX(o.lane,p.t),p.y-70*p.s); }
    worldA=1; g.globalAlpha=1;
  } else drawObstacle(o,p);
}
function drawPickupEntity(c){
  if(c.z>effZFar) return;
  const p=proj(c.z); g.globalAlpha=clamp((effZFar-c.z)/10,0,1);
  if(c.kind==='coin') drawCoin(laneX(c.lane,p.t),p.y-24*p.s,p.s*1.3,perfNow);
  else drawWeaponPickup(c.kind,laneX(c.lane,p.t),p.y-30*p.s,p.s*1.3,perfNow);
  g.globalAlpha=1;
}
function render(){
  const stage=BIO();
  g.setTransform(1,0,0,1,0,0);
  g.fillStyle='#05070c'; g.fillRect(0,0,cvs.width,cvs.height);
  g.setTransform(viewScale,0,0,viewScale,viewX,viewY);
  /* the world never spills into the letterbox — wide desktop screens stay calm */
  g.save();
  g.beginPath(); g.rect(0,-PAD_TOP,VW,VH+PAD_TOT); g.clip();
  /* screen shake offset (inside the clip so shakes can't leak either) */
  if(shakeMag>0) g.translate(rnd(-shakeMag,shakeMag),rnd(-shakeMag,shakeMag));

  if(env==='cave'){ stage.arena(lastDt); }
  else { stage.bg(lastDt); }
  updateEffHorizon();          // obstacles/items enter under the lair when it looms
  /* depth-sorted world drawables (far → near) */
  const dr=DRAW_QUEUE; dr.length=0; drawItemCount=0;
  if(env==='forest'&&mode==='run'&&CFG.LOOP_DIST-dist<SPAWN_FAR){
    const mz=CFG.LOOP_DIST-dist;
    /* the end-of-world sheet (water/lava) draws BEHIND everything, so the groves
       and columns marching in past the lair stand IN it. The lair itself renders
       from the same far distance as the trees around it. */
    if(stage.beyondDraw) queueWorldDraw(9999,drawStageBeyond,mz);
    queueWorldDraw(mz,drawStageMouth,mz);
  }
  if(env==='forest') for(const t of trees) queueWorldDraw(t.z,drawTreeEntity,t);
  const frontObs=FRONT_OBSTACLES; frontObs.length=0; // arches the knight rides UNDER
  /* GRIFFIN GREAVES exception: while the jump carries him over a duck-arch, the
     knight renders ON TOP of the root instead of slipping beneath it */
  const overArch=hasRelic('greaves')&&isAirborne();
  for(const o of obstacles){
    if(o.type.frontLayer&&o.z<1.3&&o.z>o.type.cullZ-.2&&!(overArch&&o.z>-2.2)){ frontObs.push(o); continue; }
    queueWorldDraw(o.z,drawObstacleEntity,o);
  }
  for(const c of pickups) queueWorldDraw(c.z,drawPickupEntity,c);
  if(boss) queueWorldDraw(boss.z,()=>{
    /* The attack now advances monotonically and is closest on the damage frame.
       Recovery retreats from that same contact point, so the body never snaps back. */
    const bossMove=currentBossMove(); let zD=boss.z;
    /* Large traveling bodies stage most of their forward approach during the
       tell. The active swipe then travels sideways instead of telescoping an arm. */
    const tellReach=bossMove&&bossMove.stageReach!==undefined?bossMove.stageReach:
      bossMove&&bossMove.bodySweep&&bossMove.bodyLunge>8?bossMove.bodyLunge*.88:1.8;
    if(boss.state==='tele'&&bossMove)
      zD=boss.z-easeOut(clamp(boss.stateT/(boss.teleTime||bossMove.tele*teleMult()),0,1))*tellReach;
    const requestedReach=bossMove?(bossMove.bodyLunge!==undefined?bossMove.bodyLunge:(bossMove.lunge||boss.attack.lunge||3)+5.2):0;
    const contactReach=bossMove?Math.min(boss.z-.8,requestedReach):0;
    const comboRecovering=boss.state==='comboRecover';
    const comboRecoverTime=bossMove?comboStepRecoveryTime(bossMove):.28;
    const fullRecoverTime=bossRecoveryTime(boss.attack);
    const recoverAnimTime=fullRecoverTime*(bossMove&&bossMove.recoverPortion||.38);
    if(boss.state==='strike'&&bossMove)
      zD=boss.z-tellReach-easeOut(clamp(boss.stateT/bossMove.travel,0,1))*Math.max(0,contactReach-tellReach);
    if(boss.state==='recover'&&bossMove)
      zD=boss.z-(1-easeInOut(clamp(boss.stateT/recoverAnimTime,0,1)))*contactReach;
    if(comboRecovering&&bossMove)
      zD=boss.z-(1-easeInOut(clamp(boss.stateT/comboRecoverTime,0,1)))*contactReach;
    if(boss.state==='finisher')
      zD=boss.z-easeOut(clamp((boss.stateT-0.62)/1.3,0,1))*activeBossDefinition().finisherReach;
    const p=proj(zD);
    let anim=boss.state==='tele'?boss.attack.anim:boss.state;
    if(bossMove) anim=boss.state==='tele'?bossMove.anim:boss.state==='strike'?bossMove.strike:
      comboRecovering?comboStepRecoveryAnim(bossMove):
      boss.state==='recover'&&bossMove.recoverAnim?bossMove.recoverAnim:boss.state;
    const riseK=easeOut(clamp(boss.rise,0,1)), sink=(1-riseK)*150*p.s;
    let bx2=laneX(boss.x,p.t);
    if(boss.state==='tele'&&bossMove&&bossMove.sweep&&bossMove.bodySweep){
      bx2=lerp(bx2,laneX(sweepBodyLane(bossMove,0),1),
        easeOut(clamp(boss.stateT/(boss.teleTime||bossMove.tele*teleMult()),0,1)));
    } else if(boss.state==='strike'&&bossMove&&bossMove.sweep&&bossMove.bodySweep){
      bx2=laneX(sweepBodyLane(bossMove,clamp(boss.stateT/bossMove.travel,0,1)),1);
    } else if(boss.state==='strike'&&bossMove){
      const contactK=easeOut(clamp(boss.stateT/bossMove.travel,0,1));
      bx2=lerp(bx2,laneX(boss.xTarget,1),contactK); // body/muzzle arrives on the marked line
    } else if(boss.state==='recover'&&bossMove){
      const retreatK=easeInOut(clamp(boss.stateT/recoverAnimTime,0,1));
      bx2=lerp(laneX(boss.xTarget,1),bx2,retreatK);
    } else if(comboRecovering&&bossMove){
      const retreatK=easeInOut(clamp(boss.stateT/comboRecoverTime,0,1));
      bx2=lerp(laneX(boss.xTarget,1),bx2,retreatK);
    }
    const bossContacts=moveContactXs(boss,bossMove,boss.state==='finisher'?ALL_LANES:boss.hazardLanes);
    activeBossDefinition().draw(bx2,p.y+sink,p.s*bossSpeciesScale(),anim,
      clamp(boss.stateT/(boss.state==='tele'&&bossMove?(boss.teleTime||bossMove.tele*teleMult()):boss.state==='strike'&&bossMove?bossMove.travel:comboRecovering?comboRecoverTime:boss.state==='recover'?recoverAnimTime:boss.state==='finisher'?2.15:boss.state==='dying'?2.5:0.5),0,1),
      boss.hurtT>0,bossContacts);
    if(boss.rise<1){                                    // it BREACHES: rings + spray at the waterline
      const wl=p.y+4*p.s, isLava=activeBossDefinition().element==='lava';
      for(let r=0;r<3;r++){ const ph=(boss.rise*1.6+r*0.33)%1;
        g.globalAlpha=(1-ph)*0.5; g.strokeStyle=isLava?'#ff9a3a':'#2c463a'; g.lineWidth=2;
        g.beginPath(); g.ellipse(bx2,wl,(30+ph*110)*p.s,(30+ph*110)*p.s*0.24,0,0,TAU); g.stroke(); }
      g.globalAlpha=1;
      if(Math.random()<0.55) particles.push({x:bx2+rnd(-70,70)*p.s,y:wl,vx:rnd(-40,40),vy:rnd(-190,-90),
        life:.6,maxLife:.6,size:2.6,col:isLava?(Math.random()<.5?'#ff6a2a':'#ffd23a'):'#8fae9a',grav:340});
    }
    /* status: the poison DRIPS, the burn FLICKERS */
    if(boss.poisonT>0&&boss.state!=='dying'){
      for(let i=0;i<4;i++){ const ph=(perfNow*0.9+i*0.27)%1;
        g.globalAlpha=(1-ph)*0.8; g.fillStyle=i%2?'#7ade6a':'#4a9a42';
        g.fillRect(bx2+(-46+i*30)*p.s,p.y-(120-ph*110)*p.s,3*p.s+1,(6+ph*4)*p.s+1); }
      g.globalAlpha=1;
      if(Math.random()<0.2) particles.push({x:bx2+rnd(-50,50)*p.s,y:p.y-rnd(30,110)*p.s,vx:0,vy:-20,
        life:.8,maxLife:.8,size:2.4,col:'#7ade6a',grav:-16});
    }
    if(boss.burnT>0&&boss.state!=='dying'){
      for(let i=0;i<5;i++){ const fh=(6+Math.sin(perfNow*11+i*2.3)*4)*p.s;
        g.globalAlpha=0.8; g.fillStyle='#ff6a2a';
        g.fillRect(bx2+(-52+i*26)*p.s,p.y-(56+(i%3)*34)*p.s-fh,3.4*p.s+1,fh);
        g.globalAlpha=0.9; g.fillStyle='#ffd23a';
        g.fillRect(bx2+(-51+i*26)*p.s,p.y-(56+(i%3)*34)*p.s-fh*0.5,2*p.s+1,fh*0.5); }
      g.globalAlpha=1;
      if(Math.random()<0.3) particles.push({x:bx2+rnd(-56,56)*p.s,y:p.y-rnd(40,120)*p.s,vx:rnd(-10,10),vy:rnd(-60,-30),
        life:.6,maxLife:.6,size:2.2,col:Math.random()<.5?'#ff6a2a':'#ffd23a',grav:-30});
    } });
  if(minibossFight) queueWorldDraw(minibossFight.z,()=>{
    const miniMove=currentMiniMove();
    let zD=minibossFight.z;
    const miniTellReach=1.25;
    const miniRequestedReach=miniMove?(miniMove.bodyLunge!==undefined?miniMove.bodyLunge:(miniMove.lunge||4)+4):0;
    const miniContactReach=miniMove?Math.min(minibossFight.z-.8,miniRequestedReach):0;
    const miniComboRecovering=minibossFight.state==='comboRecover';
    const miniComboRecoverTime=miniMove?comboStepRecoveryTime(miniMove):.1;
    const miniFullRecoverTime=minibossRecoveryTime(minibossFight.attack);
    const miniRecoverAnimTime=miniFullRecoverTime*(miniMove&&miniMove.recoverPortion||.42);
    if(minibossFight.state==='tele'&&miniMove)
      zD=minibossFight.z-easeOut(clamp(minibossFight.stateT/(minibossFight.teleTime||miniMove.tele*teleMult()),0,1))*miniTellReach;
    if(minibossFight.state==='strike'&&miniMove)
      zD=minibossFight.z-miniTellReach-easeOut(clamp(minibossFight.stateT/miniMove.travel,0,1))*Math.max(0,miniContactReach-miniTellReach);
    if(minibossFight.state==='recover'&&miniMove)
      zD=minibossFight.z-(1-easeInOut(clamp(minibossFight.stateT/miniRecoverAnimTime,0,1)))*miniContactReach;
    if(miniComboRecovering&&miniMove)
      zD=minibossFight.z-(1-easeInOut(clamp(minibossFight.stateT/miniComboRecoverTime,0,1)))*miniContactReach;
    const p=proj(zD);
    let wx=laneX(minibossFight.x,p.t);
    if(minibossFight.state==='tele'&&miniMove&&miniMove.sweep&&miniMove.bodySweep)
      wx=lerp(wx,laneX(sweepBodyLane(miniMove,0),1),easeOut(clamp(minibossFight.stateT/(minibossFight.teleTime||miniMove.tele*teleMult()),0,1)));
    else if(minibossFight.state==='strike'&&miniMove&&miniMove.sweep&&miniMove.bodySweep)
      wx=laneX(sweepBodyLane(miniMove,clamp(minibossFight.stateT/miniMove.travel,0,1)),1);
    else if(minibossFight.state==='strike'&&miniMove)
      wx=lerp(wx,laneX(minibossFight.xTarget,1),easeOut(clamp(minibossFight.stateT/miniMove.travel,0,1)));
    else if(minibossFight.state==='recover'&&miniMove)
      wx=lerp(laneX(minibossFight.xTarget,1),wx,easeInOut(clamp(minibossFight.stateT/miniRecoverAnimTime,0,1)));
    else if(miniComboRecovering&&miniMove)
      wx=lerp(laneX(minibossFight.xTarget,1),wx,easeInOut(clamp(minibossFight.stateT/miniComboRecoverTime,0,1)));
    const miniDef=activeMinibossDefinition();
    let anim=minibossFight.state==='tele'?minibossFight.attack.anim:
             minibossFight.state==='intro'?miniDef.introAnim:
             minibossFight.state==='dying'?(minibossFight.stateT<1.1?miniDef.introAnim:miniDef.exitAnim):minibossFight.state;
    if(miniMove&&(minibossFight.state==='tele'||minibossFight.state==='strike'||minibossFight.state==='recover'||miniComboRecovering))
      anim=minibossFight.state==='tele'?miniMove.anim:minibossFight.state==='strike'?miniMove.strike:comboStepRecoveryAnim(miniMove);
    const miniContacts=moveContactXs(minibossFight,miniMove,minibossFight.hazardLanes);
    miniDef.draw(wx,p.y,p.s*miniDef.scale,anim,
      clamp(minibossFight.stateT/(minibossFight.state==='tele'?(minibossFight.teleTime||miniMove.tele*teleMult()):minibossFight.state==='strike'&&miniMove?miniMove.travel:miniComboRecovering?miniComboRecoverTime:minibossFight.state==='recover'?miniRecoverAnimTime:minibossFight.state==='dying'?1.8:0.6),0,1),
      minibossFight.hurtT>0,miniContacts); });
  dr.sort((a,b)=>b.z-a.z);
  for(const d of dr) d.draw(d.ref,stage);

  drawTelegraphs();
  if(mode!=='menu'&&mode!=='score'&&mode!=='charsel'&&mode!=='relicdex'&&mode!=='debugcfg'&&mode!=='changelog'){
    if(player.alive) drawPlayer();
    drawPackAllies();
    drawProjectiles();
    drawPackLeap();
  }
  drawMoveLabMarkers();
  /* NOW the near arches: the knight visibly ducks UNDER them */
  frontObs.sort((a,b)=>b.z-a.z);
  for(const o of frontObs) drawObstacle(o,proj(o.z));
  drawParticles(); updateDrawSlashes(lastDt);
  drawAmbient();
  drawVignette();

  /* overlays / UI per mode */
  if(mode==='menu') drawMenu();
  else if(mode==='relicdex') drawRelicDex();
  else if(mode==='changelog') drawChangelog();
  else if(mode==='debugcfg') drawDebugCfg();
  else if(mode==='charsel') drawCharSel();
  else if(mode==='score') drawScore();
  else {
    drawHUD();
    if(mode==='bossintro') drawBossIntro();
    if(mode==='relic') drawRelicScreen();
    if(mode==='shop') drawShop();
    if(mode==='miniboss') drawMinibossIntro();
  }
  if(paused&&!pausePhotoMode){                      // photo mode leaves the frozen game completely clean
    g.fillStyle='rgba(5,7,12,0.78)'; g.fillRect(0,-PAD_TOP,VW,VH+PAD_TOT);
    g.textAlign='center'; g.font='bold 34px monospace'; g.fillStyle='#e8e2d0';
    g.fillText('PAUSED',VW/2,VH/2-58);
    g.font='15px monospace'; g.fillStyle='#aeb2c2';
    g.fillText('tap outside buttons or press P to resume',VW/2,VH/2-22);
    g.strokeStyle='#ffe37a'; g.lineWidth=2; g.strokeRect(VW/2-90,VH/2+20,180,46);
    g.font='bold 15px monospace'; g.fillStyle='#ffe37a'; g.fillText('▣ SCREENSHOT',VW/2,VH/2+50);
    g.strokeStyle='#8b8fa0'; g.strokeRect(VW/2-90,VH/2+78,180,46);
    g.fillStyle='#aeb2c2'; g.fillText('⚙ SETTINGS',VW/2,VH/2+108);
    g.strokeStyle='#e8e2d0'; g.strokeRect(VW/2-90,VH/2+136,180,46);
    g.fillStyle='#e8e2d0'; g.fillText('MAIN MENU',VW/2,VH/2+166);
  }
  if(settingsOpen) drawSettings();                  // the settings sheet floats over it all
  /* fullscreen flash */
  if(flashA>0){ g.globalAlpha=flashA; g.fillStyle=flashCol; g.fillRect(0,-PAD_TOP,VW,VH+PAD_TOT); g.globalAlpha=1; }
  g.restore();                                      // lift the stage clip
}

/* ============================== 13. MAIN LOOP ============================== */
let lastTime=performance.now();
let hadFocus=true;
function frame(now){
  requestAnimationFrame(frame);
  const gap=(now-lastTime)/1000;
  /* watchdog: a long frame gap means the browser suspended us — freeze the run.
     Focus is checked EDGE-triggered (only the moment it is lost pauses; some mobile
     browsers report no focus at all, and a level check locked the game on pause) */
  if(gap>0.6&&GAMEPLAY_MODES.includes(mode)) paused=true;
  const foc=document.hasFocus();
  if(hadFocus&&!foc&&GAMEPLAY_MODES.includes(mode)) paused=true;
  hadFocus=foc;
  let dt=Math.min(gap,1/25); lastTime=now;
  if(paused){ render(); return; }                   // paused: keep drawing, freeze the sim
  if(hitstop>0){ hitstop-=dt; render(); return; }   // hit-stop: freeze the sim, keep drawing
  update(dt);
  render();
}
requestAnimationFrame(frame);
</script>
