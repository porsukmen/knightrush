function activeBossDefinition(){
  /* A Move Lab may advance difficulty without changing its specimen. Normal runs
     remain fully stage-driven; only the lab actor can pin a definition id. */
  const pinned=boss&&(boss.definitionId||(boss._moveLab&&boss._moveLab.definitionId));
  return ENCOUNTERS.get(pinned||selectedEncounterId('boss'));
}
function activeBossAttackSet(){ return activeBossDefinition().attacks; }
function randomComboLength(cycle,movesLeft){
  /* Length has no fixed ceiling: every four cycles widen the possible chain.
     Convert the remaining discounted budget back into a visible-step capacity;
     this preserves endless growth without allowing a selected string to overspend. */
  const growth=Math.max(0,Math.floor((cycle-CFG.RANDOM_COMBO_TIER)/4));
  const min=3+Math.floor(growth/3), max=min+2+growth;
  const capacity=Math.floor(movesLeft/CFG.COMBO_MOVE_COST_RATIO);
  return Math.min(capacity,min+Math.floor(Math.random()*(max-min+1)));
}
function evasiveWeightFactor(cycle){
  const age=Math.max(0,cycle-3), start=CFG.EVASIVE_WEIGHT_START, limit=CFG.EVASIVE_WEIGHT_LIMIT;
  return limit-(limit-start)/(1+age*CFG.EVASIVE_WEIGHT_CURVE);
}
function pairWeightFactor(cycle){
  const age=Math.max(0,cycle-2), start=CFG.PAIR_WEIGHT_START, limit=CFG.PAIR_WEIGHT_LIMIT;
  return limit-(limit-start)/(1+age*CFG.PAIR_WEIGHT_CURVE);
}
function encounterStepKind(step){
  if(step.sweeps||step.mechanic==='squeeze') return 'pinch';
  if(step.sweep) return 'swipe';
  if(step.height==='low'||step.height==='high') return 'jumpduck';
  if(Array.isArray(step.lanes)&&step.lanes.length===2) return 'two_lane';
  return 'single_lane';
}
function guaranteedStepKind(step){
  return encounterStepKind(step);
}
function encounterAttackGroup(attack){
  if(attack.comboType||(attack.steps&&attack.steps.length>1)) return 'combo';
  return attack.steps&&attack.steps.length===1?guaranteedStepKind(attack.steps[0]):'unknown';
}
function encounterAttackGroups(attack){
  return [encounterAttackGroup(attack)];
}
function attackSatisfiesGuarantee(attack,kind){
  return !attack.comboType&&attack.steps&&attack.steps.length===1&&encounterAttackGroups(attack).includes(kind);
}
function encounterStepWeightFactor(step,cycle){
  const kind=encounterStepKind(step);
  if(kind==='single_lane') return 1;
  if(kind==='two_lane') return cycle<2?0:pairWeightFactor(cycle);
  if(kind==='jumpduck') return cycle<3?0:evasiveWeightFactor(cycle);
  if(kind==='swipe') return cycle<4?0:evasiveWeightFactor(cycle);
  return cycle<5?0:evasiveWeightFactor(cycle)*CFG.PINCH_WEIGHT_SCALE;
}
function comboUnlockCycle(attack){
  if(!(attack.comboType||(attack.steps&&attack.steps.length>1))) return 1;
  return CFG.COMBO_UNLOCK_CYCLE+Math.max(0,(attack.comboRank||1)-1);
}
function encounterAttackWeight(attack,cycle){
  const steps=attack.steps||[]; if(!steps.length) return attack.w;
  if(cycle<comboUnlockCycle(attack)) return 0;
  let factorTotal=0;
  for(const step of steps){
    const factor=encounterStepWeightFactor(step,cycle);
    if(factor===0) return 0;                     // cycle one excludes the whole mixed combo
    factorTotal+=factor;
  }
  /* Average step rarity preserves authored combo identity without letting one
     rare mechanic make every ordinary strike in that combo equally unlikely. */
  let weight=attack.w*factorTotal/steps.length;
  /* BALANCE BEAM: as three-stage loops rise, elementary lane hits sink while later
     mechanics rise by the same smooth curve. Once combos debut in loop 6, a
     second gradual tip makes them the dominant late-game family without abruptly
     deleting readable singles. Keep this keyed to combat tier, never raw stage. */
  const stageTip=1-Math.exp(-Math.max(0,cycle-1)*.14);
  const combo=!!(attack.comboType||steps.length>1);
  if(combo){
    const comboTip=1-Math.exp(-Math.max(0,cycle-CFG.COMBO_UNLOCK_CYCLE)*.12);
    /* The guaranteed loop-6 introduction carries onboarding. Weighted combos
       begin restrained, then rise smoothly instead of flipping the table. */
    weight*=.30+stageTip*.30+comboTip*1.35;
  } else {
    const kind=guaranteedStepKind(steps[0]);
    const rise=kind==='two_lane'?.55:kind==='jumpduck'?.75:kind==='swipe'?.95:kind==='pinch'?1.15:0;
    /* The stronger single-lane descent starts in loop 2, not at combo unlock.
       It crosses below the aggregate two-lane family around loop 6 without a
       threshold multiplier, so the balance beam visibly tips instead of flips. */
    weight*=kind==='single_lane'?1-stageTip*.90:1+stageTip*rise;
    if(cycle>=CFG.COMBO_UNLOCK_CYCLE) weight*=1-(1-Math.exp(-(cycle-CFG.COMBO_UNLOCK_CYCLE)*.12))*.28;
  }
  return weight;
}
function encounterAttackPool(attacks,cycle,weightMultiplier){
  const pool=[];
  for(const attack of attacks){
    if((attack.minTier||1)>cycle) continue;
    const weight=encounterAttackWeight(attack,cycle)*(weightMultiplier?weightMultiplier(attack):1);
    if(weight>0) pool.push(weight===attack.w?attack:Object.assign({},attack,{w:weight}));
  }
  return pool;
}
function targetSingleLaneAttackPool(attacks,lane){
  /* Selection owns targeting; immutable species tables keep the correct lane art.
     Collapsing the group preserves its aggregate probability instead of allowing
     the rider's lane to make single attacks one-third as likely. */
  let target=null,totalWeight=0;
  const pool=[];
  for(const attack of attacks){
    if(encounterAttackGroup(attack)!=='single_lane'){ pool.push(attack); continue; }
    totalWeight+=attack.w;
    if(attack.steps[0].lanes[0]===lane) target=attack;
  }
  if(!target) return attacks;                  // hierarchy validation guards boss tables
  pool.push(Object.assign({},target,{w:totalWeight}));
  return pool;
}
function randomComboSelectionWeight(attacks){
  let total=0,count=0;
  for(const attack of attacks) if(attack.comboType||(attack.steps&&attack.steps.length>1)){
    total+=attack.w; count++;
  }
  return (count?total/count:12)*CFG.RANDOM_COMBO_WEIGHT_SCALE;
}
function pickRandomComboSource(attacks,lastId,cycle){
  const choices=attacks.filter(a=>a.id!==lastId);
  const pool=choices.length?choices:attacks;
  let total=0; for(const a of pool) total+=encounterAttackWeight(a,cycle);
  let roll=Math.random()*total;
  for(const a of pool) if((roll-=encounterAttackWeight(a,cycle))<=0) return a;
  return pool[pool.length-1];
}
function buildRandomBossCombo(cycle,movesLeft,sourceSet=activeBossAttackSet()){
  const atomic=sourceSet.filter(a=>(a.minTier||1)<=cycle&&a.steps&&a.steps.length===1&&!a.comboType&&encounterAttackWeight(a,cycle)>0);
  const length=randomComboLength(cycle,movesLeft), steps=[];
  let lastId='';
  for(let i=0;i<length;i++){
    const source=pickRandomComboSource(atomic,lastId,cycle), step=Object.assign({},source.steps[0]);
    /* The first hesitation announces the improvised string. Later tells contract
       into one flowing combo, but attackTeleTime still enforces movement, jump,
       and duck safety floors on every individual strike. */
    step.tele*=i===0?1.06:.55+Math.random()*.20;
    step.travel*=i===0?1:.92+Math.random()*.10;
    step._sourceId=source.id; steps.push(step); lastId=source.id;
  }
  return {id:'random_chain',w:1,minTier:CFG.RANDOM_COMBO_TIER,comboType:'random',rec:.94,steps};

function encounterTempoMultiplier(phase,cycle){
  const tempo=CFG.ENCOUNTER_TEMPO, start=tempo[phase];
  const elapsed=Math.max(0,cycle-1), scaled=elapsed*tempo.curve;
  /* Reuse the original progression pressure instead of adding a second timing
     system. Cubing it leaves onboarding almost untouched, then gradually lowers
     the shared asymptote for normal hits, swipes, combos, recovery and cadence. */
  const pressure=scaled/(1+scaled);
  const floor=lerp(tempo.floor,tempo.deepFloor,pressure*pressure*pressure);
  return floor+(start-floor)/(1+scaled);
}
function encounterTempoRatio(phase,cycle){
  return encounterTempoMultiplier(phase,cycle)/CFG.ENCOUNTER_TEMPO[phase];
}
function encounterAttackTempoCycle(attack,cycle){
  /* Normal moves regain the original every-loop acceleration. Combo strings keep
     the exact shifted curve they had before this change: loop 6 is their debut
     baseline, and only time spent in the active combo era makes them faster. */
  return encounterAttackGroup(attack)==='combo'
    ? Math.max(1,cycle-CFG.COMBO_UNLOCK_CYCLE+2)
    : cycle;
}
function encounterAttackTempoRatio(attack,phase,cycle){
  return encounterTempoRatio(phase,encounterAttackTempoCycle(attack,cycle));
}
function encounterCadenceMultiplier(cycle){
  return encounterTempoRatio('travel',cycle);
}
function openingComboMultiplier(attack,cycle){
  if(encounterAttackGroup(attack)!=='combo'||cycle<CFG.COMBO_UNLOCK_CYCLE) return 1;
  const tempo=CFG.ENCOUNTER_TEMPO;
  return 1+(tempo.comboStart-1)/(1+(cycle-CFG.COMBO_UNLOCK_CYCLE)*tempo.comboCurve);
}
function bossHesitationMultiplier(cycle){
  const variance=CFG.BOSS_HESITATION;
  if(cycle<=variance.start) return 1;
  const pressure=1-Math.exp(-(cycle-variance.start)*variance.curve);
  if(Math.random()>=variance.chanceMax*pressure) return 1;
  return 1+rnd(-variance.swingMax,variance.swingMax)*pressure;
}
function modelViabilityReferenceTravel(attack,step){
  if(!step.contactId) return 0;
  if(encounterAttackGroup(attack)!=='combo') return step.travel*CFG.ENCOUNTER_TEMPO.travel;
  const debut=comboUnlockCycle(attack),tempoCycle=encounterAttackTempoCycle(attack,debut);
  return step.travel*encounterTempoMultiplier('travel',tempoCycle)*openingComboMultiplier(attack,debut);

function applyEncounterTempo(attack,cycle,hesitationScale=1){
  /* Clone only the selected attack, preserving immutable species tables. Every
     animation/contact step uses its normal or combo-family bounded tempo age.
     A stage boss may supply one shared tell offset; minibosses and Labs use 1. */
  const copy=Object.assign({},attack);
  const comboEase=openingComboMultiplier(attack,cycle);
  const tempoCycle=encounterAttackTempoCycle(attack,cycle);
  copy.rec=(attack.rec||.8)*encounterTempoMultiplier('recovery',tempoCycle)*comboEase;
  copy.steps=attack.steps.map(step=>{
    const scaledTravel=Math.max(step.travel*encounterTempoMultiplier('travel',tempoCycle)*comboEase,modelContactTravelFloor(step));
    return Object.assign({},step,{
      tele:step.tele*encounterTempoMultiplier('tele',tempoCycle)*comboEase*hesitationScale,
      travel:scaledTravel,_viabilityReferenceTravel:modelViabilityReferenceTravel(attack,step)

function comboMoveCostForLength(length){
  return Math.max(CFG.COMBO_MOVE_COST_MIN,Math.ceil(length*CFG.COMBO_MOVE_COST_RATIO));
}
function attackMoveCost(attack){
  return encounterAttackGroup(attack)==='combo'?comboMoveCostForLength(attack.steps.length):1;
}
function chooseBossAttack(movesLeft=boss.attacksLeft){
  const cycle=bossCombatTier();             // loop-based ladder; every loop-6 boss gets rank 1
  let unlocked=encounterAttackPool(activeBossAttackSet(),cycle,a=>{
    if(!a.comboType) return 1;
    /* The three authored patterns remain each species' identity. Harder ranks
       gain a bounded preference; an unbounded linear bonus previously made the
       combo family swallow almost every deep-loop selection. */
    const age=Math.max(0,cycle-comboUnlockCycle(a));
    const growth=1-Math.exp(-age*CFG.COMBO_RANK_CURVE);
    return 1+growth*CFG.COMBO_RANK_PREFERENCE*(a.comboRank||1)/3;
  }).filter(a=>attackMoveCost(a)<=movesLeft);
  /* Lock the target when the tell is selected. Moving during the telegraph remains
     the intended dodge; only standalone single-lane attacks track this snapshot. */
  unlocked=targetSingleLaneAttackPool(unlocked,clamp(Math.round(player.x),0,2));
  if(cycle>=CFG.RANDOM_COMBO_TIER&&movesLeft>=CFG.COMBO_MOVE_COST_MIN){
    unlocked.push({id:'random_chain',randomCombo:true,
      w:randomComboSelectionWeight(unlocked)});
  }
  let selected;
  while(boss.guaranteeQueue&&boss.guaranteeQueue.length&&!selected){
    const token=boss.guaranteeQueue.shift();
    const candidates=unlocked.filter(a=>token.id?a.id===token.id:
      token.comboRank?a.comboType==='authored'&&a.comboRank===token.comboRank:
      attackSatisfiesGuarantee(a,token.group));
    if(candidates.length) selected=boss.choose(candidates);
  }
  if(!selected) selected=boss.choose(unlocked);
  const attack=selected.randomCombo?buildRandomBossCombo(cycle,movesLeft):selected;
  return applyEncounterTempo(attack,cycle,bossHesitationMultiplier(cycle));
}
function hurtBoss(dmg,fromCounter){
  if(!boss||boss.state==='dying'||boss.state==='finisher') return;
  /* counter damage keeps counting past 0 HP — the excess lands in overkill,
     together with the whole volley, when the fight resolves */
  boss.hp-=dmg; if(boss.phase!=='dodge') boss.dealt+=dmg;
  if(boss.hp<=0&&boss.phase==='dodge'&&!boss._beaten){ boss._beaten=true;
    floater(VW/2,300,'IT STAGGERS — KEEP THE CHAIN GOING!','#ffe37a',18); }
  if(fromCounter&&hasRelic('venom')){ boss.poisonT=8;              // VENOM VIAL: the counter envenoms
    floater(laneX(boss.x,proj(boss.z).t),proj(boss.z).y-160*proj(boss.z).s,'POISONED!','#7ade6a',15); }
  if(!fromCounter&&hasRelic('brand')){ boss.burnT=4;               // BRAND OF EMBERS: steel ignites
    if(Math.random()<0.4) floater(laneX(boss.x,proj(boss.z).t)+20,proj(boss.z).y-160*proj(boss.z).s,'BURNING!','#ff9a3a',15); }
  boss.hurtT=0.14; SFX.thud(); shake(3,.12);
  const p=proj(boss.z);
  burst(laneX(boss.x,p.t),p.y-60*p.s,12,['#ff4d3a','#ffe37a'],180,120,4,.6);
  floater(laneX(boss.x,p.t),p.y-120*p.s,'-'+dmg,fromCounter?'#ffe37a':'#fff',fromCounter?22:18);

/* called once the FULL volley has landed: score first, THEN the kill animation */
function resolveVolley(){

    const overkill=Math.max(0,-boss.hp), pts=RUN_POLICY().bossScoreAt(loop), okPts=Math.round(overkill*CFG.OVERKILL_MULT);
    bossScoreRun+=pts; overkillRun+=okPts; bossKills++;

      burst(bx,p.y-50*p.s,46,['#3a3646','#ff4d3a','#ffe37a','#e8e2d0'],300,150,5,1.1);
      for(let i=0;i<14;i++) particles.push({x:bx+rnd(-40,40),y:p.y-rnd(20,90)*p.s,
        vx:rnd(-14,14),vy:rnd(-90,-40),life:1.4,maxLife:1.4,size:rnd(2,5),col:'#cfe0ff',grav:-16}); }
    if(T>2.5){
      if(pack>0){ floater(VW/2,340,activeMinibossDefinition().byeLine,'#9ecbff',17); }
      pack=0; packTypes=[];                     // its debt is paid — the beast returns to its wild
      if(hasRelic('idol')){ awardGold(40); floater(VW/2,368,'GOLDEN IDOL +40','#ffd23a',17); }
      boss=null; RUN_POLICY().afterBoss(loop);   // policy chooses reward/continuation; arena stays available
    }
    return;
  }
  if(st==='finisher'){                       /* volley failed → one undodgeable claw. shield may eat it. */
    if(T>=0.45&&!boss._finRoar){ boss._finRoar=true; SFX.roar(); shake(7,.35); }
    if(activeBossDefinition().stagedFinisher){
      const marks=[1.29,1.63,2.05], lanes=[0,2,1];
      while(boss._finStage<marks.length&&T>=marks[boss._finStage]){
        const ln=lanes[boss._finStage++], x=laneX(ln,1);
        SFX.thud(); shake(8,.18); stopTime(.045);
        burst(x,PLAYER_Y-48,16,['#ff6a2a','#ffd23a','#e8e2d0'],190,120,4,.55);
        spawnSlash(x,PLAYER_Y-58,-.35,'#ffd23a');
      }
    }
    if(T>=2.15&&!boss._fin){
      boss._fin=true; flash('#ff2638',.9); shake(18,.7); stopTime(.28);
      damagePlayer(activeBossDefinition().finisherHit,true);
    }
    return;
  }
  if(st==='volley'){                         /* --- PC's TURN: unleash every collected weapon --- */
    boss.volleyTimer-=dt;
    if(boss.volleyTimer<=0){
      boss.volleyTimer=CFG.VOLLEY_EVERY;
      let kind=null;
      if(arrows>0){ kind='arrow'; arrows--; }
      else if(lances>0){ kind='lance'; lances--; }
      if(kind){
        const base=dmgOf(kind);
        const dmg=Math.round(base*(1+chainBonus()*chainStacks));
        addChainStack();                     // arrows & lances feed the chain
        player.attackAnim=1;
        if(kind==='lance') SFX.lance(); else SFX.arrow();
        projectiles.push({kind,t:0,dmg});
      } else if(!packLeap && boss.packLeapt<pack){          // then the PACK: one leap at a time
        packLeap={idx:boss.packLeapt, phase:'fly', t:0};
        boss.packLeapt++; playEncounterSound(packEncounter(packLeap.idx));
      } else if(projectiles.length===0 && !packLeap && (boss.packLeapt>=pack)){
        resolveVolley();                     // every shot landed, every wolf home → judge it
      }
    }
    return;
  }
  if(st==='idle'){
    if(boss._moveLab&&boss._moveLab.index>=boss._moveLab.moves.length&&hazards.length===0){
      if(boss._moveLab.loopMoveset&&boss._moveLab.moves.length){
        boss._moveLab.index=0; boss._moveLab.doneT=0; boss.attacksLeft=boss._moveLab.moves.length;
        boss.atkTimer=.45; return;
      }
      if(boss._moveLab.doneT===0) floater(VW/2,270,'BOSS MOVE LAB COMPLETE','#c0f79a',20);
      boss._moveLab.doneT+=dt; if(boss._moveLab.doneT>1.35) finishMoveLab();
      return;
    }
    if(!boss._moveLab&&boss.phase==='dodge'&&boss.attacksLeft<=0&&hazards.length===0){
      boss.phase='volley'; boss.state='volley'; boss.stateT=0; boss.volleyTimer=0.6;
      const total=arrows+lances+pack;
      floater(VW/2,280,total>0?'YOUR TURN — UNLEASH!':'YOUR TURN... BUT YOU CARRY NOTHING','#c0f79a',22);
      SFX.relic();
      return;
    }
    boss.atkTimer-=dt;
    if(boss.atkTimer<=0&&boss.attacksLeft>0){
      if(boss._moveLab){
        boss.attacksLeft--;
        boss._moveLab.selected=boss._moveLab.index;
        boss.attack=boss._moveLab.moves[boss._moveLab.index++];
        if(boss.attack._labVisual){
          const visual=boss.attack;boss._moveLab.visualMode=visual._labVisual;
          boss.attack=null;boss.sequenceIndex=0;boss.state='lab_bear_turn';boss.stateT=0;
          boss.x=boss.xTarget=1;boss.z=CFG.BOSS_Z;hazards=[];
          floater(VW/2,230,boss._moveLab.index+'/'+boss._moveLab.moves.length+' · BEAR 3D ROTATION','#ff9a3a',15);
          return;
        }
        floater(VW/2,230,boss._moveLab.index+'/'+boss._moveLab.moves.length+' · '+boss.attack._labName,'#ff9a3a',15);
      } else {
        boss.attack=chooseBossAttack(boss.attacksLeft);
        const planned=boss.attack.steps?boss.attack.steps.length:1;
        boss.attacksLeft-=attackMoveCost(boss.attack); // reserve the complete discounted cost before it starts
        if(boss.attack.comboType) floater(VW/2,250,
          (boss.attack.comboType==='random'?'WILD CHAIN':'BOSS COMBO')+' x'+planned,
          boss.attack.comboType==='random'?'#ff5b3d':'#ff9a3a',16);
      }
      boss.state='tele'; boss.stateT=0;
      boss.sequenceIndex=0; cueBossMove();
      SFX.roar();
    }
  } else if(st==='tele'){
    const a=currentBossMove();
    if(a&&T>=boss.teleTime){
      boss.state='strike'; boss.stateT=0; SFX.slash();
      const def=activeBossDefinition();
      if(usesContactRig(a)&&def.contactRig) spawnModelHazard(boss,a,def,BOSS_SOURCE);
      else if(a.sweeps) spawnSweepHazards(a.sweeps,a.height,a.travel,BOSS_SOURCE);
      else if(a.sweep) spawnSweepHazard(a.sweep,a.height,a.travel,BOSS_SOURCE);
      else spawnHazard(boss.hazardLanes,a.height,a.travel,BOSS_SOURCE);
    }
  } else if(st==='strike'){
    const a=currentBossMove();
    /* Damage resolves at a.travel; this short extra beat leaves the paw/muzzle
       visibly planted on the knight's plane instead of cutting straight to recover. */
    if(a&&T>=a.travel+CFG.IMPACT_HOLD){
      const hasNext=boss.attack.steps&&boss.sequenceIndex<boss.attack.steps.length-1;
      const willContinue=hasNext;
      if(a.sweep&&a.bodySweep){
        const sweepEnd=sweepBodyLane(a,1);
        /* Hydra recoveries keep the pre-swipe body position as home. The head
           lifts from the far edge while the bulk glides back instead of snapping. */
        if(a.recoverAnim||willContinue) boss.xTarget=sweepEnd;
        else { boss.x=sweepEnd; boss.xTarget=boss.x; }
      }
      if(willContinue){
        if(comboStepRecoveryAnim(a)){ boss.state='comboRecover'; boss.stateT=0; }
        else { boss.sequenceIndex++; boss.state='tele'; boss.stateT=0; cueBossMove(); }
      } else { boss.state='recover'; boss.stateT=0; }
    }
  } else if(st==='comboRecover'){
    const a=currentBossMove();
    if(!a||T>=comboStepRecoveryTime(a,boss.attack)){
      boss.sequenceIndex++; boss.state='tele'; boss.stateT=0; cueBossMove();
    }
  } else if(st==='recover'){
    if(T>=encounterRecoveryTime(boss.attack)){
      boss.state='idle'; boss.stateT=0;
      if(boss._moveLab){ boss.atkTimer=.85; return; }
       /* Full recovery separates whole attacks. The Turtle's short comboRecover
          is only a visible neck follow-through, so the selected string still reads
          as one continuous combo rather than several independently paced attacks. */
       boss.atkTimer=encounterAttackDelay(boss.attack);
    }
  }
}
/* THE PACK LEAP: a tamed miniboss arcs into the stage boss, strikes, and returns */
function updatePackLeap(dt){
  if(!packLeap||!boss) return;
  const L=packLeap; L.t+=dt;
  if(L.phase==='fly'&&L.t>=0.5){ L.phase='maul'; L.t=0;
    const dmg=packLeapDmg();
    hurtBoss(dmg,false);
    addChainStack();                                    // every follower hit feeds the boss chain
    if(hasRelic('horn')) addChainStack();               // horn grants one additional fang stack
    if(hasRelic('alpha')){ addChainStack(); addChainStack(); }   // alpha grants two more
    const p=proj(boss.z);
    floater(laneX(boss.x,p.t),p.y-150*p.s,packEncounter(L.idx).fangLine,'#9ecbff',24);
    spawnSlash(laneX(boss.x,p.t),p.y-60*p.s,rnd(-0.6,0.6),'#9ecbff');
    shake(6,.2); stopTime(.05);
  }
  else if(L.phase==='maul'&&L.t>=0.35){ L.phase='back'; L.t=0; }
  else if(L.phase==='back'&&L.t>=0.4){ packLeap=null; }
}
function drawPackLeap(){
  if(!packLeap||!boss) return;
  const L=packLeap;
  const p0={x:laneX(player.x,1)-58,y:PLAYER_Y+6,s:1.0};
  const pb=proj(boss.z), p1={x:laneX(boss.x,pb.t),y:pb.y-30*pb.s,s:pb.s*1.9};
  const ally=packEncounter(L.idx);
  if(L.phase==='fly'){
    const k=easeOut(L.t/0.5), arc=Math.sin(k*Math.PI)*90;
    ally.allyBack(lerp(p0.x,p1.x,k),lerp(p0.y,p1.y,k)-arc,lerp(p0.s,p1.s,k),perfNow,9);
  } else if(L.phase==='maul'){
    const gn=Math.sin(L.t*40)*4;                        // savaging shudder
    ally.allyBack(p1.x+gn,p1.y,p1.s,perfNow,9);
  } else {
    const k=easeOut(L.t/0.4), arc=Math.sin(k*Math.PI)*60;
    ally.allyFront(lerp(p1.x,p0.x,k),lerp(p1.y,p0.y,k)-arc+24,lerp(p1.s*0.8,1.1,k));
  }
}
function updateProjectiles(dt){
  for(let i=projectiles.length-1;i>=0;i--){ const pr=projectiles[i];
    pr.t+=dt/0.42;
    if(pr.t>=1){ projectiles.splice(i,1);
      if(boss&&boss.state!=='dying') hurtBoss(pr.dmg,false);
    }
  }
}
function drawProjectiles(){
  if(!boss) return;
  const p1={x:laneX(player.x,1),y:PLAYER_Y-70}, p2=proj(boss.z);
  const bx=laneX(boss.x,p2.t), by=p2.y-60*p2.s;
  for(const pr of projectiles){
    const t=easeOut(pr.t), x=lerp(p1.x,bx,t), y=lerp(p1.y,by,t)-Math.sin(t*Math.PI)*60;
    g.save(); g.translate(x,y); g.rotate(Math.atan2(by-p1.y,bx-p1.x));
    if(pr.kind==='lance'){ g.shadowColor='#9ecbff'; g.shadowBlur=12;
      /* a thrown JOUSTING LANCE: point leads, shaft tapers back to the vamplate */
      g.fillStyle='#e8f0ff'; g.beginPath(); g.moveTo(24,0); g.lineTo(16,-2.6); g.lineTo(16,2.6); g.closePath(); g.fill();
      g.fillStyle='#d9b878'; g.beginPath(); g.moveTo(16,-2); g.lineTo(-8,-3.4); g.lineTo(-8,3.4); g.lineTo(16,2); g.closePath(); g.fill();
      g.fillStyle='#8a6a3a'; g.fillRect(2,-2.6,3,5.2); g.fillRect(9,-2.2,3,4.4);   // spiral bands
      g.fillStyle='#9ecbff'; g.beginPath(); g.moveTo(-8,-5); g.lineTo(-3,-2.6) ; g.lineTo(-3,2.6); g.lineTo(-8,5); g.closePath(); g.fill(); // vamplate cone
      g.fillStyle='#5a4227'; g.fillRect(-15,-2,7,4); }   // grip trailing
    else { g.shadowColor='#c0f79a'; g.shadowBlur=8;
      drawArrowSprite(0,0,1.5,Math.PI/2,false); }        // flies head-first down the lane
    g.shadowBlur=0; g.restore();
  }
}

function validateEncounterHierarchy(){
  const tempo=CFG.ENCOUNTER_TEMPO;
  if(!(tempo.deepFloor>0&&tempo.deepFloor<=tempo.floor&&
       tempo.floor<=Math.min(tempo.tele,tempo.travel,tempo.recovery)))
    throw new Error('ENCOUNTER_TEMPO floors must be positive and ordered below phase starts');
  if(!(CFG.COMBO_MOVE_COST_RATIO>0&&CFG.COMBO_MOVE_COST_RATIO<=1))
    throw new Error('COMBO_MOVE_COST_RATIO must be within (0, 1]');
  if(CFG.COMBO_MOVE_COST_MIN<2||comboMoveCostForLength(3)>CFG.COMBO_MOVE_COST_MIN)
    throw new Error('COMBO_MOVE_COST_MIN must fund the shortest three-step random combo');
  const viability=MODEL_DODGE_VIABILITY;
  if(!(viability.targetUsable>0&&viability.frameMargin>=1/30&&viability.maxTimingBonus>=0&&
       viability.maxShellScale>1&&viability.samples>=32&&viability.travelFloorMid>0&&
       viability.travelFloorPosture>=viability.travelFloorMid))
    throw new Error('MODEL_DODGE_VIABILITY needs a 30 FPS margin, bounded compensation, and ordered travel floors');
  if(!Object.isFrozen(FRAME_HIT_CLASSES)||!Object.isFrozen(BOSS_HIT_CLASSES)||
     !Object.isFrozen(MINIBOSS_FRAME_MECHANIC_KEYS)||!Object.isFrozen(MINIBOSS_FRAME_MECHANICS))
    throw new Error('Encounter hit-class and miniboss mechanic registries must be frozen');
  const miniMechanicNames=Object.keys(MINIBOSS_FRAME_MECHANICS);
  if(miniMechanicNames.length!==MINIBOSS_FRAME_MECHANIC_KEYS.length||
     !MINIBOSS_FRAME_MECHANIC_KEYS.every(key=>MINIBOSS_FRAME_MECHANICS[key]===UNIVERSAL_ENCOUNTER_HITS[key]))
    throw new Error('Miniboss frame catalogue must be an exact shared-spec allowlist');
  for(const hitClass of Object.values(BOSS_HIT_CLASSES)) if(!Object.isFrozen(hitClass))
    throw new Error('Every encounter hit class must be frozen');
  for(const stage of STAGES.list){
    for(const role of ['boss','miniboss']){
      const ids=role==='boss'?stage.bossIds:stage.minibossIds;
      for(const id of ids){
        const def=ENCOUNTERS.get(id);
        if(def.role!==role) throw new Error('Stage '+stage.id+' lists '+id+' as '+role+' but it is '+def.role);
      }
    }
  }
  for(const def of ENCOUNTERS.list) if(def.role==='boss'){
    if(def.labOnly) continue;
    for(const group of ['single_lane','two_lane','jumpduck','swipe','pinch'])
      if(!def.attacks.some(a=>encounterAttackGroups(a).includes(group)))
        throw new Error(def.id+' needs an attack in shared group '+group);
    const singles=def.attacks.filter(a=>encounterAttackGroup(a)==='single_lane');
    for(const lane of ALL_LANES) if(!singles.some(a=>a.steps[0].lanes[0]===lane))
      throw new Error(def.id+' single_lane group needs a lane '+lane+' attack');
    const posture=def.attacks.filter(a=>encounterAttackGroup(a)==='jumpduck');
    if(!posture.some(a=>a.steps[0].height==='low')||!posture.some(a=>a.steps[0].height==='high'))
      throw new Error(def.id+' jumpduck group needs stationary low and high attacks');
    for(let tier=CFG.COMBO_UNLOCK_CYCLE;tier<=CFG.COMBO_UNLOCK_CYCLE+2;tier++){
      const rank=tier-CFG.COMBO_UNLOCK_CYCLE+1;
      if(!def.attacks.some(a=>a.comboType==='authored'&&a.comboRank===rank))
        throw new Error(def.id+' needs authored combo rank '+rank+' for loop '+tier);
      const queue=bossGuaranteeQueue(tier);
      if(queue.length!==1||queue[0].comboRank!==rank)
        throw new Error(def.id+' has invalid loop '+tier+' combo guarantee');
    }
  }
  for(const def of ENCOUNTERS.list) for(const attack of def.attacks) for(const step of attack.steps||[]){
    const set=def.role==='boss'?BossCombatMechanics:MinibossCombatMechanics;
    if(!step.mechanic||!set.specs[step.mechanic])
      throw new Error(def.id+'/'+attack.id+' has no registered '+def.role+' mechanic');
    const hitClass=hitClassesForRole(def.role)[step.hitClass];
    if(!hitClass) throw new Error(def.id+'/'+attack.id+' has unknown hitClass: '+step.hitClass);
    const isPhysical=hitClass.resolver==='physical',hasTravelShape=!!(step.sweep||step.sweeps);
    const laneCount=typeof step.lanes==='function'?1:(step.lanes||[]).length;
    if(hitClass.lanes!==laneCount||(hitClass.height&&hitClass.height!==step.height))
      throw new Error(def.id+'/'+attack.id+' hitClass does not match its lane/posture geometry: '+step.hitClass);
    if(def.role==='miniboss'&&hitClass.resolver!=='frame')
      throw new Error(def.id+'/'+attack.id+' miniboss attacks must be frame-based');
    if(hitClass.resolver==='rig'&&!step.contactId)
      throw new Error(def.id+'/'+attack.id+' model lane hit needs a contactId');
    if(hitClass.resolver==='frame'&&step.contactId)
      throw new Error(def.id+'/'+attack.id+' frame hit cannot own a contactId');
    if(isPhysical&&!step.contactId&&!hasTravelShape)
      throw new Error(def.id+'/'+attack.id+' physical swipe/pinch needs a contact rig or visible sweep');
    if(!isPhysical&&hasTravelShape)
      throw new Error(def.id+'/'+attack.id+' traveling swipe/pinch cannot use a frame hitClass');
    if(step.contactId){
      const rig=def.contactRig,profile=rig&&rig.profiles&&rig.profiles[step.contactId];
      if(!rig) throw new Error(def.id+'/'+attack.id+' uses contactId without an encounter contact rig');
      if(!profile) throw new Error(def.id+'/'+attack.id+' has unknown contactId '+step.contactId);
      const validGeometry=profile.visualBounds?
        profile.coreScale>=1&&profile.shellScale>profile.coreScale:
        profile.radius>0&&profile.near>=0;
      if(!validGeometry||!Array.isArray(profile.joints)||!profile.joints.length)
        throw new Error(def.id+'/'+attack.id+' has invalid contact profile '+step.contactId);
      if(!Object.isFrozen(rig)||!Object.isFrozen(rig.profiles)||!Object.isFrozen(profile)||!Object.isFrozen(profile.joints))
        throw new Error(def.id+'/'+attack.id+' contact profile data must be frozen');
      if(typeof rig.createPose!=='function'||typeof rig.samplePose!=='function')
        throw new Error(def.id+' contact rig needs cached pose construction and sampling');
      const pose=rig.createPose();
      for(const joint of profile.joints){
        if(!pose[joint]) throw new Error(def.id+'/'+attack.id+' contact profile references unknown joint '+joint);
        if(profile.visualBounds&&typeof pose[joint].r!=='number')
          throw new Error(def.id+'/'+attack.id+' visual-bound joint needs a cached radius '+joint);
      }
    }
  }
}

    /* Begin out on the road and walk into the fixed combat distance during the

    state:'intro', stateT:0, attack:null, hazardLanes:[], hurtT:0,
    atkTimer:encounterAttackDelay(), lastIds:[],
    /* a counter duel: it attacks MINIBOSS_DODGE_ATKS times — land MINIBOSS_COUNTERS counters and it falls.

    attacksLeft:minibossAttackCount(), counters:0, _stg:0,

  /* but the forest stays: fill the treeline so the duel doesn't happen in a void */

  for(let tz=5;tz<SPAWN_FAR;tz+=rnd(...scenery.minibossPrimaryGap))
    if(!roadsideScenery.some(t=>Math.abs(t.z-tz)<1.4)) spawnMinibossSceneryRow(tz);

function updateMiniboss(dt){
  const w=minibossFight; if(!w) return;
  w.tick(dt);
  /* Optional Wolf turntable hook retained for renderer inspection. It is off in
     the playable Move Lab, where the real frame-hit attacks now run normally. */
  if(w._moveLab&&w._moveLab.visualMode==='wolf_turntable'){
    w.z=10;w.x=w.xTarget=1;w.state='lab_wolf_turn';w.attack=null;w.sequenceIndex=0;
    w.hazardLanes=[];w.hurtT=0;hazards=[];return;
  }
  w.x+=(w.xTarget-w.x)*Math.min(1,5*dt);
  if(w.state==='intro'){                       // cinematic: the miniboss walks in and bars your path
    w.z=lerp(18,10,easeOut(clamp(w.stateT/1.55,0,1)));
    if(w.stateT>2.8){ w.z=10; w.state='idle'; w.stateT=0; w._introDone=true; }
    return;
  }
  if(w.state==='flee'){                        // not enough counters — it melts into the trees
    if(w.stateT>1.0){
      minibossFight=null;
      floater(VW/2,300,activeMinibossDefinition().fleeLine,'#8b8fa0',16);
      setMode('run');
    }
    return;
  }
  if(w.state==='dying'){                       /* --- the TAMING: it howls once, then comes to heel --- */
    const p=proj(w.z), wx=laneX(w.x,p.t);
    if(w._stg===0&&w.stateT>=0.2){ w._stg=1; playEncounterSound(); }
    if(w._stg===1&&w.stateT>=1.1){ w._stg=2;   // a soft ring of light — a bond, not a wound
      burst(wx,p.y-30*p.s,16,['#9ecbff','#e8e2d0'],140,40,3,.7);
      w.xTarget=player.x;                       // it trots to your side
    }
    if(w.stateT>1.8){
      const def=activeMinibossDefinition();
      if(pack<CFG.PACK_MAX){ pack++; packTypes.push(def.ally);
        floater(VW/2,300,def.tameLine,'#9ecbff',20);
      } else { awardGold(CFG.PACK_FULL_GOLD);
        floater(VW/2,300,'THE PACK IS FULL — IT OFFERS TRIBUTE  +'+CFG.PACK_FULL_GOLD+' gold','#ffd23a',17);
      }
      minibossFight=null; SFX.relic();
      setMode('run');
    }
    return;
  }
  /* Shared miniboss attack state machine (same telegraph framework as bosses). */
  if(w.state==='idle'){
    if(w._moveLab&&w._moveLab.index>=w._moveLab.moves.length&&hazards.length===0){
      if(w._moveLab.doneT===0) floater(VW/2,270,'MINIBOSS MOVE LAB COMPLETE','#c0f79a',20);
      w._moveLab.doneT+=dt; if(w._moveLab.doneT>1.35) finishMoveLab();
      return;
    }
    if(!w._moveLab&&w.attacksLeft<=0&&hazards.length===0){  // out of attacks, not enough counters → it flees
      w.state='flee'; w.stateT=0; playEncounterSound();
      return;
    }
    w.atkTimer-=dt;
    if(w.atkTimer<=0&&w.attacksLeft>0){
      w.attacksLeft--;
      if(w._moveLab){
        w._moveLab.selected=w._moveLab.index;
        w.attack=w._moveLab.moves[w._moveLab.index++];
        if(w.attack._labVisual){
          const visual=w.attack;
          w._moveLab.visualMode=visual._labVisual;w.attack=null;w.sequenceIndex=0;
          w.state='lab_wolf_turn';w.stateT=0;w.x=w.xTarget=1;w.z=10;hazards=[];
          floater(VW/2,230,w._moveLab.index+'/'+w._moveLab.moves.length+' MODEL SPIN','#c9f74a',15);
          return;
        }
        w._moveLab.visualMode=null;
        floater(VW/2,230,w._moveLab.index+'/'+w._moveLab.moves.length+' · '+w.attack._labName,'#c9f74a',15);
      } else {
        const miniTier=bossCombatTier();
        const selected=w.choose(encounterAttackPool(minibossAttackSet(),miniTier));
        w.attack=applyEncounterTempo(selected,miniTier);
      }
      w.state='tele'; w.stateT=0;
      w.sequenceIndex=0; cueMiniMove();
    }
  } else if(w.state==='tele'){
    const a=currentMiniMove();
    if(a&&w.stateT>=w.teleTime){
      w.state='strike'; w.stateT=0; SFX.slash();
      /* The restricted miniboss catalogue guarantees a scheduled frame hit.
         Boss-only model/sweep routes do not belong in this state machine. */
      spawnHazard(w.hazardLanes,a.height,a.travel,MINIBOSS_SOURCE);
    }
  } else if(w.state==='strike'){
    const a=currentMiniMove();
    if(a&&w.stateT>=a.travel+CFG.IMPACT_HOLD){
      if(w.attack.steps&&w.sequenceIndex<w.attack.steps.length-1){
        /* Miniboss strings now use the same visible contact-release phase as
           bosses. The model reverses its own joints briefly before the next tell. */
        if(comboStepRecoveryAnim(a)){ w.state='comboRecover'; w.stateT=0; }
        else { w.sequenceIndex++; w.state='tele'; w.stateT=0; cueMiniMove(); }
      }
      else { w.state='recover'; w.stateT=0; }
    }
  } else if(w.state==='comboRecover'){
    const a=currentMiniMove();
    if(!a||w.stateT>=comboStepRecoveryTime(a,w.attack)){
      w.sequenceIndex++; w.state='tele'; w.stateT=0; cueMiniMove();
    }
  } else if(w.state==='recover'){
    if(w.stateT>=encounterRecoveryTime(w.attack)){
      w.state='idle'; w.stateT=0;
      w.atkTimer=w._moveLab ? .85 : encounterAttackDelay(w.attack);
    }
  }
}
/* --- the tamed miniboss FOLLOWS the knight: it copies your movement on a short
       delay (lane changes, jumps), trotting between you and the camera so we
       see its haunches and wagging tail — back view, like the horse.
       during the boss fight it steps up and stands at your side. --- */
let allyTrail=[], allyTrailStart=0;
function updateAllyTrail(){
  allyTrail.push({t:perfNow,x:player.x,j:jumpHeight()});
  while(allyTrailStart<allyTrail.length&&allyTrail[allyTrailStart].t<perfNow-0.8) allyTrailStart++;
  /* compact occasionally instead of shifting the whole trail every frame */
  if(allyTrailStart>64){ allyTrail.splice(0,allyTrailStart); allyTrailStart=0; }
}
function trailSample(delay){
  const tt=perfNow-delay;
  for(let i=allyTrail.length-1;i>=0;i--) if(allyTrail[i].t<=tt) return allyTrail[i];
  return allyTrail[allyTrailStart]||{x:player.x,j:0};
}
function drawPackAllies(){
  if(pack<=0) return;
  const side=[-58,58,-92];                    // formation spots beside you for the showdown
  for(let i=0;i<pack;i++){
    if(packLeap&&packLeap.idx===i) continue;  // this one is mid-leap — drawn separately
    if(mode==='boss'||mode==='bossintro'){
      packEncounter(i).allyBack(laneX(player.x,1)+side[i],PLAYER_Y+6+(i===2?10:0),0.95,perfNow*0.6+i,0);
      continue;
    }
    /* each follower replays your path at its own short delay */
    const sm=trailSample(0.16*(i+1));
    const x=laneX(sm.x,1)+(i===1?-14:i===2?14:0), y=PLAYER_Y+30+i*11-sm.j*0.85;
    g.globalAlpha=0.25*(1-sm.j/CFG.JUMP_H*.7); g.fillStyle='#000';
    g.beginPath(); g.ellipse(x,PLAYER_Y+40+i*11,17,4.5,0,0,TAU); g.fill(); g.globalAlpha=1;
    packEncounter(i).allyBack(x,y,1.0-i*0.07,perfNow+i*0.9,speed());
  }
}
/* ---- THE MIRE CROCODILE: three authored flat block views ----

   involved. Collision remains the scheduled miniboss frame hit. */
function drawCrocodile(x,y,scale,state,t,hurtFlash,contactXs){
  const recovering=state.startsWith('recover_miniboss_from:'),recoveryT=recovering?clamp(t,0,1):0;
  if(recovering){state=state.slice(state.indexOf(':')+1);t=1-easeInOut(recoveryT);}
  const packBack=state==='pack_back'||state==='pack_run';
  const held=hesitationPose(t),dir=state.endsWith('_left')?-1:1;
  let view=packBack?'back':'front',jaw=0,gait=0,phase=0,flipY=false,wind=0;
  if(state==='run'||state==='pack_run'){gait=.85;phase=perfNow*8;}
  else if(state==='flee'){view='side';gait=1;phase=perfNow*9;}
  else if(state==='tele_crocodile_rush'){jaw=held*.88;gait=held*.12;}
  else if(state==='strike_crocodile_rush'){jaw=biteJawAt(t);gait=1;phase=t*TAU*2;}

  const green=hurtFlash?'#ffffff':'#586d3f',greenL=hurtFlash?'#ffffff':'#7b8b4b';
  const greenD=hurtFlash?'#eeeeee':'#3e5234',belly=hurtFlash?'#ffffff':'#8b7a4e';
  const bellyD=hurtFlash?'#eeeeee':'#66583b',mouth=hurtFlash?'#ffffff':'#7a2a3a';
  const tongue=hurtFlash?'#ffffff':'#ba4f58',tooth=hurtFlash?'#ffffff':'#d8d3c4';

  };

    const lift=Math.max(0,Math.cos(phase+(index%2)*Math.PI))*.85*gait;
    const bend=rootX<0?-1.45:1.45;
    const col=far?dark:greenD,alpha=far?.62:1;
    g.save();g.globalAlpha*=alpha;
    R(rootX,-8.2,4.0,5.2,col);R(rootX+.55,-7.7,1.15,4.5,greenL);
    R(rootX+bend+stride,-3.6+stride*.16-lift,3.0,4.4,col);
    R(rootX+bend-.45+stride,-.25-lift,4.8,1.7,deep);
    for(let c=0;c<3;c++)R(rootX+bend+2.4+c*.72+stride,.65-lift,.55,1.0,tooth);
    g.restore();
  };
  const plantedLeg=(rootX,rootY,sideSign,index,backLeg)=>{
    const step=Math.sin(phase+(index%2)*Math.PI)*.72*gait;
    const col=backLeg?greenD:green,alpha=backLeg?.72:1;
    g.save();g.globalAlpha*=alpha;
    const out=sideSign*(2.0+step),upperX=rootX-(sideSign<0?4.2:0);
    R(upperX,rootY,4.2,6.2,col);R(upperX,rootY,1.2,5.4,greenL);
    const lowerX=rootX+out-(sideSign<0?3.2:0);
    R(lowerX,rootY+5.0,3.2,5.4,col);R(lowerX+sideSign*.35,rootY+9.2,4.3,2.0,deep);
    for(let c=0;c<3;c++)R(lowerX+sideSign*(2.7+c*.62),rootY+10.2+c*.08,.55,1.15,tooth);
    g.restore();
  };
  const tailPower=(gait>.2||view==='side'||view==='under')?.105:.025;
  const tailJoint=Math.round(Math.sin(perfNow*2.35+phase*.14)*4)/4*tailPower;
  const jointedTail=(baseX,baseY,underView=false,baseAngle=0)=>{
    const cols=underView?[belly,belly,bellyD]:[greenD,green,greenD];
    const hi=underView?belly:greenL,lengths=[11,10,9],heights=[8,5.8,3.4];
    g.save();g.translate(baseX,baseY);g.rotate(baseAngle+tailJoint*.35);
    for(let i=0;i<3;i++){
      const h=heights[i],len=lengths[i];
      R(-.5,-h*.5,len+1,h,cols[i]);R(.4,-h*.5,len*.68,1.15,hi);
      if(!underView){
        R(0,h*.5-1.3,len,1.3,bellyD);
        R(2,-h*.5-1.1,1.7,1.5,dark);R(len-2.2,-h*.5-.8,1.3,1.1,dark);
      }

  };
  const sideMouth=(open)=>{
    const hingeX=-15.7,hingeY=-10.5,a=-open*.34,ca=Math.cos(a),sa=Math.sin(a);
    const tipX=hingeX-14.8*ca-.2*sa,tipY=hingeY-14.8*sa+.2*ca;
    R(-31,-14.5,15.5,4.0,greenL);R(-29.5,-14.5,12.5,1.2,green);
    if(open>.04)Q([[-30.5,-10.7],[hingeX,-10.7],[hingeX,-10.1],[tipX,tipY]],mouth);

    g.save();g.translate(hingeX,hingeY);g.rotate(a);

    if(open>.08)R(-13.8,.35,10.5,1.0,tongue);
    for(let i=0;i<9;i++)R(-14.2+i*1.48,.2,.58,-1.2,tooth);

      R(-19,-14.2,5,8.4,bellyD);

      R(-10,-7.5,29.5,2.5,bellyD);
      R(-15,-16.2,8,11.2,greenD);R(-19,-14.2,5,8.4,green);
      for(let bx=-5;bx<18;bx+=4.4)R(bx,-11.3,1.1,1.0,dark);
      for(let bx=-6;bx<18;bx+=4.0)R(bx,-18.2,1.8,2.4,deep);
    }

    R(-18,-17.2,6.5,3.0,greenL);R(-16.6,-16.0,2.0,1.8,eye);

  };
  const drawFront=(backView=false)=>{

    plantedLeg(-5.5,-20,-1,0,true);plantedLeg(14.5,-19,1,1,true);
    R(-6,-29,22,14,greenD);R(-3,-32,17,4,greenL);R(-8,-25,26,10,green);
    R(-8,-25,4,10,greenD);R(14,-24,4,9,dark);
    for(let sx=-3;sx<15;sx+=4.5){R(sx,-30,2.2,2.6,dark);R(sx+1,-23,2.1,2.4,greenD);}
    R(-10,-20,21,14,green);R(-10,-20,5,12,greenD);R(7,-20,4,12,dark);
    R(-8,-20,15,2.2,greenL);
    plantedLeg(-10.5,-14,-1,1,false);plantedLeg(10,-14,1,0,false);
    if(backView){
      R(-9,-10,18,9,greenD);R(-7,-9,14,2,greenL);
      for(let sx=-5;sx<=5;sx+=3.4)R(sx,-15,1.4,2,dark);
      return;
    }

    if(jaw>.08){
      R(-8.3,-5.1,16.6,gap+.3,mouth);R(-3.2,-4.3+gap*.45,6.4,1.1,tongue);
      for(let i=0;i<8;i++){

        R(-7.1+i*1.9,-.5+gap,.68,-1.25,tooth);
      }
    }else{
      R(-8,-5.1,16,.65,dark);
      for(const tx of [-6.4,-2.4,2.3,6.2])R(tx,-5.0,.72,1.25,tooth);
    }
    /* Heavy stepped brows reproduce the low, hostile stare of the guide. */
    R(-9,-18,6.5,2.2,greenL);R(-7.2,-16.4,4.7,1.4,greenL);
    R(2.5,-18,6.5,2.2,greenL);R(2.5,-16.4,4.7,1.4,greenL);
    R(-8.5,-17,6,4.5,greenD);R(2.5,-17,6,4.5,greenD);
    R(-7.3,-15.8,2.2,2.0,eye);R(4.8,-15.8,2.2,2.0,eye);
    R(-6.35,-15.6,.7,1.3,'#11150f');R(5.05,-15.6,.7,1.3,'#11150f');

function speed(){
  /* All three pools in a cycle share one pace. Clearing the final pool advances
     the world forever. Logarithmic growth keeps early acceleration noticeable,
     then makes each deep-run increase smaller without ever imposing a hard cap. */
  const add=CFG.SPEED_LOG_SCALE*Math.log(1+progressionTier()*CFG.SPEED_LOG_RATE);
  return CFG.BASE_SPEED+add*(hasRelic('bead')?0.74:1);
}
/* Distance is derived from the live pace, keeping every normal stage ride at the
   loop-1 duration. Speed-changing artifacts and future pace rules therefore
   adjust route length automatically instead of requiring paired balance edits. */
function stageDistance(){ return CFG.LOOP_DIST*speed()/CFG.BASE_SPEED; }
function distanceScore(continuous=false){

}
function awardGold(amount){ gold+=amount; goldEarned+=amount; }
function countersNeeded(){
  const base=CFG.MINIBOSS_COUNTERS+activeMinibossDefinition().counterOffset+Math.floor(progressionTier()/3);
  return Math.max(1,base-(hasRelic('sigil')?1:0));
}
function minibossAttackCount(){
  return Math.max(countersNeeded()+1,CFG.MINIBOSS_DODGE_ATKS+activeMinibossDefinition().attackOffset+Math.floor(progressionTier()/2));
}
function perfectWin(){ return CFG.PERFECT_WIN+(hasRelic('eye')?0.06:0); }
function minibossPerfectBonus(){ return activeMinibossDefinition().perfectBonus; }
function chainBonus(){ return CFG.CHAIN_BONUS+(hasRelic('moon')?0.02:0); }
function relicPower(){ return 1+upg.relic*0.10; }        // the smith sharpens EVERY relic's teeth
function jumpDur(){ return CFG.JUMP_TIME*(hasRelic('feather')?1.18:1); }
function scoreSubtotal(continuous=false,includeUnspent=false){
  return distanceScore(continuous)+bossScoreRun+Math.round(overkillRun)+
    goldEarned*CFG.GOLD_SCORE_MULT+(includeUnspent?gold*CFG.GOLD_SCORE_MULT:0);
}
function scoreWithBanner(base,rounded=true){
  const total=base*(hasRelic('banner')?1.25:1);
  return rounded?Math.round(total):total;
}
function finalScore(){ return scoreWithBanner(scoreSubtotal(false,true)); }
function updateScoreShown(dt){
  const target=scoreWithBanner(scoreSubtotal(true),false);
  if(scoreShown>target) scoreShown=target;
  else scoreShown=Math.min(target,scoreShown+Math.max((target-scoreShown)*4,14)*dt);
}
function commitFinalScore(){
  const total=finalScore();
  newBestThisRun=!debugRun&&total>bestScore;
  if(newBestThisRun) bestScore=total;
}

function drawTelegraphs(){
  const telegraphActor=boss&&mode==='boss'?boss:(mode==='miniboss'?minibossFight:null);
  if(telegraphActor&&(telegraphActor.state==='tele'||telegraphActor.state==='strike')&&telegraphActor.attack&&telegraphActor.hazardLanes){
    const cue=telegraphActor===boss?currentBossMove():currentMiniMove();
    if(!cue) return;
    const height=cue.height;
    const pulse=telegraphActor.state==='strike'?.72:0.42+Math.sin(perfNow*16)*0.16;
    for(const lane of telegraphActor.hazardLanes) drawLaneHitHue(lane,pulse);
    if(height==='low'&&cue.centerJumpCue){
      const ready=pinchJumpReadiness(telegraphActor,cue);

function pinchJumpReadiness(actor,move){
  if(actor.state!=='strike') return 0;
  let model=null;
  for(let i=0;i<hazards.length;i++){
    const h=hazards[i];
    if(h.kind==='model'&&h.actor===actor&&h.move===move&&h.profile.pincer){ model=h; break; }
  }
  if(model){
    const pose=model.prevPose,presentation=model.prevPresentation;
    const a=pose[model.profile.joints[0]],b=pose[model.profile.joints[1]];
    const ar=modelJointRadius(model.profile,a,presentation),br=modelJointRadius(model.profile,b,presentation);
    const lead=Math.max(18,(ar+br)*3.5);
    return easeInOut(clamp((ar+br+lead-Math.abs(a.x-b.x))/lead,0,1));
  }
  /* Legacy species still use their two physical sweep tips. Fade from closing
     chevrons to the jump cue only over the final approach to their shared point. */
  if(move.sweeps&&move.sweeps.length>1){
    const k=clamp(actor.stateT/move.travel,0,1);
    const gap=Math.abs(sweepLaneAt(move.sweeps[0],k)-sweepLaneAt(move.sweeps[1],k));
    return easeInOut(clamp((.72-gap)/.42,0,1));
  }
  return 0;
}
function drawPinchGateCue(alpha,ready){

  g.save(); g.globalAlpha=Math.min(1,alpha+.12)*fade; g.fillStyle='#ff8a70';
  g.shadowColor='#ff2638'; g.shadowBlur=8;

  g.beginPath(); g.moveTo(x-gap+7,y); g.lineTo(x-gap-4,y-9); g.lineTo(x-gap-4,y+9); g.closePath(); g.fill();
  g.beginPath(); g.moveTo(x+gap-7,y); g.lineTo(x+gap+4,y-9); g.lineTo(x+gap+4,y+9); g.closePath(); g.fill();
  g.shadowBlur=0; g.restore();
}
function drawCenterJumpArrow(alpha){

/* Move-lab instrumentation deliberately reads the same contact positions and
   footprint sizes as resolveSweepHazard(). Red is physical death contact; the
   gold bracket is the wider last-moment input tolerance. The resolver prints the
   final HIT / PERFECT / SAFE verdict, but never damages or counters in a lab. */
function moveLabPerfectContactTime(h){
  if(h.kind==='model'){
    const volumes=h.timerPlayerVolumes,start=h.lastProgress;
    for(let i=0;i<=32;i++){
      const raw=lerp(start,1,i/32);
      sampleBossPresentation(h.actor,h.def,h.predictPresentation,'strike',raw*h.duration);
      h.rig.samplePose(h.predictPresentation,h.predictPose);
      /* Pinch timing belongs to the physical two-core clap. Gold overlap still
         decides PERFECT in the resolver; the lamp tells the player when to jump. */
      if(h.profile.pincer){
        if(modelPincerSnapped(h,h.predictPose,h.predictPresentation)) return h.born+raw*h.duration;
        continue;
      }
      for(let j=0;j<h.profile.joints.length;j++){
        const joint=h.predictPose[h.profile.joints[j]];
        const radius=modelJointRadius(h.profile,joint,h.predictPresentation,true);
        if(sweptCircleTouchesVolumes(joint.x,joint.y,joint.x,joint.y,radius,volumes))
          return h.born+raw*h.duration;
      }
    }
    return Infinity;
  }
  if(h.kind!=='sweep') return h.impact;
  const playerX=laneX(player.x,1), start=sweepProgress(h);
  /* Sweeps can contact before their nominal endpoint. Sample their same eased
     physical path to find the next frame entering the gold footprint; pinches
     additionally wait for the shared central-snap distance. */
  for(let i=0;i<=32;i++){
    const raw=lerp(start,1,i/32), x=laneX(sweepLaneAt(h,raw),1);
    const inPerfect=Math.abs(playerX-x)<=h.perfectHalf;
    const pincerReady=h.collisionMode!=='pincer'||Math.abs(sweepLaneAt(h,raw)-h.to)<=.34;
    if(raw>=h.activeFrom&&inPerfect&&pincerReady) return h.born+raw*h.duration;
  }
  return Infinity;
}
function drawMoveLabPerfectTimer(actor){
  let active=false,remaining=Infinity,activeWindow=perfectWin();
  for(const h of hazards) if(!h.done){
    const W=perfectWin()+(actor===minibossFight?minibossPerfectBonus():0)+
      (h.kind==='model'&&h.profile?(h.profile.perfectBonus||0):0);
    const left=moveLabPerfectContactTime(h)-perfNow;
    if(left>=0&&left<=W&&left<remaining){ active=true; remaining=left; activeWindow=W; }
  }
  if(!active) return;
  const x=laneX(player.x,1), y=PLAYER_Y-jumpHeight()-126;
  const pulse=.72+.28*Math.sin((1-remaining/activeWindow)*Math.PI);

  g.shadowBlur=0; g.globalAlpha=1; g.font='bold 12px monospace';

function drawMoveLabContactSweep(profile,a,b,prevPresentation,currPresentation,trail=true){

function drawMoveLabDodgeSnapshot(actor){
  const snap=actor._moveLab&&actor._moveLab.modelSnapshot;
  if(!snap||snap.until<=perfNow) return;
  const pending=snap.kind==='PENDING',late=snap.kind==='LATE HIT',hit=snap.kind==='HIT',airClear=snap.kind==='AIR CLEAR';
  const panelCol=late||hit?'#ff5b5b':pending?'#ffbf62':airClear?'#74d7ff':'#8ee8a0';
  const bx=326,by=204,bw=140,bh=142,pad=8,head=25;

  for(let i=0;i<snap.circleCount;i++){
    const c=snap.circles[i]; minX=Math.min(minX,c.fromX-c.shell,c.x-c.shell); maxX=Math.max(maxX,c.fromX+c.shell,c.x+c.shell);
    minY=Math.min(minY,c.fromY-c.shell,c.y-c.shell); maxY=Math.max(maxY,c.fromY+c.shell,c.y+c.shell);
  }

    minY=Math.min(minY,v.y1-v.r,v.y2-v.r); maxY=Math.max(maxY,v.y1+v.r,v.y2+v.r);
  }
  const scale=Math.min((bw-pad*2)/Math.max(1,maxX-minX),(bh-head-pad)/Math.max(1,maxY-minY));
  const ox=bx+bw*.5-(minX+maxX)*.5*scale,oy=by+head+(bh-head)*.5-(minY+maxY)*.5*scale;

  g.strokeStyle=panelCol; g.lineWidth=2; g.strokeRect(bx+.5,by+.5,bw-1,bh-1);
  g.textAlign='center'; g.font='bold 10px monospace'; g.fillStyle=panelCol;
  g.fillText(late?'LATE HIT':hit?'RED HIT':pending?'PERFECT PENDING':airClear?'AIR CLEAR':'PERFECT SNAPSHOT',bx+bw*.5,by+16);
  g.beginPath(); g.rect(bx+2,by+head,bw-4,bh-head-14); g.clip(); g.translate(ox,oy); g.scale(scale,scale);
  for(let i=0;i<snap.circleCount;i++){
    const c=snap.circles[i],shellCol=pending?'#ffe37a':'#a8ff6a',coreCol=late||hit?'#ff4d3a':'#ff63d8';

    g.beginPath(); g.moveTo(c.fromX,c.fromY); g.lineTo(c.x,c.y); g.stroke();

  }

  g.fillText(late||hit?'X = EXACT RED CONTACT':pending?'GOLD TOUCHED · RED ACTIVE':airClear?'AIRBORNE AT PAW CLAP':'VIOLET ATTACK  WHITE KNIGHT',bx+bw*.5,by+bh-4); g.restore();
}

function drawMoveLabMarkers(){
  const actor=boss&&boss._moveLab?boss:(minibossFight&&minibossFight._moveLab?minibossFight:null);
  if(!actor) return;
  const lab=actor._moveLab;
  g.save();
  g.textAlign='center'; g.font='bold 12px monospace';
  g.fillStyle='#ff6a5a'; g.fillText('RED = HIT',VW/2-72,176);
  g.fillStyle='#ffe37a'; g.fillText('GOLD = PERFECT EDGE',VW/2+70,176);
  g.fillStyle='#cfd4e2'; g.font='11px monospace';
  g.fillText('perfect input '+Math.round((perfectWin()+(actor===minibossFight ? minibossPerfectBonus() : 0))*1000)+' ms',VW/2,192);
  if(lab.lastResult&&lab.lastResult.until>perfNow){
    g.globalAlpha=clamp((lab.lastResult.until-perfNow)*2,0,1);
    g.font='bold 21px monospace'; g.fillStyle=lab.lastResult.col;
    g.fillText(lab.lastResult.kind,VW/2,220);
  }
  g.restore();
  drawMoveLabPerfectTimer(actor);
  drawMoveLabLivePlayerGeometry();
  drawMoveLabDodgeSnapshot(actor);
  const move=actor===boss?currentBossMove():currentMiniMove();
  const def=actor===boss?activeBossDefinition():activeMinibossDefinition();
  let modelHazard=null;
  for(let i=hazards.length-1;i>=0;i--) if(hazards[i].kind==='model'){
    if(!modelHazard) modelHazard=hazards[i];
    if(!hazards[i].done){ modelHazard=hazards[i]; break; }
  }
  if(modelHazard){ drawMoveLabModelGeometry(modelHazard); return; }
  if(move&&usesContactRig(move)&&def.contactRig&&
     (actor.state==='tele'||actor.state==='strike'||actor.state==='recover'||actor.state==='comboRecover')){
    if(drawMoveLabModelPreview(actor,move,def)) return;
  }

  if((actor.state!=='tele'&&actor.state!=='strike')||!actor.attack||!actor.hazardLanes) return;
  if(!move) return;
  const contacts=moveContactXs(actor,move,actor.hazardLanes);
  const strikeK=actor.state==='strike'?clamp(actor.stateT/move.travel,0,1):0;
  g.save(); g.lineCap='square';
  for(let i=0;i<contacts.length;i++){
    const sweep=move.sweeps?move.sweeps[i]:move.sweep;
    const hitHalf=sweep?(sweep.hitHalf||34):CFG.FIGHT_HIT_HALF;
    const perfectHalf=sweep?(sweep.perfectHalf||70):hitHalf;
    let height=move.height;
    if(sweep&&sweep.collision==='pincer')
      height=actor.state==='strike'&&Math.abs(sweepLaneAt(sweep,strikeK)-sweep.to)<=.34?'low':'mid';
    const x=contacts[i], y=attackImpactY(height), pulse=.72+Math.sin(perfNow*20)*.12;

    g.beginPath();
    g.moveTo(x-perfectHalf,y-11); g.lineTo(x-perfectHalf,y+11);
    g.moveTo(x+perfectHalf,y-11); g.lineTo(x+perfectHalf,y+11);
    if(perfectHalf>hitHalf){
      g.moveTo(x-perfectHalf,y); g.lineTo(x-hitHalf,y);
      g.moveTo(x+hitHalf,y); g.lineTo(x+perfectHalf,y);
    }
    g.stroke();
    g.globalAlpha=.28*pulse; g.fillStyle='#ff2638';
    g.fillRect(x-hitHalf,y-7,hitHalf*2,14);
    g.globalAlpha=.9*pulse; g.strokeStyle='#ff6a5a'; g.lineWidth=2;
    g.strokeRect(x-hitHalf,y-7,hitHalf*2,14);
  }
  g.restore();

/* ============================== update per mode ============================== */
function update(dt){
  perfNow+=dt; modeT+=dt;
  updateJuice(dt);
  updateAmbient(dt);
  updateArenaFx(dt);
  updateScoreShown(dt);
  if(mode==='menu'||mode==='score'||mode==='relicdex'||mode==='debugcfg'||mode==='changelog'){ dist+=dt*6; roadScroll+=dt*6; return; }   // world drifts behind menus
  if(mode==='dying'){ if(modeT>1.4){ commitFinalScore(); setMode('score'); } return; }

  updatePlayer(dt);
  if(mode==='run'){
    const mv=speed()*dt; dist+=mv; runDistance+=mv; roadScroll+=mv;
    /* Preserve the previous depth so infinite late-run speed cannot tunnel an
       obstacle or pickup through its narrow contact window in one frame. */
    for(const o of obstacles){ o.prevZ=o.z; o.z-=mv; }
    for(const c of pickups){ c.prevZ=c.z; c.z-=mv; }
    for(const t of roadsideScenery) t.z-=mv;
    /* roots stay alive until their TALL upper arm has fully cleared the screen —
       they slide off the bottom organically like everything else (the extended
       phone-bottom included: nothing may vanish while still visible) */
    cullBehind(roadsideScenery,-6);
    spawnLoopEntities();
    updateRunCollisions();
      /* the waiting stage miniboss: meet its lane to accept the optional duel */
      for(const o of obstacles){
        if(o.type.encounterGate&&!o.resolved&&o.z<2.4){
          o.resolved=true;
          if(Math.round(player.x)===o.lane) startMiniboss(o.lane);
          else { o.flee=perfNow; playEncounterSound();
            floater(VW/2,180,activeMinibossDefinition().fleeLine,'#8b8fa0',14); }
        }
      }
    if(dist>=stageDistance()){
      const policy=RUN_POLICY();
      if(policy.hasBossAt(loop)) startBoss();
      else policy.afterRoute(loop);
    }
    /* Cull only after swept collision checks; at extreme speeds an entity may
       already be behind the camera on the same frame it crosses the rider. */
    cullObstacles(); cullBehind(pickups,-7);
  }
  else if(mode==='bossintro'){
    /* the bear stalks out of the forest, shouldering through the treeline */
    if(boss&&boss.entering){
      const step=dt*2.1;
      boss.x+=boss.x<1?step:-step;
      if(Math.abs(boss.x-1)<=step*1.2){ boss.x=1; boss.entering=false; SFX.roar(); shake(8,.4); }
      else if(Math.random()<dt*7){                     // heavy footfalls kick up dirt
        const p=proj(boss.z);
        burst(laneX(boss.x,p.t)+rnd(-16,16),p.y+2,3,['#6a5a40','#3a2f20'],70,110,3,.5);
        if(Math.random()<0.35) shake(2,.08);
      }
    }
    if(modeT>2.6&&!(boss&&boss.entering)){ setMode('boss'); boss.state='idle'; boss.stateT=0; }
    updateBossVisualFx(dt);
  }
  else if(mode==='boss'){
    updateBoss(dt); updateProjectiles(dt); updatePackLeap(dt); updateHazards(); updateBossVisualFx(dt);
  }
  else if(mode==='miniboss'){ updateMiniboss(dt); updateHazards(); }
  /* during fights the run pauses, but the forest keeps drifting slowly so it feels alive */
  if(mode==='boss'||mode==='bossintro'||mode==='miniboss'){
    const mv=dt*5;
    if(mode==='miniboss') roadScroll+=mv; // the duel is stationary in stage progress, not in the world
    for(const t of roadsideScenery) t.z-=mv;
    for(const c of pickups) c.z-=mv;
    for(const o of obstacles) if(o.kind!=='minibossGate') o.z-=mv;
    cullBehind(roadsideScenery,-6); cullBehind(pickups,-5);
    if(mode==='miniboss'){
      /* The duel freezes stage distance, so tree rows advance on visual travel.
         They enter from the normal far depth at the normal spacing. */
      minibossTreeTravel-=mv;
      while(minibossTreeTravel<=0){
        spawnMinibossTreeRow(SPAWN_FAR);
        minibossTreeTravel+=rnd(...sceneryProfile().normalGap);
      }
    }
  }
}

function drawRoadsideSceneryEntity(t,stage){
  worldA=t.gnd?clamp((78-t.z)/10,0,1):clamp((SPAWN_FAR-t.z)/26,0,1);
  if(worldA<=0){ worldA=1; return; }
  const raw=(CFG.FOCAL+CFG.Z_FAR)/(CFG.FOCAL+Math.max(t.z,CFG.Z_FAR));
  const grow=t.z>CFG.Z_FAR?.10+raw*.90:1;
  const p=proj(Math.min(t.z>CFG.Z_FAR?CFG.Z_FAR-6*(1-raw):t.z,CFG.Z_FAR));
  const slide=1+Math.max(0,p.t-1)*.6, sc=linS(p.t)*3.2*grow;
  const xx=VW/2+t.off*lerp(24,150,p.t)*1.2*grow*slide;
  if(xx+110*sc<0||xx-110*sc>VW){ worldA=1; return; }
  g.globalAlpha=worldA;
  if(t.gnd){ if(stage.ground) stage.ground(xx,p.y+6,sc*.55,t.v); }
  else stage.scenery(xx,p.y+6,sc,t.v);

function drawActiveMinibossWorld(){
  const miniMove=currentMiniMove();let zD=minibossFight.z;
  const miniTellReach=1.25;
  const miniRequestedReach=miniMove?(miniMove.bodyLunge!==undefined?miniMove.bodyLunge:(miniMove.lunge||4)+4):0;
  const miniContactReach=miniMove?Math.min(minibossFight.z-.8,miniRequestedReach):0;
  const miniComboRecovering=minibossFight.state==='comboRecover';
  const miniComboRecoverTime=miniMove?comboStepRecoveryTime(miniMove,minibossFight.attack):.1;
  const miniFullRecoverTime=encounterRecoveryTime(minibossFight.attack);
  const miniRecoverAnimTime=miniFullRecoverTime*(miniMove&&miniMove.recoverPortion||.42);
  if(minibossFight.state==='tele'&&miniMove)
    zD=minibossFight.z-easeOut(clamp(minibossFight.stateT/(minibossFight.teleTime||miniMove.tele),0,1))*miniTellReach;
  if(minibossFight.state==='strike'&&miniMove)
    zD=minibossFight.z-miniTellReach-easeOut(clamp(minibossFight.stateT/miniMove.travel,0,1))*Math.max(0,miniContactReach-miniTellReach);
  if(minibossFight.state==='recover'&&miniMove)
    zD=minibossFight.z-(1-easeInOut(clamp(minibossFight.stateT/miniRecoverAnimTime,0,1)))*miniContactReach;
  if(miniComboRecovering&&miniMove)
    zD=minibossFight.z-(1-easeInOut(clamp(minibossFight.stateT/miniComboRecoverTime,0,1)))*miniContactReach;
  const p=proj(zD);let wx=laneX(minibossFight.x,p.t);
  if(minibossFight.state==='strike'&&miniMove)
    wx=lerp(wx,laneX(minibossFight.xTarget,1),easeOut(clamp(minibossFight.stateT/miniMove.travel,0,1)));
  else if(minibossFight.state==='recover'&&miniMove)
    wx=lerp(laneX(minibossFight.xTarget,1),wx,easeInOut(clamp(minibossFight.stateT/miniRecoverAnimTime,0,1)));
  else if(miniComboRecovering&&miniMove)
    wx=lerp(laneX(minibossFight.xTarget,1),wx,easeInOut(clamp(minibossFight.stateT/miniComboRecoverTime,0,1)));
  const miniDef=activeMinibossDefinition();
  let anim=minibossFight.state==='tele'?minibossFight.attack.anim:
    minibossFight.state==='intro'?miniDef.introAnim:
    minibossFight.state==='dying'?(minibossFight.stateT<1.1?miniDef.introAnim:miniDef.exitAnim):minibossFight.state;
  if(miniMove&&(minibossFight.state==='tele'||minibossFight.state==='strike'||minibossFight.state==='recover'||miniComboRecovering))
    anim=minibossFight.state==='tele'?miniMove.anim:minibossFight.state==='strike'?miniMove.strike:comboStepRecoveryAnim(miniMove);
  const miniContacts=moveContactXs(minibossFight,miniMove,minibossFight.hazardLanes);
  miniDef.draw(wx,p.y,p.s*miniDef.scale,anim,
    clamp(minibossFight.stateT/(minibossFight.state==='tele'?(minibossFight.teleTime||miniMove.tele):minibossFight.state==='strike'&&miniMove?miniMove.travel:miniComboRecovering?miniComboRecoverTime:minibossFight.state==='recover'?miniRecoverAnimTime:minibossFight.state==='dying'?1.8:.6),0,1),
    minibossFight.hurtT>0,miniContacts);
}
function render(){
  const stage=BIO();
  g.setTransform(1,0,0,1,0,0);
  g.fillStyle='#05070c'; g.fillRect(0,0,cvs.width,cvs.height);
  g.setTransform(viewScale,0,0,viewScale,viewX,viewY);
  /* the world never spills into the letterbox — wide desktop screens stay calm */
  g.save();
  g.beginPath(); g.rect(0,-PAD_TOP,VW,VH+PAD_TOT); g.clip();
  /* screen shake offset (inside the clip so shakes can't leak either) */
  if(shakeMag>0){
    const shakeFrame=(perfNow*60)|0;
    g.translate(lerp(-shakeMag,shakeMag,sRnd(shakeFrame+1701)),
      lerp(-shakeMag,shakeMag,sRnd(shakeFrame+1702)));
  }

  if(env==='cave'){ stage.arena(); }
  else { stage.bg(); }
  drawParticles(true);       // arena emissions are occluded by bosses and world actors
  updateEffHorizon();          // obstacles/items enter under the lair when it looms
  /* depth-sorted world drawables (far → near) */
  const dr=DRAW_QUEUE; dr.length=0; drawItemCount=0;
  if(env==='forest'&&mode==='run'&&stageDistance()-dist<SPAWN_FAR){
    const mz=stageDistance()-dist;
    /* the end-of-world sheet (water/lava) draws BEHIND everything, so the groves
       and columns marching in past the lair stand IN it. The lair itself renders
       from the same far distance as the trees around it. */
    if(stage.beyondDraw) queueWorldDraw(9999,drawStageBeyond,mz);
    queueWorldDraw(mz,drawStageMouth,mz);
  }
  if(env==='forest') for(const t of roadsideScenery) queueWorldDraw(t.z,drawRoadsideSceneryEntity,t);
  const frontObs=FRONT_OBSTACLES; frontObs.length=0; // arches the knight rides UNDER
  /* GRIFFIN GREAVES exception: while the jump carries him over a duck-arch, the
     knight renders ON TOP of the root instead of slipping beneath it */
  const overArch=hasRelic('greaves')&&isAirborne();
  for(const o of obstacles){
    if(o.type.frontLayer&&o.z<1.3&&o.z>o.type.cullZ-.2&&!(overArch&&o.z>-2.2)){ frontObs.push(o); continue; }
    queueWorldDraw(o.z,drawObstacleEntity,o);
  }
  for(const c of pickups) queueWorldDraw(c.z,drawPickupEntity,c);
  if(boss)queueWorldDraw(boss.z,drawActiveBossWorld);
  if(minibossFight)queueWorldDraw(minibossFight.z,drawActiveMinibossWorld);
  dr.sort((a,b)=>b.z-a.z);
  for(const d of dr) d.draw(d.ref,stage);

  drawTelegraphs();
  if(mode!=='menu'&&mode!=='score'&&mode!=='charsel'&&mode!=='relicdex'&&mode!=='debugcfg'&&mode!=='bosslabselect'&&mode!=='bosslabmoves'&&mode!=='changelog'){
    if(player.alive) drawPlayer();
    drawPackAllies();
    drawProjectiles();
    drawPackLeap();
  }
  if(!pausePhotoMode) drawMoveLabMarkers();
  /* NOW the near arches: the knight visibly ducks UNDER them */
  frontObs.sort((a,b)=>b.z-a.z);
  for(const o of frontObs) drawObstacle(o,proj(o.z));
  drawParticles(); drawSlashes();
  drawAmbient();
  drawVignette();

  /* Screenshot mode keeps only the frozen world artwork: no HUD, debug markers,
     labels, floaters or lab-only buttons. */
  if(!pausePhotoMode){
    if(mode==='menu') drawMenu();
    else if(mode==='relicdex') drawRelicDex();
    else if(mode==='changelog') drawChangelog();
    else if(mode==='debugcfg') drawDebugCfg();
    else if(mode==='bosslabselect') drawBossLabSelect();
    else if(mode==='bosslabmoves') drawBossLabMoves();
    else if(mode==='charsel') drawCharSel();
    else if(mode==='score') drawScore();
    else {
      drawHUD();drawBearTurntableMouthButton();
      if(mode==='bossintro') drawBossIntro();
      if(mode==='relic') drawRelicScreen();
      if(mode==='shop') drawShop();
      if(mode==='miniboss') drawMinibossIntro();
    }
  }
  if(paused&&!pausePhotoMode){                      // photo mode leaves the frozen game completely clean
    g.fillStyle='rgba(5,7,12,0.78)'; g.fillRect(0,-PAD_TOP,VW,VH+PAD_TOT);
    if(debugMoveLabActive()) drawMoveLabPauseControls();
    g.textAlign='center'; g.font='bold 34px monospace'; g.fillStyle='#e8e2d0';
    g.fillText('PAUSED',VW/2,VH/2-58);
    g.font='15px monospace'; g.fillStyle='#aeb2c2';
    g.fillText('tap outside buttons or press P to resume',VW/2,VH/2-22);
    g.strokeStyle='#ffe37a'; g.lineWidth=2; g.strokeRect(VW/2-90,VH/2+20,180,46);
    g.font='bold 15px monospace'; g.fillStyle='#ffe37a'; g.fillText('▣ SCREENSHOT',VW/2,VH/2+50);
    g.strokeStyle='#8b8fa0'; g.strokeRect(VW/2-90,VH/2+78,180,46);
    g.fillStyle='#aeb2c2'; g.fillText('⚙ SETTINGS',VW/2,VH/2+108);
    g.strokeStyle='#e8e2d0'; g.strokeRect(VW/2-90,VH/2+136,180,46);
    g.fillStyle='#e8e2d0'; g.fillText('MAIN MENU',VW/2,VH/2+166);
  }
  if(settingsOpen) drawSettings();                  // the settings sheet floats over it all
  /* fullscreen flash */
  if(flashA>0){ g.globalAlpha=flashA; g.fillStyle=flashCol; g.fillRect(0,-PAD_TOP,VW,VH+PAD_TOT); g.globalAlpha=1; }
  g.restore();                                      // lift the stage clip
}

/* ============================== 13. MAIN LOOP ============================== */
let lastTime=performance.now();
let hadFocus=true;
let debugFps=60;
function frame(now){
  requestAnimationFrame(frame);
  const gap=(now-lastTime)/1000;
  if(gap>0&&gap<.6) debugFps=lerp(debugFps,1/gap,.08);
  /* watchdog: a long frame gap means the browser suspended us — freeze the run.
     Focus is checked EDGE-triggered (only the moment it is lost pauses; some mobile
     browsers report no focus at all, and a level check locked the game on pause) */
  if(gap>0.6&&GAMEPLAY_MODES.includes(mode)) paused=true;
  const foc=document.hasFocus();
  if(hadFocus&&!foc&&GAMEPLAY_MODES.includes(mode)) paused=true;
  hadFocus=foc;
  let dt=Math.min(gap,1/25); lastTime=now;
  if(paused){ render(); return; }                   // paused: keep drawing, freeze the sim
  if(hitstop>0){ hitstop-=dt; render(); return; }   // hit-stop: freeze the sim, keep drawing
  update(dt*moveLabTimeScale());
  render();
}
requestAnimationFrame(frame);
</script>
