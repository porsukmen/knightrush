<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Knight Rush">
<meta name="theme-color" content="#05070c">
<title>Knight Rush</title>
<style>
  /* Fullscreen, no scrolling, black letterbox around the game canvas */
  html,body{margin:0;padding:0;background:#05070c;height:100%;overflow:hidden;
    touch-action:none;-webkit-user-select:none;user-select:none;overscroll-behavior:none;
    -webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}
  body{position:fixed;inset:0;width:100%}
  canvas{display:block;position:absolute;image-rendering:pixelated;image-rendering:crisp-edges}
</style>
</head>
<body>
<canvas id="game"></canvas>
<!-- invisible probe: measures the notch / dynamic-island inset so the HUD can dodge it -->
<div id="safe" style="position:fixed;top:0;left:0;width:0;height:0;padding-top:env(safe-area-inset-top);visibility:hidden"></div>
<script>
"use strict";
/* =====================================================================================
   KNIGHT RUSH — a complete lane-runner + souls-like boss game in one file.
   ------------------------------------------------------------------------------------
   TABLE OF CONTENTS
     1. CFG ......... every balance/tuning constant, clearly labeled
     2. UTILS ....... math helpers, easing, seeded random
     3. CANVAS ...... logical 480x800 viewport, letterboxed, crisp pixel scaling
     4. AUDIO ....... tiny WebAudio synthesizer (all sound generated in code)
     5. INPUT ....... swipe (touch) + arrow keys, tap detection for menus
     6. JUICE ....... screen shake, hit-stop, flashes, particles, floating text
     7. SPRITES ..... all pixel-art drawn procedurally (knights, wolves, props)
     8. WORLD ....... pseudo-3D projection, parallax forest, road rendering
     9. ENTITIES .... obstacles, pickups, spawner patterns
    10. FIGHTS ...... shared telegraph/dodge framework, counters, bear boss, wolf counter-duel
    11. RELICS ...... shield relic (one-hit absorb), untimed relic screen, the smith's upgrade shop
    12. GAME ....... state machine, update loops, HUD, menus, score breakdown
    13. MAIN LOOP
   ===================================================================================== */

/* ============================== 1. CONFIG / BALANCE ============================== */
const CFG = {
  /* --- world & speed --- */
  BASE_SPEED      : 22,    // forward speed in z-units/second on loop 1
  SPEED_TIER_ADD  : 4,     // extra speed added every 3 loops ("tier")
  Z_FAR           : 60,    // draw/spawn horizon distance
  FOCAL           : 14,    // perspective focal length (smaller = more dramatic 3D)
  LOOP_DIST       : 1323,  // z-units per stage loop (10% shorter again — relentless)

  /* --- player --- */
  JUMP_TIME       : 0.52,  // seconds airborne (snappy — back-to-back jumps now chain)
  JUMP_H          : 100,   // apex height in screen px (at player scale)
  JUMP_SAFE_H     : 38,    // min height that counts as "over" a low hazard (tight window)
  DUCK_TIME       : 0.38,  // seconds a duck lasts (tight — press again to refresh)
  LANE_EASE       : 11,    // lane-change easing speed (higher = snappier)

  /* --- spawning (per spawn event; events every SPAWN_GAP z-units) --- */
  SPAWN_GAP       : 13,
  P_OBSTACLE      : 0.42,  // chance: obstacle pattern (roots / ponds / boulders)
  P_COINS         : 0.26,  // chance: a single gold coin
  P_ARROW         : 0.012, // chance: BONUS arrow (arsenal is deliberately tight — every arrow matters)
  P_LANCE         : 0.005, // chance: BONUS lance
  P_MIXED         : 0.09,  // chance: obstacle + a coin in a guaranteed-free lane
  COIN_VALUE      : 1,     // gold per coin — small numbers, ×10 as score at the end

  /* --- guaranteed weapon spawns: a small fixed arsenal every loop (~6a/2l w/ rng) --- */
  GUAR_ARROWS     : 6,     // arrows guaranteed per loop...
  GUAR_ARROWS_LOOP: 1,     // ...plus one more each loop
  GUAR_LANCES     : 2,     // lances guaranteed per loop...
  GUAR_LANCES_TIER: 1,     // ...plus one more every 3 loops

  /* --- weapons / the volley --- */
  ARROW_DMG       : 10,    // damage per collected arrow
  LANCE_DMG       : 20,    // damage per collected lance
  VOLLEY_EVERY    : 0.28,  // seconds between shots during the PC's volley phase
  CHAIN_BONUS     : 0.05,  // +5% ARROW & LANCE damage per chain stack (stacks come from counters)
  COUNTER_DMG     : 4,     // flat counter damage — NOT affected by chain stacks, upgrades only
  OVERKILL_MULT   : 2,     // overkill damage is worth double as score
/* --- THE PACK (the miniboss-weapon build) --- */
  PACK_MAX        : 1,     // ONE follower: the beast you tame this stage fights this stage's boss
  PACK_LEAP_DMG   : 45,    // each pack wolf leaps into the boss during the volley (base dmg)
  UPG_FANG_INC    : 15,    // 'pack fangs' smith upgrade: +leap damage per level
  PACK_FULL_GOLD  : 30,    // taming past a full pack pays a gold tribute instead

  /* --- the smith (upgrade shop, opens after every relic screen) --- */
  UPG_COST_BASE   : 10,    // first level of any upgrade costs this much gold
  UPG_COST_MULT   : 1.5,   // each further level costs ×1.5
  UPG_ARROW_INC   : 4,     // +arrow damage per level
  UPG_LANCE_INC   : 8,     // +lance damage per level
  UPG_COUNTER_INC : 4,     // +counter damage per level

  /* --- stage boss: the bear --- */
  BOSS_HP_BASE    : 135,   // loop-1 HP: full arsenal + good counters beats it WITHOUT the wolf;
                           // miss a couple of pickups and the wolf's 60 becomes your lifeline
  BOSS_HP_PER_LOOP: 35,    // +HP each loop (the curve tightens fast — upgrades & the wolf keep pace)
  BOSS_HP_TIER_ADD: 40,    // extra +HP every 3 loops
  BOSS_Z          : 14,    // where the boss stands in world depth
  BOSS_DODGE_ATKS : 4,     // the dodge phase lasts exactly this many boss attacks...
  BOSS_ATKS_TIER  : 1,     // ...plus this many more every 3 loops
  ATK_HASTE_LOOP  : 0.07,  // idle gaps between attacks shrink per loop...
  ATK_HASTE_MIN   : 0.55,  // ...but never below this fraction (stays fair)
  COMBO_BASE      : 0.15,  // chance an attack chains instantly into another (telegraphs stay full)
  COMBO_LOOP      : 0.06,  // combo chance grows per loop...
  COMBO_MAX       : 0.55,  // ...capped here
  TELE_MIN_MULT   : 0.62,  // telegraphs shrink with loops but never below this fraction
  TELE_LOOP_MULT  : 0.05,  // telegraph shrink per loop
  PERFECT_WIN     : 0.30,  // seconds before impact that count as a "perfect dodge"

  /* --- miniboss: the grey wolf (a counter duel — no HP, no ally) --- */
  MINIBOSS_AT     : 0.60,  // fraction of loop distance where the wolf waits
  WOLF_DODGE_ATKS : 5,     // the wolf attacks this many times...
  WOLF_COUNTERS   : 3,     // ...counter it this many times and it falls (and joins you)
                           // fewer counters = it simply flees; you lose nothing (a hit still kills)

  /* --- score --- */
  BOSS_SCORE      : 1000,  // per boss kill, multiplied by loop number
  WOLF_SCORE      : 350,   // miniboss kill bonus
  GOLD_SCORE_MULT : 10,    // every UNSPENT gold coin is worth 10 score at the end
  SCORE_PER_SEC   : 10,    // survival score: 10/sec — progress you can FEEL

};

/* ============================== 2. UTILS ============================== */
const TAU = Math.PI*2;
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const easeOut=t=>1-Math.pow(1-t,3);
const easeInOut=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
const rnd=(a=1,b)=> b===undefined ? Math.random()*a : a+Math.random()*(b-a);
const pick=arr=>arr[(Math.random()*arr.length)|0];
/* deterministic random for scenery so the forest doesn't flicker between frames */
function sRnd(seed){ let s=Math.sin(seed*127.1+311.7)*43758.5453; return s-Math.floor(s); }

/* ============================== 3. CANVAS ============================== */
/* ONE GAME, ONE VIEW: the logical stage is a fixed 480×800 on EVERY device.
   Phones letterbox with near-black bars instead of reshaping the world, so the
   picture — sky, road, sprites, UI — is pixel-identical to the desktop version. */
const VW=480, VH=800;
const HORIZON_Y=286, PLAYER_Y=648, GROUND_Y=PLAYER_Y-14;
const cvs=document.getElementById('game');
const g=cvs.getContext('2d');
/* phone browsers run canvas shadow-glow effects dreadfully slowly (dropped frames,
   flickering animation). On touch devices glow becomes a no-op — art stays, lag goes. */
const LOW_FX=(typeof matchMedia==='function')&&matchMedia('(pointer:coarse)').matches;
if(LOW_FX){ try{ Object.defineProperty(g,'shadowBlur',{get:()=>0,set:()=>{}}); }catch(e){} }
const safeEl=document.getElementById('safe');
let viewScale=1, viewX=0, viewY=0;    // letterbox transform
let uiTop=0;                          // HUD offset that keeps it clear of phone notches
/* on tall phone screens the 480×800 game stays EXACTLY centered and untouched —
   but the picture continues into the empty bars: extra sky above (-PAD_TOP..0)
   and extra ground/road below (VH..VH+PAD_BOT). Desktop pads are 0. */
let PAD_TOP=0, PAD_BOT=0, PAD_TOT=0;
let lastCW=0,lastCH=0,lastDpr=0;
function resize(){
  const dpr=Math.min(window.devicePixelRatio||1,3);   // full native sharpness on phones
  /* reallocating the canvas blanks it for a frame — mobile viewport events fire
     constantly while scrolling/gesturing, so only realloc when size TRULY changed
     (this was the source of the random texture flashes) */
  if(innerWidth===lastCW&&innerHeight===lastCH&&dpr===lastDpr) return;
  lastCW=innerWidth; lastCH=innerHeight; lastDpr=dpr;
  cvs.width=innerWidth*dpr; cvs.height=innerHeight*dpr;
  cvs.style.width=innerWidth+'px'; cvs.style.height=innerHeight+'px';
  viewScale=Math.min(innerWidth/VW,innerHeight/VH)*dpr;
  viewX=(cvs.width-VW*viewScale)/2; viewY=(cvs.height-VH*viewScale)/2;
  PAD_TOP=PAD_BOT=Math.max(0,viewY/viewScale); PAD_TOT=PAD_TOP+PAD_BOT;
  /* the HUD tucks just below the notch / dynamic island, up in the extended sky —
     plus a small pad so nothing clips into the phone's rounded corners */
  const safeL=(safeEl?safeEl.offsetHeight:0)*dpr/viewScale;
  const cornerPad=(PAD_TOP>0||safeL>0)?14:0;
  uiTop=-PAD_TOP+clamp(safeL+cornerPad,0,PAD_TOP+96);
  g.imageSmoothingEnabled=false;
}
addEventListener('resize',resize); resize();
addEventListener('orientationchange',()=>{ setTimeout(resize,300); });
if(window.visualViewport) visualViewport.addEventListener('resize',resize);
/* convert a client (touch/mouse) point into logical game coordinates */
function toGame(cx,cy){
  const dpr=Math.min(window.devicePixelRatio||1,3);
  return { x:(cx*dpr-viewX)/viewScale, y:(cy*dpr-viewY)/viewScale };
}

/* ============================== 4. AUDIO (synthesized) ============================== */
const SFX=(()=>{
  let ac=null, master=null, muted=false, vol=0.5;             // vol 0..1 (0.5 = old loudness)
  try{ const s=parseFloat(localStorage.getItem('kr_vol')); if(!isNaN(s)) vol=clamp(s,0,1); }catch(e){}
  function init(){ if(ac) return; try{
    ac=new (window.AudioContext||window.webkitAudioContext)();
    master=ac.createGain(); master.gain.value=0.7*vol; master.connect(ac.destination);
  }catch(e){} }
  function unlock(){ init(); if(ac&&ac.state==='suspended') ac.resume(); }
  function tone(f0,f1,dur,type='square',vol=0.5,delay=0){
    if(!ac||muted) return; const t=ac.currentTime+delay;
    const o=ac.createOscillator(), gn=ac.createGain();
    o.type=type; o.frequency.setValueAtTime(f0,t);
    o.frequency.exponentialRampToValueAtTime(Math.max(f1,1),t+dur);
    gn.gain.setValueAtTime(vol,t); gn.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(gn); gn.connect(master); o.start(t); o.stop(t+dur+.02);
  }
  function noise(dur,vol=0.4,delay=0,lp=1200){
    if(!ac||muted) return; const t=ac.currentTime+delay;
    const len=(dur*ac.sampleRate)|0, buf=ac.createBuffer(1,len,ac.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
    const src=ac.createBufferSource(); src.buffer=buf;
    const fl=ac.createBiquadFilter(); fl.type='lowpass'; fl.frequency.value=lp;
    const gn=ac.createGain(); gn.gain.value=vol;
    src.connect(fl); fl.connect(gn); gn.connect(master); src.start(t);
  }
  return {
    init, unlock, get muted(){return muted;}, toggle(){muted=!muted;},
    get vol(){return vol;},
    setVol(v){ vol=clamp(v,0,1); if(master) master.gain.value=0.7*vol;
      try{ localStorage.setItem('kr_vol',vol); }catch(e){} },
    coin(){tone(920,1400,.09,'square',.25); tone(1400,1900,.10,'square',.18,.05);},
    arrow(){tone(500,900,.12,'triangle',.35);},
    lance(){tone(300,760,.2,'sawtooth',.35); tone(760,1100,.14,'triangle',.3,.08);},
    jump(){tone(300,620,.16,'triangle',.3);},
    swipe(){noise(.07,.18,0,2400);},
    duck(){tone(420,220,.12,'triangle',.28);},
    hit(){noise(.25,.6,0,900); tone(220,60,.3,'sawtooth',.5);},
    shield(){tone(700,340,.25,'triangle',.45); noise(.12,.3);},
    thud(){noise(.12,.5,0,600); tone(140,70,.16,'sine',.6);},
    slash(){noise(.1,.35,0,3200); tone(800,300,.1,'sawtooth',.2);},
    counter(){tone(880,1760,.14,'square',.4); tone(1320,2200,.16,'square',.3,.06);},
    roar(){tone(120,45,.8,'sawtooth',.6); noise(.5,.4,0,700);},
    howl(){tone(400,820,.5,'sine',.4); tone(820,520,.7,'sine',.35,.5);},
    relic(){[660,830,990,1320].forEach((f,i)=>tone(f,f,.16,'square',.3,i*.09));},
    win(){[523,659,784,1046].forEach((f,i)=>tone(f,f,.2,'square',.32,i*.11));},
    dead(){[440,349,261,196].forEach((f,i)=>tone(f,f*.8,.25,'sawtooth',.3,i*.14));},
  };
})();

/* ============================== 5. INPUT ============================== */
/* action() receives 'left' | 'right' | 'up' | 'down' | 'tap' (tap carries a point) */
let tapPoint=null;
/* pause button hit-area (drawn in the HUD, top-right under the weapon pool) */
const PAUSE_BTN={x:VW-52,y:100,w:38,h:38};
const GAMEPLAY_MODES=['run','boss','miniboss','bossintro'];
let settingsOpen=false;        // the settings sheet floats over the menu OR the pause screen
function handleAction(a,pt){
  SFX.init();
  if(settingsOpen){ if(a==='tap'&&pt) settingsTap(pt); return; }
  if(paused){
    if(a==='tap'&&pt&&pt.x>VW/2-90&&pt.x<VW/2+90){
      if(pt.y>VH/2+30&&pt.y<VH/2+76){ settingsOpen=true; SFX.swipe(); return; }
      if(pt.y>VH/2+88&&pt.y<VH/2+134){
        paused=false; resetRun(); setMode('menu'); SFX.duck(); return;   // abandon the run
      }
    }
    paused=false; SFX.swipe(); return;                    // anything else resumes
  }
  if(mode==='menu'){
    if(a==='tap'&&pt){
      if(pt.x>VW/2-80&&pt.x<VW/2+80&&pt.y>404&&pt.y<454){ uiConfirm(); }
      else if(pt.x>VW/2-80&&pt.x<VW/2+80&&pt.y>468&&pt.y<510){ setMode('relicdex'); SFX.swipe(); }
      else if(pt.x>VW/2-80&&pt.x<VW/2+80&&pt.y>524&&pt.y<566){
        menuMsg='brave knight, close the tab to truly leave'; menuMsgT=perfNow+2.5;
        try{ window.close(); }catch(e){} }
      else if(pt.x>VW/2-80&&pt.x<VW/2+80&&pt.y>580&&pt.y<612){ setMode('debugcfg'); SFX.swipe(); }
      else if(pt.x>VW-140&&pt.x<VW-10&&pt.y>VH-82&&pt.y<VH-40){ clSel=0; setMode('changelog'); SFX.swipe(); }
      else if(pt.x>10&&pt.x<140&&pt.y>VH-82&&pt.y<VH-40){ settingsOpen=true; SFX.swipe(); }
    } else if(a==='up') uiConfirm();
    return;
  }
  if(mode==='relicdex'){ if(a==='tap'||a==='up'||a==='down'){ setMode('menu'); SFX.duck(); } return; }
  if(mode==='changelog'){
    if(a==='tap'&&pt){
      for(let i=0;i<CHANGELOGS.length;i++){                 // version tabs
        const x=20+i*92;
        if(pt.x>x&&pt.x<x+84&&pt.y>60&&pt.y<100){ clSel=i; SFX.swipe(); return; }
      }
      setMode('menu'); SFX.duck();
    } else if(a==='up'||a==='down'){ setMode('menu'); SFX.duck(); }
    return;
  }
  if(mode==='debugcfg'){ if(a==='tap'&&pt) debugCfgTap(pt); return; }
  if(mode==='score'){ if(a==='tap'||a==='up') uiConfirm(); return; }
  if(mode==='charsel'){
    if(a==='left'){ charSel=Math.max(0,charSel-1); SFX.swipe(); }
    else if(a==='right'){ charSel=Math.min(CHARS.length-1,charSel+1); SFX.swipe(); }
    else if(a==='up') uiConfirm();
    else if(a==='tap'&&pt) charselTap(pt);
    return;
  }
  if(mode==='relic' && a==='tap' && pt){ relicTap(pt); return; }
  if(mode==='shop'  && a==='tap' && pt){ shopTap(pt); return; }
  if(a==='tap' && pt && GAMEPLAY_MODES.includes(mode)
     && pt.x>PAUSE_BTN.x&&pt.x<PAUSE_BTN.x+PAUSE_BTN.w&&pt.y>PAUSE_BTN.y+uiTop&&pt.y<PAUSE_BTN.y+PAUSE_BTN.h+uiTop){
    paused=true; return;
  }
  if(a==='tap' && pt && debugRun && boss && mode==='boss'
     && pt.x>VW-128&&pt.x<VW-16&&pt.y>150+uiTop&&pt.y<186+uiTop){ debugKillBoss(); return; }
  if(a==='tap') return;                          // gameplay uses swipes/keys only
  if(mode==='run'||mode==='boss'||mode==='miniboss') playerAction(a);
}
addEventListener('keydown',e=>{
  const map={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down',
             a:'left',d:'right',w:'up',s:'down',' ':'up',Enter:'tap'};
  if(e.key==='m'||e.key==='M'){SFX.toggle();return;}
  if(e.key==='p'||e.key==='P'||e.key==='Escape'){       // pause toggle on keyboard
    if(settingsOpen){settingsOpen=false;}
    else if(paused){paused=false;} else if(GAMEPLAY_MODES.includes(mode)){paused=true;}
    return;
  }
  const a=map[e.key]; if(!a) return; e.preventDefault();
  if(a==='tap') handleAction('tap',{x:VW/2,y:VH/2}); else handleAction(a);
});
/* swipes fire the INSTANT the pointer crosses the threshold (Subway-Surfers feel) —
   and each touch is exactly ONE action: after it fires, the rest of that drag is
   ignored until the finger lifts. No hold-and-slide steering, no double-lane hops. */
let tStart=null;
const SWIPE_TH=24;
function trySwipe(cx,cy){
  if(!tStart||tStart.done) return false;
  const dx=cx-tStart.x, dy=cy-tStart.y;
  if(Math.abs(dx)<SWIPE_TH && Math.abs(dy)<SWIPE_TH) return false;
  if(Math.abs(dx)>Math.abs(dy)) handleAction(dx>0?'right':'left');
  else handleAction(dy>0?'down':'up');
  tStart.done=true;                           // this touch is spent — lift to act again
  return true;
}
addEventListener('touchstart',e=>{e.preventDefault();
  SFX.unlock();
  const t=e.changedTouches[0];
  /* a touch born in the bottom system-gesture strip is the iOS home-swipe, not
     input: it must NEVER fire a jump — the game just pauses when the system
     steals it a moment later */
  const sys=t.clientY>innerHeight-36;
  tStart={x:t.clientX,y:t.clientY,done:sys};
},{passive:false});
addEventListener('touchmove',e=>{ e.preventDefault();
  const t=e.changedTouches[0]; trySwipe(t.clientX,t.clientY);
},{passive:false});
addEventListener('gesturestart',e=>e.preventDefault());
addEventListener('gesturechange',e=>e.preventDefault());
addEventListener('touchend',e=>{e.preventDefault();
  if(!tStart) return; const t=e.changedTouches[0];
  if(!tStart.done && !trySwipe(t.clientX,t.clientY))
    handleAction('tap',toGame(t.clientX,t.clientY));
  tStart=null;
},{passive:false});
/* the system STEALING a touch (the swipe-up into the iOS app switcher, control
   center, notification pull) fires touchcancel — pause right there, so the game
   is already frozen while it sits in the switcher */
addEventListener('touchcancel',()=>{ tStart=null; autoPause(); },{passive:true});
let mDown=false;
addEventListener('mousedown',e=>{ mDown=true; tStart={x:e.clientX,y:e.clientY,done:false}; });
addEventListener('mousemove',e=>{ if(mDown) trySwipe(e.clientX,e.clientY); });
addEventListener('mouseup',e=>{
  mDown=false;
  if(!tStart) return;
  if(!tStart.done && !trySwipe(e.clientX,e.clientY)) handleAction('tap',toGame(e.clientX,e.clientY));
  tStart=null;
});
/* the game must NOT run in the background: pause when the tab/app is hidden
   (iOS app switcher / swipe-up, home button, tab change). Belt AND braces: every
   lifecycle event is hooked, and the main loop carries a watchdog that pauses the
   run whenever the frame clock reveals we were suspended. */
function autoPause(){ if(GAMEPLAY_MODES.includes(mode)) paused=true; }
document.addEventListener('visibilitychange',()=>{ if(document.hidden) autoPause(); });
document.addEventListener('freeze',autoPause);
addEventListener('pagehide',autoPause);
addEventListener('blur',autoPause);
/* iOS system sheets (attach-image picker, share sheet, keyboard) slide OVER the
   page without firing any hide event — but they shrink the visual viewport */
if(window.visualViewport){
  let vvH=visualViewport.height;
  visualViewport.addEventListener('resize',()=>{
    if(visualViewport.height<vvH*0.85) autoPause();
    vvH=visualViewport.height;
  });
}

/* ============================== 6. JUICE ============================== */
let shakeMag=0, shakeT=0, hitstop=0, flashCol=null, flashA=0;
function shake(m,t=0.3){ shakeMag=Math.max(shakeMag,m); shakeT=Math.max(shakeT,t); }
function stopTime(t){ hitstop=Math.max(hitstop,t); }               // hit-stop freeze
function flash(col,a=0.7){ flashCol=col; flashA=a; }               // fullscreen flash
const particles=[], floaters=[];
/* generic particle: {x,y,vx,vy,life,maxLife,size,col,grav,glow} */
function burst(x,y,n,cols,spd=140,grav=180,size=4,life=0.7){
  for(let i=0;i<n;i++){ const a=rnd(TAU), s=rnd(spd*0.3,spd);
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-40,life,maxLife:life,
      size:rnd(size*0.5,size),col:pick(cols),grav}); }
}
function floater(x,y,txt,col='#ffe37a',size=18){
  floaters.push({x,y,txt,col,size,life:1,maxLife:1});
}
function updateJuice(dt){
  shakeT-=dt; if(shakeT<=0) shakeMag=0;
  flashA=Math.max(0,flashA-dt*2.4);
  for(let i=particles.length-1;i>=0;i--){ const p=particles[i];
    p.life-=dt; if(p.life<=0){particles.splice(i,1);continue;}
    p.vy+=(p.grav||0)*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; }
  for(let i=floaters.length-1;i>=0;i--){ const f=floaters[i];
    f.life-=dt*0.9; f.y-=34*dt; if(f.life<=0) floaters.splice(i,1); }
}
/* claw-slash streaks: physical hit feedback (no beams) */
let slashes=[];
function spawnSlash(x,y,ang,col){ slashes.push({x,y,ang,col:col||'#e8e2d0',t:0}); }
function updateDrawSlashes(dt){
  for(let i=slashes.length-1;i>=0;i--){ const sl=slashes[i]; sl.t+=dt/0.22;
    if(sl.t>=1){ slashes.splice(i,1); continue; }
    const a=1-sl.t, len=46+sl.t*46;
    g.save(); g.translate(sl.x,sl.y); g.rotate(sl.ang); g.globalAlpha=a;
    g.fillStyle=sl.col;
    g.fillRect(-len/2,-2,len,3.4);            // three parallel claw rakes
    g.fillRect(-len/2+7,-9,len*0.8,2.8);
    g.fillRect(-len/2+4,6,len*0.85,2.8);
    g.restore(); g.globalAlpha=1;
  }
}
function drawParticles(){
  for(const p of particles){ const a=p.life/p.maxLife;
    g.globalAlpha=a; g.fillStyle=p.col;
    g.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size); }
  g.globalAlpha=1;
  for(const f of floaters){ const a=clamp(f.life/f.maxLife,0,1);
    g.globalAlpha=a; g.font=`bold ${f.size}px monospace`; g.textAlign='center';
    g.fillStyle='#000'; g.fillText(f.txt,f.x+2,f.y+2);
    g.fillStyle=f.col; g.fillText(f.txt,f.x,f.y); }
  g.globalAlpha=1;
}

/* ============================== 7. SPRITES (all procedural pixel-art) ==============================
   Every sprite is drawn with small filled rects in a local "pixel" coordinate space,
   then scaled/rotated with canvas transforms. u = one art pixel (3 screen px).      */
const U=3;
function px(x,y,w,h,c){ g.fillStyle=c; g.fillRect(x*U,y*U,w*U,h*U); }

/* ---- Knight on horseback, seen from behind (the runner view) ----
   opts: {gallop (phase 0..1), lean (-1..1), duck (0..1), feather, armor, horse, chubby,
          attack (0..1 lance-thrust anim), counter (0..1)} */
function drawRider(x,y,scale,o){
  o=o||{}; const gal=(o.gallop||0)*TAU;
  const air=o.air||0, duck=o.duck||0;                // air: 0..1 through the jump arc
  const leap=air>0?Math.sin(air*Math.PI):0;
  const dnPh=air>0?clamp(air*2-1,0,1):0;             // 0 = rising, 1 = about to land
  const bob=air>0?-1.2*leap:Math.sin(gal*2)*1.2;     // body lifts, no bobbing mid-air
  const kBob=air>0?-0.8*leap:Math.sin(gal*2+0.9)*1.0;
  g.save(); g.translate(x,y); g.scale(scale,scale);
  /* JUMP is PURELY VERTICAL: no tilt, no side lean — the HORSE does the acting
     (kick-off stretch on the rise, legs gathering under it for the landing) */
  g.rotate(air>0?0:(o.lean||0)*0.16);
  /* CROUCH: a soft press instead of the old cartoon squash — the rider drops flat */
  g.scale(1+duck*0.10, 1-duck*0.22);
  g.translate(-9*U, -30*U);                          // sprite origin: feet baseline centered

  const horse=o.horse||'#7a4a26', horseD=shade(horse,-24), mane=shade(horse,-40);
  const armor=o.caveman?'#c98e5a':(o.armor||'#8f9bb0'),
        armorD=o.caveman?'#8a5c3a':shade(armor,-30);

  /* -- legs: two pairs splaying with gallop; the JUMP plays in two phases:
        rise = hind legs kicked out, front tucked · fall = all legs reach down -- */
  const l1=air>0?-(2.8*(1-dnPh)+0.7):Math.sin(gal)*2.6;
  const l2=air>0? (2.7*(1-dnPh)+0.5):Math.sin(gal+Math.PI)*2.6;
  if(!o.monkey){
    px(3+l1*0.4, 22+bob, 3, 8-Math.abs(l1), horseD);   // back-left leg
    px(12-l1*0.4,22+bob, 3, 8-Math.abs(l1), horseD);   // back-right leg
    px(1+l2*0.5, 21+bob, 3, 8-Math.abs(l2), horse);    // front-left leg
    px(14-l2*0.5,21+bob, 3, 8-Math.abs(l2), horse);    // front-right leg
    /* -- horse rump / body (we see it from behind) -- */
    px(2,14+bob,14,9,horse); px(3,13+bob,12,2,shade(horse,14));
    px(2,21+bob,14,2,horseD);
    /* tail swishes with gallop, streams up in the air */
    const tail=air>0?-2.6*leap:Math.sin(gal+1.7)*2;
    px(8+tail*0.6,22+bob,2,6,mane); px(8+tail,27+bob,2,3,mane);
    /* horse neck + head peeking above the rump — in the air the head throws UP
       with the kick-off, then lowers as it gathers itself for the landing */
    const hdy=air>0?(-1.6*(1-dnPh)+1.4*dnPh):0;
    px(6,7+bob+hdy,6,8,horse); px(5,4+bob+hdy,8,5,horse);
    px(6,3+bob+hdy,2,2,mane); px(10,3+bob+hdy,2,2,mane); // ears
    px(7,6+bob+hdy,4,2,mane);                            // mane tuft
  } else {
    /* -- THE MONKEY: long knuckle-running arms, compact body, tail curling high -- */
    const fur=o.horse||'#6a4a2e', furD=shade(fur,-24), furL=shade(fur,16);
    px(2+l2*0.5, 20+bob,2.6,10-Math.abs(l2)*0.8,fur);   // LONG front arms
    px(13.4-l2*0.5,20+bob,2.6,10-Math.abs(l2)*0.8,fur);
    px(4+l1*0.4, 24+bob,2.6,6-Math.abs(l1)*0.7,furD);   // short hind legs
    px(11.4-l1*0.4,24+bob,2.6,6-Math.abs(l1)*0.7,furD);
    px(3.4,14+bob,11.2,9,fur); px(4.4,13+bob,9.2,2,furL); // compact body
    px(3.4,21+bob,11.2,2,furD);
    const mtail=air>0?-3.4*leap:Math.sin(gal+1.7)*2.4;    // tail curls up over the back
    px(8.6+mtail*0.5,10+bob,1.8,6,furD); px(9.4+mtail,7+bob,3,3,furD);
    px(6,8.6+bob,6,5.4,fur);                              // round head
    px(4.8,9.6+bob,1.6,2.2,'#c9a37a'); px(11.6,9.6+bob,1.6,2.2,'#c9a37a'); // bare ears
    px(7,7.6+bob,4,1.4,furD);                             // crown tuft
  }
  /* -- rider torso (tall+skinny, short+fat companion, or the bare-backed caveman) -- */
  const w=o.chubby?10:6, hgt=o.chubby?7:10, tx=9-w/2, dx2=duck*1.5;
  px(tx+dx2,7-hgt+kBob+duck*5, w, hgt, armor);
  px(tx+dx2,7-hgt+kBob+duck*5, w, 2, shade(armor,18));
  if(o.caveman){
    /* UMUTCAN: just a normal guy — broad bare back, hairy but NORMAL: a modest
       dusting of dark hair, not a pelt */
    const ty=7-hgt+kBob+duck*5;
    g.fillStyle='#b8804e';                                    // soft lower-back shading
    g.fillRect((tx+dx2)*U,(ty+hgt-2.4)*U,w*U,U*1.3);
    g.fillStyle='#3a2a1a';
    g.fillRect((tx+dx2+w*0.5-0.5)*U,(ty+1.8)*U,U*1.0,U*2.8);  // a tuft along the spine
    g.fillRect((tx+dx2+1.3)*U,(ty+2.5)*U,U*0.7,U*1.5);        // light shoulder wisps
    g.fillRect((tx+dx2+w-2)*U,(ty+2.3)*U,U*0.7,U*1.5);
  }
  px(tx+1,8+kBob,2,3,armorD); px(tx+w-3,8+kBob,2,3,armorD);   // legs gripping saddle
  /* lance on the back / thrust forward when attacking */
  const atk=o.attack||0;
  if(atk>0){ const th=easeOut(Math.min(atk*2,1));
    px(9+w/2, 2-hgt+kBob-th*3, 2, 6, '#c9a86a');
    px(9+w/2, 0-hgt+kBob-th*5, 2, 3, '#e8e2d0'); }
  else { px(tx+w, 4-hgt+kBob, 1, 9, '#c9a86a'); }
  /* -- the head: helmet + feather, or Umutcan's bald dome and beard -- */
  const hy=4-hgt+kBob+duck*6;
  if(o.caveman){
    px(9-3.2+dx2,hy-0.6,6.4,5,'#c98e5a');                      // the skull
    px(9-2+dx2,hy-1.2,4,1.4,'#d9a06a');                        // the BALD SPOT, catching light
    px(9-1+dx2,hy-1.5,1.6,0.9,'#e8b884');                      // its gleam
    g.fillStyle='#241a10';                                     // neat DARK hair around it
    g.fillRect((9-3.5+dx2)*U,(hy+0.4)*U,U*1.3,U*3.4);          // left side
    g.fillRect((9+2.2+dx2)*U,(hy+0.4)*U,U*1.3,U*3.4);          // right side
    g.fillRect((9-2.6+dx2)*U,(hy+2.6)*U,U*5.2,U*1.2);          // trimmed band at the back
    px(9-3.9+dx2,hy+1.6,1,1.5,'#8a5c3a'); px(9+2.9+dx2,hy+1.6,1,1.5,'#8a5c3a'); // ears
    px(9-2.8+dx2,hy+3.8,5.6,1.5,'#3a2a1a');                    // a tidy short beard
  } else {
    px(9-3+dx2,hy,6,4,armor); px(9-3+dx2,hy+1,6,1,'#2a2f3a');  // visor slit
    px(9-2+dx2,hy-1,4,1,shade(armor,22));
    const sway=Math.sin(gal+2.2)*1.4;                          // feather sways; flattens in a crouch
    g.fillStyle=o.feather||'#3f7bff';
    g.fillRect((9-1+dx2)*U+sway+duck*6,(hy-4+duck*2)*U,2*U,(4-duck*1.4)*U);
    g.fillRect((9-1+dx2)*U+sway*1.6+duck*9,(hy-6+duck*3.2)*U,2*U,2*U);
  }
  /* counter-attack: golden slash arc in front of the knight */
  if(o.counter>0){ const c=o.counter;
    g.globalAlpha=Math.sin(c*Math.PI);
    g.strokeStyle='#ffe37a'; g.lineWidth=3*U;
    g.beginPath(); g.arc(9*U,(2-hgt)*U,14*U,-.4-c*2.2,.6-c*2.2); g.stroke();
    g.globalAlpha=1; }
  g.restore();
}
/* darken/lighten a hex color by amt (-255..255) */
function shade(hex,amt){
  const n=parseInt(hex.slice(1),16);
  const r=clamp((n>>16)+amt,0,255),gr=clamp(((n>>8)&255)+amt,0,255),b=clamp((n&255)+amt,0,255);
  return `rgb(${r},${gr},${b})`;
}
/* blend two hex colors: f=0 → a, f=1 → b (returns hex, so shade() can chew on it) */
function mixCol(a,b,f){
  const n1=parseInt(a.slice(1),16), n2=parseInt(b.slice(1),16);
  const r=Math.round(lerp(n1>>16,n2>>16,f)), gr=Math.round(lerp((n1>>8)&255,(n2>>8)&255,f)),
        bl=Math.round(lerp(n1&255,n2&255,f));
  return '#'+((1<<24)|(r<<16)|(gr<<8)|bl).toString(16).slice(1);
}

/* ---- Werewolf stage boss, facing the player ----
   state: idle|tele_*|strike|recover|hit|dying|howl ; t: 0..1 anim progress */
function drawBear(x,y,scale,state,t,hurtFlash){
  g.save(); g.translate(x,y); g.scale(scale,scale);
  const breathe=Math.sin(perfNow*2.1)*0.02;
  g.scale(1+breathe,1-breathe);
  if(state==='dying'){                               // staged kill anim: shudder → collapse → fade
    if(t<0.4){ g.translate(rnd(-3,3)*t*10, 0); }     // body shudders under the killing blows
    else { const c=(t-0.4)/0.6;
      g.rotate(easeOut(c)*0.9); g.globalAlpha=1-c*c; g.translate(0,easeOut(c)*40); }
  }
  g.translate(-16*U,-42*U);                          // origin: feet center
  const fur=hurtFlash?'#ffffff':'#4a3524', furD=hurtFlash?'#e8e8e8':'#31220f',
        furL=hurtFlash?'#ffffff':'#63492f', claw='#d8d3c4';
  /* pose parameters per state */
  let armL=0.5, armR=0.5, crouch=0, headY=0, jaw=0;  // arm angles (rad, 0=down), body crouch
  if(state==='tele_swipe'){ armR=-2.0-Math.sin(t*22)*0.06; }                 // wind up right claw high
  else if(state==='tele_double'){ armL=-2.0; armR=-2.0; }                    // both claws high
  else if(state==='tele_sweep'){ crouch=easeOut(t)*8; armL=0.9; armR=0.9; }  // crouch low
  else if(state==='tele_lunge'){ headY=-easeOut(t)*6; armL=-0.6; armR=-0.6; jaw=t; } // rear up, jaws wide
  else if(state==='tele_pounce'){ crouch=easeOut(t)*10; headY=2; }           // coiled deep crouch
  else if(state==='howl'||state==='tele_combo'){ headY=-easeOut(Math.min(t*2,1))*8; jaw=1; }
  else if(state==='strike'){ const s=easeOut(t); armL=0.5+s*2.6; armR=0.5+s*2.6; crouch=s*3; }
  else if(state==='hit'){ headY=2; crouch=-2; }
  /* legs (digitigrade) with heavy haunches */
  px(4.6,26-crouch,8,8,fur); px(19.4,26-crouch,8,8,fur);     // thigh mass
  px(5.4,27-crouch,2,5,furL);                                 // moonlit thigh edge
  px(6,32-crouch,5,10+crouch,furD); px(21,32-crouch,5,10+crouch,furD);
  px(5,40,7,2,fur); px(20,40,7,2,fur);
  px(5.6,40.6,1.6,1.4,'#d8d3c4'); px(9,40.6,1.6,1.4,'#d8d3c4');  // toe claws
  px(20.6,40.6,1.6,1.4,'#d8d3c4'); px(24,40.6,1.6,1.4,'#d8d3c4');
  /* hunched torso */
  px(6,14-crouch,20,19,fur);
  px(8,12-crouch,16,4,furL);                          // shoulder hump
  px(10,20-crouch,12,10,furD);                        // belly shadow
  px(4,14-crouch,3,10,fur); px(25,14-crouch,3,10,fur);// shoulder mass
  /* moonlight rim along the left silhouette (light falls from the canopy opening) */
  px(6,14-crouch,1.2,16,furL); px(7.2,13.4-crouch,1.2,2.4,furL);
  /* matted fur streaks + battle scars across the chest */
  for(let i=0;i<4;i++) px(8+i*4.4,15.5-crouch,1.2,6+(i%2)*3,furD);
  px(9,24-crouch,7,1.1,'#5a3040'); px(11,26-crouch,6,1.1,'#5a3040');   // old claw scars
  px(20,16-crouch,4.4,1.1,'#5a3040');
  /* jagged hackles bristling off the hump */
  px(8,10.6-crouch,2.4,2.4,furD); px(13,9.8-crouch,2.6,3,furD); px(18,10.4-crouch,2.4,2.6,furD); px(23,11-crouch,2,2.2,furD);
  /* arms: rotated rects with claws */
  drawWolfArm(6*U,(16-crouch)*U,armL,fur,claw,-1);
  drawWolfArm(26*U,(16-crouch)*U,armR,fur,claw,1);
  /* head */
  const hy=6+headY-crouch;
  px(10,hy,12,8,fur); px(9,hy+2,3,4,fur); px(20,hy+2,3,4,fur);
  px(9.6,hy-2.4,4.4,3.4,furD); px(18,hy-2.4,4.4,3.4,furD);   // round bear ears
  px(10.6,hy-1.6,2,1.6,fur); px(19,hy-1.6,2,1.6,fur);         // inner ear
  px(20.6,hy-2.4,1.8,1.4,'#0f0d16');                          // right ear torn ragged
  /* glowing eyes */
  g.fillStyle='#ff4d3a'; g.shadowColor='#ff4d3a'; g.shadowBlur=8*scale;
  g.fillRect(12*U,(hy+2)*U,2*U,2*U); g.fillRect(18*U,(hy+2)*U,2*U,2*U);
  g.shadowBlur=0;
  /* heavy brow shadowing the eyes */
  px(11,hy+1,4,1.2,furD); px(17,hy+1,4,1.2,furD);
  /* muzzle + jaw (opens for lunge/howl) */
  px(13,hy+5,6,3,furD); px(13.4,hy+5.6,5,0.9,'#5a3040');
  px(14,hy+8+jaw*2,4,2,furD);
  if(jaw>0.2){ g.fillStyle='#e8e2d0';
    for(let i=0;i<3;i++) g.fillRect((14+i*1.6)*U,(hy+7.6)*U,U*0.8,U*1.2+(i===1?U*0.5:0));
    g.fillStyle='#b8c4d8'; g.fillRect(15.4*U,(hy+9.6+jaw*2)*U,U*0.5,U*(0.8+jaw*1.4)); }
  g.restore();
}
function drawWolfArm(sx,sy,ang,fur,claw,dir){
  g.save(); g.translate(sx,sy); g.rotate(ang*dir);
  g.fillStyle=fur; g.fillRect(-2*U,0,4*U,13*U);
  g.fillStyle=claw;                                    // three claws
  for(let i=-1;i<=1;i++) g.fillRect((i*1.6-0.6)*U,13*U,1.2*U,2.6*U);
  g.restore();
}

/* ---- THE HYDRA: three necks out of one drowned bulk (the original design) ---- */
function drawHydra(x,y,scale,state,t,hurtFlash){
  g.save(); g.translate(x,y); g.scale(scale,scale);
  const breathe=Math.sin(perfNow*1.7)*0.02;
  g.scale(1+breathe,1-breathe);
  if(state==='dying'){
    if(t<0.4){ g.translate(rnd(-3,3)*t*10,0); }
    else { const c=(t-0.4)/0.6; g.rotate(easeOut(c)*0.5); g.globalAlpha=1-c*c; g.translate(0,easeOut(c)*48); }
  }
  g.translate(-16*U,-42*U);
  const sc=hurtFlash?'#ffffff':'#2e4a3a', scD=hurtFlash?'#e8e8e8':'#1c3226',
        scL=hurtFlash?'#ffffff':'#457a5a', belly=hurtFlash?'#e8e8e8':'#7a9a72';
  /* neck poses per state: [lean(px), rise(px), jaw] for left / mid / right heads */
  let P=[[ -3,0,0],[0,2,0],[3,0,0]];
  const sway=i=>Math.sin(perfNow*1.6+i*2.1)*1.6;
  if(state==='tele_swipe')      P=[[-2,0,0],[1,2,0],[7,9,0.5]];          // right head rears
  else if(state==='tele_double')P=[[-7,9,0.5],[0,1,0],[7,9,0.5]];        // both outer heads rear
  else if(state==='tele_sweep') P=[[-5,-7,0.2],[0,-8,0.2],[5,-7,0.2]];   // all coil LOW
  else if(state==='tele_lunge') P=[[-4,-2,0],[0,12,1],[4,-2,0]];         // center towers, jaws wide
  else if(state==='tele_pounce')P=[[-6,-9,0.3],[0,-10,0.6],[6,-9,0.3]];  // deep coil
  else if(state==='howl'||state==='tele_combo') P=[[-5,10,1],[0,13,1],[5,10,1]]; // all scream
  else if(state==='strike'){ const k=easeOut(t); P=[[-3-k*4,-k*6,1],[0,2-k*10,1],[3+k*4,-k*6,1]]; }
  else if(state==='hit')        P=[[-5,-3,0.4],[0,-4,0.4],[5,-3,0.4]];
  /* the drowned bulk: a scaled mound half out of the water */
  px(3,24,26,16,sc); px(5,22,22,4,scL);
  px(7,30,18,9,scD);
  for(let i=0;i<5;i++) px(5+i*4.6,25,2.2,2.2,scD);          // scale nubs
  for(let i=0;i<4;i++) px(7+i*4.6,29,2.2,2.2,scD);
  /* waterline lapping the bulk */
  g.globalAlpha=0.55; px(1,38,30,3,'#101b16'); g.globalAlpha=1;
  px(0,37,7,2.4,sc); px(25,37,7,2.4,sc);                    // half-sunk coils beside it
  /* three necks: segmented columns, each with its own pose */
  const bases=[[8,25],[16,23],[24,25]];
  for(let n=0;n<3;n++){
    const [bx,by]=bases[n], [ln,rise,jaw]=P[n];
    const topX=bx+ln+sway(n)*0.6, topY=6-rise;
    for(let k2=0;k2<5;k2++){
      const f=k2/4, nx=lerp(bx,topX,f)+Math.sin(f*Math.PI)*ln*0.35;
      const ny=lerp(by,topY,f);
      const w=4.4-f*1.4;
      px(nx-w/2,ny,w,4,sc);
      px(nx-w/2,ny,w*0.34,4,scL);
      if(k2%2) px(nx-w/2+w*0.3,ny+1,w*0.4,1.2,scD);
    }
    /* belly plates up the front of the neck */
    for(let k2=0;k2<4;k2++){ const f=k2/4+0.1;
      px(lerp(bx,topX,f)+Math.sin(f*Math.PI)*ln*0.35-0.8,lerp(by,topY,f)+1.4,1.8,1.6,belly); }
    /* the head: wedge skull, jaw, frill, glowing eyes */
    const hx2=topX, hy2=topY-3;
    px(hx2-3,hy2,6,3.6,sc); px(hx2-3,hy2,6,1.2,scL);
    px(hx2-4.4,hy2+0.6,1.8,2,sc); px(hx2+2.6,hy2+0.6,1.8,2,sc);       // frill horns
    px(hx2-2.4,hy2+3.4,4.8,1.6,scD);                                   // upper jaw
    px(hx2-1.8,hy2+5+jaw*2.2,3.6,1.4,scD);                             // lower jaw drops
    if(jaw>0.2){ g.fillStyle='#e8e2d0';

/* ---- THE MOLTEN SNAPPER: it faces YOU across the lava — shell like a furnace door ---- */
function drawLavaTurtle(x,y,scale,state,t,hurtFlash){
  g.save(); g.translate(x,y); g.scale(scale,scale);
  const breathe=Math.sin(perfNow*1.5)*0.012;
  g.scale(1+breathe,1-breathe);
  if(state==='dying'){
    if(t<0.4){ g.translate(rnd(-3,3)*t*10,0); }
    else { const c=(t-0.4)/0.6; g.globalAlpha=1-c*c; g.translate(0,easeOut(c)*28); g.scale(1,1-c*0.3); }
  }
  g.translate(-16*U,-42*U);
  const rock=hurtFlash?'#ffffff':'#2a2226', rockD=hurtFlash?'#e8e8e8':'#181215',
        rockL=hurtFlash?'#ffffff':'#4a3c44';

  const glow=(state==='dying'?Math.max(0.1,0.6-t*0.5):0.62)+Math.sin(perfNow*3.1)*0.18;
  /* pose: headOut (0=in the shell, 1=out, 2=SNAPPED at your face), squash, tilt, legs, jaw */
  let headOut=0.4, squash=0, tilt=0, legL=0, legR=0, jaw=0.2, rear=0;
  if(state==='tele_swipe'){ tilt=0.07; legR=easeOut(t)*6; headOut=0.5; jaw=0.4; }     // one claw rises — SIDESTEP
  else if(state==='tele_double'){ rear=easeOut(t)*6; legL=legR=easeOut(t)*5; jaw=0.5; } // it REARS the whole shell
  else if(state==='tele_sweep'){ squash=easeOut(t)*0.16; headOut=0.55; jaw=0.3; }     // FLATTENS to rake low — JUMP
  else if(state==='tele_lunge'){ headOut=0.4-easeOut(t)*0.4; jaw=0; rear=easeOut(t)*2; } // head VANISHES inside — DUCK the snap
  else if(state==='tele_pounce'){ headOut=0.4-easeOut(t)*0.35; legL=legR=-easeOut(t)*2; squash=easeOut(t)*0.08; }
  else if(state==='howl'||state==='tele_combo'){ headOut=0.8; jaw=1; rear=easeOut(Math.min(t*2,1))*3; }

  /* per-scute shading + battle chips */

    }

  }
  /* embers shed from the seams */
  if(Math.random()<0.35){ g.globalAlpha=glow; g.fillStyle=Math.random()<0.5?seam:seamHot;
    g.fillRect(rnd(4,28)*U,rnd(sy(10),sy(30))*U,1.6,1.6); g.globalAlpha=1; }
  g.restore();
}
/* ---- Grey wolf (miniboss + later ally), front-facing ---- */

  else if(state==='tele_sweep'){ crouch=easeOut(t)*7; }

  else if(state==='howl'){ headY=-easeOut(Math.min(t*2,1))*6; jaw=1; }

  /* raised hackles: jagged spikes along the spine */
  px(4,6.4-crouch*0.5,2,2,furD); px(8,5.8-crouch*0.5,2,2.4,furD); px(12,6.2-crouch*0.5,2,2,furD);

  g.fillStyle='#7a2020'; g.fillRect(7.6*U,(hy+1.7)*U,2.8*U,2.6*U); g.fillRect(11.6*U,(hy+1.7)*U,2.8*U,2.6*U);
  g.fillStyle='#ffd23a'; g.shadowColor='#ffd23a'; g.shadowBlur=6*scale;
  g.fillRect(8*U,(hy+2)*U,2*U,2*U); g.fillRect(12*U,(hy+2)*U,2*U,2*U);

  px(9,hy+4,4,3,furD); px(9.4,hy+4.4,3,0.8,'#4a3438');

    g.fillRect(9.7*U,(hy+6.9)*U,U*0.65,U*1.25); g.fillRect(12.3*U,(hy+6.9)*U,U*0.65,U*1.25);

    g.fillRect(10.3*U,(hy+6.7+jaw*2)*U,U*0.55,U*0.65); g.fillRect(11.8*U,(hy+6.7+jaw*2)*U,U*0.55,U*0.65);

/* ---- obstacles & pickups ---- */
function drawObstacle(o,pIn){
  const lanes=[0,1,2].filter(l=>o.req[l]);
  if(!lanes.length) return;
  /* obstacles render from the FAR distance like the trees — but through a SOFT
     horizon: beyond the draw distance they compress into the last few pixels
     below the line (a slow, steady downward drift instead of freezing in one
     bundle and then racing off), and the growth ratio is tempered so nothing
     rears up like cresting a hill — the world out there stays FLAT. */
  const far=o.z>effZFar;
  const raw=(CFG.FOCAL+effZFar)/(CFG.FOCAL+Math.max(o.z,effZFar));
  /* FULL perspective curvature (the visible swelling is what sells the distance),
     only a hair lifted to take the worst of the hill-rise off, plus a steady
     drift down the last sliver below the line so nothing sits frozen.
     effZFar drops to the lair's foot when the massif blocks the horizon, so
     obstacles surface from beneath the lair and flow like everything else. */
  const grow=far?0.10+raw*0.90:1;
  const zEff=far?effZFar-6*(1-raw):o.z;
  const p=far?proj(zEff):pIn;
  /* short window: the NEXT obstacle only fades in as this one crosses the horizon —
     one at a time, so you always know which comes first */
  worldA=clamp((OBST_FAR-o.z)/10,0,1);
  if(worldA<=0){ worldA=1; return; }
  g.save();
  if(far){ g.translate(VW/2,p.y); g.scale(grow,grow); g.translate(-VW/2,-p.y); }
  g.globalAlpha=worldA;
  const S=linS(p.t)*1.6, y=p.y;
  const xl=laneX(Math.min(...lanes)-0.44,p.t), xr=laneX(Math.max(...lanes)+0.44,p.t);
  if(o.kind==='pond'){
    /* flat, so it also slides in THROUGH the horizon line, clipped to the ground */
    g.beginPath(); g.rect(-8,HORIZON_Y,VW+16,VH-HORIZON_Y+PAD_BOT); g.clip();
    const zc=Math.min(zEff,CFG.Z_FAR);
    drawPond(o,xl,xr,y,S,lanes,(proj(zc-1.05).y-proj(zc+1.05).y)/2);
    if(far){ /* the far water SHINES: a bright moonlit (or molten) sparkle that makes
                the pool pop out of the dark road — twinkling, just shy of strobing */
      const PB=OBS_PAL[biome], cxp=(xl+xr)/2;
      const tw=0.46+Math.sin(perfNow*2.2+o.seed)*0.26;
      g.globalAlpha=worldA*tw;
      g.fillStyle=PB.glint;
      g.fillRect(cxp-5,y-2,9,1.8); g.fillRect(cxp+7,y-0.8,4,1.3);
      g.globalAlpha=worldA*tw*0.55; g.fillStyle=PB.reflect;      // soft halo under the sparkle
      g.fillRect(cxp-8,y-1,16,2.6);
      g.globalAlpha=worldA;
    }
  }
  else if(o.kind==='boulder') drawBoulder(o,xl,xr,y,S,lanes);
  else drawRoot(o,y,p,S);
  g.restore(); worldA=1; g.globalAlpha=1;
}
/* per-biome obstacle skins: same shapes, native materials */
const OBS_PAL={
  forest:{bark:'#241a10',hi:'#3a2c18',dk:'#170f07',moss:'#2e4c2b',mossHi:'#3d6136',
          canopy:['#101f14','#16281a'],ember:null,
          water:'#0d161e',rim:'#241f14',glint:'#cfd8ff',reflect:'#aebde4',reeds:true,
          rock:'#454b3e',rockD:'#333a2e',rockL:'#565e4c',crack:'#2b3126',skirt:'#232b1a',tuft:'#243a22'},
  swamp: {bark:'#1e1a10',hi:'#2a2416',dk:'#120e08',moss:'#3a4a3c',mossHi:'#4a5a48',
          canopy:['#171d1c','#1e2624'],ember:null,
          water:'#101a20',rim:'#1c1811',glint:'#b8ccd8',reflect:'#8aa0ae',reeds:true,
          rock:'#3a4238',rockD:'#2a3128',rockL:'#4a5a48',crack:'#232b22',skirt:'#141b10',tuft:'#243a22'},
  volcano:{bark:'#4a3a44',hi:'#6e5866',dk:'#241a20',moss:'#3a1c14',mossHi:'#5a2a1a',
          canopy:null,ember:'#ff6a2a',
          water:'#ff6a2a',rim:'#191416',glint:'#ffd23a',reflect:'#ffd23a',reeds:false,
          rock:'#4e4248',rockD:'#2e262c',rockL:'#6a5a62',crack:'#1c1618',skirt:'#221a1c',tuft:null},
};
/* --- ROGUE ROOT / MANGROVE ROOT / BASALT ARCH: head-height over the outer lane (duck),
       slumping to the ground across the inner lanes (jump) --- */
function drawRoot(o,y,p,S){
  const L=o.side==='L';
  const PB=OBS_PAL[biome];
  const bark=PB.bark, hi=PB.hi, dk=PB.dk, moss=PB.moss, mossHi=PB.mossHi;
  const sd=o.seed;
  const outLane=L?0:2;
  const duckX0=laneX(outLane-0.55,p.t), duckX1=laneX(outLane+0.55,p.t);
  const armBot=y-52*S, armTop=armBot-17*S;           // THICK beam, HIGH clearance — ducked riders pass clean
  const jumps=[0,1,2].filter(l=>o.req[l]==='jump');
  const dir=L?1:-1;
  const stone=biome==='volcano';                     // ashland roots are STONE PIPES
  /* THE MOTHER TREE: a full-size random tree of this biome (a petrified coral stone
     in the ashlands). It uses the same LINEAR perspective as the roadside scenery,
     so it tracks the road cleanly, never warps, and stands clear of the lanes. */
  const SL=linS(p.t);
  const edgeX=L?duckX0-112*SL:duckX1+112*SL;
  const tv=o.treeV!==undefined?o.treeV:((sd%97)/97);
  g.save();
  if(stone) drawPetrifiedCoral(edgeX,y+4,2.6*SL,tv);
  else BIO().scenery(edgeX,y+4,2.8*SL,tv);
  /* stone-pipe palette: starts at the coral's basalt-dark tone, blending gradually
     up to a lighter shade toward the path so the pipe still pops against the ground */
  const pipeD='#241d21', pipeL='#5e4a56';
  const nearC=stone?mixCol(pipeD,pipeL,0.85):bark;     // near-road pieces sit at the light end
  /* root flare where the arm erupts from the base of the tree (dark end) */
  g.fillStyle=stone?pipeD:bark; g.fillRect(edgeX-16*S,y-10*S,32*S,12*S);
  g.fillStyle=stone?shade(pipeD,-14):dk;
  g.fillRect(edgeX-16*S,y-3*S,10*S,5*S); g.fillRect(edgeX+7*S,y-4*S,9*S,6*S);
  /* THE ROOT ARM: stepped, tapering segments arcing from the trunk over the outer lane */
  const steps=5, x0=edgeX+dir*8*S, x1=L?duckX1+6*S:duckX0-6*S;
  for(let i=0;i<steps;i++){
    const t0=i/steps, t1=(i+1)/steps;
    const sx=lerp(x0,x1,t0), sw=Math.abs(lerp(x0,x1,t1)-sx)+2*S;
    /* rises out of the ground, arches flat over the lane */
    const rise=Math.sin(Math.min(t0*2.2,1)*Math.PI/2);
    const segTop=lerp(y-16*S,armTop,rise)+(((sd>>i)&1)?1.5:0)*S;   // knuckled, not straight
    const th=(17-i*1.5)*S;                                          // heavy timber, tapering to the tip
    const segC=stone?mixCol(pipeD,pipeL,i/(steps-1)):bark;          // coral→path blend
    g.fillStyle=segC; g.fillRect(L?sx:sx-sw,segTop,sw,th);
    g.fillStyle=stone?shade(segC,20):hi; g.fillRect(L?sx:sx-sw,segTop,sw,2.6*S);
    g.fillStyle=stone?shade(segC,-18):dk; g.fillRect(L?sx:sx-sw,segTop+th-2.2*S,sw,2.2*S);
    if(stone){ g.fillStyle=shade(segC,34);                          // pipe-joint ring collars
      g.fillRect(L?sx:sx-sw,segTop-0.8*S,2.2*S,th+1.6*S);
    } else if(((sd>>i)&3)===1){ g.fillStyle=moss;                   // moss saddles on top
      g.fillRect((L?sx:sx-sw)+sw*0.3,segTop-3.4*S,7*S,4*S);
      g.fillStyle=mossHi; g.fillRect((L?sx:sx-sw)+sw*0.34,segTop-3.4*S,3*S,2*S); }
  }
  /* the beam CASTS A MOON-SHADOW on the empty ground below — the eye reads
     "solid above, clear underneath" without any UI */
  g.globalAlpha=0.34*worldA; g.fillStyle='#0a0d08';
  g.fillRect(Math.min(duckX0,duckX1)-6*S, y-3*S, Math.abs(duckX1-duckX0)+12*S, 5*S);
  g.globalAlpha=0.2*worldA;
  g.fillRect(Math.min(duckX0,duckX1)+2*S, y-6*S, Math.abs(duckX1-duckX0)-4*S, 3*S);
  g.globalAlpha=worldA;
  /* hanging moss + rootlets sway from the beam's underside — living wood only,
     the stone pipes of the ashlands hang nothing */
  if(!stone) for(let i=0;i<4;i++){
    const hx2=lerp(Math.min(duckX0,duckX1)+6*S,Math.max(duckX0,duckX1)-6*S,i/3);
    const sway=Math.sin(perfNow*1.6+i*1.9+sd)*2.2*S;
    const len=(7+((sd>>i)&3)*2.5)*S;
    g.fillStyle=i%2?moss:'#233d21';
    g.fillRect(hx2+sway*0.4,armBot,2.2*S,len*0.55);
    g.fillRect(hx2+sway,armBot+len*0.55,2.2*S,len*0.45);
    if(i%2){ g.fillStyle=mossHi; g.fillRect(hx2+sway*0.4,armBot,2.2*S,2*S); }
  }
  if(PB.ember){ const pul=0.55+Math.sin(perfNow*3+sd)*0.22;
    const bx0=Math.min(duckX0,duckX1)+8*S, bw2=Math.abs(duckX1-duckX0)-16*S;
    /* a pale ash dusting along the top edge — the arch reads against the dark road */
    g.fillStyle='#6a5a62'; g.fillRect(bx0,armTop,bw2,1.8*S);
    g.fillStyle='#8a7a80'; g.fillRect(bx0+bw2*0.14,armTop,bw2*0.2,1.1*S); g.fillRect(bx0+bw2*0.6,armTop,bw2*0.16,1.1*S);
    /* magma veins branching through the beam, glowing */
    g.globalAlpha=pul*worldA; g.fillStyle=PB.ember; g.shadowColor=PB.ember; g.shadowBlur=8*S;
    for(let i=0;i<4;i++){ const vx2=bx0+bw2*(0.08+0.24*i), vy2=armTop+((sd>>i)&1?4:9)*S;
      g.fillRect(vx2,vy2,8*S,1.7*S);
      g.fillRect(vx2+5*S,vy2+((i%2)?1.6:-1.6)*S,4*S,1.5*S); }
    g.shadowBlur=0;
    g.globalAlpha=pul*0.6*worldA; g.fillStyle='#ffd23a';
    g.fillRect(bx0+bw2*0.3,armTop+6*S,3.4*S,1.1*S); g.fillRect(bx0+bw2*0.74,armTop+5*S,3*S,1*S);
    /* lava dripping off the underside of the beam */
    for(let i=0;i<3;i++){ const dx2=bx0+bw2*(0.2+0.3*i);
      const dl=(perfNow*20+i*31)%16;
      g.globalAlpha=pul*(1-dl/16)*worldA; g.fillStyle=PB.ember;
      g.fillRect(dx2,armBot+dl*S*0.5,1.6*S,3.4*S); }
    g.globalAlpha=worldA; }
  /* the high point: a woody knuckle — or, in the ashlands, the OPEN MOUTH of the pipe */
  g.fillStyle=stone?nearC:bark; g.fillRect(x1-(L?2:12)*S,armTop-3*S,14*S,16*S);
  if(stone){
    g.fillStyle=shade(nearC,26);                                   // the pipe's stone lip
    g.beginPath(); g.ellipse(x1+dir*3*S,armTop+5.5*S,5.5*S,7*S,0,0,TAU); g.fill();
    g.fillStyle='#16090c';                                         // the hollow bore
    g.beginPath(); g.ellipse(x1+dir*3*S,armTop+5.5*S,3.6*S,5*S,0,0,TAU); g.fill();
    g.globalAlpha=(0.5+Math.sin(perfNow*3+sd)*0.2)*worldA; g.fillStyle='#ff6a2a';
    g.beginPath(); g.ellipse(x1+dir*3*S,armTop+7.5*S,2.2*S,2.4*S,0,0,TAU); g.fill();
    g.globalAlpha=worldA;
  } else {
    g.fillStyle=dk;   g.fillRect(x1+dir*8*S,armTop+6*S,5*S,12*S);
    g.fillStyle=bark; g.fillRect(x1+dir*4*S,armTop+2*S,7*S,9*S);
  }
  /* GROUND ROOTS across the jump lanes: FAT bulging timber, finger-tipped
     (stone pipes use the light path-end tone here, closest to the road) */
  const gBark=stone?nearC:bark, gHi=stone?shade(nearC,18):hi, gDk=stone?shade(nearC,-20):dk;
  for(const l of jumps){
    const gx0=laneX(l-0.5,p.t), gx1=laneX(l+0.5,p.t), w=gx1-gx0;
    const bulge=(((sd+l)&1)?3:0)*S;
    g.fillStyle=gBark; g.fillRect(gx0,y-15*S-bulge,w,16*S+bulge);
    g.fillStyle=gHi;   g.fillRect(gx0,y-15*S-bulge,w,3.6*S);
    g.fillStyle=gDk;   g.fillRect(gx0+w*0.28,y-10*S,4*S,11*S); g.fillRect(gx0+w*0.66,y-12*S-bulge,3.5*S,13*S);
    /* root fingers clawing into the dirt at the leading edge */
    const fx=L?gx1:gx0;
    g.fillStyle=gBark;
    g.fillRect(fx-dir*2*S,y-4*S,dir>0?7*S:-7*S,5*S);
    g.fillRect(fx+dir*3*S,y-2*S,dir>0?5*S:-5*S,4*S);
    if((sd+l)%2&&!stone){ g.fillStyle=moss; g.fillRect(gx0+w*0.42,y-19*S-bulge,11*S,5*S);
      g.fillStyle=mossHi; g.fillRect(gx0+w*0.45,y-19*S-bulge,5*S,2.4*S); }
  }
  /* the descending bend: arm dives back to the ground toward the jump lanes */
  if(jumps.length){
    const bendX=L?duckX1:duckX0;
    g.fillStyle=stone?mixCol(pipeD,pipeL,0.7):bark;
    g.fillRect(bendX-(L?2:10)*S,armTop+4*S,12*S,(y-armTop)*0.5);
    g.fillRect(bendX+(L?4:-14)*S,armTop+(y-armTop)*0.48,11*S,(y-armTop)*0.52);
    g.fillStyle=stone?shade(nearC,20):hi; g.fillRect(bendX-(L?2:10)*S,armTop+4*S,2.6*S,(y-armTop)*0.45);
  }
  g.restore();
}
/* --- POND: still black water sunk into the track; always JUMP.
       left/right ponds bleed into their treeline, the middle one is a circle --- */
function drawPond(o,xl,xr,y,S,lanes,ry){
  /* ry comes from projecting the pond's real z-extent, so the water FORESHORTENS
     correctly: thin sliver far away, wide open oval underfoot */
  const PB=OBS_PAL[biome], lava=!!PB.ember;
  const cx=(xl+xr)/2, w=(xr-xl)*0.56, h=Math.max(1.2,ry);   // pure perspective: it only ever grows
  const blendL=lanes.includes(0), blendR=lanes.includes(2), circle=o.side==='M'&&lanes.length===1;
  g.save();
  /* muddy (or scorched) rim first, slightly larger */
  g.fillStyle=PB.rim;
  g.beginPath(); g.ellipse(cx,y-1*S,circle?w*0.92:w*1.06,h*1.18,0,0,TAU); g.fill();
  /* the water — in the ashlands it is LAVA, and it glows */
  if(lava){ g.shadowColor=PB.water; g.shadowBlur=14*S; }
  g.fillStyle=PB.water;
  g.beginPath(); g.ellipse(cx,y-1*S,circle?w*0.82:w,h,0,0,TAU); g.fill();
  g.shadowBlur=0;
  /* blend arms reaching into the grass on covered sides */
  g.fillStyle=PB.water;
  if(blendL&&!circle){ g.beginPath(); g.ellipse(xl-6*S,y-1*S,16*S,h*0.7,0,0,TAU); g.fill();
    g.fillStyle=PB.skirt; g.fillRect(xl-16*S,y-4*S,5*S,4*S); g.fillRect(xl-9*S,y-5*S,4*S,5*S); }
  g.fillStyle=PB.water;
  if(blendR&&!circle){ g.beginPath(); g.ellipse(xr+6*S,y-1*S,16*S,h*0.7,0,0,TAU); g.fill();
    g.fillStyle=PB.skirt; g.fillRect(xr+10*S,y-4*S,5*S,4*S); g.fillRect(xr+4*S,y-5*S,4*S,5*S); }
  /* the moon lives in the water — or the heat lives in the lava */
  g.globalAlpha=(lava?0.6:0.28)*worldA; g.fillStyle=PB.reflect;
  g.beginPath(); g.ellipse(cx+w*0.16,y-1*S-h*0.28,7*S,2.6*S,0,0,TAU); g.fill();
  g.globalAlpha=(lava?0.8:0.5)*worldA; g.fillStyle=PB.glint;
  g.fillRect(cx-w*0.3,y-1*S,3*S,1.4*S); g.fillRect(cx+w*0.05,y-1*S+h*0.3,2.4*S,1.2*S);
  g.fillRect(cx-w*0.05,y-1*S-h*0.45,2*S,1.2*S);
  g.globalAlpha=worldA;
  if(PB.reeds){ /* reeds on the banks — offsets are ALREADY in screen pixels (w and h
       are projected), so they must NOT be scaled by S again: that double-scaling sent
       the far-bank reed clump flying up the screen as the pond passed the rider */
    const reeds=circle?[[-w*0.9,0],[w*0.85,-2*S],[0,-h*1.35]]:[[blendL?-w*1.1:-w*0.8,0],[blendR?w*1.1:w*0.8,-2*S]];
    g.fillStyle='#2a4526';
    for(const r of reeds){ const rx=cx+r[0],ry2=y+r[1];
      g.fillRect(rx,ry2-9*S,1.6*S,9*S); g.fillRect(rx+3*S,ry2-12*S,1.6*S,12*S); g.fillRect(rx-2.6*S,ry2-6*S,1.4*S,6*S); }
  } else { /* black crust plates floating on the lava */
    g.fillStyle=PB.rim;
    g.fillRect(cx-w*0.5,y-2.4*S,9*S,3*S); g.fillRect(cx+w*0.2,y-1*S+h*0.3,11*S,3.4*S);
    g.fillRect(cx-w*0.1,y-1*S-h*0.4,7*S,2.6*S); }
  g.restore();
}
/* --- BOULDER: a low rectangular slab half-swallowed by the forest floor; JUMP.
       cracked, chipped, mossy — muted so it belongs to the woods --- */
/* the swamp's jump-block: a rotting fallen log, furred in moss and shelf-fungus */
function drawFallenLog(o,xl,xr,y,S){
  const w=xr-xl, hL=20*S, sd=o.seed;
  g.save(); g.translate(xl,y);
  g.fillStyle='#141b10'; g.fillRect(-6*S,-3*S,w+12*S,5*S);        // mud it sank into
  /* the trunk, lying across the lanes */
  g.fillStyle='#2b2014'; g.fillRect(0,-hL,w,hL);
  g.fillStyle='#3a2c1a'; g.fillRect(0,-hL,w,4*S);                 // top light
  g.fillStyle='#1c1409'; g.fillRect(0,-7*S,w,3*S);                // underside rot shadow
  /* bark plates + long cracks */
  g.fillStyle='#1f170d';
  for(let i=0;i<6;i++){ const bx=w*(0.06+0.16*i)+((sd>>i)&1)*4*S;
    g.fillRect(bx,-hL+3*S,3*S,hL-5*S); }
  g.fillRect(w*0.1,-hL*0.55,w*0.34,1.6*S); g.fillRect(w*0.55,-hL*0.4,w*0.3,1.6*S);
  /* sawn end-grain ring facing us on the near end */
  const ex=(sd&1)?w-1*S:1*S;
  g.fillStyle='#4a3a22'; g.beginPath(); g.ellipse(ex,-hL*0.5,7*S,hL*0.47,0,0,TAU); g.fill();
  g.strokeStyle='#2b2014'; g.lineWidth=1.4*S;
  for(let r=1;r<4;r++){ g.beginPath(); g.ellipse(ex,-hL*0.5,7*S*r/4,hL*0.47*r/4,0,0,TAU); g.stroke(); }
  /* snapped branch stubs */
  g.fillStyle='#2b2014';
  g.fillRect(w*0.3,-hL-6*S,4*S,7*S); g.fillRect(w*0.68,-hL-4*S,3.4*S,5*S);
  g.fillStyle='#3a2c1a'; g.fillRect(w*0.3,-hL-6*S,4*S,1.6*S);
  /* moss fur along the top + hanging beard */
  g.fillStyle='#3a4a3c';
  g.fillRect(w*0.04,-hL-1.4*S,w*0.4,3*S); g.fillRect(w*0.56,-hL-1*S,w*0.36,2.6*S);
  g.fillStyle='#4a5a48'; g.fillRect(w*0.1,-hL-1.4*S,w*0.14,1.4*S);
  g.fillRect(w*0.2,-hL+2*S,2*S,5*S); g.fillRect(w*0.8,-hL+2*S,2*S,4*S);
  /* SHELF FUNGUS stair-stepping up the side, pale-lit */
  for(let i=0;i<3;i++){ const fx=w*(0.18+0.26*i), fy=-hL*(0.3+0.22*(i%2));
    g.fillStyle='#6a5a3a'; g.fillRect(fx,fy,7*S,2.6*S);
    g.fillStyle='#8a7a52'; g.fillRect(fx,fy,7*S,1*S);
    g.fillStyle='#4a3a22'; g.fillRect(fx+1*S,fy+2.6*S,5*S,1*S); }
  /* reeds hugging the ends */
  g.fillStyle='#33402e';
  g.fillRect(-4*S,-8*S,1.6*S,8*S); g.fillRect(-1.6*S,-11*S,1.6*S,11*S);
  g.fillRect(w+2*S,-9*S,1.6*S,9*S); g.fillRect(w+4.6*S,-6*S,1.4*S,6*S);
  g.restore();
}
function drawBoulder(o,xl,xr,y,S,lanes){
  if(biome==='swamp') return drawFallenLog(o,xl,xr,y,S);
  const PB=OBS_PAL[biome];
  const w=xr-xl, hB=24*S, sd=o.seed;
  g.save(); g.translate(xl,y);
  /* ground skirt so it reads as grown-in, not placed */
  g.fillStyle=PB.skirt; g.fillRect(-5*S,-3*S,w+10*S,5*S);
  /* main slab: native stone, chipped top silhouette */
  g.fillStyle=PB.rock;
  g.fillRect(0,-hB,w,hB);
  g.fillStyle=PB.rockD;                                  // chips knocked out of the top edge
  g.fillRect(w*0.18,-hB,7*S,3.5*S); g.fillRect(w*0.66+((sd&3)*2*S),-hB,9*S,4.5*S);
  if(w>140*S) g.fillRect(w*0.42,-hB,6*S,3*S);
  /* top light */
  g.fillStyle=PB.rockL; g.fillRect(0,-hB+3.5*S,w,3*S);
  g.fillRect(w*0.06,-hB+6.5*S,w*0.2,1.6*S);
  /* cracks: stepped pixel zigzags (they GLOW on volcanic slabs) */
  g.fillStyle=PB.ember||PB.crack;
  if(PB.ember) g.globalAlpha=(0.55+Math.sin(perfNow*3+sd)*0.2)*worldA;
  let cx0=w*0.3+((sd>>1)&3)*3*S;
  for(let i=0;i<4;i++){ g.fillRect(cx0+i*2.2*S*((sd&1)?1:-1),-hB+4*S+i*4.5*S,2*S,5*S); }
  cx0=w*0.74;
  for(let i=0;i<3;i++){ g.fillRect(cx0-i*2*S,-hB+8*S+i*4*S,1.8*S,4.6*S); }
  g.fillRect(w*0.12,-hB+10*S,6*S,1.6*S);
  g.globalAlpha=worldA;
  /* moss (or scorched lichen) creeping over it */
  g.fillStyle=PB.moss;
  g.fillRect(w*0.02,-hB+1.5*S,10*S,4*S); g.fillRect(w*0.55,-4.5*S,12*S,4.5*S);
  if((sd&2)) g.fillRect(w*0.82,-hB+2*S,8*S,3.5*S);
  g.fillStyle=PB.mossHi; g.fillRect(w*0.04,-hB+1.5*S,5*S,2*S); g.fillRect(w*0.58,-4*S,6*S,2*S);
  /* grass tufts hugging the base (none grow in the ashlands) */
  if(PB.tuft){ g.fillStyle=PB.tuft;
    for(let i=0;i<5;i++){ const gx=w*(0.08+0.2*i)+((sd>>i)&1)*4*S;
      g.fillRect(gx,-4*S,2*S,4*S); g.fillRect(gx+2.6*S,-6*S,1.8*S,6*S); } }
  g.restore();
}
function drawCoin(x,y,s,t){
  /* spinning PIXEL coin: a stepped disc whose width breathes with the spin */
  const spin=Math.abs(Math.sin(t*5)), w=spin*10+3;
  g.save(); g.translate(x,y-3*s);
  g.shadowColor='#ffd23a'; g.shadowBlur=12*s;
  const row=(yy,half,c)=>{ g.fillStyle=c; g.fillRect(-half*s,yy*s,half*2*s,3.2*s); };
  /* stepped octagonal silhouette (rows narrow at top & bottom) */
  row(-11,w*0.55,'#ffd23a'); row(-8,w*0.85,'#ffd23a'); row(-5,w,'#ffd23a');
  row(-2,w,'#ffd23a');       row(1,w,'#ffd23a');       row(4,w*0.85,'#e2b525');
  row(7,w*0.55,'#c99a18');
  row(-11,w*0.55,'#fff2b0');                                    // crown shine
  if(spin>0.5){ g.fillStyle='#b98a12';                          // embossed crown face
    g.fillRect(-w*0.4*s,-5*s,w*0.8*s,2.6*s); g.fillRect(-w*0.25*s,-1*s,w*0.5*s,5*s); }
  g.fillStyle='#fff'; g.fillRect((w*0.3)*s,-9*s,2*s,2*s);       // sparkle
  g.shadowBlur=0; g.restore();
}
/* the one true arrow: steel broadhead, cedar shaft, two fletch vanes — used for
   pickups, the HUD count, and the shot itself, so it always reads as the same arrow */
function drawArrowSprite(x,y,s,ang,glow){
  g.save(); g.translate(x,y); g.rotate(ang); g.scale(s,s);
  if(glow){ g.shadowColor='#c0f79a'; g.shadowBlur=10; }
  g.fillStyle='#8a6a3a'; g.fillRect(-1.1,-9,2.2,20);              // cedar shaft
  g.fillStyle='#c9a86a'; g.fillRect(-1.1,-9,1,20);
  g.fillStyle='#dfe8ff';                                          // steel BROADHEAD
  g.beginPath(); g.moveTo(0,-17); g.lineTo(4.4,-8); g.lineTo(1.1,-9.4);
  g.lineTo(-1.1,-9.4); g.lineTo(-4.4,-8); g.closePath(); g.fill();
  g.fillStyle='#aeb8d8'; g.beginPath(); g.moveTo(0,-17); g.lineTo(-4.4,-8); g.lineTo(-1.1,-9.4); g.closePath(); g.fill();
  g.fillStyle='#c0f79a';                                          // fletch vanes
  g.beginPath(); g.moveTo(-1.1,6); g.lineTo(-4.6,11); g.lineTo(-1.1,11.5); g.closePath(); g.fill();
  g.beginPath(); g.moveTo(1.1,6); g.lineTo(4.6,11); g.lineTo(1.1,11.5); g.closePath(); g.fill();
  g.fillStyle='#8fd06a';
  g.fillRect(-1.1,7.6,2.2,1); g.fillRect(-1.1,9.6,2.2,1);         // binding wraps
  g.fillStyle='#e8e2d0'; g.fillRect(-1.4,11.5,2.8,1.6);           // nock
  g.shadowBlur=0; g.restore();
}
function drawWeaponPickup(kind,x,y,s,t){
  g.save(); g.translate(x,y+Math.sin(t*3)*4*s); g.rotate(Math.sin(t*2)*.14);
  g.shadowColor=kind==='lance'?'#9ecbff':'#c0f79a'; g.shadowBlur=14*s; g.scale(s,s);
  if(kind==='arrow'){
    drawArrowSprite(0,0,2.2,-0.28,true);
  } else {
    /* a true jousting lance, tilted for silhouette: point → tapered shaft → vamplate → grip */
    g.rotate(-0.42);
    g.fillStyle='#e8f0ff'; g.fillRect(-1*U,-19*U,2*U,3*U);          // steel point
    g.fillStyle='#c8d6f0'; g.fillRect(-1.6*U,-16*U,3.2*U,3*U);      // point base
    g.fillStyle='#d9b878'; g.fillRect(-1*U,-13*U,2*U,5*U);          // shaft: thin at the tip...
    g.fillStyle='#c9a86a'; g.fillRect(-1.5*U,-8*U,3*U,6*U);
    g.fillStyle='#b8935a'; g.fillRect(-2*U,-2*U,4*U,5*U);           // ...thickening down
    g.fillStyle='#8a6a3a'; g.fillRect(-2.4*U,1.4*U,4.8*U,1.4*U);    // spiral band
    g.fillStyle='#8a6a3a'; g.fillRect(-1.9*U,-5.6*U,3.8*U,1.2*U);
    g.fillStyle='#9ecbff'; g.fillRect(-5*U,3*U,10*U,2*U);           // vamplate (hand guard cone)
    g.fillStyle='#7ba8e0'; g.fillRect(-3.6*U,5*U,7.2*U,2*U);
    g.fillStyle='#5a4227'; g.fillRect(-1.4*U,7*U,2.8*U,5*U);        // grip
    g.fillStyle='#3d2b1a'; g.fillRect(-1.8*U,12*U,3.6*U,2*U);       // pommel
  }
  g.shadowBlur=0; g.restore();
}

/* ============================== 8. WORLD (projection + forest) ============================== */
/* HORIZON_Y / PLAYER_Y / GROUND_Y live in the CANVAS section — they derive from VH
   so the road reaches the screen bottom on tall phones. GROUND_Y sits a touch behind
   the knight, so passing objects slide by BEHIND him, not through him. */
function proj(z){
  const f=CFG.FOCAL, near=1, far=f/(f+CFG.Z_FAR);
  const zc=Math.max(z,-f*0.78);                       // guard the projection pole — the wider
                                                      // margin lets obstacles slide fully off-screen
  const p=(f/(f+zc)-far)/(near-far);                  // 1 at z=0, >1 once past the knight
  return { t:p, y:lerp(HORIZON_Y,GROUND_Y,p), s:lerp(0.09,1,p*p*0.35+p*0.65) };
}
function laneX(lane,t){ return VW/2 + (lane-1)*lerp(24,150,t); }
/* LINEAR perspective scale: exactly proportional to the lane spread above, so anything
   scaled with this glides straight out from the vanishing point without warping */
function linS(t){ return lerp(0.16,1,Math.max(t,0)); }
/* horizon fade-in: world objects materialise through the haze instead of popping */
function spawnFade(z){ return clamp((CFG.Z_FAR-4-z)/6,0,1); }
let worldA=1;   // current fade for the object being drawn — sprites multiply their alphas by it
/* trees are BORN far past the draw horizon. Everything beyond the horizon is FLAT
   and far: the silhouette stands ON the horizon line (never above it) and simply
   GROWS in place with the true 1/(f+z) perspective ratio, until the real sprite
   crossfades in at exactly the same spot and size. */
const SPAWN_FAR=150;
/* obstacles use a SHORT far window: one obstacle spacing (13+) — so they enter the
   distance ONE BY ONE, readable in order, instead of stacking up at the line */
const OBST_FAR=76;
/* the EFFECTIVE horizon for obstacles & items: normally Z_FAR, but when the lair
   massif stands at the end of the road its foot hangs a little below the line —
   things must then emerge from UNDER the lair's base, never in mid-air on top of
   it. Recomputed every frame in render(). */
let effZFar=CFG.Z_FAR;
function updateEffHorizon(){
  effZFar=CFG.Z_FAR;
  if(env==='forest'&&mode==='run'){
    const mz=CFG.LOOP_DIST-dist;
    if(mz<SPAWN_FAR){
      const rawL=(CFG.FOCAL+CFG.Z_FAR)/(CFG.FOCAL+Math.max(mz,CFG.Z_FAR));
      const lairEff=mz>CFG.Z_FAR?CFG.Z_FAR-6*(1-rawL):mz;   // where the lair actually renders
      /* -10 z ≈ a dozen pixels BELOW the massif's foot, clear of its skirt/haze —
         ramped in smoothly so nothing jumps the moment the lair first appears */
      effZFar=clamp(lerp(CFG.Z_FAR,lairEff-10,clamp((SPAWN_FAR-mz)/70,0,1)),30,CFG.Z_FAR);
    }
  }
}

/* THE-WORLD-ENDS backdrops: drawn BEHIND all scenery, so the trees/columns that
   march in past the lair stand IN them (wading groves, rocks in the melt) — the
   sheet is the world's floor out there, never something glued onto the lair. */
function drawMereBeyond(z){
  const lairZ=clamp(z,0.35,CFG.Z_FAR), gy=proj(lairZ).y;
  /* an endless drowned river: flat black water from the horizon to the mere's shore */
  g.fillStyle='#0c1318';
  g.fillRect(0,HORIZON_Y-2,VW,Math.max(4,gy-HORIZON_Y+6));
  for(let i=0;i<8;i++){                                    // sheen rows in true WORLD perspective
    const zr=lairZ+2+i*3.1; if(zr>CFG.Z_FAR) break;
    const pr=proj(zr), sd=sRnd(i*29+3);
    const x=((perfNow*(6+sd*10)+i*120)%(VW+200))-100;
    g.globalAlpha=0.10+sd*0.05; g.fillStyle='#93a2b2';
    g.fillRect(x,pr.y,(40+sd*50)*pr.s+8,Math.max(1,2.4*pr.s));
  }
  g.globalAlpha=1;
  for(let i=0;i<5;i++){                                    // wisplights far out on the water
    const zr=lairZ+4+i*4.7; if(zr>CFG.Z_FAR) break;
    const pr=proj(zr), sd=sRnd(i*41+6);
    g.globalAlpha=(0.25+Math.sin(perfNow*1.8+i*2.2)*0.15);
    g.fillStyle='#a9d8cf'; g.fillRect(sd*VW,pr.y-3*pr.s,2.6,2.6);
    g.globalAlpha=1;
  }
}
function drawLavaBeyond(z){
  const lairZ=clamp(z,0.35,CFG.Z_FAR), gy=proj(lairZ).y;
  const breathe=0.75+Math.sin(perfNow*1.7)*0.14;
  /* ONE gigantic sheet of lava reaching the horizon — its far bank BLENDS into
     the ash haze instead of wiping the surroundings */
  const lv=g.createLinearGradient(0,HORIZON_Y-6,0,gy+4);
  lv.addColorStop(0,'rgba(138,44,16,0)'); lv.addColorStop(.22,'rgba(178,58,20,0.7)');
  lv.addColorStop(.6,'rgba(230,88,32,0.92)'); lv.addColorStop(1,'rgba(255,106,42,0.95)');
  g.fillStyle=lv; g.fillRect(0,HORIZON_Y-6,VW,Math.max(6,gy-HORIZON_Y+10));
  g.globalAlpha=0.14*breathe; g.fillStyle='#ff6a2a';       // the whole sheet breathes
  g.fillRect(0,HORIZON_Y-6,VW,Math.max(6,gy-HORIZON_Y+10)); g.globalAlpha=1;
  for(let i=0;i<9;i++){                                    // currents & crust in WORLD perspective
    const zr=lairZ+1.5+i*2.8; if(zr>CFG.Z_FAR) break;
    const pr=proj(zr), sd=sRnd(i*23+5);
    const x=((perfNow*(10+sd*16)+i*140)%(VW+220))-110;
    g.globalAlpha=breathe*(0.5+sd*0.3); g.fillStyle=i%2?'#ffd23a':'#ffe88a';
    g.fillRect(x,pr.y,(26+sd*30)*pr.s+6,Math.max(1,2*pr.s));
    g.globalAlpha=1;
    if(i%2){ g.fillStyle='#140e10';                        // black crust plates adrift
      g.fillRect(sRnd(i*41+9)*VW,pr.y+2*pr.s,(14+sd*18)*pr.s+4,Math.max(1.2,3*pr.s)); }
  }
}
function drawMereApproach(z){
  /* renders from the FAR distance like the trees — soft horizon: tempered growth
     (flat, no hill-rise) and a gentle drift down the last sliver below the line */
  const raw=(CFG.FOCAL+CFG.Z_FAR)/(CFG.FOCAL+Math.max(z,CFG.Z_FAR));
  const grow=z>CFG.Z_FAR?0.10+raw*0.90:1;
  const p=proj(clamp(z>CFG.Z_FAR?CFG.Z_FAR-6*(1-raw):z,0.35,CFG.Z_FAR)), t=clamp(p.t,0,1);
  const cx=VW/2, gy=p.y;
  const pw=lerp(34,430,t*t)*grow, ph=pw*0.26;
  /* the mere itself, swallowing the road */
  g.strokeStyle='#31502e'; g.lineWidth=Math.max(1.4,2.6*p.s);
  g.beginPath(); g.ellipse(cx,gy,pw,ph,0,0,TAU); g.stroke();
  g.fillStyle='#060d0a';
  g.beginPath(); g.ellipse(cx,gy,pw*0.94,ph*0.94,0,0,TAU); g.fill();
  /* the moon lying on it + ripple rings */
  g.globalAlpha=0.14; g.fillStyle='#c9d8c0';
  g.beginPath(); g.ellipse(cx-pw*0.16,gy-ph*0.2,pw*0.26,ph*0.2,0,0,TAU); g.fill(); g.globalAlpha=1;
  for(let i=0;i<3;i++){ const phs=(perfNow*0.4+i*0.45)%1;
    g.globalAlpha=(1-phs)*0.3; g.strokeStyle='#2c463a'; g.lineWidth=Math.max(1,1.3*p.s);
    g.beginPath(); g.ellipse(cx+(sRnd(i*7+2)-0.5)*pw,gy+(sRnd(i*7+3)-0.5)*ph*0.8,
      (4+phs*22)*p.s+1,((4+phs*22)*0.3)*p.s+0.5,0,0,TAU); g.stroke(); }
  g.globalAlpha=1;
  /* THE HYDRA ITSELF waits half-sunk in the mere, visible from afar */
  drawHydra(cx,gy+ph*0.15,Math.max(0.14,t*1.05)*grow,'run',0,false);
  /* wisps over the water */
  for(let i=0;i<3;i++){ g.globalAlpha=0.3+Math.sin(perfNow*2.2+i*2)*0.18;
    g.fillStyle='#9fe8c0'; g.shadowColor='#9fe8c0'; g.shadowBlur=7;
    g.fillRect(cx+Math.sin(perfNow*0.6+i*2.4)*pw*0.5,gy-ph*(0.8+i*0.3),2.4,2.4); g.shadowBlur=0; }
  g.globalAlpha=1;
}
function drawLavaPondApproach(z){
  /* renders from the FAR distance — soft horizon (see drawMereApproach) */
  const raw=(CFG.FOCAL+CFG.Z_FAR)/(CFG.FOCAL+Math.max(z,CFG.Z_FAR));
  const grow=z>CFG.Z_FAR?0.10+raw*0.90:1;
  const p=proj(clamp(z>CFG.Z_FAR?CFG.Z_FAR-6*(1-raw):z,0.35,CFG.Z_FAR)), t=clamp(p.t,0,1);
  const cx=VW/2, gy=p.y;
  const pw=lerp(34,430,t*t)*grow, ph=pw*0.26;
  const breathe=0.75+Math.sin(perfNow*1.7)*0.14;
  /* rock teeth ringing the far shore */
  g.fillStyle='#120e10';
  for(let i=0;i<6;i++){ const sd=sRnd(i*23+5), tx=cx+(sd-0.5)*pw*2.4, th=ph*(1.4+sd*2.2);
    g.beginPath(); g.moveTo(tx-pw*0.05,gy-ph*0.4); g.lineTo(tx+(sd-0.5)*pw*0.03,gy-ph*0.4-th);
    g.lineTo(tx+pw*0.05,gy-ph*0.4); g.closePath(); g.fill(); }
  /* the pond: it glows before you can even see the shore */
  g.globalAlpha=breathe;
  g.fillStyle='#ff6a2a'; g.shadowColor='#ff6a2a'; g.shadowBlur=Math.max(6,20*p.s);
  g.beginPath(); g.ellipse(cx,gy,pw,ph,0,0,TAU); g.fill(); g.shadowBlur=0;
  g.globalAlpha=breathe*0.7; g.fillStyle='#ffd23a';
  g.fillRect(cx-pw*0.4+Math.sin(perfNow*1.1)*pw*0.1,gy-ph*0.24,pw*0.3,Math.max(1.6,ph*0.12));
  g.fillRect(cx+pw*0.06-Math.sin(perfNow*0.8)*pw*0.1,gy+ph*0.2,pw*0.24,Math.max(1.4,ph*0.1));
  g.globalAlpha=1;
  /* crust islands + the smoke standing over it */
  g.fillStyle='#120a0d';
  g.fillRect(cx-pw*0.5,gy-ph*0.12,pw*0.16,Math.max(2,ph*0.24));
  g.fillRect(cx+pw*0.24,gy+ph*0.14,pw*0.2,Math.max(2,ph*0.26));
  for(let i=0;i<3;i++){ const smT=i/3;
    g.globalAlpha=0.24-smT*0.05; g.fillStyle='#241a1c';
    g.beginPath(); g.ellipse(cx+Math.sin(perfNow*0.5+i)*pw*0.1,gy-ph*(1+i*0.8),
      pw*(0.16+smT*0.14),ph*(0.3+smT*0.2),0,0,TAU); g.fill(); }
  g.globalAlpha=1;
  /* THE SNAPPER ITSELF broods in the middle of the glow, visible from afar */
  drawLavaTurtle(cx,gy+ph*0.15,Math.max(0.14,t*1.0)*grow,'run',0,false);
}
/* the arena MOUTH: a rock massif rising at the end of the loop — you ride straight in.
   It renders from the FAR distance like the trees around it. */
function drawCaveMouth(z){
  const P=BIO().mouth;
  /* soft horizon: tempered growth + gentle drift (see drawMereApproach) */
  const raw=(CFG.FOCAL+CFG.Z_FAR)/(CFG.FOCAL+Math.max(z,CFG.Z_FAR));
  const grow=z>CFG.Z_FAR?0.10+raw*0.90:1;
  const p=proj(clamp(z>CFG.Z_FAR?CFG.Z_FAR-6*(1-raw):z,0.35,CFG.Z_FAR)), t=clamp(p.t,0,1);
  const cx=VW/2, gy=p.y;
  const hillW=lerp(70,760,t*t)*grow, hillH=lerp(46,720,t*t)*grow;
  const aw=lerp(16,290,t*t)*grow, ah=lerp(18,340,t*t)*grow;   // the arch opening
  g.save();
  /* THE END OF THE ROAD: real trees march in across the whole road behind the
     lair (spawned like all scenery, same perspective). This haze only BLENDS
     their bases together so no bare trail shows between the far boles. */
  const hz=g.createLinearGradient(0,HORIZON_Y-12,0,gy+6);
  hz.addColorStop(0,'rgba(8,13,10,0)'); hz.addColorStop(.4,'rgba(8,13,10,0.75)');
  hz.addColorStop(1,'rgba(8,13,10,0.92)');
  g.fillStyle=hz; g.fillRect(0,HORIZON_Y-12,VW,Math.max(6,gy-HORIZON_Y+20));
  /* massif silhouette: ragged stepped skyline */
  g.fillStyle=P.rock;
  g.beginPath(); g.moveTo(cx-hillW,gy+8);
  for(let i=0;i<=12;i++){
    const fx=lerp(cx-hillW,cx+hillW,i/12);
    const rag=Math.floor(sRnd(i*19+3)*3)*0.09+Math.abs(i-6)*0.115;
    g.lineTo(fx,gy-hillH*(1-rag));
  }
  g.lineTo(cx+hillW,gy+8); g.closePath(); g.fill();
  /* strata bands */
  for(let b=0;b<3;b++){
    g.fillStyle=P.band[b];
    const by=gy-hillH*(0.24+b*0.2);
    g.fillRect(cx-hillW*(0.9-b*0.16),by,hillW*2*(0.9-b*0.16),Math.max(2,hillH*0.05));
  }
  /* growth clinging to the rock over the entrance (moss / bog weed / scorched lichen) */
  g.fillStyle=P.moss;
  g.fillRect(cx-aw*0.9,gy-ah*1.12,aw*0.7,Math.max(2,ah*0.09));
  g.fillRect(cx+aw*0.15,gy-ah*1.2,aw*0.6,Math.max(2,ah*0.08));
  g.fillStyle=P.mossL; g.fillRect(cx-aw*0.7,gy-ah*1.12,aw*0.3,Math.max(1.6,ah*0.05));
  /* the black throat of the cave */
  g.fillStyle='#020204';
  g.beginPath(); g.moveTo(cx-aw,gy+6);
  g.lineTo(cx-aw*0.94,gy-ah*0.62); g.lineTo(cx-aw*0.55,gy-ah*0.94); g.lineTo(cx-aw*0.1,gy-ah);
  g.lineTo(cx+aw*0.4,gy-ah*0.96); g.lineTo(cx+aw*0.9,gy-ah*0.7); g.lineTo(cx+aw,gy+6);
  g.closePath(); g.fill();
  /* worn rim where the rock meets the dark — the volcano's rim GLOWS */
  g.strokeStyle=P.rim; g.lineWidth=Math.max(1.5,3*p.s); g.stroke();
  if(P.glow){ g.globalAlpha=0.35+Math.sin(perfNow*3)*0.12;
    g.strokeStyle=P.glow; g.lineWidth=Math.max(1,1.6*p.s); g.stroke(); g.globalAlpha=1; }
  /* two rock teeth hanging in the opening */
  g.fillStyle=P.rock;
  g.fillRect(cx-aw*0.42,gy-ah*0.92,Math.max(2,aw*0.09),ah*0.3);
  g.fillRect(cx+aw*0.2,gy-ah*0.9,Math.max(2,aw*0.07),ah*0.22);
  /* the dark swallows the view as you pass under the arch */
  if(z<5){ g.globalAlpha=clamp((5-z)/4.2,0,1)*0.96; g.fillStyle='#020204';
    g.fillRect(-20,-PAD_TOP-20,VW+40,VH+PAD_TOT+40); g.globalAlpha=1; }
  g.restore();
}
/* ============================== THE SWAMP (loop 2, 5, 8...) ============================== */
function drawSwampBg(dt){
  /* a drowned sky: haze, a sickly gauzed moon, dead trees standing in water */
  g.fillStyle='#0a0e13'; g.fillRect(0,-PAD_TOP,VW,HORIZON_Y+60+PAD_TOP);
  const mx=VW*0.44, my=124;
  /* the moon behind bog-haze: dimmer, greener, no crisp opening */
  g.globalAlpha=0.85;
  const sky=g.createRadialGradient(mx,my,8,mx,my,150);
  sky.addColorStop(0,'#28323e'); sky.addColorStop(.5,'#151d26'); sky.addColorStop(1,'#0a0e13');
  g.fillStyle=sky; g.fillRect(mx-150,my-120,300,240);
  g.fillStyle='#d8dde4'; g.beginPath(); g.arc(mx,my,30,0,TAU); g.fill();
  g.fillStyle='#a8b2c0'; g.fillRect(mx-14,my-8,8,7); g.fillRect(mx+4,my+7,9,6); g.fillRect(mx-4,my-18,6,5);
  g.globalAlpha=0.5; g.fillStyle='#151d26';                       // gauze bands across the moon
  g.fillRect(mx-40,my-10,80,6); g.fillRect(mx-34,my+6,68,5); g.fillRect(mx-38,my+18,58,4);
  g.globalAlpha=1;
  /* the moon lies broken on the far water: a shivering reflection path */
  for(let i=0;i<7;i++){
    g.globalAlpha=0.22-i*0.02;
    g.fillStyle='#d8dde4';
    const rw=26-i*2.4+Math.sin(perfNow*1.8+i)*3;
    g.fillRect(mx-rw/2+Math.sin(perfNow*1.2+i*2)*3,HORIZON_Y+8+i*3.4,rw,2);
  }
  g.globalAlpha=1;
  /* a far treeline of drowned crowns behind the dead trunks */
  g.fillStyle='#0b110c';
  for(let i=0;i<10;i++){ const cx2=sRnd(i*41+9)*VW*1.1-VW*0.05, cw=40+sRnd(i*41+10)*60;
    g.beginPath(); g.ellipse(cx2,HORIZON_Y-8-sRnd(i*41+11)*20,cw,14+sRnd(i*41+12)*10,0,0,TAU); g.fill(); }
  /* dead trees standing in the far water: bare trunks + snapped limbs */
  for(let i=0;i<9;i++){
    const sd=sRnd(i*23+2), tx=(sd*1.16-0.08)*VW, th=34+sRnd(i*23+3)*44;
    const drift=((dist*0.06*(0.5+sd*0.5))%40)-20;
    g.fillStyle=i%2?'#0d1118':'#0b0e14';
    g.fillRect(tx+drift-2.5,HORIZON_Y+12-th,5,th);
    g.fillRect(tx+drift-2.5+(sd<0.5?-8:5),HORIZON_Y+12-th*0.72,8,3);   // snapped limb

function drawSwampRoad(){

  g.fillRect(0,HORIZON_Y+14,VW,VH-HORIZON_Y+PAD_BOT);
  for(let b=0;b<5;b++){                                            // sheen bands ROLL slowly shoreward
    const by2=HORIZON_Y+40+b*86+Math.sin(perfNow*0.7+b)*5;
    g.globalAlpha=0.06+((b%2)?0.03:0); g.fillStyle='#93a2b2';
    for(let k=0;k<6;k++)
      g.fillRect(k*(VW/6)+Math.sin(perfNow*1.1+b+k)*10,by2+Math.sin(perfNow*1.6+b*2+k*1.2)*3,VW/6*0.86,7+b*2);
  }
  g.globalAlpha=1;
  for(let i=0;i<26;i++){                                         // ripples drift slowly
    const z=((i*2.31 - dist*0.35)%(CFG.Z_FAR+3)+(CFG.Z_FAR+3))%(CFG.Z_FAR+3)-3;
    const p=proj(z), sd=sRnd(i*19+Math.floor((dist*0.35+i*2.31)/(CFG.Z_FAR+3))*7);
    const side=sd<0.5?-1:1, x=VW/2+side*(hw(p.t)+30+sd*130);
    /* each ripple is a little travelling WAVE: segments bob out of phase */
    const L2=(14+sd*16)*p.s+2, seg=L2/4;
    g.globalAlpha=0.6; g.fillStyle=i%2?'#31505c':'#1e3038';
    for(let k=0;k<4;k++)

                 p.y+Math.sin(perfNow*2.7+i+k*1.5)*1.5*p.s,seg*0.78,1.5*p.s+0.7);
    if(sd>0.75){ g.globalAlpha=0.5; g.fillStyle='#d8dde4';          // a moon glint rides the wave

    if(i%3===0){ g.fillStyle='#49604a'; g.fillRect(x-2*p.s,p.y-1.4*p.s,2.4*p.s,1.4*p.s); }

  /* the causeway: packed mud, chewed edges, half-drowned at the rim */
  const notch=(z,seed)=>Math.floor(sRnd(Math.floor((z+dist)/4.2)*7+seed)*3)*4.5-4.5;
  g.fillStyle='#241f16';
  g.beginPath(); g.moveTo(VW/2-hw(p0.t),p0.y);
  for(let i=0;i<=22;i++){ const t=i/22, z=lerp(CFG.Z_FAR,-2.6,t), p=proj(z);
    g.lineTo(VW/2+hw(p.t)+notch(z,1)*p.t, p.y); }
  g.lineTo(VW/2+hw(pB.t),VH+PAD_BOT+40); g.lineTo(VW/2-hw(pB.t),VH+PAD_BOT+40);
  for(let i=22;i>=0;i--){ const t=i/22, z=lerp(CFG.Z_FAR,-2.6,t), p=proj(z);

  g.closePath(); g.fill();
  /* waterline lapping the causeway edge */
  g.fillStyle='#101a20';
  for(let i=0;i<18;i++){ const z=lerp(CFG.Z_FAR*0.9,-2.2,i/18), p=proj(z);
    g.fillRect(VW/2+hw(p.t)+notch(z,1)*p.t-7*p.s,p.y,6*p.s+1,2.6*p.s+1);
    g.fillRect(VW/2-hw(p.t)-notch(z,5)*p.t+1*p.s,p.y,6*p.s+1,2.6*p.s+1); }
  /* wet mud sheen + puddle glints + sunk planks */
  for(let i=0;i<26;i++){
    const z=((i*2.17 - dist)%(CFG.Z_FAR+3)+(CFG.Z_FAR+3))%(CFG.Z_FAR+3)-3;
    const p=proj(z), sd=sRnd(i*11+Math.floor((dist+i*2.17)/(CFG.Z_FAR+3))*9);
    const x=VW/2+(sd-0.5)*2*(hw(p.t)-16*p.t-6);

      g.fillRect(x,p.y,(6+sd*10)*p.s+1,1.8*p.s+0.8); g.globalAlpha=1; }
    else if(sd<0.62){ g.fillStyle='#1b170f'; g.fillRect(x,p.y,(5+sd*7)*p.s+1,(2+sd*2)*p.s+1); }
    else if(sd<0.72){ g.fillStyle='#33291c';                          // a sunk plank
      g.fillRect(x,p.y,15*p.s+2,3*p.s+1);
      g.fillStyle='#241c12'; g.fillRect(x+3*p.s,p.y,1.4*p.s,3*p.s+1); g.fillRect(x+9*p.s,p.y,1.4*p.s,3*p.s+1); }
    else { g.fillStyle='#2c2618'; g.fillRect(x,p.y,(4+sd*5)*p.s+1,2*p.s+1); }
  }
  /* reeds crowding both rims */
  for(let i=0;i<30;i++){
    const z=((i*1.93 - dist)%(CFG.Z_FAR+3)+(CFG.Z_FAR+3))%(CFG.Z_FAR+3)-3;
    const p=proj(z), sd=sRnd(i*29+Math.floor((dist+i*1.93)/(CFG.Z_FAR+3))*3);
    const side=i%2?-1:1, x=VW/2+side*(hw(p.t)-4-sd*12);
    g.fillStyle=sd<0.5?'#33402e':'#2a3628';
    g.fillRect(x,p.y-6*p.s,1.5*p.s+0.8,6*p.s+1);
    g.fillRect(x+2.2*p.s,p.y-8.4*p.s,1.4*p.s+0.8,8.4*p.s+1);
    if(sd>0.62){ g.fillStyle='#5a4c2a'; g.fillRect(x+2*p.s,p.y-10*p.s,2*p.s+0.8,2.4*p.s+0.8); } // cattail head
  }
}

function drawCypress(x,y,s,v){

  const waterStain=w=>{ g.globalAlpha=0.5*worldA; g.fillStyle='#101a20'; g.fillRect(-w,0,w*2,5); g.globalAlpha=worldA; };
  if(vr===0){        /* --- great bald cypress: flared buttress, high thin crown --- */

      g.fillRect(cx-w*0.3+R(cx)*w*0.2,cy-h*0.85,w*0.6,h*0.6);
      for(let k=0;k<w-6;k+=8) g.fillRect(cx-w/2+k,cy+h/2-2+((k/8|0)%2)*4,5,5); };
    blob(lean-12,-212,86+R(2)*20,30,leaf);
