/* end-of-loop approaches: what rises at the end of the road depends on the biome —
   the bear's rock massif, the hydra's black mere, the snapper's boiling pond */
/* THE-WORLD-ENDS backdrops: drawn BEHIND all scenery, so the trees/columns that
   march in past the lair stand IN them (wading groves, rocks in the melt) — the
   sheet is the world's floor out there, never something glued onto the lair. */
function drawMereBeyond(z){
  const lairZ=clamp(z,0.35,CFG.Z_FAR), gy=proj(lairZ).y;
  /* an endless MURKY water sheet from the horizon to the mere's shore — the same
     dark yellow-green as the roadside shallows */
  g.fillStyle='#2a2a16';
  g.fillRect(0,HORIZON_Y-2,VW,Math.max(4,gy-HORIZON_Y+6));
  for(let i=0;i<8;i++){                                    // sun-sheen rows in WORLD perspective
    const zr=lairZ+2+i*3.1; if(zr>CFG.Z_FAR) break;
    const pr=proj(zr), sd=sRnd(i*29+3);
    const x=((perfNow*(6+sd*10)+i*120)%(VW+200))-100;
    g.globalAlpha=0.08+sd*0.04; g.fillStyle='#9aa47a';
    g.fillRect(x,pr.y,(40+sd*50)*pr.s+8,Math.max(1,2.4*pr.s));
  }
  g.globalAlpha=1;
  for(let i=0;i<6;i++){                                    // far lily rafts and sun sparkles
    const zr=lairZ+3+i*4.2; if(zr>CFG.Z_FAR) break;
    const pr=proj(zr), sd=sRnd(i*41+6);
    if(i%2){ g.fillStyle='#324e24';
      g.beginPath(); g.ellipse(sd*VW,pr.y,7*pr.s+2,2.6*pr.s+0.8,0,0,TAU); g.fill(); }
    else { g.globalAlpha=(0.3+Math.sin(perfNow*1.8+i*2.2)*0.18);
      g.fillStyle='#f0eec6'; g.fillRect(sd*VW,pr.y-1,3.2,1.6); g.globalAlpha=1; }
  }
}
function drawLavaBeyond(z){
  const lairZ=clamp(z,0.35,CFG.Z_FAR), gy=proj(lairZ).y;
  const breathe=0.75+Math.sin(perfNow*1.7)*0.14;
  /* ONE gigantic sheet of lava reaching the horizon — its far bank BLENDS into
     the ash haze instead of wiping the surroundings */
  const lv=g.createLinearGradient(0,HORIZON_Y-6,0,gy+4);
  lv.addColorStop(0,'rgba(138,44,16,0)'); lv.addColorStop(.22,'rgba(178,58,20,0.7)');
  lv.addColorStop(.6,'rgba(230,88,32,0.92)'); lv.addColorStop(1,'rgba(255,106,42,0.95)');
  g.fillStyle=lv; g.fillRect(0,HORIZON_Y-6,VW,Math.max(6,gy-HORIZON_Y+10));
  g.globalAlpha=0.14*breathe; g.fillStyle='#ff6a2a';       // the whole sheet breathes
  g.fillRect(0,HORIZON_Y-6,VW,Math.max(6,gy-HORIZON_Y+10)); g.globalAlpha=1;
  for(let i=0;i<9;i++){                                    // currents & crust in WORLD perspective
    const zr=lairZ+1.5+i*2.8; if(zr>CFG.Z_FAR) break;
    const pr=proj(zr), sd=sRnd(i*23+5);
    const x=((perfNow*(10+sd*16)+i*140)%(VW+220))-110;
    g.globalAlpha=breathe*(0.5+sd*0.3); g.fillStyle=i%2?'#ffd23a':'#ffe88a';
    g.fillRect(x,pr.y,(26+sd*30)*pr.s+6,Math.max(1,2*pr.s));
    g.globalAlpha=1;
    if(i%2){ g.fillStyle='#140e10';                        // black crust plates adrift
      g.fillRect(sRnd(i*41+9)*VW,pr.y+2*pr.s,(14+sd*18)*pr.s+4,Math.max(1.2,3*pr.s)); }
  }
}
function drawMereApproach(z){
  /* renders from the FAR distance like the trees — soft horizon: tempered growth
     (flat, no hill-rise) and a gentle drift down the last sliver below the line */
  const raw=(CFG.FOCAL+CFG.Z_FAR)/(CFG.FOCAL+Math.max(z,CFG.Z_FAR));
  const grow=z>CFG.Z_FAR?0.10+raw*0.90:1;
  const p=proj(clamp(z>CFG.Z_FAR?CFG.Z_FAR-6*(1-raw):z,0.35,CFG.Z_FAR)), t=clamp(p.t,0,1);
  const cx=VW/2, gy=p.y;
  const pw=lerp(34,430,t*t)*grow, ph=pw*0.26;
  /* THE GREAT MERE: a gigantic lake-pond, its rim thick with growth */
  g.strokeStyle='#334621'; g.lineWidth=Math.max(1.4,2.6*p.s);       // hummock-grass rim
  g.beginPath(); g.ellipse(cx,gy,pw,ph,0,0,TAU); g.stroke();
  g.fillStyle='#202e20';
  g.beginPath(); g.ellipse(cx,gy,pw*0.94,ph*0.94,0,0,TAU); g.fill();
  g.fillStyle='#161f14';                                            // deeper heart of the lake
  g.beginPath(); g.ellipse(cx,gy+ph*0.06,pw*0.6,ph*0.55,0,0,TAU); g.fill();
  /* the sun lying on it, dimmed under the canopy + slow ripple rings */
  g.globalAlpha=0.15; g.fillStyle='#f0eec6';
  g.beginPath(); g.ellipse(cx-pw*0.18,gy-ph*0.22,pw*0.26,ph*0.2,0,0,TAU); g.fill(); g.globalAlpha=1;
  for(let i=0;i<3;i++){ const phs=(perfNow*0.4+i*0.45)%1;
    g.globalAlpha=(1-phs)*0.3; g.strokeStyle='#48603c'; g.lineWidth=Math.max(1,1.3*p.s);
    g.beginPath(); g.ellipse(cx+(sRnd(i*7+2)-0.5)*pw,gy+(sRnd(i*7+3)-0.5)*ph*0.8,
      (4+phs*22)*p.s+1,((4+phs*22)*0.3)*p.s+0.5,0,0,TAU); g.stroke(); }
  g.globalAlpha=1;
  /* PLANTS ALL OVER IT: lily rafts, algae drifts, reed clumps standing in it */
  for(let i=0;i<8;i++){ const sd=sRnd(i*19+4), sd3=sRnd(i*19+5);
    const lx2=cx+(sd-0.5)*pw*1.6, ly2=gy+(sd3-0.5)*ph*1.3;
    if(i%3===2){ g.fillStyle='#263620';                             // an algae drift
      g.fillRect(lx2-8*p.s,ly2,16*p.s+3,Math.max(1,1.6*p.s)); }
    else{ g.fillStyle=i%2?'#3a5c2a':'#446834';                      // lily pads (notched)
      g.beginPath(); g.ellipse(lx2,ly2,(4.5+sd*4)*p.s+1.4,(1.8+sd*1.6)*p.s+0.6,0,0,TAU); g.fill();
      g.fillStyle='#202e20'; g.fillRect(lx2,ly2-(1.8+sd*1.6)*p.s,2.2*p.s,(1.8+sd*1.6)*p.s);
      if(sd3>0.72){ g.fillStyle='#e8d8e0';                          // a white lily bloom
        g.fillRect(lx2-1.2*p.s,ly2-1.6*p.s,2.4*p.s+0.8,1.6*p.s+0.6); } }
  }
  for(let i=0;i<5;i++){ const sd=sRnd(i*31+8);                      // reed clumps in the shallows
    const rx2=cx+(sd-0.5)*pw*1.7, ry3=gy+ph*(0.5+sRnd(i*31+9)*0.5);
    g.fillStyle=i%2?'#2b401d':'#25381a';
    g.fillRect(rx2,ry3-7*p.s,1.5*p.s+0.8,7*p.s+1);
    g.fillRect(rx2+2*p.s,ry3-9*p.s,1.4*p.s+0.8,9*p.s+1);
    if(sd>0.6){ g.fillStyle='#48351c'; g.fillRect(rx2+1.8*p.s,ry3-10.6*p.s,2*p.s+0.8,2.2*p.s+0.8); } }
  /* THE HYDRA ITSELF waits half-sunk among the lilies, visible from afar */
  drawHydra(cx,gy+ph*0.15,Math.max(0.14,t*1.05)*grow,'run',0,false);
  /* morning midges glinting over the water */
  for(let i=0;i<3;i++){ g.globalAlpha=0.3+Math.sin(perfNow*2.2+i*2)*0.18;
    g.fillStyle='#eef2c2'; g.shadowColor='#eef2c2'; g.shadowBlur=6;
    g.fillRect(cx+Math.sin(perfNow*0.6+i*2.4)*pw*0.5,gy-ph*(0.8+i*0.3),2.4,2.4); g.shadowBlur=0; }
  g.globalAlpha=1;
}
function drawLavaPondApproach(z){
  /* renders from the FAR distance — soft horizon (see drawMereApproach) */
  const raw=(CFG.FOCAL+CFG.Z_FAR)/(CFG.FOCAL+Math.max(z,CFG.Z_FAR));
  const grow=z>CFG.Z_FAR?0.10+raw*0.90:1;
  const p=proj(clamp(z>CFG.Z_FAR?CFG.Z_FAR-6*(1-raw):z,0.35,CFG.Z_FAR)), t=clamp(p.t,0,1);
  const cx=VW/2, gy=p.y;
  const pw=lerp(34,430,t*t)*grow, ph=pw*0.26;
  const breathe=0.75+Math.sin(perfNow*1.7)*0.14;
  /* rock teeth ringing the far shore */
  g.fillStyle='#120e10';
  for(let i=0;i<6;i++){ const sd=sRnd(i*23+5), tx=cx+(sd-0.5)*pw*2.4, th=ph*(1.4+sd*2.2);
    g.beginPath(); g.moveTo(tx-pw*0.05,gy-ph*0.4); g.lineTo(tx+(sd-0.5)*pw*0.03,gy-ph*0.4-th);
    g.lineTo(tx+pw*0.05,gy-ph*0.4); g.closePath(); g.fill(); }
  /* the pond: it glows before you can even see the shore */
  g.globalAlpha=breathe;
  g.fillStyle='#ff6a2a'; g.shadowColor='#ff6a2a'; g.shadowBlur=Math.max(6,20*p.s);
  g.beginPath(); g.ellipse(cx,gy,pw,ph,0,0,TAU); g.fill(); g.shadowBlur=0;
  g.globalAlpha=breathe*0.7; g.fillStyle='#ffd23a';
  g.fillRect(cx-pw*0.4+Math.sin(perfNow*1.1)*pw*0.1,gy-ph*0.24,pw*0.3,Math.max(1.6,ph*0.12));
  g.fillRect(cx+pw*0.06-Math.sin(perfNow*0.8)*pw*0.1,gy+ph*0.2,pw*0.24,Math.max(1.4,ph*0.1));
  g.globalAlpha=1;
  /* crust islands + the smoke standing over it */
  g.fillStyle='#120a0d';
  g.fillRect(cx-pw*0.5,gy-ph*0.12,pw*0.16,Math.max(2,ph*0.24));
  g.fillRect(cx+pw*0.24,gy+ph*0.14,pw*0.2,Math.max(2,ph*0.26));
  for(let i=0;i<3;i++){ const smT=i/3;
    g.globalAlpha=0.24-smT*0.05; g.fillStyle='#241a1c';
    g.beginPath(); g.ellipse(cx+Math.sin(perfNow*0.5+i)*pw*0.1,gy-ph*(1+i*0.8),
      pw*(0.16+smT*0.14),ph*(0.3+smT*0.2),0,0,TAU); g.fill(); }
  g.globalAlpha=1;
  /* THE SNAPPER ITSELF broods in the middle of the glow, visible from afar */
  drawLavaTurtle(cx,gy+ph*0.15,Math.max(0.14,t*1.0)*grow,'run',0,false);
}
/* the arena MOUTH: a rock massif rising at the end of the loop — you ride straight in.
   It renders from the FAR distance like the trees around it. */
function drawCaveMouth(z){
  const P=BIO().mouth;
  /* soft horizon: tempered growth + gentle drift (see drawMereApproach) */
  const raw=(CFG.FOCAL+CFG.Z_FAR)/(CFG.FOCAL+Math.max(z,CFG.Z_FAR));
  const grow=z>CFG.Z_FAR?0.10+raw*0.90:1;
  const p=proj(clamp(z>CFG.Z_FAR?CFG.Z_FAR-6*(1-raw):z,0.35,CFG.Z_FAR)), t=clamp(p.t,0,1);
  const cx=VW/2, gy=p.y;
  const hillW=lerp(70,760,t*t)*grow, hillH=lerp(46,720,t*t)*grow;
  const aw=lerp(16,290,t*t)*grow, ah=lerp(18,340,t*t)*grow;   // the arch opening
  g.save();
  /* THE END OF THE ROAD: real trees march in across the whole road behind the
     lair (spawned like all scenery, same perspective). This haze only BLENDS
     their bases together so no bare trail shows between the far boles. */
  const hz=g.createLinearGradient(0,HORIZON_Y-12,0,gy+6);
  hz.addColorStop(0,'rgba(8,13,10,0)'); hz.addColorStop(.4,'rgba(8,13,10,0.75)');
  hz.addColorStop(1,'rgba(8,13,10,0.92)');
  g.fillStyle=hz; g.fillRect(0,HORIZON_Y-12,VW,Math.max(6,gy-HORIZON_Y+20));
  /* massif silhouette: ragged stepped skyline */
  g.fillStyle=P.rock;
  g.beginPath(); g.moveTo(cx-hillW,gy+8);
  for(let i=0;i<=12;i++){
    const fx=lerp(cx-hillW,cx+hillW,i/12);
    const rag=Math.floor(sRnd(i*19+3)*3)*0.09+Math.abs(i-6)*0.115;
    g.lineTo(fx,gy-hillH*(1-rag));
  }
  g.lineTo(cx+hillW,gy+8); g.closePath(); g.fill();
  /* strata bands */
  for(let b=0;b<3;b++){
    g.fillStyle=P.band[b];
    const by=gy-hillH*(0.24+b*0.2);
    g.fillRect(cx-hillW*(0.9-b*0.16),by,hillW*2*(0.9-b*0.16),Math.max(2,hillH*0.05));
  }
  /* growth clinging to the rock over the entrance (moss / bog weed / scorched lichen) */
  g.fillStyle=P.moss;
  g.fillRect(cx-aw*0.9,gy-ah*1.12,aw*0.7,Math.max(2,ah*0.09));
  g.fillRect(cx+aw*0.15,gy-ah*1.2,aw*0.6,Math.max(2,ah*0.08));
  g.fillStyle=P.mossL; g.fillRect(cx-aw*0.7,gy-ah*1.12,aw*0.3,Math.max(1.6,ah*0.05));
  /* the black throat of the cave */
  g.fillStyle='#020204';
  g.beginPath(); g.moveTo(cx-aw,gy+6);
  g.lineTo(cx-aw*0.94,gy-ah*0.62); g.lineTo(cx-aw*0.55,gy-ah*0.94); g.lineTo(cx-aw*0.1,gy-ah);
  g.lineTo(cx+aw*0.4,gy-ah*0.96); g.lineTo(cx+aw*0.9,gy-ah*0.7); g.lineTo(cx+aw,gy+6);
  g.closePath(); g.fill();
  /* worn rim where the rock meets the dark — the volcano's rim GLOWS */
  g.strokeStyle=P.rim; g.lineWidth=Math.max(1.5,3*p.s); g.stroke();
  if(P.glow){ g.globalAlpha=0.35+Math.sin(perfNow*3)*0.12;
    g.strokeStyle=P.glow; g.lineWidth=Math.max(1,1.6*p.s); g.stroke(); g.globalAlpha=1; }
  /* two rock teeth hanging in the opening */
  g.fillStyle=P.rock;
  g.fillRect(cx-aw*0.42,gy-ah*0.92,Math.max(2,aw*0.09),ah*0.3);
  g.fillRect(cx+aw*0.2,gy-ah*0.9,Math.max(2,aw*0.07),ah*0.22);
  /* the dark swallows the view as you pass under the arch */
  if(z<5){ g.globalAlpha=clamp((5-z)/4.2,0,1)*0.96; g.fillStyle='#020204';
    g.fillRect(-20,-PAD_TOP-20,VW+40,VH+PAD_TOT+40); g.globalAlpha=1; }
  g.restore();
}
/* ============================== THE SWAMP (loop 2, 5, 8...) ============================== */
function drawSwampBg(dt){
  /* THE FOREST'S SKY, WHOLESALE: the same swallowed canopy, the same one opening
     dead ahead, the same near-black tree walls — but the SUN looks through the
     gap instead of the moon, and the marsh below sits a shade darker under it. */
  g.fillStyle='#060905'; g.fillRect(0,-PAD_TOP,VW,HORIZON_Y+60+PAD_TOP);
  /* the opening: a soft clearing of hazy morning sky around the sun */
  const mx=VW*0.56, my=118;
  g.save();
  g.beginPath(); g.ellipse(mx,my,118,86,0,0,TAU); g.clip();
  const sky=g.createRadialGradient(mx,my,10,mx,my,130);
  sky.addColorStop(0,'#c9be8e'); sky.addColorStop(.6,'#6f755a'); sky.addColorStop(1,'#2c3226');
  g.fillStyle=sky; g.fillRect(mx-130,my-100,260,200);
  /* THE SUN: soft-glowing pale disc, gauze streaks dragging across it */
  g.shadowColor='#f0e6b8'; g.shadowBlur=34;
  g.fillStyle='#f6eec6'; g.beginPath(); g.arc(mx,my,26,0,TAU); g.fill();
  g.shadowBlur=0;
  g.fillStyle='#efe3ac';
  g.fillRect(mx-12,my-8,7,6); g.fillRect(mx+2,my+4,8,6); g.fillRect(mx-4,my+12,5,4);
  g.globalAlpha=0.4; g.fillStyle='#6f755a';                       // mist gauze over the sun
  g.fillRect(mx-40,my-9,80,5); g.fillRect(mx-34,my+8,68,4);
  g.globalAlpha=1;
  g.restore();
  /* canopy: the forest's own leaf ceiling, unchanged (shared cache) */
  drawCanopy(mx,my);
  /* near-black parallax tree walls below the canopy */
  drawRidge(HORIZON_Y+14, 74, '#0a0f0d', dist*0.10);
  drawRidge(HORIZON_Y+22, 52, '#0d1410', dist*0.22);
  /* the heron keeps its perch, hunched against the ridge */
  const hx3=VW*0.15, hy3=HORIZON_Y+2;
  g.fillStyle='#131a12';
  g.fillRect(hx3-2,hy3-14,4,16); g.fillRect(hx3-3,hy3-30,6,12);
  g.fillRect(hx3-1,hy3-40,2.6,12); g.fillRect(hx3-1,hy3-42,7,2.6);
  g.fillRect(hx3,hy3-18,2,6);
  /* SHALLOW MUDDY WATER plane — darker, to sit under the closed canopy */
  const ground=g.createLinearGradient(0,HORIZON_Y,0,VH);
  ground.addColorStop(0,'#2e2c17'); ground.addColorStop(.4,'#232210'); ground.addColorStop(1,'#121107');
  g.fillStyle=ground; g.fillRect(0,HORIZON_Y,VW,VH-HORIZON_Y+PAD_BOT);
}
function drawSwampRoad(){
  const dist=roadScroll; // visual texture scroll; combat can keep this moving without advancing the stage
  /* a trodden MUD-AND-MOSS path through real swamp ground: the flanks are a
     living patchwork — side pools with lily pads, mud flats, moss beds, root
     tangles and creeping vines — never one flat sheet of anything */
  const p0=proj(CFG.Z_FAR), pB=proj(-2.6);
  const hw=t=>lerp(34,218,t);
  const notch=(z,seed)=>Math.floor(sRnd(Math.floor((z+dist)/4.2)*7+seed)*3)*4.5-4.5;
  /* ---- THE FLANKS: SHALLOW MUDDY WATER — a dark yellowed murk, with bits of
          ground breaking the surface, drifting debris and lily pads ---- */
  /* lateral offsets SCALE with perspective (fo): flank features emerge beside the
     road small and spread outward as they near — pure, natural vertical flow,
     never "pushed" sideways toward the path */
  const fo=t=>lerp(0.18,1,t);
  /* soft GREEN reaches staining the water — algae shallows, so it reads SWAMP.
     They scroll with the world like everything on the ground. */
  /* NOTE: the flank features recycle at z=-6 — fully OFF-SCREEN below — so none
     of them ever teleports away (or to the other side) while still visible */
  for(let i=0;i<10;i++){
    const z=((i*5.3 - dist)%(CFG.Z_FAR+6)+(CFG.Z_FAR+6))%(CFG.Z_FAR+6)-6;
    const p=proj(z), sd=sRnd(i*19+Math.floor((dist+i*5.3)/(CFG.Z_FAR+6))*9);
    const side=i%2?-1:1, x=VW/2+side*(hw(p.t)+(20+sd*150)*fo(p.t));
    g.globalAlpha=0.5;
    g.fillStyle=sd<0.5?'#2d3d24':'#263620';
    g.beginPath(); g.ellipse(x,p.y,(16+sd*20)*p.s+3,(6+sd*4)*p.s+1,0,0,TAU); g.fill();
    g.globalAlpha=1;
  }
  /* pale sheen rows resting on the murk (a gentle shimmer, no sideways slide) */
  for(let b=0;b<4;b++){
    const by2=HORIZON_Y+34+b*((VH+PAD_BOT-HORIZON_Y)/4);
    g.globalAlpha=0.05+(b%2)*0.02; g.fillStyle='#c3b684';
    for(let k=0;k<5;k++)
      g.fillRect(k*(VW/5)+8,by2+Math.sin(perfNow*1.2+b*2+k)*2.4,VW/5*0.78,6+b*2);
  }
  g.globalAlpha=1;
  /* GROUND BITS: mud islets breaking the surface — soaked base, drier crown */
  for(let i=0;i<16;i++){
    const z=((i*3.9 - dist)%(CFG.Z_FAR+6)+(CFG.Z_FAR+6))%(CFG.Z_FAR+6)-6;
    const p=proj(z), sd=sRnd(i*17+Math.floor((dist+i*3.9)/(CFG.Z_FAR+6))*13);
    const side=i%2?-1:1, x=VW/2+side*(hw(p.t)+(26+sd*146)*fo(p.t));
    const iw=(8+sd*14)*p.s+2;
    g.fillStyle='#1f1a0e';
    g.beginPath(); g.ellipse(x,p.y,iw,iw*0.34,0,0,TAU); g.fill();
    g.fillStyle='#37331e';
    g.beginPath(); g.ellipse(x-iw*0.08,p.y-iw*0.1,iw*0.72,iw*0.24,0,0,TAU); g.fill();
    if(sd>0.55){ g.fillStyle='#334a23';                          // a tuft riding it
      g.fillRect(x-1*p.s,p.y-iw*0.1-3*p.s,1.6*p.s+0.8,3*p.s+1);
      g.fillRect(x+1.4*p.s,p.y-iw*0.1-4*p.s,1.4*p.s+0.8,4*p.s+1); }
    else if(sd>0.3){ g.fillStyle='#3d392a';                      // a pebble on the crown
      g.fillRect(x+iw*0.3,p.y-1.6*p.s,3*p.s+1,1.8*p.s+1); }
  }
  /* LILY PADS riding the water STRAIGHT DOWN with the world (no sideways sway,
     no wobble) — bigger, properly green, with a lighter leaf face and a slit */
  for(let i=0;i<10;i++){
    const z=((i*6.1 - dist)%(CFG.Z_FAR+6)+(CFG.Z_FAR+6))%(CFG.Z_FAR+6)-6;
    const p=proj(z), sd=sRnd(i*31+Math.floor((dist+i*6.1)/(CFG.Z_FAR+6))*7);
    const side=i%2?-1:1, x=VW/2+side*(hw(p.t)+(30+sd*130)*fo(p.t));
    const s2=(6+sd*5)*p.s+1.5;
    g.fillStyle=sd<0.5?'#335c25':'#3d682d';                           // the leaf
    g.beginPath(); g.ellipse(x,p.y,s2,s2*0.42,0,0,TAU); g.fill();
    g.fillStyle=sd<0.5?'#416b30':'#4e7638';                           // lighter leaf face
    g.beginPath(); g.ellipse(x-s2*0.12,p.y-s2*0.06,s2*0.6,s2*0.24,0,0,TAU); g.fill();
    g.fillStyle='#24421b';                                            // the slit vein
    g.fillRect(x,p.y-Math.max(0.5,0.45*p.s),s2*0.95,Math.max(1,0.9*p.s));
    if(sd>0.82){ g.fillStyle='#d888a8';                               // a pink bloom
      g.fillRect(x-1.6*p.s,p.y-2*p.s,3.2*p.s+1,2.4*p.s+1);
      g.fillStyle='#f2c6d6'; g.fillRect(x-0.6*p.s,p.y-1.4*p.s,1.4*p.s+0.6,1.2*p.s+0.5); }
  }
  /* FLOATING DEBRIS: flecks lying on the surface, flowing straight down-screen
     with the world as the knight passes — no sideways drift, no wobble */
  for(let i=0;i<14;i++){
    const z=((i*4.3 - dist)%(CFG.Z_FAR+6)+(CFG.Z_FAR+6))%(CFG.Z_FAR+6)-6;
    const p=proj(z), sd=sRnd(i*23+Math.floor((dist+i*4.3)/(CFG.Z_FAR+6))*5);

    g.fillStyle=sd<0.5?'#544a30':'#423722';
    g.fillRect(x,p.y,(2.5+sd*3)*p.s+0.8,1.2*p.s+0.6);
    g.globalAlpha=1;
  }
  /* (a second particle row on the FAR sides was tried and scrapped: fixed lanes
     read as drifting inward against the perspective flow, and true-perspective
     paths exit the screen while still too small to see out there) */
  /* algae streaks lying flat on the water */
  for(let i=0;i<8;i++){
    const z=((i*7.3 - dist)%(CFG.Z_FAR+6)+(CFG.Z_FAR+6))%(CFG.Z_FAR+6)-6;
    const p=proj(z), sd=sRnd(i*41+Math.floor((dist+i*7.3)/(CFG.Z_FAR+6))*11);
    const side=i%2?-1:1, x=VW/2+side*(hw(p.t)+(34+sd*120)*fo(p.t));
    g.fillStyle='#2c3f1d';
    g.fillRect(x-6*p.s,p.y,(10+sd*8)*p.s+2,Math.max(1,1.5*p.s));
    g.fillRect(x-2*p.s,p.y-1.3*p.s,(6+sd*5)*p.s+1,Math.max(0.8,1.1*p.s));
  }
  /* the WATERLINE lapping the path's edges */
  for(let i=0;i<16;i++){ const z=lerp(CFG.Z_FAR*0.9,-2.2,i/16), p=proj(z);
    const lap=Math.sin(perfNow*2+i)*1.2*p.s;
    g.fillStyle='#241f11';
    g.fillRect(VW/2+hw(p.t)+notch(z,1)*p.t+3*p.s+lap,p.y+1.2*p.s,5*p.s+1,1.8*p.s+0.8);
    g.fillRect(VW/2-hw(p.t)-notch(z,5)*p.t-8*p.s-lap,p.y+1.2*p.s,5*p.s+1,1.8*p.s+0.8); }
  /* ---- THE PATH: packed wet mud, moss chewing its edges ---- */
  g.fillStyle='#332a18';
  g.beginPath(); g.moveTo(VW/2-hw(p0.t),p0.y);
  for(let i=0;i<=22;i++){ const t=i/22, z=lerp(CFG.Z_FAR,-2.6,t), p=proj(z);
    g.lineTo(VW/2+hw(p.t)+notch(z,1)*p.t, p.y); }
  g.lineTo(VW/2+hw(pB.t),VH+PAD_BOT+40); g.lineTo(VW/2-hw(pB.t),VH+PAD_BOT+40);
  for(let i=22;i>=0;i--){ const t=i/22, z=lerp(CFG.Z_FAR,-2.6,t), p=proj(z);
    g.lineTo(VW/2-hw(p.t)-notch(z,5)*p.t, p.y); }
  g.closePath(); g.fill();
  /* moss eating in from both edges */
  g.fillStyle='#2c3d1d';
  for(let i=0;i<18;i++){ const z=lerp(CFG.Z_FAR*0.9,-2.2,i/18), p=proj(z);
    g.fillRect(VW/2+hw(p.t)+notch(z,1)*p.t-7*p.s,p.y,6*p.s+1,2.8*p.s+1);
    g.fillRect(VW/2-hw(p.t)-notch(z,5)*p.t+1*p.s,p.y,6*p.s+1,2.8*p.s+1); }
  /* path texture: sky-puddles, dark wet mud, moss islands, twigs, a sunk plank */
  for(let i=0;i<28;i++){
    const z=((i*2.17 - dist)%(CFG.Z_FAR+3)+(CFG.Z_FAR+3))%(CFG.Z_FAR+3)-3;
    const p=proj(z), sd=sRnd(i*11+Math.floor((dist+i*2.17)/(CFG.Z_FAR+3))*9);
    const x=VW/2+(sd-0.5)*2*(hw(p.t)-16*p.t-6);
    if(sd<0.26){ g.globalAlpha=0.5; g.fillStyle='#5d6852';            // a puddle holding the sky
      g.fillRect(x,p.y,(6+sd*10)*p.s+1,1.9*p.s+0.8); g.globalAlpha=1; }
    else if(sd<0.5){ g.fillStyle='#2a2114'; g.fillRect(x,p.y,(5+sd*7)*p.s+1,(2+sd*2)*p.s+1); }
    else if(sd<0.68){ g.fillStyle='#334424';                          // a moss island on the path
      g.fillRect(x,p.y,(5+sd*6)*p.s+1,2.2*p.s+1);
      g.fillStyle='#3c5126'; g.fillRect(x+1*p.s,p.y,2.4*p.s+1,1.1*p.s+0.5); }
    else if(sd<0.76){ g.fillStyle='#3d321f';                          // a sunk plank
      g.fillRect(x,p.y,15*p.s+2,3*p.s+1);
      g.fillStyle='#2e2618'; g.fillRect(x+3*p.s,p.y,1.4*p.s,3*p.s+1); g.fillRect(x+9*p.s,p.y,1.4*p.s,3*p.s+1); }
    else { g.fillStyle='#211a10'; g.fillRect(x,p.y,(4+sd*5)*p.s+1,1.8*p.s+1); }   // twigs
  }
  /* two trodden ruts of pressed dark mud */
  g.fillStyle='#291f12';
  for(let ln=0;ln<2;ln++){
    for(let i=0;i<14;i++){
      const z=((i*4.6 - dist)%(CFG.Z_FAR+3)+(CFG.Z_FAR+3))%(CFG.Z_FAR+3)-3;
      const p=proj(z), x=(laneX(ln,p.t)+laneX(ln+1,p.t))/2;
      g.fillRect(x-2.2*p.s,p.y,4.4*p.s,9*p.s);
    }
  }
  /* fat roots fingering ACROSS the path edges from the flanks */
  for(let i=0;i<10;i++){
    const z=((i*5.8 - dist)%(CFG.Z_FAR+3)+(CFG.Z_FAR+3))%(CFG.Z_FAR+3)-3;
    const p=proj(z), sd=sRnd(i*37+Math.floor((dist+i*5.8)/(CFG.Z_FAR+3))*5);
    const side=i%2?-1:1, ex=VW/2+side*(hw(p.t)-2);
    g.fillStyle='#33281a';
    g.fillRect(side>0?ex-11*p.s:ex,p.y-1.4*p.s,11*p.s,2.2*p.s+1);
    g.fillRect(side>0?ex-7*p.s:ex+4*p.s,p.y-3*p.s,3*p.s,3*p.s);
    if(sd>0.5){ g.fillStyle='#443620';
      g.fillRect(side>0?ex-11*p.s:ex,p.y-1.4*p.s,11*p.s,0.9*p.s); }
  }
  /* reeds and cattails crowding both rims */
  for(let i=0;i<24;i++){
    const z=((i*1.93 - dist)%(CFG.Z_FAR+3)+(CFG.Z_FAR+3))%(CFG.Z_FAR+3)-3;
    const p=proj(z), sd=sRnd(i*29+Math.floor((dist+i*1.93)/(CFG.Z_FAR+3))*3);
    const side=i%2?-1:1, x=VW/2+side*(hw(p.t)-4-sd*12);
    g.fillStyle=sd<0.5?'#2b401d':'#25381a';
    g.fillRect(x,p.y-6*p.s,1.5*p.s+0.8,6*p.s+1);
    g.fillRect(x+2.2*p.s,p.y-8.4*p.s,1.4*p.s+0.8,8.4*p.s+1);
    if(sd>0.62){ g.fillStyle='#48351c'; g.fillRect(x+2*p.s,p.y-10*p.s,2*p.s+0.8,2.4*p.s+0.8); } // cattail head
  }
}
/* the swamp's GROUND scenery: small ponds lying flat in the mud — spawned and
   rendered through the TREE pipeline, so they ride the exact same perspective
   (grow in from the horizon, slide past, never distort). Four dressings. */
function drawSwampPond(x,y,s,v){
  g.save(); g.translate(x,y); g.scale(s,s);
  const R=k=>sRnd(v*547.9+k*7.13);
  const vr=(v*4|0)%4;
  /* SHAPE variants: some ponds run long (up the road), some wide, some round */
  const shp=(v*7|0)%3, sxF=shp===1?1.42:shp===2?0.68:1, syF=shp===1?0.68:shp===2?1.6:1;
  g.save(); g.scale(sxF,syF);
  /* the soaked mud bed it sits in — lobed, no clean rim */
  g.fillStyle='#2e2718';
  g.beginPath(); g.ellipse(0,-2,34,13,0,0,TAU); g.fill();
  g.beginPath(); g.ellipse(20*(R(1)-0.5),3,24,10,0,0,TAU); g.fill();
  /* the water: an irregular union of lobes */
  g.fillStyle='#37503e';
  g.beginPath(); g.ellipse(0,-2,28,10,0,0,TAU); g.fill();
  g.beginPath(); g.ellipse(24*(R(2)-0.5),2,18,8,0,0,TAU); g.fill();
  g.beginPath(); g.ellipse(-14*R(3),-6,14,6,0,0,TAU); g.fill();
  g.fillStyle='#2b4033'; g.beginPath(); g.ellipse(4,-1,14,5.5,0,0,TAU); g.fill();
  g.restore();                                   // dressings keep their TRUE shape
  const pad=(px2,py2,s2)=>{ g.fillStyle='#5d8a45';
    g.beginPath(); g.ellipse(px2,py2,s2,s2*0.42,0,0,TAU); g.fill();
    g.fillStyle='#37503e'; g.fillRect(px2,py2-s2*0.42,s2*0.44,s2*0.42);   // the notch
    g.fillStyle='#6d9a50'; g.fillRect(px2-s2*0.5,py2-s2*0.12,s2*0.5,s2*0.22); };
  if(vr===0){                        /* lily pads, one with a pink bloom */
    pad(-9*sxF,-1*syF,7); pad(10*sxF,-5*syF,5.5); pad(4*sxF,4*syF,4.5);
    g.fillStyle='#d888a8'; g.fillRect(-11*sxF,-4*syF,5,4);
    g.fillStyle='#f2c6d6'; g.fillRect(-11*sxF+1.4,-4*syF+1,2,2);
  } else if(vr===1){                 /* spots of algae */
    g.fillStyle='#4e7a3a';
    g.fillRect(-16*sxF,-4*syF,14,2.6); g.fillRect(-6*sxF,1*syF,16,2.4); g.fillRect(6*sxF,-6*syF,10,2.2);
    g.fillStyle='#5d8a45'; g.fillRect(-12*sxF,-2.4*syF,8,1.6); g.fillRect(2*sxF,2.6*syF,9,1.4);
  } else if(vr===2){                 /* scummed film with gaps, reeds at the edge */
    g.globalAlpha=0.85*worldA; g.fillStyle='#5f7d44';
    g.beginPath(); g.ellipse(0,-1*syF,24*sxF,8.6*syF,0,0,TAU); g.fill(); g.globalAlpha=worldA;
    g.fillStyle='#37503e'; g.fillRect(-8*sxF,-4*syF,8,2.4); g.fillRect(4*sxF,2*syF,8,2);
    g.fillStyle='#4b6b33';
    g.fillRect(-26*sxF,-14,2,14); g.fillRect(-26*sxF+4,-18,2,18);
    g.fillStyle='#48351c'; g.fillRect(-26*sxF+3.6,-20.6,3,3.4);    // cattail head
  } else {                           /* open water: a sheen, one pad, a stone */
    g.globalAlpha=0.5*worldA; g.fillStyle='#a8b694';
    g.fillRect(-12*sxF,-5*syF,12*sxF,1.8); g.globalAlpha=worldA;
    pad(12*sxF,0,5.5);
    g.fillStyle='#5c5745'; g.fillRect(-24*sxF,-3,6,4);
    g.fillStyle='#6a6553'; g.fillRect(-24*sxF,-3,6,1.6);
  }
  g.restore();
}
/* FIVE drowned-forest silhouettes: cypress, dead giant, mangrove cluster,
   weeping willow, hollow fungus-lit bole — every swamp tree its own ghost */
function drawCypress(x,y,s,v){
  g.save(); g.translate(x,y); g.scale(s,s);
  const R=k=>sRnd(v*883.7+k*13.31);
  const bark='#1e1a10', barkL='#2a2416', barkD='#141008';
  const leaf=v>0.5?'#171d1c':'#12181a', leafL='#1e2624';
  const moss='#3a4a3c', mossL='#4a5a48';
  const lean=(R(1)-0.5)*14;
  const vr=(v*5|0)%5;
  const mossStrand=(hx2,top,len,ph)=>{
    const sway=Math.sin(perfNow*1.1+ph)*3;
    g.fillStyle=(ph|0)%2?moss:'#2c3a2c';
    g.fillRect(hx2+sway*0.3,top,4,len*0.5);
    g.fillRect(hx2+sway,top+len*0.5,4,len*0.5);
    g.fillStyle=mossL; g.fillRect(hx2+sway*0.3,top,4,4);
  };
  const knees=()=>{ g.fillStyle=bark;
    g.fillRect(-44,-5,8,10); g.fillRect(38,-8,7,13); g.fillRect(-52,-3,5,8); g.fillRect(48,-4,5,9); };
  const waterStain=w=>{ g.globalAlpha=0.5*worldA; g.fillStyle='#2e3d2c'; g.fillRect(-w,0,w*2,5); g.globalAlpha=worldA; };
  if(vr===0){        /* --- great bald cypress: flared buttress, high thin crown --- */
    g.fillStyle=bark;
    g.beginPath(); g.moveTo(-36,5); g.lineTo(-13,-38); g.lineTo(-13,-50); g.lineTo(13,-50);
    g.lineTo(13,-38); g.lineTo(36,5); g.closePath(); g.fill();
    g.fillStyle=barkD; g.fillRect(-4,-48,6,52);
    g.fillStyle=barkL; g.fillRect(-33,0,8,5); g.fillRect(-13,-48,6,46);
    knees();
    g.fillStyle=bark; g.fillRect(-9+lean*0.3,-192,18,144);
    g.fillStyle=barkD; g.fillRect(-1+lean*0.3,-188,4,140);
    g.fillStyle=barkL; g.fillRect(-9+lean*0.3,-192,4,144);
    const blob=(cx,cy,w,h,c)=>{ g.fillStyle=c; g.fillRect(cx-w/2,cy-h/2,w,h);
      g.fillRect(cx-w*0.3+R(cx)*w*0.2,cy-h*0.85,w*0.6,h*0.6);
      for(let k=0;k<w-6;k+=8) g.fillRect(cx-w/2+k,cy+h/2-2+((k/8|0)%2)*4,5,5); };
    blob(lean-12,-212,86+R(2)*20,30,leaf);
    blob(lean+20,-236,62,24,leafL);
    blob(lean-2,-256,44,18,leaf);
    for(let i=0;i<6;i++) mossStrand(lean-34+i*14+R(i+3)*6,-208+R(i+7)*12,32+R(i+11)*36,i*1.7+v*9);
    waterStain(36);
  } else if(vr===1){ /* --- DEAD GIANT: bare, snapped crown, one claw limb --- */
    g.fillStyle=barkD;
    g.fillRect(-11,-170,22,174);
    g.fillStyle='#0e0b06'; g.fillRect(-2,-166,5,168);
    g.fillStyle=barkL; g.fillRect(-11,-170,4,174);
    /* snapped, splintered top */
    g.fillStyle=barkD;
    g.beginPath(); g.moveTo(-11,-170); g.lineTo(-6,-192); g.lineTo(-1,-172);
    g.lineTo(4,-198); g.lineTo(8,-174); g.lineTo(11,-170); g.closePath(); g.fill();
    const d=R(2)<0.5?-1:1;
    g.fillRect(d*8,-136,d*40,7); g.fillRect(d*40,-152,d*7,18);      // one clawed limb
    g.fillRect(-d*7,-96,-d*26,6);                                    // a stub the other way
    for(let i=0;i<3;i++) mossStrand(d*(14+i*12),-132+R(i+4)*8,24+R(i+9)*22,i*2.1+v*7);
    g.fillStyle=bark; g.fillRect(-18,-6,9,10); g.fillRect(10,-8,10,12);
    waterStain(20);
    /* a crow-black shape hunched on the limb */
    if(R(6)<0.4){ g.fillStyle='#0a0d0a'; g.fillRect(d*30-3,-142,7,5); g.fillRect(d*30+ (d>0?3:-5),-144,3,3); }
  } else if(vr===2){ /* --- MANGROVE: a crown standing on stilt roots over the water --- */
    g.fillStyle=bark;
    for(let i=0;i<5;i++){ const rx=-26+i*13+R(i)*4;
      g.beginPath(); g.moveTo(rx,4); g.lineTo(rx+3,4); g.lineTo(rx*0.3+4,-52); g.lineTo(rx*0.3-3,-52);
      g.closePath(); g.fill(); }
    g.fillStyle=barkD; g.fillRect(-6,-96,12,48);
    g.fillStyle=barkL; g.fillRect(-6,-96,3,48);
    const blob=(cx,cy,w,h,c)=>{ g.fillStyle=c; g.fillRect(cx-w/2,cy-h/2,w,h);
      for(let k=0;k<w-6;k+=8) g.fillRect(cx-w/2+k,cy+h/2-2+((k/8|0)%2)*4,5,5); };
    blob(-8,-120,92+R(3)*16,34,leaf);
    blob(18,-144,58,24,leafL);
    blob(-22,-140,44,20,leaf);
    for(let i=0;i<4;i++) mossStrand(-30+i*18,-116+R(i+2)*8,22+R(i+8)*20,i*1.4+v*5);
    waterStain(30);
  } else if(vr===3){ /* --- WEEPING WILLOW: everything hangs --- */
    g.fillStyle=bark; g.fillRect(-8+lean*0.3,-128,16,132);
    g.fillStyle=barkD; g.fillRect(0+lean*0.3,-124,4,126);

    g.fillStyle=leafL; g.fillRect(lean-28,-164,56,14);

    for(let i=0;i<9;i++){
      const cx=lean-40+i*10+R(i)*4, top=-146+R(i+5)*8;
      const len=58+R(i+13)*48, sway=Math.sin(perfNow*0.9+i*1.3+v*8)*4;
      g.fillStyle=(i%3===0)?leafL:(i%3===1)?leaf:'#101820';
      g.fillRect(cx+sway*0.2,top,3,len*0.4);
      g.fillRect(cx+sway*0.6,top+len*0.4,3,len*0.35);
      g.fillRect(cx+sway,top+len*0.75,3,len*0.25);
    }
    waterStain(22);
  } else {           /* --- HOLLOW BOLE: bloated, split open, fungus-lit inside --- */
    g.fillStyle=bark;
    g.beginPath(); g.moveTo(-30,5); g.lineTo(-22,-86); g.lineTo(-10,-118); g.lineTo(12,-116);
    g.lineTo(24,-80); g.lineTo(30,5); g.closePath(); g.fill();
    g.fillStyle=barkL; g.fillRect(-26,-70,7,70);
    /* the split maw of the hollow */
    g.fillStyle='#080b0e';
    g.beginPath(); g.moveTo(-8,2); g.lineTo(-12,-38); g.lineTo(0,-58); g.lineTo(10,-34); g.lineTo(7,2);
    g.closePath(); g.fill();
    const gl=0.5+Math.sin(perfNow*1.6+v*11)*0.25;
    g.globalAlpha=gl*worldA; g.fillStyle='#4a8a7a';                 // fungus shelves in the maw
    g.fillRect(-9,-20,7,4); g.fillRect(2,-34,6,4); g.fillRect(-4,-46,5,3);
    g.fillStyle='#a9d8cf'; g.fillRect(-8,-20,3,2); g.fillRect(3,-34,2.6,2); g.globalAlpha=worldA;
    g.fillStyle=barkD; g.fillRect(-14,-112,10,20);                  // dead stub crown
    g.fillRect(6,-124,8,26); g.fillRect(-4,-130,6,18);
    for(let i=0;i<3;i++) mossStrand(-18+i*16,-104+R(i+6)*6,20+R(i+12)*18,i*1.9+v*6);
    knees();
    waterStain(30);
  }
  g.restore();
}
function drawSwampAtmos(){
  if(env==='cave') return;
  /* morning marsh air: sunlit midges circling, mist motes climbing off the pools */
  for(const a of ambient){
    if(a.kind==='fly'){
      const fx=a.x+Math.sin(a.ph)*30, fy=a.y+Math.cos(a.ph*0.8)*16;
      g.globalAlpha=0.30+Math.sin(a.ph*2.6)*0.2;
      g.fillStyle='#eef2c2'; g.shadowColor='#eef2c2'; g.shadowBlur=8;
      g.fillRect(fx,fy,2.6,2.6); g.fillRect(fx+2,fy-2,1.4,1.4);
      g.shadowBlur=0;
    } else {
      /* mist motes rising slowly off the wet ground */
      g.globalAlpha=0.3;
      g.fillStyle='#b9c2a4'; g.fillRect(a.x|0,a.y|0,2.4,2.4);
      if(a.sp>0.7) g.fillRect((a.x+3)|0,(a.y-4)|0,1.6,1.6);
    }
  }
  g.globalAlpha=1;
  /* THE MIST AURA: a noticeable but gentle veil — dimmed to fit the closed canopy */
  const fog=g.createLinearGradient(0,HORIZON_Y-24,0,HORIZON_Y+130);
  fog.addColorStop(0,'rgba(217,226,194,0)'); fog.addColorStop(.5,'rgba(217,226,194,0.12)');
  fog.addColorStop(1,'rgba(217,226,194,0)');

  /* two slow mist banks drifting low across the road — phase folded INTO the

function drawVolcanoRoad(){

  const p0=proj(CFG.Z_FAR), pB=proj(-2.6);

  const notch=(z,seed)=>Math.floor(sRnd(Math.floor((z+dist)/4.2)*7+seed)*3)*4.5-4.5;

  }

  for(let i=0;i<7;i++){
    const z=((i*8.1 - dist*0.5)%(CFG.Z_FAR+3)+(CFG.Z_FAR+3))%(CFG.Z_FAR+3)-3;
    const p=proj(z), sd=sRnd(i*37+4), side=i%2?-1:1;

  g.lineTo(VW/2+hw(pB.t),VH+PAD_BOT+40); g.lineTo(VW/2-hw(pB.t),VH+PAD_BOT+40);
  for(let i=22;i>=0;i--){ const t=i/22, z=lerp(CFG.Z_FAR,-2.6,t), p=proj(z);
    g.lineTo(VW/2-hw(p.t)-notch(z,5)*p.t, p.y); }
  g.closePath(); g.fill();
  /* slab joints: dark seams crossing the road */
  g.fillStyle='#161214';
  for(let i=0;i<14;i++){
    const z=((i*4.6 - dist)%(CFG.Z_FAR+3)+(CFG.Z_FAR+3))%(CFG.Z_FAR+3)-3;
    const p=proj(z);
    g.fillRect(VW/2-(hw(p.t)-8*p.t),p.y,(hw(p.t)-8*p.t)*2,1.8*p.s+0.8);
  }
  /* GLOWING FISSURES: magma light leaking up between the slabs */
  for(let i=0;i<16;i++){
    const z=((i*4.1 - dist)%(CFG.Z_FAR+3)+(CFG.Z_FAR+3))%(CFG.Z_FAR+3)-3;
    const p=proj(z), sd=sRnd(i*17+Math.floor((dist+i*4.1)/(CFG.Z_FAR+3))*5);

    g.globalAlpha=pul*0.55; g.fillStyle='#ffd23a';
    g.fillRect(x+1*p.s,p.y+0.4*p.s,2*p.s+0.6,0.9*p.s+0.5);
    g.globalAlpha=1;
  }
  /* scattered scoria pebbles + cooled rope textures on the slabs */
  for(let i=0;i<22;i++){
    const z=((i*2.37 - dist)%(CFG.Z_FAR+3)+(CFG.Z_FAR+3))%(CFG.Z_FAR+3)-3;
    const p=proj(z), sd=sRnd(i*23+Math.floor((dist+i*2.37)/(CFG.Z_FAR+3))*11);

  }

/* basalt columns + obsidian spires with ember vents — the volcano's "trees" */

    g.fillStyle=rockL; g.fillRect(cx-w/2,-h,w,3);    // capstone

    g.lineTo(20,-30); g.lineTo(32,4); g.closePath(); g.fill();

/* PETRIFIED CORAL STONES — the volcano's root-anchors: three sprites of pale,
   fossilised reef-rock. The stone-pipe roots erupt straight out of these. */
function drawPetrifiedCoral(x,y,s,v){
  g.save(); g.translate(x,y); g.scale(s,s);
  const R=k=>sRnd(v*641.3+k*9.71);
  /* fossil stone: BASALT-dark at the base — the same family as the roadside rock —
     lightening naturally up toward the pipe tips */
  const rock='#221c20', rockD='#131013', rockL='#2e262c', pale='#453842', lit='#544450';
  const vr=(v*3|0)%3;
  const branch=(bx,by,w,h,lean)=>{                   // one knobby fossil branch, tapering up
    const seg=4;
    for(let k=0;k<seg;k++){ const f=k/seg;
      const sw=w*(1-f*0.45), sx=bx+lean*f*h*0.4-sw/2, sy=by-h*(f+1/seg);
      g.fillStyle=mixCol(rock,lit,f); g.fillRect(sx,sy,sw,h/seg+2);        // lighter as it climbs
      g.fillStyle=mixCol(rockL,'#5e4a56',f); g.fillRect(sx,sy,sw*0.3,h/seg+2);
      if(k%2){ g.fillStyle=rockD; g.fillRect(sx+sw*0.55,sy+1,sw*0.2,h/seg); }
    }
    g.fillStyle=lit; g.fillRect(bx+lean*h*0.4-w*0.31,by-h-5,w*0.62,6);     // knobbed tip
  };
  if(vr===0){          /* --- staghorn cluster: antler branches off one bole --- */

    g.fillStyle=rockD; g.fillRect(4,-30,6,34);
    branch(-10,-34,14,86+R(1)*30,-0.5);
    branch(2,-36,16,120+R(2)*36,0.15);
    branch(12,-30,12,70+R(3)*24,0.6);

    for(let i=0;i<4;i++) g.fillRect(-12+i*8,-30+R(i+4)*18,2.6,2.6);
  } else if(vr===1){   /* --- brain-dome: a grooved boulder sprouting stone tubes --- */
    g.fillStyle=rock;

    g.fillRect(-44,-34,88,38);
    g.fillStyle=rockL; g.beginPath(); g.ellipse(-12,-46,24,18,0,0,TAU); g.fill();
    g.fillStyle=rockD;                                // the winding brain grooves

    for(let i=0;i<3;i++){ const tx=-26+i*24+R(i+7)*6, tl=54+R(i+3)*22;
      g.fillStyle=mixCol(rock,lit,0.6);  g.fillRect(tx-4,-34-tl,8,tl);     // tubes: lighter than the dome
      g.fillStyle=mixCol(rockL,'#5e4a56',0.6); g.fillRect(tx-4,-34-tl,2.6,tl);
      g.fillStyle='#171114'; g.fillRect(tx-2.4,-34-tl,4.8,4); }            // open bores
  } else {             /* --- fan tower: stacked plate fans on a leaning column --- */
    const lean=(R(1)-0.5)*18;
    g.fillStyle=rock; g.fillRect(-9,-118,18,122);
    g.fillStyle=rockL; g.fillRect(-9,-118,5,122);
    g.fillStyle=rockD; g.fillRect(2+lean*0.1,-110,4,112);
    for(let i=0;i<4;i++){ const fy=-34-i*26, fw=52-i*9, d=(i%2?-1:1);
      g.fillStyle=mixCol(i%2?rock:rockL,lit,i/3);                // fans brighten upward
      g.fillRect(d*4-fw/2+lean*(i/4),fy-7,fw,10);
      g.fillStyle=mixCol(pale,'#5e4a56',i/3); g.fillRect(d*4-fw/2+lean*(i/4),fy-7,fw,3);
      g.fillStyle=rockD; for(let k2=0;k2<fw-6;k2+=9) g.fillRect(d*4-fw/2+lean*(i/4)+k2,fy+1,4,3);
    }
    g.fillStyle=lit; g.fillRect(-6+lean*0.25,-126,12,9);         // crown knob
  }
  /* ash skirting + one faint ember crack ties it into the ashlands */
  g.fillStyle='#221a1c'; g.fillRect(-30,-4,60,7);
  g.globalAlpha=(0.4+Math.sin(perfNow*2.3+v*8)*0.2)*worldA; g.fillStyle='#ff6a2a';

/* v9.8 — rebuilt from scratch. One vast rock throat around a single opening:
   through it, the full moon, stars and treeline of the forest you rode in from.
   Every detail GROWS from a surface — ceiling, walls or floor. Nothing floats. */
function drawCave(dt){
  const mx2=VW*0.5, mw2=152, mtop=HORIZON_Y-118, mbot=HORIZON_Y+40;
  /* flat dark rock — no gradient halo hazing around the entrance */
  g.fillStyle='#0f0c0a'; g.fillRect(0,-PAD_TOP,VW,VH+PAD_TOT);
  /* CEILING: a ragged rock fringe growing down from the true screen top */
  for(let x=0;x<VW;x+=16){
    const k=x/16;
    const h1=26+sRnd(k*7+1)*46, h2=h1*0.55+sRnd(k*7+2)*20;
    g.fillStyle='#0d0a08'; g.fillRect(x,-PAD_TOP,16,h1+PAD_TOP);
    g.fillStyle='#12100c'; g.fillRect(x+3,-PAD_TOP,10,h2+PAD_TOP);
    g.fillStyle='#0d0a08'; g.fillRect(x+5,h1-3,7,7);
  }
  /* SIDE WALLS: rock shoulders growing in from both screen edges, lit inner rims */
  for(let yy=-PAD_TOP;yy<VH+PAD_BOT;yy+=22){
    const k=yy/22;
    const wl=32+sRnd(k*11+3)*54, wr=32+sRnd(k*11+7)*54;
    g.fillStyle='#0c0a08';
    g.fillRect(0,yy,wl,22); g.fillRect(VW-wr,yy,wr,22);
    g.fillStyle='#110e0b';
    g.fillRect(wl-7,yy+4,7,14); g.fillRect(VW-wr,yy+4,7,14);
  }
  /* stepped cracks running DOWN out of the ceiling fringe */
  g.fillStyle='#050403';
  for(let i=0;i<5;i++){
    const sd=sRnd(i*13+5), cx2=50+sd*(VW-100); if(Math.abs(cx2-mx2)<mw2*0.9) continue;
    let cy2=-PAD_TOP+24+sd*30;
    for(let k=0;k<4;k++){ g.fillRect(cx2+((k%2)?4:-3.2)*(0.7+sd),cy2,2.6,12+sd*8); cy2+=13+sd*8; }
  }
  /* ===== THE MOUTH: the moonlit night at the bear's back — the ONE moon ===== */
  g.save();
  g.beginPath(); g.moveTo(mx2-mw2,mbot);
  g.lineTo(mx2-mw2*0.86,mtop+40); g.lineTo(mx2-mw2*0.42,mtop+8); g.lineTo(mx2,mtop);
  g.lineTo(mx2+mw2*0.46,mtop+12); g.lineTo(mx2+mw2*0.88,mtop+44); g.lineTo(mx2+mw2,mbot);
  g.closePath(); g.clip();
  const nsky=g.createLinearGradient(0,mtop,0,mbot);
  nsky.addColorStop(0,'#0c1226'); nsky.addColorStop(.65,'#152140'); nsky.addColorStop(1,'#0d1424');
  g.fillStyle=nsky; g.fillRect(mx2-mw2,mtop,mw2*2,mbot-mtop);
  /* the FULL MOON, dither-cratered — the same moon the level rides under */

  g.fillStyle='#e8ecff'; g.beginPath(); g.arc(moX,moY,21,0,TAU); g.fill(); g.shadowBlur=0;
  g.fillStyle='#c3cbe8';
  g.fillRect(moX-10,moY-6,5,5); g.fillRect(moX+2,moY+5,7,5); g.fillRect(moX-4,moY+11,4,3);
  g.fillRect(moX+7,moY-11,4,4); g.fillRect(moX-13,moY+2,3,3);
  /* pixel plus-shaped stars around it, twinkling */
  const stars2=[[-96,-44],[-64,-8],[-108,18],[44,-58],[84,-26],[64,22],[-30,-64],[98,4]];
  for(let i=0;i<stars2.length;i++){
    const tw=0.5+Math.sin(perfNow*2.2+i*1.7)*0.5;
    g.globalAlpha=0.3+tw*0.6; g.fillStyle='#dfe6ff';
    const sx=moX+stars2[i][0], sy2=moY+stars2[i][1];

  }
  g.globalAlpha=1;
  /* the treeline you rode in from */
  for(let i=0;i<8;i++){ const sd=sRnd(i*17+3), tx=mx2-mw2+sd*mw2*2, th=26+sRnd(i*17+4)*42;
    g.fillStyle=i%2?'#0a1220':'#0c1526';
    g.fillRect(tx-3,mbot-th,6,th);
    g.beginPath(); g.ellipse(tx,mbot-th-8,15+sRnd(i*17+5)*12,11,0,0,TAU); g.fill();

  g.globalAlpha=0.3; g.fillStyle='#93a2b2';                     // ground mist at the threshold

let canopyCache=null, canopyCachePad=-1, canopyCacheQ=-1;   // rebuilt on pad/scale change
function drawCanopy(mx,my){
  /* the forest is CLAD in darkness: a solid leaf-mass ceiling covers the WHOLE sky
     (however tall the screen), parted only by one ragged clearing where the full
     moon and its stars look through. */
  const skyB=HORIZON_Y-46;                       // canopy reaches down to the treeline tops
  const rx=112, ry=84;                           // the moon clearing (kept tight)
  /* the ceiling is fully STATIC — build it once into an offscreen layer and blit
     it every frame (a big win on older phones); only the swaying fringe is live */
  const capTop=-4-PAD_TOP, capH=Math.ceil(skyB+42-capTop);
  if(!canopyCache||canopyCachePad!==PAD_TOP||canopyCacheQ!==viewScale){
    canopyCachePad=PAD_TOP; canopyCacheQ=viewScale;
    /* build at DEVICE resolution (viewScale = device px per logical unit), so the
       blitted ceiling is as crisp as everything drawn live — no low-res look */
    const q=Math.max(1,viewScale);
    canopyCache=document.createElement('canvas');
    canopyCache.width=Math.ceil(VW*q); canopyCache.height=Math.ceil(capH*q);
    const gMain=g; g=canopyCache.getContext('2d');
    g.scale(q,q);
    g.translate(0,-capTop);

  g.rect(0,-4-PAD_TOP,VW,skyB+8+PAD_TOP);
  g.ellipse(mx,my,rx,ry,0,0,TAU);
  g.clip('evenodd');                             // everything EXCEPT the clearing
  g.fillStyle='#070d09'; g.fillRect(0,-4-PAD_TOP,VW,skyB+12+PAD_TOP);
  /* clumped leaf masses give the ceiling depth — no gaps, just darker/greener knots */
  for(let i=0;i<64;i++){
    const cx=sRnd(i*7+1)*VW, cy=sRnd(i*7+2)*(skyB+PAD_TOP)-PAD_TOP;
    const r=12+sRnd(i*7+3)*26;
    g.fillStyle=i%3===0?'#0a130c':i%3===1?'#060b08':'#081009';
    g.beginPath(); g.arc(cx,cy,r,0,TAU); g.fill();
    for(let k=0;k<4;k++){ const a=sRnd(i*11+k)*TAU;      // pixel leaf-clumps on each rim
      g.fillRect(cx+Math.cos(a)*r-3,cy+Math.sin(a)*r-3,6,6); }
  }

  /* ragged bottom edge: hanging clumps reaching down for the treeline */
  for(let x=0;x<VW;x+=14){

  }

     irregular, each one anchored in the canopy below (nothing floats) */
  for(let i=0;i<5;i++){
    const fx=mx+(sRnd(i*23+3)-0.5)*rx*1.44;
    const q=Math.sqrt(Math.max(0,1-(fx-mx)*(fx-mx)/(rx*rx)));
    const baseY=my+ry*q;                              // the rim's y at this x (bottom half)
    const h=10+sRnd(i*31+5)*18, w0=12+sRnd(i*7+1)*7;
    for(let k=0;k<3;k++){                             // stacked, narrowing upward
      const s=w0*(1-k*0.28);

    }
  }

  for(let i=0;i<26;i++){
    const ang=(i/26+(sRnd(i*13+2)-0.5)*0.03)*TAU;
    const bx=mx+Math.cos(ang)*rx*(0.99+(sRnd(i*7+5)-0.5)*0.05);
    const by=my+Math.sin(ang)*ry*(0.99+(sRnd(i*11+3)-0.5)*0.05);
    const s=4+sRnd(i*11+4)*7;

/* huge forest trees with barked, mossy trunks and layered leaf masses —

function drawTree(x,y,s,v){
  g.save(); g.translate(x,y); g.scale(s,s);
  const R=k=>sRnd(v*997.3+k*17.77);                  // deterministic per-tree jitter
  const vr=(v*4|0)%4;                                // FOUR distinct silhouettes
  const dark=v>0.5?'#101f14':'#0c1a10', mid=v>0.5?'#16281a':'#122215', hi='#1d3320';
  const bark='#241a10', barkL='#2f2315', barkD='#191108', moss='#31502e', mossL='#3e6338';
  const lean=(R(1)-0.5)*16;                          // every tree leans its own way
  /* one leaf mass: chunky offset rects + dithered rim (never centered) */
  const blob=(cx,cy,w,h,c)=>{
    g.fillStyle=c;

    g.fillRect(cx-w/2+w*(0.1+R(cx+cy)*0.3),cy-h/2-h*0.42,w*0.66,h*0.55);
    for(let k=0;k<w-8;k+=9) g.fillRect(cx-w/2+k,cy+h/2-3+((k/9|0)%2)*5,6,6);
    g.fillStyle=hi; g.fillRect(cx-w/2+4+R(cx)*w*0.3,cy-h/2-2,w*0.16,4);
  };
  const barkStreaks=(tx,tw,ty,th)=>{                 // uneven bark: streaks at jittered x
    g.fillStyle=barkL; g.fillRect(tx+tw*0.12,ty,tw*0.2,th);
    g.fillStyle=barkD; g.fillRect(tx+tw*(0.45+R(ty)*0.2),ty+th*0.06,tw*0.14,th*0.92);
    g.fillStyle=moss;                                // moss clumps hug one side only
    const mSide=R(ty+3)<0.5?tx-2:tx+tw-4;
    g.fillRect(mSide,ty+th*0.55,6,12); g.fillRect(mSide+(R(ty+5)-0.5)*6,ty+th*0.3,5,8);
    g.fillStyle=mossL; g.fillRect(mSide+1,ty+th*0.57,3,5);
  };
  if(vr===0){          /* --- tall sentinel, high crown, one long bare limb --- */
    g.fillStyle=bark;
    g.fillRect(-14,-104,28,108);                     // lower trunk — a true bole
    g.fillRect(-11+lean*0.5,-178,21,80);             // upper trunk shifts with the lean
    barkStreaks(-14,28,-104,108);
    g.fillRect(-22,-8,10,12); g.fillRect(12,-11,12,15);  // uneven root flare
    const limbD=R(2)<0.5?-1:1;                       // a single bare limb, one side only
    g.fillRect(limbD*8,-144,limbD*42,9); blob(limbD*54+lean*0.4,-152,42,24,mid);
    blob(lean*0.6-8,-196,102+R(3)*22,50,dark);
    blob(lean*0.8+16,-238,78,44,mid);
    blob(lean-4,-270,52,32,dark);
  } else if(vr===1){   /* --- broad squat crown, buttressed base --- */
    g.fillStyle=bark; g.fillRect(-19,-90,38,94);
    barkStreaks(-19,38,-90,94);
    g.fillStyle=bark; g.fillRect(-33,-16,16,22); g.fillRect(18,-10,20,15); // buttress roots
    g.fillStyle=barkD; g.fillRect(-29,-9,8,12);
    blob(-18,-112,134+R(4)*24,54,dark);
    blob(30,-142,100,46,mid);
    blob(-2+lean*0.5,-128,80,36,dark);
  } else if(vr===2){   /* --- crooked, kinked trunk, crown thrown to one side --- */
    const kink=R(5)<0.5?-12:12;
    g.fillStyle=bark;
    g.fillRect(-12,-64,24,68);
    g.fillRect(-12+kink,-134,22,74);                 // trunk jinks halfway up
    g.fillRect(Math.min(-12,-12+kink),-68,Math.abs(kink)+22,12); // the elbow
    barkStreaks(-12+kink,22,-134,74);
    g.fillStyle=barkD; g.fillRect(-kink*0.8,-100,13,6); // dead stub on the far side
    blob(kink*2.2-6,-162,104,48,dark);               // crown leans hard past the kink
    blob(kink*2.8+12,-198,70,36,mid);
    blob(kink*1.2-20,-144,50,26,mid);

    g.fillStyle=bark;

    g.fillRect(-20,-110,16,82); g.fillRect(7,-92,15,66); // diverging trunks

function drawForestAtmosphere(){

  const fog=g.createLinearGradient(0,HORIZON_Y-30,0,HORIZON_Y+80);
  fog.addColorStop(0,'rgba(90,105,150,0)'); fog.addColorStop(.5,'rgba(90,105,150,0.32)');
  fog.addColorStop(1,'rgba(90,105,150,0)');
  g.fillStyle=fog; g.fillRect(0,HORIZON_Y-30,VW,110);
}
function drawVignette(){
  const v=g.createRadialGradient(VW/2,VH/2,VH*0.32,VW/2,VH/2,VH*0.72);
  v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(1,'rgba(4,6,14,0.55)');

  g.globalCompositeOperation='source-over'; g.globalAlpha=1;

/* ============================== 9. ENTITIES & SPAWNER ============================== */
let obstacles=[], pickups=[], trees=[], projectiles=[], hazards=[];
let nextSpawnAt=0, nextTreeAt=0, nextPondAt=0;   // nextPondAt paces the swamp's ground ponds

class ObstacleDefinition{
  constructor(id,data){ this.id=id; Object.assign(this,data); Object.freeze(this); }
}
const OBSTACLE_TYPES=new DefinitionRegistry('obstacle');
OBSTACLE_TYPES.register(new ObstacleDefinition('root',{
  cullZ:-10.4,solid:true,frontLayer:true,motherTree:true,
  draw:(o,xl,xr,y,S,lanes,p)=>drawRoot(o,y,p,S)
}));
OBSTACLE_TYPES.register(new ObstacleDefinition('pond',{
  cullZ:-8,solid:true,forgiveArtifact:'boots',
  draw:(o,xl,xr,y,S,lanes)=>drawPond(o,xl,xr,y,S,lanes,(proj(Math.min(o.z,CFG.Z_FAR)-1.05).y-proj(Math.min(o.z,CFG.Z_FAR)+1.05).y)/2)
}));
OBSTACLE_TYPES.register(new ObstacleDefinition('boulder',{
  cullZ:-8,solid:true,draw:(o,xl,xr,y,S,lanes)=>drawBoulder(o,xl,xr,y,S,lanes)
}));
OBSTACLE_TYPES.register(new ObstacleDefinition('minibossGate',{
  cullZ:-8,solid:false,encounterGate:true,draw:null
}));

/* One compact entity points at one immutable type definition. New obstacle art
   registers behavior once; collision, culling and render routing need no switch. */
class ObstacleEntity{
  constructor(kind,z,req=null,side=null){
    this.type=OBSTACLE_TYPES.get(kind); this.kind=kind; this.z=z; this.req=req; this.side=side;
    this.lanes=[];
    if(req) for(let lane=0;lane<3;lane++) if(req[lane]) this.lanes.push(lane);
    this.seed=(Math.random()*999)|0; this.resolved=false;
  }
}
function cullBehind(items,minZ){
  let write=0;
  for(let read=0;read<items.length;read++) if(items[read].z>minZ) items[write++]=items[read];
  items.length=write;
}
function cullObstacles(){
  let write=0;
  for(let read=0;read<obstacles.length;read++){
    const o=obstacles[read]; if(o.z>o.type.cullZ) obstacles[write++]=o;
  }
  obstacles.length=write;
}

/* the guaranteed arsenal: fixed weapon positions rolled at loop start */
let guaranteed=[];
function buildGuaranteed(){
  guaranteed=[];
  const tier=progressionTier();
  const minibossAt=CFG.LOOP_DIST*CFG.MINIBOSS_AT;
  const place=(kind,count,from,to)=>{
    for(let i=0;i<count;i++){
      let at=CFG.LOOP_DIST*(from+(to-from)*(count===1?0.5:i/(count-1)))+rnd(-18,18);
      if(Math.abs(at-minibossAt)<32) at+=48;                   // keep the encounter runway clear
      at=clamp(at,60,CFG.LOOP_DIST-70);                        // and of the boss runway
      guaranteed.push({kind,at});
    }
  };
  /* Route density stops growing after a modest arsenal. Long runs become strong
     through focused upgrades, relic synergy, counters and the optional follower. */
  const arrowBase=Math.min(CFG.GUAR_ARROWS_MAX,CFG.GUAR_ARROWS+tier*CFG.GUAR_ARROWS_TIER);
  const lanceBase=Math.min(CFG.GUAR_LANCES_MAX,CFG.GUAR_LANCES+tier*CFG.GUAR_LANCES_TIER);
  place('arrow',arrowBase+(hasRelic('quiver')?3:0)+(hasRelic('storm')?2:0),0.05,0.92);
  place('lance',lanceBase,0.14,0.86);
  guaranteed.sort((a,b)=>a.at-b.at);
  for(let i=1;i<guaranteed.length;i++)                     // enforce breathing room between drops
    if(guaranteed[i].at-guaranteed[i-1].at<9) guaranteed[i].at=guaranteed[i-1].at+9;
}
function spawnLoopEntities(){
  /* called every frame during 'run'; spawns patterns ahead at the horizon */
  while(dist+SPAWN_FAR > nextTreeAt){                     // roadside pines born far out
    const tz=nextTreeAt-dist;
    if(nextTreeAt>CFG.LOOP_DIST+1.5){
      /* BEYOND THE LAIR the world ends in scenery: the same trees keep coming from
         the sides AND from the center — a dense wall of woods (or drowned grove,
         or basalt forest) in the exact same perspective as everything else */
      const side=Math.random()<.5?-1:1;
      trees.push({z:tz, off:side*rnd(0.15,3.8), v:Math.random()});
      nextTreeAt+=rnd(0.9,1.7);
      continue;
    }
    let side=Math.random()<.5?-1:1, off=rnd(2.6,3.8);
    /* a root's mother tree claims its own ground — plant BESIDE it (flip sides, or
       step deeper into the treeline), but never leave a gap in the woods */
    const rootAt=s=>obstacles.some(o=>o.type.motherTree&&Math.abs(o.z-tz)<2.6&&(o.side==='L'?-1:1)===s);
    if(rootAt(side)){ if(!rootAt(-side)) side=-side; else off=rnd(3.6,4.4); }
    trees.push({z:tz, off:side*off, v:Math.random()});
    /* a SECOND, sparser line of trees far out on each flank — background texture
       for the emptier biomes. Same projection as every tree (no distortion), and
       they slide off-screen while still mid-distance, so they come and go cheaply */
    if(Math.random()<0.7)
      trees.push({z:tz+rnd(0.5,1.6), off:(Math.random()<.5?-1:1)*rnd(4.6,6.6), v:Math.random()});
    nextTreeAt+=rnd(1.7,3.4);
  }
  const stageEnd=CFG.LOOP_DIST, minibossAtDist=stageEnd*CFG.MINIBOSS_AT;
  while(dist+SPAWN_FAR > nextSpawnAt && nextSpawnAt < CFG.LOOP_DIST-30){
    const worldPos=nextSpawnAt; nextSpawnAt+=CFG.SPAWN_GAP;   // the runway before the cave stays clean
    if(worldPos>stageEnd-40) continue;                    // clear runway before the boss
    if(Math.abs(worldPos-minibossAtDist)<26) continue;    // clear runway around the miniboss
    spawnPattern(worldPos-dist);
  }
  /* guaranteed weapons: drop each one into a lane free of obstacles */
  while(guaranteed.length && dist+CFG.Z_FAR-2 > guaranteed[0].at){
    const gw=guaranteed[0], z=gw.at-dist;
    const free=[0,1,2].filter(l=>!obstacles.some(o=>Math.abs(o.z-z)<4.5 && occupiesLane(o,l))
      && !pickups.some(c=>Math.abs(c.z-z)<4.5 && c.lane===l));
    if(!free.length){ gw.at+=6; break; }                  // blocked → try a little further ahead
    pickups.push({kind:gw.kind,lane:pick(free),z});
    guaranteed.shift();
  }
  /* the active stage miniboss (spawned once per loop) */
  if(!minibossSpawned && dist+CFG.Z_FAR > minibossAtDist){
    minibossSpawned=true;
    const gate=new ObstacleEntity('minibossGate',minibossAtDist-dist);
    gate.lane=(Math.random()*3)|0; gate.t=0; obstacles.push(gate);
    const def=activeMinibossDefinition();
    floater(VW/2,150,def.arrivalLine,'#aeb2c2',16); playEncounterSound(def);
  }
}
/* obstacle model: every obstacle carries per-lane requirements —
     req[lane] = 'jump' | 'duck' | null(safe)
   ROOT    — a rogue tree root bursting from the L or R treeline:
             1 lane: head-height over the outer lane (DUCK)
             2 lanes: outer DUCK + it slumps to the ground on middle (JUMP)
             3 lanes (rare): outer DUCK, the other two JUMP
   POND    — still water: always JUMP. The only type allowed alone on center.
             Blends left/right/circular; rarely 2 lanes, very rarely all 3.
   BOULDER — a low rectangular slab grown into the forest floor: JUMP.
             Never alone on center; rarely 2 lanes, very rarely all 3.       */
function spawnPattern(z){
  const r=Math.random(); let acc=0;
  /* pickups never spawn on top of one another: prefer a clear lane, else skip */
  const clear=l=>!pickups.some(c=>Math.abs(c.z-z)<4.5&&c.lane===l);
  let lane=(Math.random()*3)|0;
  if(!clear(lane)){ const alt=[0,1,2].filter(clear); if(!alt.length) return; lane=pick(alt); }
  if((acc+=CFG.P_OBSTACLE)>r){ spawnObstacle(z); }
  else if((acc+=CFG.P_COINS)>r){ pickups.push({kind:'coin',lane,z}); }        // one big coin at a time
  else if((acc+=CFG.P_ARROW)>r){ pickups.push({kind:'arrow',lane,z}); }       // rare bonus arrow, single
  else if((acc+=CFG.P_LANCE)>r){ pickups.push({kind:'lance',lane,z}); }
  else if((acc+=CFG.P_MIXED)>r){
    const used=spawnObstacle(z);                          // lanes the obstacle actually occupies
    const free=[0,1,2].filter(l=>!used.includes(l)&&clear(l));
    if(free.length) pickups.push({kind:'coin',lane:pick(free),z});
  } /* else: breathing room — nothing */
}
function occupiesLane(o,l){ return o.type.solid&&!!(o.req&&o.req[l]); }
let lastObsFull=false;                        // fairness: never two full-cover obstacles in a row
function spawnObstacle(z){
  const pickupNear=l=>pickups.some(c=>Math.abs(c.z-z)<4.5&&c.lane===l);
  const side=Math.random()<.5?'L':'R', out=side==='L'?0:2, inn=side==='L'?2:0;
  let sizeRoll=Math.random(); if(lastObsFull) sizeRoll*=0.85;   // full-cover can't repeat
  const tRoll=Math.random();
  let kind, req=[null,null,null], variant=side;
  if(tRoll<0.40){                             /* --- ROOT --- */
    kind='root';
    req[out]='duck';                          // head-height arm over the outer lane
    if(sizeRoll>=0.55) req[1]='jump';         // slumps to the ground across the middle
    if(sizeRoll>=0.90&&!lastObsFull) req[inn]='jump';   // rare: sprawls across all three
  } else if(tRoll<0.74){                      /* --- POND --- */
    kind='pond';
    if(sizeRoll<0.62){ const l=(Math.random()*3)|0; req[l]='jump'; variant=l===0?'L':l===2?'R':'M'; }
    else if(sizeRoll<0.92||lastObsFull){ req[out]='jump'; req[1]='jump'; }
    else { req=['jump','jump','jump']; }
  } else {                                    /* --- BOULDER --- */
    kind='boulder';
    if(sizeRoll<0.62){ req[out]='jump'; }     // single boulder: never alone on center
    else if(sizeRoll<0.92||lastObsFull){ req[out]='jump'; req[1]='jump'; }
    else { req=['jump','jump','jump']; }
  }
  /* keep pickups reachable: uncover any lane holding a pickup (never strand one inside) */
  for(let l=0;l<3;l++) if(req[l]&&pickupNear(l)) req[l]=null;
  if(!req[0]&&!req[1]&&!req[2]) return [];    // everything conflicted — skip this one
  lastObsFull=!!(req[0]&&req[1]&&req[2]);
  const ob=new ObstacleEntity(kind,z,req,variant);
  if(ob.type.motherTree){
    ob.treeV=Math.random();                   // the mother tree: a random sprite of this biome
    const ss=side==='L'?-1:1;                 // clear its standing room — never two trees in one
    trees=trees.filter(t=>!(Math.abs(t.z-z)<2.6&&Math.sign(t.off)===ss&&Math.abs(t.off)<3.5));
  }
  obstacles.push(ob);
  return ob.lanes;
}

/* ============================== PLAYER ============================== */
const player={
  lane:1, x:1,                 // logical lane + eased visual lane position
  jumpT:-1, duckT:-1,          // -1 = inactive, else 0..duration
  gallop:0, alive:true,
  lastLaneChange:-9, laneFrom:1, lastJump:-9, lastDuck:-9,
  attackAnim:0, counterAnim:0, invuln:0,
};
function playerAction(a){
  if(!player.alive) return;
  if(a==='left'&&player.lane>0){ player.laneFrom=player.lane; player.lane--; player.lastLaneChange=perfNow; SFX.swipe(); }
  else if(a==='right'&&player.lane<2){ player.laneFrom=player.lane; player.lane++; player.lastLaneChange=perfNow; SFX.swipe(); }
  else if(a==='up'&&player.jumpT<0){ player.jumpT=0; player.duckT=-1; player.lastJump=perfNow; SFX.jump();
    burst(laneX(player.x,1),PLAYER_Y+8,6,['#8a744f','#5c4a30'],90,240,3,.4);
    if(playerChar.monkey)                          // the monkey's slight kick-off toot
      burst(laneX(player.x,1)+6,PLAYER_Y-2,4,['#b8c49a','#cdd8ac'],38,-14,2.4,.45); }
  else if(a==='down'){
    if(player.jumpT>=0){ player.jumpT=Math.max(player.jumpT,jumpDur()*0.82); } // fast-fall
    else { player.duckT=0; player.lastDuck=perfNow; SFX.duck(); }   // duck — or refresh mid-duck
  }
}
function jumpHeight(){ return player.jumpT<0?0:Math.sin(Math.PI*clamp(player.jumpT/jumpDur(),0,1))*CFG.JUMP_H; }
function isAirborne(){ return jumpHeight()>CFG.JUMP_SAFE_H; }
function isDucking(){ return player.duckT>=0; }
function updatePlayer(dt){
  player.x+=(player.lane-player.x)*Math.min(1,CFG.LANE_EASE*dt);
  const resting=mode==='relic'||mode==='shop';
  const inFight=(mode==='boss'||mode==='miniboss'||mode==='bossintro');
  player.gallop=resting?0:(player.gallop+dt*(inFight?0.55:speed()/9))%1; // reward rooms are still
  if(player.jumpT>=0){ player.jumpT+=dt; if(player.jumpT>jumpDur()){ player.jumpT=-1;
    burst(laneX(player.x,1),PLAYER_Y+8,8,['#8a744f','#5c4a30'],110,260,3,.4); } }
  if(player.duckT>=0){ player.duckT+=dt; if(player.duckT>CFG.DUCK_TIME) player.duckT=-1; }
  player.attackAnim=Math.max(0,player.attackAnim-dt*2.4);
  player.counterAnim=Math.max(0,player.counterAnim-dt*1.6);
  player.invuln=Math.max(0,player.invuln-dt);
  updateAllyTrail();
  /* galloping dust */
  if(!resting&&Math.random()<dt*14) burst(laneX(player.x,1)+rnd(-12,12),PLAYER_Y+10,1,['#6a5a40'],40,60,3,.5);
}
function drawPlayer(){
  const lean=clamp((player.lane-player.x)*1.6,-1,1);
  const duck=player.duckT>=0?Math.sin(Math.PI*clamp(player.duckT/CFG.DUCK_TIME,0,1)):0;
  const y=PLAYER_Y-jumpHeight();
  if(player.invuln>0 && (perfNow*14|0)%2===0) g.globalAlpha=0.45;   // shield i-frames blink
  drawRider(laneX(player.x,1),y,1.02,{
    gallop:player.gallop, lean, duck,
    air:player.jumpT>=0?clamp(player.jumpT/jumpDur(),0,1):0,
    feather:playerChar.feather, horse:playerChar.horse, chubby:playerChar.chubby,
    monkey:playerChar.monkey, caveman:playerChar.caveman,
    attack:player.attackAnim, counter:player.counterAnim,
  });
  g.globalAlpha=1;
  /* shadow shrinks when airborne */
  g.globalAlpha=0.3*(1-jumpHeight()/CFG.JUMP_H*.7); g.fillStyle='#000';
  g.beginPath(); g.ellipse(laneX(player.x,1),PLAYER_Y+12,23,6,0,0,TAU); g.fill(); g.globalAlpha=1;
}

/* ============================== collisions (run mode) ============================== */
function updateRunCollisions(){
  const REASON=BIO().reasons;
  const crossed=(e,z)=>(e.prevZ===undefined?e.z:e.prevZ)>=z&&e.z<z;
  for(const o of obstacles){
    if(o.resolved||o.type.encounterGate) continue;
    const crossedHit=crossed(o,.45);
    if((o.z<1.1&&o.z>-1.2)||crossedHit){
      const need=o.req[Math.round(player.x)];      // this lane's demand: 'jump' | 'duck' | null
      if(need){
        const hit = need==='jump' ? !isAirborne()
                                  : !(isDucking()||(hasRelic('greaves')&&isAirborne()));
        if(hit&&(o.z<0.45||crossedHit)){ o.resolved=true;
          if(o.type.forgiveArtifact&&hasRelic(o.type.forgiveArtifact)){ // registered obstacle immunity
            floater(laneX(player.x,1),PLAYER_Y-70,'MARSH BOOTS!','#c0f79a',16);
            burst(laneX(player.x,1),PLAYER_Y+6,10,['#8fae9a','#39423a'],140,80,3,.5); SFX.duck(); }
          else if(hasRelic('oak')&&!oakUsed){                      // OAKEN CHARM: one crash forgiven per loop
            oakUsed=true; floater(laneX(player.x,1),PLAYER_Y-70,'OAKEN CHARM SHATTERS THE BLOW!','#ffe37a',16);
            burst(laneX(player.x,1),PLAYER_Y-30,14,['#c9a86a','#ffe37a'],180,100,3,.6); SFX.thud(); shake(3,.15); }
          else damagePlayer(REASON[o.kind]); }
        else if(!hit){ o.resolved=true; }
      } else if(o.z<0.2||crossed(o,.2)) o.resolved=true;
    }
  }
  for(let i=pickups.length-1;i>=0;i--){ const c=pickups[i];
    if(((c.z<0.9&&c.z>-0.6)||crossed(c,.15))&&Math.round(player.x)===c.lane){
      collect(c); pickups.splice(i,1);
    }
  }
}
function collect(c){
  const p=proj(Math.max(c.z,0)), x=laneX(c.lane,p.t);
  if(c.kind==='coin'){ const v=CFG.COIN_VALUE+(hasRelic('clover')?1:0); gold+=v; SFX.coin();
    burst(x,p.y-20,7,['#ffd23a','#fff2b0'],120,60,3,.5); floater(x,p.y-34,'+'+v,'#ffd23a',15); }
  else if(c.kind==='arrow'){ arrows++; SFX.arrow();
    burst(x,p.y-20,9,['#c0f79a','#e8ffd0'],140,40,3,.6); floater(x,p.y-40,'ARROW +'+dmgOf('arrow'),'#c0f79a',16); }
  else { lances++; SFX.lance();
    burst(x,p.y-24,14,['#9ecbff','#e0efff'],170,40,4,.7); floater(x,p.y-44,'LANCE +'+dmgOf('lance'),'#9ecbff',18); }
}
/* damage formulas: base + smith upgrades (bought with gold; no automatic scaling anymore) */
function dmgOf(kind){
  return kind==='lance' ? CFG.LANCE_DMG+upg.lance*CFG.UPG_LANCE_INC+(hasRelic('flask')?Math.round(8*relicPower()):0)
                        : CFG.ARROW_DMG+upg.arrow*CFG.UPG_ARROW_INC+(hasRelic('whet')?Math.round(3*relicPower()):0);
}
function counterDmg(){ return CFG.COUNTER_DMG+upg.counter*CFG.UPG_COUNTER_INC+(hasRelic('drum')?Math.round(3*relicPower()):0); }

/* ============================== damage / death / shield ============================== */
let debugRun=false, godMode=false, debugBossStart=false, debugMiniStart=false,
    debugBossMoves=false, debugMiniMoves=false, debugLoop=1, debugSel={};
function damagePlayer(reason,unstoppable=false){
  if(godMode){ flash('#9ecbff',.15); floater(laneX(player.x,1),PLAYER_Y-90,'GOD MODE','#9ecbff',14);
    hazards=[]; return; }
  chainStacks=0;                             // pain breaks the chain
  if(!unstoppable&&player.invuln>0) return;
  if(!unstoppable&&consumeShield()){         // execution finishers bypass shields
    player.invuln=1.2; SFX.shield(); flash('#9ecbff',.5); shake(8,.3); stopTime(.09);
    burst(laneX(player.x,1),PLAYER_Y-40,22,['#9ecbff','#ffffff'],220,120,4,.8);
    floater(laneX(player.x,1),PLAYER_Y-90,'SHIELD BROKE!','#9ecbff',20);
    return;
  }
  player.alive=false; deathReason=reason;
  SFX.hit(); SFX.dead(); flash('#ff4d3a',.8); shake(14,.5); stopTime(.22);
  burst(laneX(player.x,1),PLAYER_Y-40,30,['#ff4d3a','#8f9bb0','#3f7bff'],260,240,4,1);
  setMode('dying');
}

/* ============================== 10. FIGHTS (shared telegraph/dodge framework) ==============================
   A "hazard" = {lanes:[..], height:'mid'|'low'|'high'|'all', born, impact, done}
     mid  → occupies those lanes at every height: survive by NOT being in the lane
     low  → ground strike in those lanes: survive by JUMPING
     high → head-height strike: survive by DUCKING
     all  → undodgeable (boss frenzy)                                                    */
/* HESITATION (FromSoftware-style): pull quickly like drawing a heavy bow, then
   keep creeping deeper into the pose with a strained shake before release. It is
   never a frozen hold and never damaging: the physical hitbox begins only when
   the state changes from telegraph to strike. Future "hesitation" work preserves
   this readable pull / slow creep / tremble / release rhythm. */
function hesitationPose(t){
  t=clamp(t,0,1);
  if(t<.40) return easeOut(t/.40)*.74;
  const q=(t-.40)/.60;
  const creep=.74+easeInOut(q)*.26;
  const strain=Math.sin(q*Math.PI)*(.006+q*.012)*Math.sin(t*76);
  return clamp(creep+strain,0,1.02);
}
/* Universal bite clock: fully open through the approach, then a fast visible
   close over the final 16%. t=1 is the shared physical hazard-impact frame. */
function biteJawAt(t){ return 1-easeIn(clamp((t-.84)/.16,0,1))*.92; }
function spawnHazard(lanes,height,travel,src){
  hazards.push({lanes,height,born:perfNow,impact:perfNow+travel,done:false,src});
}
/* Traveling limbs enter from beyond the road rather than materialising on an
   outer lane. One continuous eased curve carries them across the entire attack:
   never insert a second ease at lane zero, because that creates a visible brake. */
const SWEEP_ENTRY_PAD=.64;
const BOSS_SOURCE='boss',MINIBOSS_SOURCE='miniboss';
const isMinibossSource=src=>src===MINIBOSS_SOURCE;
function combatHitText(src){
  return isMinibossSource(src)?activeMinibossDefinition().hitText:activeBossDefinition().hitText;
}
function sweepEntryLane(sweep){
  if(sweep.entryFrom!==undefined) return sweep.entryFrom;
  return sweep.from===0?-SWEEP_ENTRY_PAD:sweep.from===2?2+SWEEP_ENTRY_PAD:sweep.from;
}
function sweepLaneAt(sweep,k){
  k=clamp(k,0,1);
  const entry=sweep.entryFrom!==undefined?sweep.entryFrom:sweepEntryLane(sweep);
  return lerp(entry,sweep.to,easeInOut(k));
}
function spawnSweepHazard(sweep,height,travel,src,group=null){
  hazards.push({kind:'sweep',lanes:[0,1,2],height,born:perfNow,impact:perfNow+travel,
    duration:travel,from:sweepEntryLane(sweep),authoredFrom:sweep.from,to:sweep.to,
    entryFrom:sweepEntryLane(sweep),activeFrom:sweep.activeFrom===undefined?.24:sweep.activeFrom,
    hitHalf:sweep.hitHalf||34,perfectHalf:sweep.perfectHalf||70,

  let hit=false, perfect=false;
  const W=perfectWin()+(isMinibossSource(h.src)?minibossPerfectBonus():0); // species may widen its physical counter timing

    return;                                   // classify real contact without ending the preview

  if(hit){ damagePlayer(combatHitText(h.src)); return; }
  if(perfect){
    floater(laneX(player.x,1),PLAYER_Y-jumpHeight()-96,'PERFECT!','#ffe37a',20);
    burst(laneX(player.x,1),PLAYER_Y-jumpHeight()-50,10,['#ffe37a','#fff'],160,80,3,.6);

class EncounterActor{
  constructor(spec={}){
    /* Safe shared defaults matter as more species are added: an intro actor must
       be renderable before it has selected its first attack. */
    Object.assign(this,{state:'idle',stateT:0,hurtT:0,lastIds:[],hazardLanes:[]},spec);
  }
  enter(state){ this.state=state; this.stateT=0; }
  tick(dt){ this.stateT+=dt; this.hurtT=Math.max(0,(this.hurtT||0)-dt); }
  currentMove(){ return !this.attack?null:this.attack.steps?this.attack.steps[this.sequenceIndex||0]:this.attack; }
  cueMove(){
    const move=this.currentMove(); if(!move) return null;
    this.hazardLanes=typeof move.lanes==='function'?move.lanes():move.lanes;
    this.xTarget=move.sweep&&move.bodySweep?sweepBodyLane(move,0):
      move.x!==undefined?move.x:(move.height==='mid'?this.hazardLanes[0]:1);
    this.teleTime=attackTeleTime(move,this.hazardLanes); return move;
  }
  choose(attacks){
    let total=0, fallback=null;
    for(let i=0;i<attacks.length;i++){
      const a=attacks[i]; let repeats=0;
      for(let j=0;j<this.lastIds.length;j++) if(this.lastIds[j]===a.id) repeats++;
      if(repeats<2){ total+=a.w; if(!fallback) fallback=a; }
    }
    let roll=Math.random()*total, selected=fallback||attacks[0];
    for(let i=0;i<attacks.length;i++){
      const a=attacks[i]; let repeats=0;
      for(let j=0;j<this.lastIds.length;j++) if(this.lastIds[j]===a.id) repeats++;
      if(repeats<2 && (roll-=a.w)<=0){ selected=a; break; }
    }
    this.lastIds.push(selected.id); if(this.lastIds.length>3)this.lastIds.shift();
    return selected;
  }
}

    const s=this.specs[key]; if(!s) throw new Error('Unknown '+this.label+' mechanic: '+key);
    const out=Object.assign({},s,{lanes:typeof s.lanes==='function'?s.lanes:s.lanes.slice()});
    if(s.sweep) out.sweep=Object.assign({},s.sweep);
    if(s.sweeps) out.sweeps=s.sweeps.map(v=>Object.assign({},v));

  }
  infer(step){
    if(step.mechanic&&this.specs[step.mechanic]) return step.mechanic;
    if(typeof step.lanes==='function'&&this.specs.targetLane) return 'targetLane';
    if(step.sweeps||(step.strike||'').includes('pincer')) return 'squeeze';
    if(step.sweep){
      const rtl=(step.strike||'').endsWith('_rtl')||step.sweep.from===2;
      return (step.height==='high'?'high':'low')+(rtl?'RTL':'LTR');
    }
    const key=(step.lanes||[]).join(',');
    if(key==='0') return 'singleLeft'; if(key==='1') return 'singleCenter'; if(key==='2') return 'singleRight';
    if(key==='0,1') return 'pairLeft'; if(key==='1,2') return 'pairRight'; if(key==='0,2') return 'outerPair';
    if(key==='0,1,2') return step.height==='high'?'fullHigh':'fullLow';
    throw new Error(this.label+' step has no universal hit shape: '+(step.strike||key));
  }
  normalizeStep(step,preserveTempo=false){
    const key=this.infer(step),spec=this.cloneSpec(key),tele=step.tele,travel=step.travel;
    step.mechanic=key; step.lanes=spec.lanes; step.height=spec.height;
    if(spec.x!==undefined) step.x=spec.x; else delete step.x;
    delete step.sweep; delete step.sweeps; delete step.centerJumpCue;
    if(spec.sweep) step.sweep=spec.sweep;
    if(spec.sweeps) step.sweeps=spec.sweeps;
    if(spec.centerJumpCue) step.centerJumpCue=true;
    step.tele=preserveTempo&&tele!==undefined?tele:spec.tele;
    step.travel=preserveTempo&&travel!==undefined?travel:spec.travel;
    return key;
  }
  normalizeSet(attacks,preserveAllTempo=false){
    for(const attack of attacks){
      if(!attack.steps) continue;
      for(const step of attack.steps) this.normalizeStep(step,preserveAllTempo||!!attack.comboType);

    }

  }

    const step=this.cloneSpec(key); delete step.rec;
    Object.assign(step,animation,visual,{mechanic:key});
    if(pace.tele!==undefined) step.tele=pace.tele;
    if(pace.travel!==undefined) step.travel=pace.travel;
    return step;
  }
  attack(id,key,animation,meta={},visual={}){
    const attack=Object.assign({id,w:10,minTier:1},meta);
    attack.steps=[this.step(key,animation,visual)];
    if(attack.rec===undefined) attack.rec=this.specs[key].rec;
    return attack;
  }
}

  const out=actor?(actor._contactXs||(actor._contactXs=[])):[];

  const contactState=actor&&(actor.state==='tele'||actor.state==='strike'||actor.state==='recover'||actor.state==='comboRecover');
  if(actor&&move&&move.sweeps&&contactState){
    const k=actor.state==='recover'||actor.state==='comboRecover'?1:actor.state==='strike'?clamp(actor.stateT/move.travel,0,1):0;
    for(const sweep of move.sweeps) out.push(laneX(sweepLaneAt(sweep,k),1));
    return out;
  }
  if(actor&&move&&move.sweep&&contactState){
    const k=actor.state==='recover'||actor.state==='comboRecover'?1:actor.state==='strike'?clamp(actor.stateT/move.travel,0,1):0;
    out.push(laneX(sweepLaneAt(move.sweep,k),1));

  const startFactor=move.bodySweepStartFactor===undefined?endFactor:move.bodySweepStartFactor;

  return pool===2?Math.round(base*1.07+8):base;
}
function bossAttackCount(){ return dodgeAttackCount()+(stagePoolRank()===2?1:0); }
function packLeapDmg(){
  const base=CFG.PACK_LEAP_DMG+upg.fang*CFG.UPG_FANG_INC;
  /* the follower's fangs ride the CHAIN like your weapons do, and the horn empowers them */
  return Math.round(base*(hasRelic('horn')?1.5:1)*(1+chainBonus()*chainStacks));
}

function activeBossDefinition(){ return ENCOUNTERS.get(selectedEncounterId('boss')); }
function activeBossAttackSet(){ return activeBossDefinition().attacks; }
/* Hydra/turtle sprites use a smaller 32px base silhouette than the 44px bear.
   Species scale compensates for source-art dimensions so all three occupy the
   same intimidating screen footprint without altering combat speed. */
function bossSpeciesScale(){ return activeBossDefinition().scale; }
function randomComboLength(cycle,movesLeft){
  /* Length has no fixed ceiling: every four cycles widen the possible chain.
     The current dodge-phase budget is its natural limit, so every generated hit
     remains a real boss move rather than free damage hidden inside one turn. */
  const growth=Math.max(0,Math.floor((cycle-CFG.RANDOM_COMBO_TIER)/4));
  const min=3+Math.floor(growth/3), max=min+2+growth;
  return Math.min(movesLeft,min+Math.floor(Math.random()*(max-min+1)));
}
function evasiveWeightFactor(cycle){
  const age=Math.max(0,cycle-3), start=CFG.EVASIVE_WEIGHT_START, limit=CFG.EVASIVE_WEIGHT_LIMIT;
  return limit-(limit-start)/(1+age*CFG.EVASIVE_WEIGHT_CURVE);
}
function pairWeightFactor(cycle){
  const age=Math.max(0,cycle-2), start=CFG.PAIR_WEIGHT_START, limit=CFG.PAIR_WEIGHT_LIMIT;
  return limit-(limit-start)/(1+age*CFG.PAIR_WEIGHT_CURVE);
}
function encounterStepKind(step){
  if(step.sweeps||step.mechanic==='squeeze') return 'pinch';
  if(step.sweep) return 'slide';
  if(step.height==='low'||step.height==='high') return 'posture';
  if(Array.isArray(step.lanes)&&step.lanes.length===2) return 'pair';
  return 'hit';
}
function encounterStepWeightFactor(step,cycle){
  const kind=encounterStepKind(step);
  if(kind==='hit') return 1;
  if(kind==='pair') return cycle<2?0:pairWeightFactor(cycle);
  if(kind==='posture') return cycle<3?0:evasiveWeightFactor(cycle);
  if(kind==='slide') return cycle<4?0:evasiveWeightFactor(cycle);
  return cycle<5?0:evasiveWeightFactor(cycle)*CFG.PINCH_WEIGHT_SCALE;
}
function comboUnlockCycle(attack){
  if(!(attack.comboType||(attack.steps&&attack.steps.length>1))) return 1;
  return CFG.COMBO_UNLOCK_CYCLE+Math.max(0,(attack.comboRank||1)-1);
}
function encounterAttackWeight(attack,cycle){
  const steps=attack.steps||[]; if(!steps.length) return attack.w;
  if(cycle<comboUnlockCycle(attack)) return 0;
  let factorTotal=0;
  for(const step of steps){
    const factor=encounterStepWeightFactor(step,cycle);
    if(factor===0) return 0;                     // cycle one excludes the whole mixed combo
    factorTotal+=factor;
  }
  /* Average step rarity preserves authored combo identity without letting one
     rare mechanic make every ordinary strike in that combo equally unlikely. */
  return attack.w*factorTotal/steps.length;
}
function encounterAttackPool(attacks,cycle,weightMultiplier){
  const pool=[];
  for(const attack of attacks){
    if((attack.minTier||1)>cycle) continue;
    const weight=encounterAttackWeight(attack,cycle)*(weightMultiplier?weightMultiplier(attack):1);
    if(weight>0) pool.push(weight===attack.w?attack:Object.assign({},attack,{w:weight}));
  }
  return pool;
}
function randomComboSelectionWeight(attacks){
  let total=0,count=0;
  for(const attack of attacks) if(attack.comboType||(attack.steps&&attack.steps.length>1)){
    total+=attack.w; count++;
  }
  return (count?total/count:12)*CFG.RANDOM_COMBO_WEIGHT_SCALE;
}
function pickRandomComboSource(attacks,lastId,cycle){
  const choices=attacks.filter(a=>a.id!==lastId);
  const pool=choices.length?choices:attacks;
  let total=0; for(const a of pool) total+=encounterAttackWeight(a,cycle);
  let roll=Math.random()*total;
  for(const a of pool) if((roll-=encounterAttackWeight(a,cycle))<=0) return a;
  return pool[pool.length-1];
}
function buildRandomBossCombo(cycle,movesLeft){
  const atomic=activeBossAttackSet().filter(a=>(a.minTier||1)<=cycle&&a.steps&&a.steps.length===1&&!a.comboType&&encounterAttackWeight(a,cycle)>0);
  const length=randomComboLength(cycle,movesLeft), steps=[];
  let lastId='';
  for(let i=0;i<length;i++){
    const source=pickRandomComboSource(atomic,lastId,cycle), step=Object.assign({},source.steps[0]);
    /* The first hesitation announces the improvised string. Later tells contract
       into one flowing combo, but attackTeleTime still enforces movement, jump,
       and duck safety floors on every individual strike. */
    step.tele*=i===0?1.06:.55+Math.random()*.20;
    step.travel*=i===0?1:.92+Math.random()*.10;
    step._sourceId=source.id; steps.push(step); lastId=source.id;
  }
  return {id:'random_chain',w:1,minTier:CFG.RANDOM_COMBO_TIER,comboType:'random',rec:.94,steps};
}
function chooseBossAttack(movesLeft=boss.attacksLeft){
  const cycle=progressionTier()+1;
  const unlocked=encounterAttackPool(activeBossAttackSet(),cycle,a=>{
    if(!a.comboType) return 1;
    /* The three authored patterns remain each species' identity. Their harder
       ranks gain a mild endless-play preference without crowding out single hits. */
    const growth=Math.max(0,cycle-(a.minTier||1))*.01*(a.comboRank||1);
    return 1+growth;
  });
  if(cycle>=CFG.RANDOM_COMBO_TIER&&movesLeft>=3){
    unlocked.push({id:'random_chain',randomCombo:true,
      w:randomComboSelectionWeight(unlocked)});
  }
  const selected=boss.choose(unlocked);
  return selected.randomCombo?buildRandomBossCombo(cycle,movesLeft):selected;
}
function hurtBoss(dmg,fromCounter){
  if(!boss||boss.state==='dying'||boss.state==='finisher') return;
  /* counter damage keeps counting past 0 HP — the excess lands in overkill,
     together with the whole volley, when the fight resolves */
  boss.hp-=dmg; if(boss.phase!=='dodge') boss.dealt+=dmg;
  if(boss.hp<=0&&boss.phase==='dodge'&&!boss._beaten){ boss._beaten=true;
    floater(VW/2,300,'IT STAGGERS — KEEP THE CHAIN GOING!','#ffe37a',18); }
  if(fromCounter&&hasRelic('venom')){ boss.poisonT=8;              // VENOM VIAL: the counter envenoms
    floater(laneX(boss.x,proj(boss.z).t),proj(boss.z).y-160*proj(boss.z).s,'POISONED!','#7ade6a',15); }
  if(!fromCounter&&hasRelic('brand')){ boss.burnT=4;               // BRAND OF EMBERS: steel ignites
    if(Math.random()<0.4) floater(laneX(boss.x,proj(boss.z).t)+20,proj(boss.z).y-160*proj(boss.z).s,'BURNING!','#ff9a3a',15); }
  boss.hurtT=0.14; SFX.thud(); shake(3,.12);
  const p=proj(boss.z);
  burst(laneX(boss.x,p.t),p.y-60*p.s,12,['#ff4d3a','#ffe37a'],180,120,4,.6);
  floater(laneX(boss.x,p.t),p.y-120*p.s,'-'+dmg,fromCounter?'#ffe37a':'#fff',fromCounter?22:18);
}
/* called once the FULL volley has landed: score first, THEN the kill animation */
function resolveVolley(){
  if(boss.hp<=0){
    const overkill=Math.max(0,-boss.hp), pts=CFG.BOSS_SCORE*loop, okPts=Math.round(overkill*CFG.OVERKILL_MULT);
    bossScoreRun+=pts; overkillRun+=okPts; bossKills++;
    floater(VW/2,300,'BOSS SLAIN  +'+pts,'#ffe37a',26);
    if(okPts>0) floater(VW/2,336,'OVERKILL '+overkill+' ×'+CFG.OVERKILL_MULT+'  +'+okPts,'#ff9a3a',20);
    SFX.win(); flash('#ffe37a',.5); shake(12,.6); stopTime(.25);
    boss.state='dying'; boss.stateT=0; boss._stg=0; hazards=[];   // now the kill animation plays
  } else {
    floater(VW/2,300,'NOT ENOUGH DAMAGE...','#ff4d3a',24); SFX.roar();
    boss.state='finisher'; boss.stateT=0; boss.xTarget=1; boss._fin=false; boss._finRoar=false; boss._finStage=0; hazards=[];
  }
}
function updateBoss(dt){

    let dps=0;
    if(boss.poisonT>0){ boss.poisonT-=dt; dps+=2*relicPower(); }
    if(boss.burnT>0){ boss.burnT-=dt; dps+=3*relicPower(); }
    if(dps>0){ boss.dotAcc+=dps*dt;
      if(boss.dotAcc>=2){ const n=Math.floor(boss.dotAcc); boss.dotAcc-=n;
        boss.hp-=n; if(boss.phase!=='dodge') boss.dealt+=n;

  }
