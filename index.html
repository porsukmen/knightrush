  g.textAlign='center';
  g.strokeStyle='#c0f79a'; g.lineWidth=2+Math.sin(perfNow*5); g.strokeRect(VW/2-95,688,190,52);
  g.font='bold 19px monospace'; g.fillStyle='#c0f79a'; g.fillText('RIDE ON →',VW/2,721);
}
function drawScore(){
  g.fillStyle='rgba(5,7,12,0.82)'; g.fillRect(0,-PAD_TOP,VW,VH+PAD_TOT);
  g.textAlign='center';
  g.font='bold 34px monospace'; g.fillStyle='#ff4d3a'; g.fillText('THE RIDE ENDS',VW/2,200);
  g.font='13px monospace'; g.fillStyle='#aeb2c2'; g.fillText(deathReason,VW/2,228);
  const goldPts=gold*CFG.GOLD_SCORE_MULT;
  const survPts=Math.round(runTime)*CFG.SCORE_PER_SEC;   // time survived pays, even on a bad run
  const overk=Math.round(overkillRun);                   // overkill points (already ×2 at the kill)
  const total=survPts+bossScoreRun+overk+goldPts;
  const rows=[
    ['survived '+Math.round(runTime)+'s', survPts],
    ['bosses slain  ×'+bossKills, bossScoreRun],
    ['overkill dmg ×'+CFG.OVERKILL_MULT, overk],
    ['gold unspent '+gold+' × '+CFG.GOLD_SCORE_MULT, goldPts],
  ];
  g.font='16px monospace';
  let y=290, shown=Math.floor(modeT*3.5);      // rows tick in one by one
  rows.forEach((r,i)=>{ if(i>=shown) return;
    g.textAlign='left'; g.fillStyle='#e8e2d0'; g.fillText(r[0],80,y+i*38);
    g.textAlign='right'; g.fillStyle='#ffd23a'; g.fillText('+'+r[1],VW-80,y+i*38);
  });
  if(shown>=rows.length){
    g.strokeStyle='#e8e2d055'; g.beginPath(); g.moveTo(80,y+134); g.lineTo(VW-80,y+134); g.stroke();
    g.textAlign='left'; g.font='bold 22px monospace'; g.fillStyle='#e8e2d0'; g.fillText('TOTAL',80,y+172);
    g.textAlign='right'; g.fillStyle='#ffe37a'; g.fillText(total,VW-80,y+172);
    if(total>bestScore&&!debugRun) bestScore=total;
    if(total===bestScore&&total>0){ g.textAlign='center'; g.font='bold 15px monospace';
      g.fillStyle='#c0f79a'; g.fillText('★ NEW BEST ★',VW/2,y+204); }
    g.textAlign='center'; g.font='bold 17px monospace'; g.fillStyle='#ffe37a';
    if((perfNow*1.6|0)%2===0) g.fillText('TAP FOR MAIN MENU',VW/2,y+250);
  }
}
function drawMinibossIntro(){
  const w=wolfFight; if(!w||w.state!=='intro') return;
  letterbox(w.stateT);
  g.textAlign='center'; g.font='bold 24px monospace';
  g.fillStyle='#9ecbff'; g.fillText(BIO().miniName+' BARS YOUR PATH',VW/2,380);
  g.font='13px monospace';
  if(w.stateT>0.35){ g.fillStyle='#8b8fa0'; g.fillText(BIO().introFlavor,VW/2,406); }
  g.font='14px monospace'; g.fillStyle='#e8e2d0';
  if(w.stateT>0.7) g.fillText('counter it '+countersNeeded()+' times (perfect dodges) to TAME it',VW/2,428);
  if(w.stateT>1.05) g.fillText('a tamed beast fights beside you until the stage boss falls',VW/2,448);
  if(w.stateT>1.4) g.fillText('fall short and it flees — but one hit still kills',VW/2,468);
}

/* ============================== update per mode ============================== */
function update(dt){
  perfNow+=dt; modeT+=dt; lastDt=dt;
  updateJuice(dt);
  if(mode==='menu'||mode==='score'||mode==='relicdex'||mode==='debugcfg'||mode==='changelog'){ dist+=dt*6; return; }   // world drifts behind menus
  if(mode==='dying'){ if(modeT>1.4){ setMode('score'); } return; }

  updatePlayer(dt);
  if(GAMEPLAY_MODES.includes(mode)) runTime+=dt;          // survival score clock
  if(mode==='run'||mode==='relic'||mode==='shop'){        // relic/shop: untimed safe auto-run
    const mv=speed()*dt; dist+=mv;
    for(const o of obstacles) o.z-=mv;
    for(const c of pickups) c.z-=mv;
    for(const t of trees) t.z-=mv;
    /* roots stay alive until their TALL upper arm has fully cleared the screen —
       they slide off the bottom organically like everything else (the extended
       phone-bottom included: nothing may vanish while still visible) */
    obstacles=obstacles.filter(o=>o.z>(o.kind==='root'?-10.4:-8)); pickups=pickups.filter(c=>c.z>-7);
    trees=trees.filter(t=>t.z>-6);
    if(mode==='run'){
      spawnLoopEntities();
      updateRunCollisions();
      /* the waiting wolf: in its lane → fight; otherwise it flees */
      for(const o of obstacles){
        if(o.kind==='wolfgate'&&!o.resolved&&o.z<2.4){
          o.resolved=true;
          if(Math.round(player.x)===o.lane) startMiniboss(o.lane);
          else { o.flee=perfNow; SFX.howl();
            floater(VW/2,180,'the wolf slips into the trees...','#8b8fa0',14); }
        }
      }
      if(dist>=CFG.LOOP_DIST) startBoss();
    } else {
      /* keep spawning scenery trees so the safe ride still looks alive */
      while(dist+SPAWN_FAR > nextTreeAt){
        trees.push({z:nextTreeAt-dist, off:(Math.random()<.5?-1:1)*rnd(2.6,3.8), v:Math.random()});
        nextTreeAt+=rnd(1.7,3.4);
      }
    }
  }
  else if(mode==='bossintro'){
    /* the bear stalks out of the forest, shouldering through the treeline */
    if(boss&&boss.entering){
      const step=dt*2.1;
      boss.x+=boss.x<1?step:-step;
      if(Math.abs(boss.x-1)<=step*1.2){ boss.x=1; boss.entering=false; SFX.roar(); shake(8,.4); }
      else if(Math.random()<dt*7){                     // heavy footfalls kick up dirt
        const p=proj(boss.z);
        burst(laneX(boss.x,p.t)+rnd(-16,16),p.y+2,3,['#6a5a40','#3a2f20'],70,110,3,.5);
        if(Math.random()<0.35) shake(2,.08);
      }
    }
    if(modeT>2.6&&!(boss&&boss.entering)){ setMode('boss'); boss.state='idle'; boss.stateT=0; }
  }
  else if(mode==='boss'){ updateBoss(dt); updateProjectiles(dt); updateWolfLeap(dt); updateHazards(); }
  else if(mode==='miniboss'){ updateMiniboss(dt); updateHazards(); }
  /* during fights the run pauses, but the forest keeps drifting slowly so it feels alive */
  if(mode==='boss'||mode==='bossintro'||mode==='miniboss'){
    const mv=dt*5;
    for(const t of trees) t.z-=mv;
    for(const c of pickups) c.z-=mv;
    for(const o of obstacles) if(o.kind!=='wolfgate') o.z-=mv;
    trees=trees.filter(t=>t.z>-6); pickups=pickups.filter(c=>c.z>-5);
    if(mode==='miniboss'){                       // new trees keep marching in — the duel never empties the wood
      let far=0; for(const t of trees) far=Math.max(far,t.z);
      while(far<CFG.Z_FAR-2){ far+=rnd(1.7,3.2);
        trees.push({z:far,off:(Math.random()<.5?-1:1)*rnd(2.6,3.8),v:Math.random()}); }
    }
  }
}

/* ============================== render ============================== */
function render(){
  g.setTransform(1,0,0,1,0,0);
  g.fillStyle='#05070c'; g.fillRect(0,0,cvs.width,cvs.height);
  g.setTransform(viewScale,0,0,viewScale,viewX,viewY);
  /* the world never spills into the letterbox — wide desktop screens stay calm */
  g.save();
  g.beginPath(); g.rect(0,-PAD_TOP,VW,VH+PAD_TOT); g.clip();
  /* screen shake offset (inside the clip so shakes can't leak either) */
  if(shakeMag>0) g.translate(rnd(-shakeMag,shakeMag),rnd(-shakeMag,shakeMag));

  if(env==='cave'){ BIO().arena(lastDt); }
  else { BIO().bg(lastDt); }
  updateEffHorizon();          // obstacles/items enter under the lair when it looms
  /* depth-sorted world drawables (far → near) */
  const dr=[];
  if(env==='forest'&&mode==='run'&&CFG.LOOP_DIST-dist<SPAWN_FAR){
    const mz=CFG.LOOP_DIST-dist;
    /* the end-of-world sheet (water/lava) draws BEHIND everything, so the groves
       and columns marching in past the lair stand IN it. The lair itself renders
       from the same far distance as the trees around it. */
    if(BIO().beyondDraw) dr.push({z:9999,fn:()=>BIO().beyondDraw(mz)});
    dr.push({z:mz,fn:()=>BIO().mouthDraw(mz)});
  }
  if(env==='forest') for(const t of trees) dr.push({z:t.z,fn:()=>{
    /* ONE continuous render using the REAL tree sprite the whole way: beyond the
       draw horizon it stands on the horizon line and simply grows with the true
       1/(f+z) ratio (position converging on the vanishing point); inside it rides
       the normal projection. The two meet exactly at the horizon — no phasing,
       no stand-in silhouettes, background and foreground are the same tree. */
    worldA=clamp((SPAWN_FAR-t.z)/26,0,1);
    if(worldA<=0){ worldA=1; return; }
    /* soft horizon, same mapping as the obstacles: tempered growth (no hill-rise)
       plus a gentle drift down the last sliver below the line — a root's mother
       tree and the scenery tree beside it stay in perfect step */
    const raw=(CFG.FOCAL+CFG.Z_FAR)/(CFG.FOCAL+Math.max(t.z,CFG.Z_FAR));
    const grow=t.z>CFG.Z_FAR?0.10+raw*0.90:1;
    const p=proj(Math.min(t.z>CFG.Z_FAR?CFG.Z_FAR-6*(1-raw):t.z,CFG.Z_FAR));
    /* once PAST the knight, trees swing outward so no canopy edge can flash up
       the screen as they leave (the source of the green-streak bug) */
    const slide=1+Math.max(0,p.t-1)*0.6;
    g.globalAlpha=worldA;
    BIO().scenery(VW/2+t.off*lerp(24,150,p.t)*1.2*grow*slide,p.y+6,linS(p.t)*3.2*grow,t.v);
    worldA=1; g.globalAlpha=1;
  }});
  const frontObs=[];                     // arches the knight is riding UNDER draw over him
  /* GRIFFIN GREAVES exception: while the jump carries him over a duck-arch, the
     knight renders ON TOP of the root instead of slipping beneath it */
  const overArch=hasRelic('greaves')&&isAirborne();
  for(const o of obstacles){
    if(o.kind==='root'&&o.z<1.3&&o.z>-10.6&&!(overArch&&o.z>-2.2)){ frontObs.push(o); continue; }
    dr.push({z:o.z,fn:()=>{ const p=proj(o.z);
    if(o.kind==='wolfgate'){
      worldA=spawnFade(o.z); if(worldA<=0){worldA=1;return;} g.globalAlpha=worldA;
      const fleeT=o.flee?clamp((perfNow-o.flee)*1.4,0,1):0;
      BIO().miniDraw(laneX(o.lane,p.t),p.y,p.s*1.4,o.flee?'flee':'run',fleeT,false);
      if(!o.flee){ g.font='bold '+Math.max(10,18*p.s)+'px monospace'; g.textAlign='center';
        g.fillStyle='#ffd23a'; g.fillText('!',laneX(o.lane,p.t),p.y-70*p.s); }
      worldA=1; g.globalAlpha=1;
    } else drawObstacle(o,p); }}); }
  for(const c of pickups) dr.push({z:c.z,fn:()=>{
    if(c.z>effZFar) return;                   // still beyond the (effective) horizon
    const p=proj(c.z);
    /* items surface at the effective horizon with a long fade — and when the lair
       blocks the line, they emerge from under its foot instead of floating on it */
    g.globalAlpha=clamp((effZFar-c.z)/10,0,1);
    if(c.kind==='coin') drawCoin(laneX(c.lane,p.t),p.y-24*p.s,p.s*1.3,perfNow);
    else drawWeaponPickup(c.kind,laneX(c.lane,p.t),p.y-30*p.s,p.s*1.3,perfNow);
    g.globalAlpha=1; }});
  if(boss) dr.push({z:boss.z,fn:()=>{
    /* on the strike the beast physically hurls itself down the track (no beams) */
    let zD=boss.z;
    if(boss.state==='strike'&&boss.attack)
      zD=boss.z-Math.sin(Math.PI*clamp(boss.stateT/boss.attack.travel,0,1))*(boss.attack.lunge||3);
    const p=proj(zD);
    const anim=boss.state==='tele'?boss.attack.anim:boss.state;
    const riseK=easeOut(clamp(boss.rise,0,1)), sink=(1-riseK)*150*p.s;
    const bx2=laneX(boss.x,p.t);
    BIO().bossDraw(bx2,p.y+sink,p.s*3.3,anim,
      clamp(boss.stateT/(boss.state==='tele'?boss.attack.tele*teleMult():boss.state==='dying'?2.5:0.5),0,1),
      boss.hurtT>0);
    if(boss.rise<1){                                    // it BREACHES: rings + spray at the waterline
      const wl=p.y+4*p.s, isLava=biome==='volcano';
      for(let r=0;r<3;r++){ const ph=(boss.rise*1.6+r*0.33)%1;
        g.globalAlpha=(1-ph)*0.5; g.strokeStyle=isLava?'#ff9a3a':'#2c463a'; g.lineWidth=2;
        g.beginPath(); g.ellipse(bx2,wl,(30+ph*110)*p.s,(30+ph*110)*p.s*0.24,0,0,TAU); g.stroke(); }
      g.globalAlpha=1;
      if(Math.random()<0.55) particles.push({x:bx2+rnd(-70,70)*p.s,y:wl,vx:rnd(-40,40),vy:rnd(-190,-90),
        life:.6,maxLife:.6,size:2.6,col:isLava?(Math.random()<.5?'#ff6a2a':'#ffd23a'):'#8fae9a',grav:340});
    }
    /* status: the poison DRIPS, the burn FLICKERS */
    if(boss.poisonT>0&&boss.state!=='dying'){
      for(let i=0;i<4;i++){ const ph=(perfNow*0.9+i*0.27)%1;
        g.globalAlpha=(1-ph)*0.8; g.fillStyle=i%2?'#7ade6a':'#4a9a42';
        g.fillRect(bx2+(-46+i*30)*p.s,p.y-(120-ph*110)*p.s,3*p.s+1,(6+ph*4)*p.s+1); }
      g.globalAlpha=1;
      if(Math.random()<0.2) particles.push({x:bx2+rnd(-50,50)*p.s,y:p.y-rnd(30,110)*p.s,vx:0,vy:-20,
        life:.8,maxLife:.8,size:2.4,col:'#7ade6a',grav:-16});
    }
    if(boss.burnT>0&&boss.state!=='dying'){
      for(let i=0;i<5;i++){ const fh=(6+Math.sin(perfNow*11+i*2.3)*4)*p.s;
        g.globalAlpha=0.8; g.fillStyle='#ff6a2a';
        g.fillRect(bx2+(-52+i*26)*p.s,p.y-(56+(i%3)*34)*p.s-fh,3.4*p.s+1,fh);
        g.globalAlpha=0.9; g.fillStyle='#ffd23a';
        g.fillRect(bx2+(-51+i*26)*p.s,p.y-(56+(i%3)*34)*p.s-fh*0.5,2*p.s+1,fh*0.5); }
      g.globalAlpha=1;
      if(Math.random()<0.3) particles.push({x:bx2+rnd(-56,56)*p.s,y:p.y-rnd(40,120)*p.s,vx:rnd(-10,10),vy:rnd(-60,-30),
        life:.6,maxLife:.6,size:2.2,col:Math.random()<.5?'#ff6a2a':'#ffd23a',grav:-30});
    } }});
  if(wolfFight) dr.push({z:wolfFight.z,fn:()=>{
    let zD=wolfFight.z;
    if(wolfFight.state==='strike'&&wolfFight.attack)
      zD=wolfFight.z-Math.sin(Math.PI*clamp(wolfFight.stateT/wolfFight.attack.travel,0,1))*(wolfFight.attack.lunge||4);
    const p=proj(zD);
    const anim=wolfFight.state==='tele'?wolfFight.attack.anim:
               wolfFight.state==='intro'?'howl':
               wolfFight.state==='dying'?(wolfFight.stateT<1.1?'howl':'run'):wolfFight.state;
    BIO().miniDraw(laneX(wolfFight.x,p.t),p.y,p.s*2.4,anim,
      clamp(wolfFight.stateT/(wolfFight.state==='tele'?wolfFight.attack.tele*teleMult():wolfFight.state==='dying'?1.8:0.6),0,1),
      wolfFight.hurtT>0); }});
  dr.sort((a,b)=>b.z-a.z);
  for(const d of dr) d.fn();

  drawTelegraphs();
  if(mode!=='menu'&&mode!=='score'&&mode!=='charsel'&&mode!=='relicdex'&&mode!=='debugcfg'&&mode!=='changelog'){
    if(player.alive) drawPlayer();
    drawAllyWolf();
    drawProjectiles();
    drawWolfLeap();
  }
  /* NOW the near arches: the knight visibly ducks UNDER them */
  frontObs.sort((a,b)=>b.z-a.z);
  for(const o of frontObs) drawObstacle(o,proj(o.z));
  drawParticles(); updateDrawSlashes(lastDt);
  BIO().atmos(lastDt);
  drawVignette();

  /* overlays / UI per mode */
  if(mode==='menu') drawMenu();
  else if(mode==='relicdex') drawRelicDex();
  else if(mode==='changelog') drawChangelog();
  else if(mode==='debugcfg') drawDebugCfg();
  else if(mode==='charsel') drawCharSel();
  else if(mode==='score') drawScore();
  else {
    drawHUD();
    if(mode==='bossintro') drawBossIntro();
    if(mode==='relic') drawRelicScreen();
    if(mode==='shop') drawShop();
    if(mode==='miniboss') drawMinibossIntro();
  }
  if(paused){                                       // pause overlay on top of everything
    g.fillStyle='rgba(5,7,12,0.78)'; g.fillRect(0,-PAD_TOP,VW,VH+PAD_TOT);
    g.textAlign='center'; g.font='bold 34px monospace'; g.fillStyle='#e8e2d0';
    g.fillText('PAUSED',VW/2,VH/2-48);
    g.font='15px monospace'; g.fillStyle='#aeb2c2';
    g.fillText('tap anywhere or press P to resume',VW/2,VH/2-10);
    g.strokeStyle='#8b8fa0'; g.lineWidth=2; g.strokeRect(VW/2-90,VH/2+30,180,46);
    g.font='bold 16px monospace'; g.fillStyle='#aeb2c2'; g.fillText('⚙ SETTINGS',VW/2,VH/2+60);
    g.strokeStyle='#e8e2d0'; g.strokeRect(VW/2-90,VH/2+88,180,46);
    g.fillStyle='#e8e2d0'; g.fillText('MAIN MENU',VW/2,VH/2+118);
  }
  if(settingsOpen) drawSettings();                  // the settings sheet floats over it all
  /* fullscreen flash */
  if(flashA>0){ g.globalAlpha=flashA; g.fillStyle=flashCol; g.fillRect(0,-PAD_TOP,VW,VH+PAD_TOT); g.globalAlpha=1; }
  g.restore();                                      // lift the stage clip
}

/* ============================== 13. MAIN LOOP ============================== */
let lastTime=performance.now();
let hadFocus=true;
function frame(now){
  requestAnimationFrame(frame);
  const gap=(now-lastTime)/1000;
  /* watchdog: a long frame gap means the browser suspended us — freeze the run.
     Focus is checked EDGE-triggered (only the moment it is lost pauses; some mobile
     browsers report no focus at all, and a level check locked the game on pause) */
  if(gap>0.6&&GAMEPLAY_MODES.includes(mode)) paused=true;
  const foc=document.hasFocus();
  if(hadFocus&&!foc&&GAMEPLAY_MODES.includes(mode)) paused=true;
  hadFocus=foc;
  let dt=Math.min(gap,1/25); lastTime=now;
  if(paused){ render(); return; }                   // paused: keep drawing, freeze the sim
  if(hitstop>0){ hitstop-=dt; render(); return; }   // hit-stop: freeze the sim, keep drawing
  update(dt);
  render();
}
requestAnimationFrame(frame);
</script>
