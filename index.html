    for(let i=0;i<6;i++) mossStrand(lean-34+i*14+R(i+3)*6,-208+R(i+7)*12,32+R(i+11)*36,i*1.7+v*9);

    const d=R(2)<0.5?-1:1;

    g.fillStyle=bark; g.fillRect(-18,-6,9,10); g.fillRect(10,-8,10,12);

    g.fillStyle=barkD; g.fillRect(-14,-112,10,20);                  // dead stub crown

}
function drawSwampAtmos(dt){

    if(a.kind==='fly'){

}

function drawVolcanoRoad(){
  /* a cracked BASALT causeway — the fissures between the slabs glow with magma */
  const p0=proj(CFG.Z_FAR), pB=proj(-2.6);
  const hw=t=>lerp(34,218,t);
  const notch=(z,seed)=>Math.floor(sRnd(Math.floor((z+dist)/4.2)*7+seed)*3)*4.5-4.5;
  /* ash field beside the road: grey drifts + cooled ropes of lava */
  g.fillStyle='#15100f';
  for(let i=0;i<50;i++){
    const z=((i*1.3 - dist)%(CFG.Z_FAR+3)+(CFG.Z_FAR+3))%(CFG.Z_FAR+3)-3;
    const p=proj(z), sd=sRnd(i*13+Math.floor((dist+i*1.3)/(CFG.Z_FAR+3))*7);
    const side=sd<0.5?-1:1, off=hw(p.t)+16+sd*140;
    g.fillStyle=sd<0.3?'#221a18':'#15100f';
    g.fillRect(VW/2+side*off, p.y, (4+sd*6)*p.s+1.5, 2.5*p.s+1);
  }
  /* far ember pools out in the ash */
  for(let i=0;i<7;i++){
    const z=((i*8.1 - dist*0.5)%(CFG.Z_FAR+3)+(CFG.Z_FAR+3))%(CFG.Z_FAR+3)-3;
    const p=proj(z), sd=sRnd(i*37+4), side=i%2?-1:1;
    const x=VW/2+side*(hw(p.t)+50+sd*120);
    g.globalAlpha=0.5+Math.sin(perfNow*2+i*2.1)*0.2;
    g.fillStyle='#ff6a2a'; g.fillRect(x,p.y,(5+sd*8)*p.s+1,1.8*p.s+0.8);
    g.globalAlpha=0.25; g.fillStyle='#ffd23a'; g.fillRect(x+2*p.s,p.y,2.4*p.s+0.6,1.2*p.s+0.6);
    g.globalAlpha=1;
  }
  /* the basalt slab road */
  g.fillStyle='#221e20';
  g.beginPath(); g.moveTo(VW/2-hw(p0.t),p0.y);
  for(let i=0;i<=22;i++){ const t=i/22, z=lerp(CFG.Z_FAR,-2.6,t), p=proj(z);
    g.lineTo(VW/2+hw(p.t)+notch(z,1)*p.t, p.y); }
  g.lineTo(VW/2+hw(pB.t),VH+PAD_BOT+40); g.lineTo(VW/2-hw(pB.t),VH+PAD_BOT+40);
  for(let i=22;i>=0;i--){ const t=i/22, z=lerp(CFG.Z_FAR,-2.6,t), p=proj(z);
    g.lineTo(VW/2-hw(p.t)-notch(z,5)*p.t, p.y); }
  g.closePath(); g.fill();
  /* slab joints: dark seams crossing the road */
  g.fillStyle='#161214';
  for(let i=0;i<14;i++){
    const z=((i*4.6 - dist)%(CFG.Z_FAR+3)+(CFG.Z_FAR+3))%(CFG.Z_FAR+3)-3;
    const p=proj(z);
    g.fillRect(VW/2-(hw(p.t)-8*p.t),p.y,(hw(p.t)-8*p.t)*2,1.8*p.s+0.8);
  }
  /* GLOWING FISSURES: magma light leaking up between the slabs */
  for(let i=0;i<16;i++){
    const z=((i*4.1 - dist)%(CFG.Z_FAR+3)+(CFG.Z_FAR+3))%(CFG.Z_FAR+3)-3;
    const p=proj(z), sd=sRnd(i*17+Math.floor((dist+i*4.1)/(CFG.Z_FAR+3))*5);
    const x=VW/2+(sd-0.5)*2*(hw(p.t)-24*p.t-8);
    const pul=0.55+Math.sin(perfNow*3+i*1.9)*0.25;
    g.globalAlpha=pul;
    g.fillStyle='#ff6a2a';
    /* a stepped zigzag crack */
    for(let k=0;k<4;k++) g.fillRect(x+k*3.4*p.s*((i%2)?1:-1),p.y+k*1.5*p.s,3.8*p.s+1,1.6*p.s+0.7);
    g.globalAlpha=pul*0.55; g.fillStyle='#ffd23a';
    g.fillRect(x+1*p.s,p.y+0.4*p.s,2*p.s+0.6,0.9*p.s+0.5);
    g.globalAlpha=1;
  }
  /* scattered scoria pebbles + cooled rope textures on the slabs */
  for(let i=0;i<22;i++){
    const z=((i*2.37 - dist)%(CFG.Z_FAR+3)+(CFG.Z_FAR+3))%(CFG.Z_FAR+3)-3;
    const p=proj(z), sd=sRnd(i*23+Math.floor((dist+i*2.37)/(CFG.Z_FAR+3))*11);
    const x=VW/2+(sd-0.5)*2*(hw(p.t)-14*p.t-6);
    if(sd<0.5){ g.fillStyle='#2c2628'; g.fillRect(x,p.y,(4+sd*6)*p.s+1,2*p.s+0.8); }
    else { g.fillStyle='#191416';                                  // rope of cooled lava
      g.fillRect(x,p.y,(9+sd*8)*p.s+1,1.6*p.s+0.7);
      g.fillRect(x+3*p.s,p.y-1.4*p.s,(5+sd*4)*p.s+1,1.4*p.s+0.6); }
  }
}
/* basalt columns + obsidian spires with ember vents — the volcano's "trees" */
function drawBasalt(x,y,s,v){
  g.save(); g.translate(x,y); g.scale(s,s);
  const R=k=>sRnd(v*761.9+k*11.13);
  const rock='#1c181a', rockL='#2a2426', rockD='#120e10';
  const vr=(v*4|0)%4;
  const col=(cx,w,h,cap)=>{                          // one hexagonal basalt column
    g.fillStyle=rock; g.fillRect(cx-w/2,-h,w,h);
    g.fillStyle=rockL; g.fillRect(cx-w/2,-h,w*0.28,h);
    g.fillStyle=rockD; g.fillRect(cx+w*0.16,-h+3,w*0.2,h-3);
    g.fillStyle=rockL; g.fillRect(cx-w/2,-h,w,3);    // capstone
    if(cap){ g.fillStyle=rockD; g.fillRect(cx-w/2+2,-h-4,w-4,4); }
    for(let k=1;k<h/22;k++){ g.fillStyle=rockD; g.fillRect(cx-w/2,-h+k*22,w,1.6); } // joints
  };
  if(vr===0){         /* stepped organ-pipe cluster */
    col(-22,20,64+R(1)*20,1); col(0,22,108+R(2)*26,1); col(22,18,84,0); col(40,14,52,1);
  } else if(vr===1){  /* one great obsidian spire, glassy edge */
    g.fillStyle=rockD;
    g.beginPath(); g.moveTo(-20,4); g.lineTo(-6,-138-R(3)*30); g.lineTo(2,-146-R(3)*30);
    g.lineTo(14,-40); g.lineTo(22,4); g.closePath(); g.fill();
    g.fillStyle='#3a3440'; g.beginPath(); g.moveTo(-6,-138-R(3)*30); g.lineTo(2,-146-R(3)*30);
    g.lineTo(4,-60); g.lineTo(-2,-58); g.closePath(); g.fill();  // glass glint face
    g.fillStyle=rock; g.fillRect(-26,-8,52,12);
  } else if(vr===2){  /* broken columns with an EMBER VENT smoking between */
    col(-18,18,56,0); col(4,20,88+R(4)*18,1); col(24,16,38,0);
    const pul=0.6+Math.sin(perfNow*2.4+v*9)*0.25;
    g.globalAlpha=pul*worldA; g.fillStyle='#ff6a2a';
    g.fillRect(-6,-6,10,5); g.globalAlpha=pul*0.5*worldA; g.fillStyle='#ffd23a'; g.fillRect(-3,-5,4,3);
    g.globalAlpha=0.30*worldA; g.fillStyle='#241a1c';             // smoke wisp
    g.beginPath(); g.ellipse(-1,-26-Math.sin(perfNow*1.3+v*7)*4,7,10,0,0,TAU); g.fill();
    g.globalAlpha=worldA;
  } else {            /* slumped crag with cooled lava tongue */
    g.fillStyle=rock;
    g.beginPath(); g.moveTo(-30,4); g.lineTo(-18,-52-R(5)*16); g.lineTo(6,-74-R(5)*16);
    g.lineTo(20,-30); g.lineTo(32,4); g.closePath(); g.fill();
    g.fillStyle=rockL; g.fillRect(-16,-52-R(5)*16,8,4);
    g.fillStyle='#191416'; g.fillRect(-4,-18,18,7); g.fillRect(4,-11,22,6);   // the tongue
    const pul=0.5+Math.sin(perfNow*2+v*5)*0.2;
    g.globalAlpha=pul*worldA; g.fillStyle='#ff6a2a'; g.fillRect(20,-8,7,2.6); g.globalAlpha=worldA;
  }
  g.restore();
}
/* PETRIFIED CORAL STONES — the volcano's root-anchors: three sprites of pale,
   fossilised reef-rock. The stone-pipe roots erupt straight out of these. */
function drawPetrifiedCoral(x,y,s,v){
  g.save(); g.translate(x,y); g.scale(s,s);
  const R=k=>sRnd(v*641.3+k*9.71);
  /* fossil stone: BASALT-dark at the base — the same family as the roadside rock —
     lightening naturally up toward the pipe tips */
  const rock='#221c20', rockD='#131013', rockL='#2e262c', pale='#453842', lit='#544450';
  const vr=(v*3|0)%3;
  const branch=(bx,by,w,h,lean)=>{                   // one knobby fossil branch, tapering up
    const seg=4;
    for(let k=0;k<seg;k++){ const f=k/seg;
      const sw=w*(1-f*0.45), sx=bx+lean*f*h*0.4-sw/2, sy=by-h*(f+1/seg);
      g.fillStyle=mixCol(rock,lit,f); g.fillRect(sx,sy,sw,h/seg+2);        // lighter as it climbs
      g.fillStyle=mixCol(rockL,'#5e4a56',f); g.fillRect(sx,sy,sw*0.3,h/seg+2);
      if(k%2){ g.fillStyle=rockD; g.fillRect(sx+sw*0.55,sy+1,sw*0.2,h/seg); }
    }
    g.fillStyle=lit; g.fillRect(bx+lean*h*0.4-w*0.31,by-h-5,w*0.62,6);     // knobbed tip
  };
  if(vr===0){          /* --- staghorn cluster: antler branches off one bole --- */
    g.fillStyle=rock; g.fillRect(-16,-38,32,42);
    g.fillStyle=rockL; g.fillRect(-16,-38,8,42);
    g.fillStyle=rockD; g.fillRect(4,-30,6,34);
    branch(-10,-34,14,86+R(1)*30,-0.5);
    branch(2,-36,16,120+R(2)*36,0.15);
    branch(12,-30,12,70+R(3)*24,0.6);
    g.fillStyle=rockD;                                // fossil pores up the bole
    for(let i=0;i<4;i++) g.fillRect(-12+i*8,-30+R(i+4)*18,2.6,2.6);
  } else if(vr===1){   /* --- brain-dome: a grooved boulder sprouting stone tubes --- */
    g.fillStyle=rock;
    g.beginPath(); g.ellipse(0,-34,44,40,0,0,TAU); g.fill();
    g.fillRect(-44,-34,88,38);
    g.fillStyle=rockL; g.beginPath(); g.ellipse(-12,-46,24,18,0,0,TAU); g.fill();
    g.fillStyle=rockD;                                // the winding brain grooves
    for(let i=0;i<5;i++){ const gy=-62+i*12+R(i)*4;
      for(let k2=0;k2<6;k2++) g.fillRect(-38+k2*13+((i+k2)%2)*4,gy+((k2%2)?3:0),9,3); }
    for(let i=0;i<3;i++){ const tx=-26+i*24+R(i+7)*6, tl=54+R(i+3)*22;
      g.fillStyle=mixCol(rock,lit,0.6);  g.fillRect(tx-4,-34-tl,8,tl);     // tubes: lighter than the dome
      g.fillStyle=mixCol(rockL,'#5e4a56',0.6); g.fillRect(tx-4,-34-tl,2.6,tl);
      g.fillStyle='#171114'; g.fillRect(tx-2.4,-34-tl,4.8,4); }            // open bores
  } else {             /* --- fan tower: stacked plate fans on a leaning column --- */
    const lean=(R(1)-0.5)*18;
    g.fillStyle=rock; g.fillRect(-9,-118,18,122);
    g.fillStyle=rockL; g.fillRect(-9,-118,5,122);
    g.fillStyle=rockD; g.fillRect(2+lean*0.1,-110,4,112);
    for(let i=0;i<4;i++){ const fy=-34-i*26, fw=52-i*9, d=(i%2?-1:1);
      g.fillStyle=mixCol(i%2?rock:rockL,lit,i/3);                // fans brighten upward
      g.fillRect(d*4-fw/2+lean*(i/4),fy-7,fw,10);
      g.fillStyle=mixCol(pale,'#5e4a56',i/3); g.fillRect(d*4-fw/2+lean*(i/4),fy-7,fw,3);
      g.fillStyle=rockD; for(let k2=0;k2<fw-6;k2+=9) g.fillRect(d*4-fw/2+lean*(i/4)+k2,fy+1,4,3);
    }
    g.fillStyle=lit; g.fillRect(-6+lean*0.25,-126,12,9);         // crown knob
  }
  /* ash skirting + one faint ember crack ties it into the ashlands */
  g.fillStyle='#221a1c'; g.fillRect(-30,-4,60,7);
  g.globalAlpha=(0.4+Math.sin(perfNow*2.3+v*8)*0.2)*worldA; g.fillStyle='#ff6a2a';
  g.fillRect(-8+R(9)*10,-2,9,2.2); g.globalAlpha=worldA;
  g.restore();
}
function drawVolcanoAtmos(dt){

      /* rising EMBERS instead of fireflies */

      if(a.y<-PAD_TOP+20){ a.y=rnd(VH*0.5,VH+PAD_BOT); a.x=rnd(VW); }

      g.shadowColor='#ff6a2a'; g.shadowBlur=7;

      g.fillRect(a.x|0,a.y|0,2.6,2.6);

  g.globalAlpha=1;

}

  }

  for(let i=0;i<3;i++){ const smx=VW*(0.16+i*0.34);

  g.globalAlpha=1;

/* ============================== THE BEAR'S CAVE ============================== */
/* v9.8 — rebuilt from scratch. One vast rock throat around a single opening:
   through it, the full moon, stars and treeline of the forest you rode in from.
   Every detail GROWS from a surface — ceiling, walls or floor. Nothing floats. */
function drawCave(dt){
  const mx2=VW*0.5, mw2=152, mtop=HORIZON_Y-118, mbot=HORIZON_Y+40;
  /* flat dark rock — no gradient halo hazing around the entrance */
  g.fillStyle='#0f0c0a'; g.fillRect(0,-PAD_TOP,VW,VH+PAD_TOT);
  /* CEILING: a ragged rock fringe growing down from the true screen top */
  for(let x=0;x<VW;x+=16){
    const k=x/16;
    const h1=26+sRnd(k*7+1)*46, h2=h1*0.55+sRnd(k*7+2)*20;
    g.fillStyle='#0d0a08'; g.fillRect(x,-PAD_TOP,16,h1+PAD_TOP);
    g.fillStyle='#12100c'; g.fillRect(x+3,-PAD_TOP,10,h2+PAD_TOP);
    g.fillStyle='#0d0a08'; g.fillRect(x+5,h1-3,7,7);
  }
  /* SIDE WALLS: rock shoulders growing in from both screen edges, lit inner rims */
  for(let yy=-PAD_TOP;yy<VH+PAD_BOT;yy+=22){
    const k=yy/22;
    const wl=32+sRnd(k*11+3)*54, wr=32+sRnd(k*11+7)*54;
    g.fillStyle='#0c0a08';
    g.fillRect(0,yy,wl,22); g.fillRect(VW-wr,yy,wr,22);
    g.fillStyle='#110e0b';
    g.fillRect(wl-7,yy+4,7,14); g.fillRect(VW-wr,yy+4,7,14);
  }
  /* stepped cracks running DOWN out of the ceiling fringe */
  g.fillStyle='#050403';
  for(let i=0;i<5;i++){
    const sd=sRnd(i*13+5), cx2=50+sd*(VW-100); if(Math.abs(cx2-mx2)<mw2*0.9) continue;
    let cy2=-PAD_TOP+24+sd*30;
    for(let k=0;k<4;k++){ g.fillRect(cx2+((k%2)?4:-3.2)*(0.7+sd),cy2,2.6,12+sd*8); cy2+=13+sd*8; }
  }
  /* ===== THE MOUTH: the moonlit night at the bear's back — the ONE moon ===== */
  g.save();
  g.beginPath(); g.moveTo(mx2-mw2,mbot);
  g.lineTo(mx2-mw2*0.86,mtop+40); g.lineTo(mx2-mw2*0.42,mtop+8); g.lineTo(mx2,mtop);
  g.lineTo(mx2+mw2*0.46,mtop+12); g.lineTo(mx2+mw2*0.88,mtop+44); g.lineTo(mx2+mw2,mbot);
  g.closePath(); g.clip();
  const nsky=g.createLinearGradient(0,mtop,0,mbot);
  nsky.addColorStop(0,'#0c1226'); nsky.addColorStop(.65,'#152140'); nsky.addColorStop(1,'#0d1424');
  g.fillStyle=nsky; g.fillRect(mx2-mw2,mtop,mw2*2,mbot-mtop);
  /* the FULL MOON, dither-cratered — the same moon the level rides under */
  const moX=mx2+38, moY=mtop+58;
  g.shadowColor='#cfd8ff'; g.shadowBlur=26;
  g.fillStyle='#e8ecff'; g.beginPath(); g.arc(moX,moY,21,0,TAU); g.fill(); g.shadowBlur=0;
  g.fillStyle='#c3cbe8';
  g.fillRect(moX-10,moY-6,5,5); g.fillRect(moX+2,moY+5,7,5); g.fillRect(moX-4,moY+11,4,3);
  g.fillRect(moX+7,moY-11,4,4); g.fillRect(moX-13,moY+2,3,3);
  /* pixel plus-shaped stars around it, twinkling */
  const stars2=[[-96,-44],[-64,-8],[-108,18],[44,-58],[84,-26],[64,22],[-30,-64],[98,4]];
  for(let i=0;i<stars2.length;i++){
    const tw=0.5+Math.sin(perfNow*2.2+i*1.7)*0.5;
    g.globalAlpha=0.3+tw*0.6; g.fillStyle='#dfe6ff';
    const sx=moX+stars2[i][0], sy2=moY+stars2[i][1];
    g.fillRect(sx-1,sy2-3,2,6); g.fillRect(sx-3,sy2-1,6,2);
    if(i%3===0) g.fillRect(sx-1,sy2-1,2,2);
  }
  g.globalAlpha=1;
  /* the treeline you rode in from */
  for(let i=0;i<8;i++){ const sd=sRnd(i*17+3), tx=mx2-mw2+sd*mw2*2, th=26+sRnd(i*17+4)*42;
    g.fillStyle=i%2?'#0a1220':'#0c1526';
    g.fillRect(tx-3,mbot-th,6,th);
    g.beginPath(); g.ellipse(tx,mbot-th-8,15+sRnd(i*17+5)*12,11,0,0,TAU); g.fill();
    if(i%3===0){ g.fillStyle='#26324e'; g.fillRect(tx-1,mbot-th,2,4); } }
  g.globalAlpha=0.3; g.fillStyle='#93a2b2';                     // ground mist at the threshold
  g.beginPath(); g.ellipse(mx2,mbot-6,mw2*0.9,10,0,0,TAU); g.fill(); g.globalAlpha=1;
  g.restore();
  /* the mouth's ragged rock lip bites over the view */
  g.fillStyle='#0d0a08';
  for(let i=0;i<12;i++){ const a=i/12;
    g.fillRect(mx2-mw2+a*mw2*2-7,mtop+Math.abs(Math.sin(a*9.3))*20,15,10+((i%3)*5)); }
  /* moonlight SPILLS from the mouth across the arena floor — one light source */
  const beam=g.createLinearGradient(0,mbot,0,PLAYER_Y+30);
  beam.addColorStop(0,'rgba(175,195,245,0.16)'); beam.addColorStop(.55,'rgba(150,172,228,0.08)');
  beam.addColorStop(1,'rgba(140,160,220,0.02)');
  g.fillStyle=beam;
  g.beginPath(); g.moveTo(mx2-mw2*0.92,mbot-8); g.lineTo(mx2+mw2*0.92,mbot-8);
  g.lineTo(mx2+mw2*1.9,PLAYER_Y+30); g.lineTo(mx2-mw2*1.9,PLAYER_Y+30); g.closePath(); g.fill();
  /* DRIPSTONES: fangs of rock off the ceiling, wet tips glinting */
  for(let i=0;i<14;i++){
    const sx=sRnd(i*13+2)*VW, len=24+sRnd(i*13+3)*88, w=9+sRnd(i*13+4)*17;
    g.fillStyle='#0e0c0f';
    g.fillRect(sx-w/2,-PAD_TOP,w,len*0.55+PAD_TOP);

    g.fillRect(sx-w*0.14,len*0.83,w*0.28,len*0.17);
    g.fillStyle='#1a191f'; g.fillRect(sx-w/2,0,3,len*0.5);      // moonlit edge
    if(sRnd(i*13+5)>0.4){ g.fillStyle='#8fa8d8';                 // wet tip glint
      g.globalAlpha=0.5+Math.sin(perfNow*2+i)*0.3;
      g.fillRect(sx-1,len-3,2,3); g.globalAlpha=1; }
  }
  /* floor: cold stone washed by the mouth-light */
  const fl=g.createLinearGradient(0,HORIZON_Y,0,VH);
  fl.addColorStop(0,'#16151a'); fl.addColorStop(.45,'#1a191f'); fl.addColorStop(1,'#0b0b0f');
  g.fillStyle=fl; g.fillRect(0,HORIZON_Y,VW,VH-HORIZON_Y+PAD_BOT);
  /* pools of moonlight where the spill lands */
  g.globalAlpha=0.10; g.fillStyle='#aebde4';
  g.beginPath(); g.ellipse(mx2,HORIZON_Y+96,200,44,0,0,TAU); g.fill();
  g.globalAlpha=0.05;
  g.beginPath(); g.ellipse(mx2,PLAYER_Y-60,230,50,0,0,TAU); g.fill();
  g.globalAlpha=1;
  /* cracked slab floor: stepped pixel cracks + scattered rubble */
  for(let i=0;i<24;i++){
    const z=sRnd(i*17+1)*CFG.Z_FAR*0.9, pz=proj(z);
    const x=VW/2+(sRnd(i*17+2)-0.5)*2*lerp(50,300,pz.t);
    g.fillStyle='#0d0d11';
    for(let k=0;k<3;k++) g.fillRect(x+k*4*pz.s*((i%2)?1:-1),pz.y+k*2.6*pz.s,4.4*pz.s+1,2.2*pz.s+1);
    if(i%3===0){ g.fillStyle='#24242c'; g.fillRect(x+8*pz.s,pz.y-2*pz.s,4*pz.s+1,2.4*pz.s+1); }
  }
  /* STALAGMITES + fallen rocks hugging the walls (never on the fight floor) */
  for(let i=0;i<7;i++){
    const sd=sRnd(i*29+3), side=i%2?-1:1;
    const x=VW/2+side*(196+sd*70), by=HORIZON_Y+34+sRnd(i*29+4)*(PLAYER_Y-HORIZON_Y-90);
    const h2=14+sd*42, w2=8+sd*12;
    g.fillStyle='#131217';
    g.beginPath(); g.moveTo(x-w2,by); g.lineTo(x-w2*0.2+sd*3,by-h2); g.lineTo(x+w2*0.5,by-h2*0.6);
    g.lineTo(x+w2,by); g.closePath(); g.fill();
    g.fillStyle='#1e1d25'; g.fillRect(x-w2*0.4,by-h2*0.8,2.4,h2*0.5);

  /* glowing fungi colonies hug the wall bases (the cave's only other light) */

    g.beginPath(); g.ellipse(fx,fy,26,12,0,0,TAU); g.fill();

  }
  /* old kills: a ribcage and a skull half-buried near the walls */
  const bx0=VW*0.16, by0=PLAYER_Y-176;
  g.fillStyle='#b7b2a4';
  for(let i=0;i<4;i++) g.fillRect(bx0+i*9,by0-14+Math.abs(i-1.5)*3,4,16-Math.abs(i-1.5)*4);
  g.fillRect(bx0-4,by0+2,44,4);                                        // spine
  const kx=VW*0.86, ky=PLAYER_Y-148;
  g.fillRect(kx-9,ky-10,18,12); g.fillRect(kx-6,ky+2,12,5);            // skull + jaw
  g.fillStyle='#060608'; g.fillRect(kx-6,ky-6,4,4); g.fillRect(kx+2,ky-6,4,4);
  /* (no drifting motes, no mid-air drips — nothing floats in the lair) */
}
function drawBackground(dt){

function drawCanopy(mx,my){
  /* the forest is CLAD in darkness: a solid leaf-mass ceiling covers the WHOLE sky
     (however tall the screen), parted only by one ragged clearing where the full
     moon and its stars look through. */
  const skyB=HORIZON_Y-46;                       // canopy reaches down to the treeline tops
  const rx=112, ry=84;                           // the moon clearing (kept tight)
  g.save();
  g.beginPath();

    const r=12+sRnd(i*7+3)*26;
    g.fillStyle=i%3===0?'#0a130c':i%3===1?'#060b08':'#081009';
    g.beginPath(); g.arc(cx,cy,r,0,TAU); g.fill();

      g.fillRect(cx+Math.cos(a)*r-3,cy+Math.sin(a)*r-3,6,6); }
  }
  g.restore();
  g.fillStyle='#070d09';
  /* ragged bottom edge: hanging clumps reaching down for the treeline */
  for(let x=0;x<VW;x+=14){
    const drop=8+sRnd(x*3+9)*26;
    g.fillRect(x,skyB-4,14,drop+4); g.fillRect(x+4,skyB+drop-2,7,7);
  }

  for(let i=0;i<5;i++){
    const fx=mx+(sRnd(i*23+3)-0.5)*rx*1.44;
    const q=Math.sqrt(Math.max(0,1-(fx-mx)*(fx-mx)/(rx*rx)));
    const baseY=my+ry*q;                              // the rim's y at this x (bottom half)

    for(let k=0;k<3;k++){                             // stacked, narrowing upward

    }
  }
  /* small irregular jagged leaf squares hug the WHOLE rim — top and sides alike */
  for(let i=0;i<26;i++){
    const ang=(i/26+(sRnd(i*13+2)-0.5)*0.03)*TAU;
    const bx=mx+Math.cos(ang)*rx*(0.99+(sRnd(i*7+5)-0.5)*0.05);
    const by=my+Math.sin(ang)*ry*(0.99+(sRnd(i*11+3)-0.5)*0.05);
    const s=4+sRnd(i*11+4)*7;
    g.fillRect(bx-s/2,by-s/2,s,s);
  }
  /* a tree's crown chunk covers a rounded bite of the gap, lower right */
  const chX=mx+rx*0.62, chY=my+ry*0.62;
  g.beginPath(); g.arc(chX,chY,25,0,TAU); g.fill();
  g.beginPath(); g.arc(chX+13,chY+14,21,0,TAU); g.fill();  // anchored back into the rim
  for(let k=0;k<6;k++){ const a=sRnd(k*9+2)*TAU;           // pixel clumps on its edge
    g.fillRect(chX+Math.cos(a)*23-3,chY+Math.sin(a)*23-3,7,7); }
  /* darker hanging fringe along the very top (hangs from the true screen top) */
  g.fillStyle='#060b08';
  for(let x=0;x<VW;x+=12){
    const drop=18+sRnd(x)*30 + Math.sin((x+dist*2)*0.05)*4;
    g.fillRect(x,-PAD_TOP,12,drop+PAD_TOP);
    g.fillRect(x+3,drop,6,6);
  }
}
function drawRidge(baseY,h,col,scroll){

  for(let x=0;x<=VW;x+=16){

    const side=i%2?-1:1, x=VW/2+side*(hw(p.t)-6-sd*16);

      g.fillRect(x,p.y-3*p.s,2*p.s+1,3*p.s+1); g.fillRect(x+2.4*p.s,p.y-4.4*p.s,1.8*p.s+1,4.4*p.s+1);
      g.fillRect(x-2*p.s,p.y-2.4*p.s,1.8*p.s+1,2.4*p.s+1);

/* huge forest trees with barked, mossy trunks and layered leaf masses —
   the knight should feel SMALL passing beneath them */
function drawTree(x,y,s,v){
  g.save(); g.translate(x,y); g.scale(s,s);
  const R=k=>sRnd(v*997.3+k*17.77);                  // deterministic per-tree jitter
  const vr=(v*4|0)%4;                                // FOUR distinct silhouettes
  const dark=v>0.5?'#101f14':'#0c1a10', mid=v>0.5?'#16281a':'#122215', hi='#1d3320';
  const bark='#241a10', barkL='#2f2315', barkD='#191108', moss='#31502e', mossL='#3e6338';
  const lean=(R(1)-0.5)*16;                          // every tree leans its own way
  /* one leaf mass: chunky offset rects + dithered rim (never centered) */
  const blob=(cx,cy,w,h,c)=>{
    g.fillStyle=c;
    g.fillRect(cx-w/2,cy-h/2,w,h);
    g.fillRect(cx-w/2+w*(0.1+R(cx+cy)*0.3),cy-h/2-h*0.42,w*0.66,h*0.55);
    for(let k=0;k<w-8;k+=9) g.fillRect(cx-w/2+k,cy+h/2-3+((k/9|0)%2)*5,6,6);
    g.fillStyle=hi; g.fillRect(cx-w/2+4+R(cx)*w*0.3,cy-h/2-2,w*0.16,4);
  };
  const barkStreaks=(tx,tw,ty,th)=>{                 // uneven bark: streaks at jittered x
    g.fillStyle=barkL; g.fillRect(tx+tw*0.12,ty,tw*0.2,th);
    g.fillStyle=barkD; g.fillRect(tx+tw*(0.45+R(ty)*0.2),ty+th*0.06,tw*0.14,th*0.92);
    g.fillStyle=moss;                                // moss clumps hug one side only
    const mSide=R(ty+3)<0.5?tx-2:tx+tw-4;
    g.fillRect(mSide,ty+th*0.55,6,12); g.fillRect(mSide+(R(ty+5)-0.5)*6,ty+th*0.3,5,8);
    g.fillStyle=mossL; g.fillRect(mSide+1,ty+th*0.57,3,5);
  };
  if(vr===0){          /* --- tall sentinel, high crown, one long bare limb --- */
    g.fillStyle=bark;
    g.fillRect(-14,-104,28,108);                     // lower trunk — a true bole
    g.fillRect(-11+lean*0.5,-178,21,80);             // upper trunk shifts with the lean
    barkStreaks(-14,28,-104,108);
    g.fillRect(-22,-8,10,12); g.fillRect(12,-11,12,15);  // uneven root flare
    const limbD=R(2)<0.5?-1:1;                       // a single bare limb, one side only
    g.fillRect(limbD*8,-144,limbD*42,9); blob(limbD*54+lean*0.4,-152,42,24,mid);
    blob(lean*0.6-8,-196,102+R(3)*22,50,dark);
    blob(lean*0.8+16,-238,78,44,mid);
    blob(lean-4,-270,52,32,dark);
  } else if(vr===1){   /* --- broad squat crown, buttressed base --- */
    g.fillStyle=bark; g.fillRect(-19,-90,38,94);
    barkStreaks(-19,38,-90,94);
    g.fillStyle=bark; g.fillRect(-33,-16,16,22); g.fillRect(18,-10,20,15); // buttress roots
    g.fillStyle=barkD; g.fillRect(-29,-9,8,12);
    blob(-18,-112,134+R(4)*24,54,dark);
    blob(30,-142,100,46,mid);
    blob(-2+lean*0.5,-128,80,36,dark);
  } else if(vr===2){   /* --- crooked, kinked trunk, crown thrown to one side --- */
    const kink=R(5)<0.5?-12:12;
    g.fillStyle=bark;
    g.fillRect(-12,-64,24,68);
    g.fillRect(-12+kink,-134,22,74);                 // trunk jinks halfway up
    g.fillRect(Math.min(-12,-12+kink),-68,Math.abs(kink)+22,12); // the elbow
    barkStreaks(-12+kink,22,-134,74);
    g.fillStyle=barkD; g.fillRect(-kink*0.8,-100,13,6); // dead stub on the far side
    blob(kink*2.2-6,-162,104,48,dark);               // crown leans hard past the kink
    blob(kink*2.8+12,-198,70,36,mid);
    blob(kink*1.2-20,-144,50,26,mid);
  } else {             /* --- split twin trunk, two crowns at odd heights --- */
    g.fillStyle=bark;
    g.fillRect(-17,-32,34,36);                       // shared base
    g.fillRect(-20,-110,16,82); g.fillRect(7,-92,15,66); // diverging trunks
    barkStreaks(-20,16,-110,82);
    g.fillStyle=barkD; g.fillRect(9,-74,5,48);
    g.fillStyle=bark; g.fillRect(-26,-5,11,9);
    blob(-20+lean*0.4,-142,86+R(6)*18,44,dark);      // taller crown
    blob(18,-112,64,34,mid);                         // shorter crown
    blob(-2,-172,50,28,mid);
  }
  g.restore();
}
function drawAtmosphere(dt){
  if(env==='cave') return;                    // the cave breathes its own dust (drawCave)
  /* fireflies + detailed pixel leaves tumbling down */
  for(const a of ambient){
    if(a.kind==='fly'){
      a.ph+=dt*a.sp; const fx=a.x+Math.sin(a.ph)*20, fy=a.y+Math.cos(a.ph*1.3)*12;
      g.globalAlpha=0.4+Math.sin(a.ph*3)*0.35;
      g.fillStyle='#d9f79a'; g.shadowColor='#d9f79a'; g.shadowBlur=8;
      g.fillRect(fx,fy,3,3); g.shadowBlur=0;
    } else {
      a.x+=a.vx*dt+Math.sin(a.ph*1.7)*22*dt; a.y+=a.vy*dt; a.ph+=dt*3;
      /* EVEN respawns: fall off the bottom → return across the top; blow off the
         left → return at the right at any height. No more piling up in a corner. */
      if(a.y>VH+PAD_BOT){ a.y=-PAD_TOP-rnd(6,30); a.x=rnd(0,VW+40); }
      else if(a.x<-12){ a.x=rnd(VW,VW+40); a.y=rnd(-PAD_TOP,VH+PAD_BOT); }
      /* two-tone pixel leaf: blade + stem + midrib, rotation quantized for pixel feel */
      g.globalAlpha=0.85;
      g.save(); g.translate(a.x|0,a.y|0);
      g.rotate(((Math.sin(a.ph)*4)|0)*(Math.PI/8));
      g.fillStyle=a.col; g.fillRect(-3,-2,6,4); g.fillRect(-1,-4,3,2); g.fillRect(-1,2,3,2);
      g.fillStyle=a.col2; g.fillRect(-1,-3,1,7);
      g.restore();
    }
  }
  g.globalAlpha=1;
  /* fog band at the horizon */
  const fog=g.createLinearGradient(0,HORIZON_Y-30,0,HORIZON_Y+80);
  fog.addColorStop(0,'rgba(90,105,150,0)'); fog.addColorStop(.5,'rgba(90,105,150,0.32)');
  fog.addColorStop(1,'rgba(90,105,150,0)');
  g.fillStyle=fog; g.fillRect(0,HORIZON_Y-30,VW,110);
}
function drawVignette(){
  const v=g.createRadialGradient(VW/2,VH/2,VH*0.32,VW/2,VH/2,VH*0.72);
  v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(1,'rgba(4,6,14,0.55)');
  g.fillStyle=v; g.fillRect(0,-PAD_TOP,VW,VH+PAD_TOT);
  /* subtle teal→warm color grade */
  g.globalCompositeOperation='overlay'; g.globalAlpha=0.12;
  const cg=g.createLinearGradient(0,0,0,VH);
  cg.addColorStop(0,'#3a5ba0'); cg.addColorStop(1,'#a06a3a');
  g.fillStyle=cg; g.fillRect(0,-PAD_TOP,VW,VH+PAD_TOT);
  g.globalCompositeOperation='source-over'; g.globalAlpha=1;
}

/* ============================== 9. ENTITIES & SPAWNER ============================== */
let obstacles=[], pickups=[], trees=[], projectiles=[], hazards=[];
let nextSpawnAt=0, nextTreeAt=0;

/* the guaranteed arsenal: fixed weapon positions rolled at loop start */
let guaranteed=[];
function buildGuaranteed(){
  guaranteed=[];
  const wolfAt=CFG.LOOP_DIST*CFG.MINIBOSS_AT;
  const place=(kind,count,from,to)=>{
    for(let i=0;i<count;i++){
      let at=CFG.LOOP_DIST*(from+(to-from)*(count===1?0.5:i/(count-1)))+rnd(-18,18);
      if(Math.abs(at-wolfAt)<32) at+=48;                       // keep clear of the wolf encounter
      at=clamp(at,60,CFG.LOOP_DIST-70);                        // and of the boss runway
      guaranteed.push({kind,at});
    }
  };
  place('arrow',CFG.GUAR_ARROWS+(loop-1)*CFG.GUAR_ARROWS_LOOP+(hasRelic('quiver')?3:0)+(hasRelic('storm')?2:0),0.05,0.92);
  place('lance',CFG.GUAR_LANCES+Math.floor((loop-1)/3)*CFG.GUAR_LANCES_TIER,0.14,0.86);
  guaranteed.sort((a,b)=>a.at-b.at);
  for(let i=1;i<guaranteed.length;i++)                     // enforce breathing room between drops
    if(guaranteed[i].at-guaranteed[i-1].at<9) guaranteed[i].at=guaranteed[i-1].at+9;
}
function spawnLoopEntities(){
  /* called every frame during 'run'; spawns patterns ahead at the horizon */
  while(dist+SPAWN_FAR > nextTreeAt){                     // roadside pines born far out
    const tz=nextTreeAt-dist;
    if(nextTreeAt>CFG.LOOP_DIST+1.5){
      /* BEYOND THE LAIR the world ends in scenery: the same trees keep coming from
         the sides AND from the center — a dense wall of woods (or drowned grove,
         or basalt forest) in the exact same perspective as everything else */
      const side=Math.random()<.5?-1:1;
      trees.push({z:tz, off:side*rnd(0.15,3.8), v:Math.random()});
      nextTreeAt+=rnd(0.9,1.7);
      continue;
    }
    let side=Math.random()<.5?-1:1, off=rnd(2.6,3.8);
    /* a root's mother tree claims its own ground — plant BESIDE it (flip sides, or
       step deeper into the treeline), but never leave a gap in the woods */
    const rootAt=s=>obstacles.some(o=>o.kind==='root'&&Math.abs(o.z-tz)<2.6&&(o.side==='L'?-1:1)===s);
    if(rootAt(side)){ if(!rootAt(-side)) side=-side; else off=rnd(3.6,4.4); }
    trees.push({z:tz, off:side*off, v:Math.random()});
    nextTreeAt+=rnd(1.7,3.4);
  }
  const stageEnd=CFG.LOOP_DIST, wolfAtDist=stageEnd*CFG.MINIBOSS_AT;
  while(dist+SPAWN_FAR > nextSpawnAt && nextSpawnAt < CFG.LOOP_DIST-30){
    const worldPos=nextSpawnAt; nextSpawnAt+=CFG.SPAWN_GAP;   // the runway before the cave stays clean
    if(worldPos>stageEnd-40) continue;                    // clear runway before the boss
    if(Math.abs(worldPos-wolfAtDist)<26) continue;        // clear runway around the wolf
    spawnPattern(worldPos-dist);
  }
  /* guaranteed weapons: drop each one into a lane free of obstacles */
  while(guaranteed.length && dist+CFG.Z_FAR-2 > guaranteed[0].at){
    const gw=guaranteed[0], z=gw.at-dist;
    const free=[0,1,2].filter(l=>!obstacles.some(o=>Math.abs(o.z-z)<4.5 && occupiesLane(o,l))
      && !pickups.some(c=>Math.abs(c.z-z)<4.5 && c.lane===l));
    if(!free.length){ gw.at+=6; break; }                  // blocked → try a little further ahead
    pickups.push({kind:gw.kind,lane:pick(free),z});
    guaranteed.shift();
  }
  /* the waiting miniboss wolf (spawned once per loop) */
  if(!wolfSpawned && dist+CFG.Z_FAR > wolfAtDist){
    wolfSpawned=true;
    obstacles.push({kind:'wolfgate', lane:(Math.random()*3)|0, z:wolfAtDist-dist, t:0});
    floater(VW/2,150,'A howl echoes ahead...','#aeb2c2',16); SFX.howl();
  }
}
/* obstacle model: every obstacle carries per-lane requirements —
     req[lane] = 'jump' | 'duck' | null(safe)
   ROOT    — a rogue tree root bursting from the L or R treeline:
             1 lane: head-height over the outer lane (DUCK)
             2 lanes: outer DUCK + it slumps to the ground on middle (JUMP)
             3 lanes (rare): outer DUCK, the other two JUMP
   POND    — still water: always JUMP. The only type allowed alone on center.
             Blends left/right/circular; rarely 2 lanes, very rarely all 3.
   BOULDER — a low rectangular slab grown into the forest floor: JUMP.
             Never alone on center; rarely 2 lanes, very rarely all 3.       */
function spawnPattern(z){
  const r=Math.random(); let acc=0;
  /* pickups never spawn on top of one another: prefer a clear lane, else skip */
  const clear=l=>!pickups.some(c=>Math.abs(c.z-z)<4.5&&c.lane===l);
  let lane=(Math.random()*3)|0;
  if(!clear(lane)){ const alt=[0,1,2].filter(clear); if(!alt.length) return; lane=pick(alt); }
  if((acc+=CFG.P_OBSTACLE)>r){ spawnObstacle(z); }
  else if((acc+=CFG.P_COINS)>r){ pickups.push({kind:'coin',lane,z}); }        // one big coin at a time
  else if((acc+=CFG.P_ARROW)>r){ pickups.push({kind:'arrow',lane,z}); }       // rare bonus arrow, single
  else if((acc+=CFG.P_LANCE)>r){ pickups.push({kind:'lance',lane,z}); }
  else if((acc+=CFG.P_MIXED)>r){
    const used=spawnObstacle(z);                          // lanes the obstacle actually occupies
    const free=[0,1,2].filter(l=>!used.includes(l)&&clear(l));
    if(free.length) pickups.push({kind:'coin',lane:pick(free),z});
  } /* else: breathing room — nothing */
}
function occupiesLane(o,l){ return o.kind==='wolfgate' ? false : !!(o.req&&o.req[l]); }
let lastObsFull=false;                        // fairness: never two full-cover obstacles in a row
function spawnObstacle(z){
  const pickupNear=l=>pickups.some(c=>Math.abs(c.z-z)<4.5&&c.lane===l);
  const side=Math.random()<.5?'L':'R', out=side==='L'?0:2, inn=side==='L'?2:0;
  let sizeRoll=Math.random(); if(lastObsFull) sizeRoll*=0.85;   // full-cover can't repeat
  const tRoll=Math.random();
  let kind, req=[null,null,null], variant=side;
  if(tRoll<0.40){                             /* --- ROOT --- */
    kind='root';
    req[out]='duck';                          // head-height arm over the outer lane
    if(sizeRoll>=0.55) req[1]='jump';         // slumps to the ground across the middle
    if(sizeRoll>=0.90&&!lastObsFull) req[inn]='jump';   // rare: sprawls across all three
  } else if(tRoll<0.74){                      /* --- POND --- */
    kind='pond';
    if(sizeRoll<0.62){ const l=(Math.random()*3)|0; req[l]='jump'; variant=l===0?'L':l===2?'R':'M'; }
    else if(sizeRoll<0.92||lastObsFull){ req[out]='jump'; req[1]='jump'; }
    else { req=['jump','jump','jump']; }
  } else {                                    /* --- BOULDER --- */
    kind='boulder';
    if(sizeRoll<0.62){ req[out]='jump'; }     // single boulder: never alone on center
    else if(sizeRoll<0.92||lastObsFull){ req[out]='jump'; req[1]='jump'; }
    else { req=['jump','jump','jump']; }
  }
  /* keep pickups reachable: uncover any lane holding a pickup (never strand one inside) */
  for(let l=0;l<3;l++) if(req[l]&&pickupNear(l)) req[l]=null;
  if(!req[0]&&!req[1]&&!req[2]) return [];    // everything conflicted — skip this one
  lastObsFull=!!(req[0]&&req[1]&&req[2]);
  const ob={kind,req,side:variant,z,seed:(Math.random()*999)|0,resolved:false};
  if(kind==='root'){
    ob.treeV=Math.random();                   // the mother tree: a random sprite of this biome
    const ss=side==='L'?-1:1;                 // clear its standing room — never two trees in one
    trees=trees.filter(t=>!(Math.abs(t.z-z)<2.6&&Math.sign(t.off)===ss&&Math.abs(t.off)<3.5));
  }
  obstacles.push(ob);
  return [0,1,2].filter(l=>req[l]);
}

/* ============================== PLAYER ============================== */
const player={
  lane:1, x:1,                 // logical lane + eased visual lane position
  jumpT:-1, duckT:-1,          // -1 = inactive, else 0..duration
  gallop:0, alive:true,
  lastLaneChange:-9, laneFrom:1, lastJump:-9, lastDuck:-9,
  attackAnim:0, counterAnim:0, invuln:0,
};
function playerAction(a){
  if(!player.alive) return;
  if(a==='left'&&player.lane>0){ player.laneFrom=player.lane; player.lane--; player.lastLaneChange=perfNow; SFX.swipe(); }
  else if(a==='right'&&player.lane<2){ player.laneFrom=player.lane; player.lane++; player.lastLaneChange=perfNow; SFX.swipe(); }
  else if(a==='up'&&player.jumpT<0){ player.jumpT=0; player.duckT=-1; player.lastJump=perfNow; SFX.jump();
    burst(laneX(player.x,1),PLAYER_Y+8,6,['#8a744f','#5c4a30'],90,240,3,.4);
    if(playerChar.monkey)                          // the monkey's slight kick-off toot
      burst(laneX(player.x,1)+6,PLAYER_Y-2,4,['#b8c49a','#cdd8ac'],38,-14,2.4,.45); }
  else if(a==='down'){
    if(player.jumpT>=0){ player.jumpT=Math.max(player.jumpT,jumpDur()*0.82); } // fast-fall
    else { player.duckT=0; player.lastDuck=perfNow; SFX.duck(); }   // duck — or refresh mid-duck
  }
}
function jumpHeight(){ return player.jumpT<0?0:Math.sin(Math.PI*clamp(player.jumpT/jumpDur(),0,1))*CFG.JUMP_H; }
function isAirborne(){ return jumpHeight()>CFG.JUMP_SAFE_H; }
function isDucking(){ return player.duckT>=0; }
function updatePlayer(dt){
  player.x+=(player.lane-player.x)*Math.min(1,CFG.LANE_EASE*dt);
  const inFight=(mode==='boss'||mode==='miniboss'||mode==='bossintro');
  player.gallop=(player.gallop+dt*(inFight?0.55:speed()/9))%1;   // the horse WALKS in a fight
  if(player.jumpT>=0){ player.jumpT+=dt; if(player.jumpT>jumpDur()){ player.jumpT=-1;
    burst(laneX(player.x,1),PLAYER_Y+8,8,['#8a744f','#5c4a30'],110,260,3,.4); } }
  if(player.duckT>=0){ player.duckT+=dt; if(player.duckT>CFG.DUCK_TIME) player.duckT=-1; }
  player.attackAnim=Math.max(0,player.attackAnim-dt*2.4);
  player.counterAnim=Math.max(0,player.counterAnim-dt*1.6);
  player.invuln=Math.max(0,player.invuln-dt);
  updateAllyTrail();
  /* galloping dust */
  if(Math.random()<dt*14) burst(laneX(player.x,1)+rnd(-12,12),PLAYER_Y+10,1,['#6a5a40'],40,60,3,.5);
}
function drawPlayer(){
  const lean=clamp((player.lane-player.x)*1.6,-1,1);
  const duck=player.duckT>=0?Math.sin(Math.PI*clamp(player.duckT/CFG.DUCK_TIME,0,1)):0;
  const y=PLAYER_Y-jumpHeight();
  if(player.invuln>0 && (perfNow*14|0)%2===0) g.globalAlpha=0.45;   // shield i-frames blink
  drawRider(laneX(player.x,1),y,1.02,{
    gallop:player.gallop, lean, duck,
    air:player.jumpT>=0?clamp(player.jumpT/jumpDur(),0,1):0,
    feather:playerChar.feather, horse:playerChar.horse, chubby:playerChar.chubby,
    monkey:playerChar.monkey, caveman:playerChar.caveman,
    attack:player.attackAnim, counter:player.counterAnim,
  });
  g.globalAlpha=1;

  g.globalAlpha=0.3*(1-jumpHeight()/CFG.JUMP_H*.7); g.fillStyle='#000';
  g.beginPath(); g.ellipse(laneX(player.x,1),PLAYER_Y+12,23,6,0,0,TAU); g.fill(); g.globalAlpha=1;

/* ============================== collisions (run mode) ============================== */
function updateRunCollisions(){
  const REASON=BIO().reasons;
  for(const o of obstacles){
    if(o.resolved||o.kind==='wolfgate') continue;
    if(o.z<1.1&&o.z>-1.2){
      const need=o.req[Math.round(player.x)];      // this lane's demand: 'jump' | 'duck' | null
      if(need){
        const hit = need==='jump' ? !isAirborne()
                                  : !(isDucking()||(hasRelic('greaves')&&isAirborne()));
        if(hit&&o.z<0.45){ o.resolved=true;
          if(o.kind==='pond'&&hasRelic('boots')){                  // MARSH BOOTS: you splash straight through
            floater(laneX(player.x,1),PLAYER_Y-70,'MARSH BOOTS!','#c0f79a',16);
            burst(laneX(player.x,1),PLAYER_Y+6,10,['#8fae9a','#39423a'],140,80,3,.5); SFX.duck(); }
          else if(hasRelic('oak')&&!oakUsed){                      // OAKEN CHARM: one crash forgiven per loop
            oakUsed=true; floater(laneX(player.x,1),PLAYER_Y-70,'OAKEN CHARM SHATTERS THE BLOW!','#ffe37a',16);
            burst(laneX(player.x,1),PLAYER_Y-30,14,['#c9a86a','#ffe37a'],180,100,3,.6); SFX.thud(); shake(3,.15); }
          else damagePlayer(REASON[o.kind]); }
        else if(!hit){ o.resolved=true; }
      } else if(o.z<0.2) o.resolved=true;
    }
  }
  for(let i=pickups.length-1;i>=0;i--){ const c=pickups[i];
    if(c.z<0.9&&c.z>-0.6&&Math.round(player.x)===c.lane){
      collect(c); pickups.splice(i,1);
    }
  }
}
function collect(c){
  const p=proj(Math.max(c.z,0)), x=laneX(c.lane,p.t);
  if(c.kind==='coin'){ const v=CFG.COIN_VALUE+(hasRelic('clover')?1:0); gold+=v; SFX.coin();
    burst(x,p.y-20,7,['#ffd23a','#fff2b0'],120,60,3,.5); floater(x,p.y-34,'+'+v,'#ffd23a',15); }
  else if(c.kind==='arrow'){ arrows++; SFX.arrow();
    burst(x,p.y-20,9,['#c0f79a','#e8ffd0'],140,40,3,.6); floater(x,p.y-40,'ARROW +'+dmgOf('arrow'),'#c0f79a',16); }
  else { lances++; SFX.lance();
    burst(x,p.y-24,14,['#9ecbff','#e0efff'],170,40,4,.7); floater(x,p.y-44,'LANCE +'+dmgOf('lance'),'#9ecbff',18); }
}
/* damage formulas: base + smith upgrades (bought with gold; no automatic scaling anymore) */
function dmgOf(kind){
  return kind==='lance' ? CFG.LANCE_DMG+upg.lance*CFG.UPG_LANCE_INC+(hasRelic('flask')?Math.round(8*relicPower()):0)
                        : CFG.ARROW_DMG+upg.arrow*CFG.UPG_ARROW_INC+(hasRelic('whet')?Math.round(3*relicPower()):0);
}
function counterDmg(){ return CFG.COUNTER_DMG+upg.counter*CFG.UPG_COUNTER_INC+(hasRelic('drum')?Math.round(3*relicPower()):0); }

/* ============================== damage / death / shield ============================== */
let debugRun=false, godMode=false, debugLoop=1, debugSel={};
function damagePlayer(reason){
  if(godMode){ flash('#9ecbff',.15); floater(laneX(player.x,1),PLAYER_Y-90,'GOD MODE','#9ecbff',14);
    hazards=[]; return; }
  chainStacks=0;                             // pain breaks the chain
  if(player.invuln>0) return;

  }

/* ============================== 10. FIGHTS (shared telegraph/dodge framework) ==============================
   A "hazard" = {lanes:[..], height:'mid'|'low'|'high'|'all', born, impact, done}
     mid  → occupies those lanes at every height: survive by NOT being in the lane
     low  → ground strike in those lanes: survive by JUMPING
     high → head-height strike: survive by DUCKING
     all  → undodgeable (boss frenzy)                                                    */
function spawnHazard(lanes,height,travel,src){
  hazards.push({lanes,height,born:perfNow,impact:perfNow+travel,done:false,src});
}
function updateHazards(){
  for(const h of hazards){
    if(h.done||perfNow<h.impact) continue;
    h.done=true; resolveHazard(h);
  }
  for(let i=hazards.length-1;i>=0;i--) if(hazards[i].done&&perfNow>hazards[i].impact+0.35) hazards.splice(i,1);
}
function resolveHazard(h){
  const inLane=h.lanes.includes(Math.round(player.x));
  let hit=false, perfect=false;
  const W=perfectWin();
  if(h.height==='all'){ hit=true; }
  else if(h.height==='mid'){
    hit=inLane;
    /* perfect = you swapped OUT of a threatened lane inside the window */
    if(!hit && h.lanes.includes(player.laneFrom) && perfNow-player.lastLaneChange<=W) perfect=true;
  } else if(h.height==='low'){
    hit=inLane&&!isAirborne();
    if(inLane&&!hit&&perfNow-player.lastJump<=W+0.12) perfect=true;
  } else if(h.height==='high'){
    hit=inLane&&!isDucking();
    if(inLane&&!hit&&perfNow-player.lastDuck<=W) perfect=true;
  }
  /* impact: torn earth + claw rakes — a physical strike, not an energy beam */
  for(const ln of h.lanes){
    const x=laneX(ln,1), iy=h.height==='high'?PLAYER_Y-86:PLAYER_Y-6;
    burst(x,iy,9,['#6a5a40','#8a744f','#4a3b28'],170,150,4,.5);           // dirt & sod
    spawnSlash(x,iy-10,h.height==='high'?0.35:-0.4,h.src==='wolf'?'#cfd4e2':'#e8e2d0');
    if(h.height!=='high') burst(x,iy,4,['#243a22'],110,90,3,.45);         // torn grass
  }
  SFX.slash(); shake(4,.18);
  if(hit){ damagePlayer(h.src==='wolf'?BIO().miniHit:BIO().bossHit); return; }
  if(perfect){
    floater(laneX(player.x,1),PLAYER_Y-jumpHeight()-96,'PERFECT!','#ffe37a',20);
    burst(laneX(player.x,1),PLAYER_Y-jumpHeight()-50,10,['#ffe37a','#fff'],160,80,3,.6);
    doCounter(h.src);                        // counters are a CORE mechanic — always available
  } else if(inLane||h.lanes.includes(player.laneFrom)){
  }
}
/* CHAIN STACKS: EVERY hit the player lands — counter, arrow, or lance — adds a
   stack (+5% each). Only arrows & lances receive the bonus; counters stay flat. */
let chainStacks=0;
function addChainStack(){
  if(wolfFight) return;                      // the wolf duel builds no chain — boss fights only
  chainStacks++;
  const tgt=boss||wolfFight;                 // the chain is shown on the BOSS, not the player
  if(tgt){ const p=proj(tgt.z);
    floater(laneX(tgt.x,p.t)+rnd(-14,14),p.y-146*p.s,'CHAIN ×'+chainStacks,'#ffe37a',15); }
}
function doCounter(src){
  const dmg=counterDmg();                    // counter damage is FLAT (base + upgrades)
  player.counterAnim=1; player.attackAnim=1; SFX.counter(); stopTime(.06); shake(5,.2);
  spawnSlash(laneX(player.x,1),PLAYER_Y-70,-0.5,'#ffe37a');
  if(src==='wolf'&&wolfFight){ wolfCounterHit(dmg); }
  else if(boss){ hurtBoss(dmg,true); }
  addChainStack();
}

/* ============================== WEREWOLF STAGE BOSS ============================== */
let boss=null;
/* attack table — pick() chooses target lanes at telegraph start.
   Each entry: weight, telegraph secs, travel (strike→impact), recover, height, anim key */
const BOSS_ATTACKS=[
  /* lunge = how far (z-units) the beast physically hurls itself forward on the strike */
  {id:'swipe',  w:22, tele:0.95, travel:0.50, rec:0.7, height:'mid',  anim:'tele_swipe',  lunge:4,
   pick:()=>[Math.round(player.x)]},                                  // claw rake at your lane → dodge L/R
  {id:'double', w:17, tele:1.05, travel:0.55, rec:0.8, height:'mid',  anim:'tele_double', lunge:4,
   pick:()=>{const safe=(Math.random()*3)|0; return [0,1,2].filter(l=>l!==safe);}}, // both paws → find the safe lane
  {id:'sweep',  w:16, tele:1.15, travel:0.60, rec:0.9, height:'low',  anim:'tele_sweep',  lunge:3,
   pick:()=>[0,1,2]},                                                 // full-width ground rake → JUMP
  {id:'lunge',  w:14, tele:1.05, travel:0.55, rec:0.9, height:'high', anim:'tele_lunge',  lunge:6,
   pick:()=>[0,1,2]},                                                 // high raking charge → DUCK
  {id:'pounce', w:15, tele:0.75, travel:0.42, rec:0.7, height:'mid',  anim:'tele_pounce', lunge:9,
   pick:()=>[Math.round(player.x)]},                                  // it THROWS itself at you → quick dodge
  {id:'combo',  w:9,  tele:1.25, travel:0.55, rec:1.0, height:'seq',  anim:'tele_combo',  lunge:3,
   pick:()=>[0,1,2]},                                                 // howl: ground rake THEN high rake
];
function teleMult(){ return Math.max(CFG.TELE_MIN_MULT, 1-Math.floor((loop-1)/3)*0.12); } // a step faster every 3 stages
function dodgeAttackCount(){ return CFG.BOSS_DODGE_ATKS + Math.floor((loop-1)/3)*CFG.BOSS_ATKS_TIER; }
function bossMaxHp(){
  const tier=Math.floor((loop-1)/3);
  return CFG.BOSS_HP_BASE+(loop-1)*CFG.BOSS_HP_PER_LOOP+tier*CFG.BOSS_HP_TIER_ADD;
}
function packLeapDmg(){
  const base=CFG.PACK_LEAP_DMG+upg.fang*CFG.UPG_FANG_INC;
  /* the follower's fangs ride the CHAIN like your weapons do, and the horn empowers them */
  return Math.round(base*(hasRelic('horn')?1.5:1)*(1+chainBonus()*chainStacks));
}
function startBoss(){
  /* the bear stalks in from the treeline; pond bosses RISE from the water */
  const side=BIO().rises?1:(Math.random()<.5?-3.1:5.1);
  boss={
    hp:bossMaxHp(),
    z:CFG.BOSS_Z, x:side, xTarget:1, entering:!BIO().rises,
    state:'intro', stateT:0, attack:null, hazardLanes:[],
    lastIds:[], hurtT:0, atkTimer:1.4, comboStep:0,
    poisonT:0, burnT:0, dotAcc:0, rise:BIO().rises?0:1,
    /* fight structure: exactly N attacks of dodging, THEN the knight's volley */
    phase:'dodge', attacksLeft:dodgeAttackCount(),
    volleyTimer:0, packLeapt:0, dealt:0,
  };
  boss.maxhp=boss.hp;
  obstacles=[]; pickups=[]; trees=[];       // full focus on the fight
  env='cave';                               // you rode in under the arch — now it has you
  flash('#020204',.8);
  floater(VW/2,300,BIO().arenaLine,'#e8e2d0',19);
  setMode('bossintro'); SFX.roar(); shake(10,.6);
}
function chooseBossAttack(){
  let pool=BOSS_ATTACKS.filter(a=>boss.lastIds.filter(x=>x===a.id).length<2); // no cheap triple-repeats
  let tot=pool.reduce((s,a)=>s+a.w,0), r=Math.random()*tot;
  for(const a of pool){ if((r-=a.w)<=0){ boss.lastIds.push(a.id); if(boss.lastIds.length>3)boss.lastIds.shift(); return a; } }
  return pool[0];
}
function hurtBoss(dmg,fromCounter){
  if(!boss||boss.state==='dying'||boss.state==='finisher') return;
  /* counter damage keeps counting past 0 HP — the excess lands in overkill,
     together with the whole volley, when the fight resolves */
  boss.hp-=dmg; if(boss.phase!=='dodge') boss.dealt+=dmg;
  if(boss.hp<=0&&boss.phase==='dodge'&&!boss._beaten){ boss._beaten=true;
    floater(VW/2,300,'IT STAGGERS — KEEP THE CHAIN GOING!','#ffe37a',18); }
  if(fromCounter&&hasRelic('venom')){ boss.poisonT=8;              // VENOM VIAL: the counter envenoms
    floater(laneX(boss.x,proj(boss.z).t),proj(boss.z).y-160*proj(boss.z).s,'POISONED!','#7ade6a',15); }
  if(!fromCounter&&hasRelic('brand')){ boss.burnT=4;               // BRAND OF EMBERS: steel ignites
    if(Math.random()<0.4) floater(laneX(boss.x,proj(boss.z).t)+20,proj(boss.z).y-160*proj(boss.z).s,'BURNING!','#ff9a3a',15); }
  boss.hurtT=0.14; SFX.thud(); shake(3,.12);
  const p=proj(boss.z);
  burst(laneX(boss.x,p.t),p.y-60*p.s,12,['#ff4d3a','#ffe37a'],180,120,4,.6);
  floater(laneX(boss.x,p.t),p.y-120*p.s,'-'+dmg,fromCounter?'#ffe37a':'#fff',fromCounter?22:18);
}
/* called once the FULL volley has landed: score first, THEN the kill animation */
function resolveVolley(){
  if(boss.hp<=0){
    const overkill=Math.max(0,-boss.hp), pts=CFG.BOSS_SCORE*loop, okPts=Math.round(overkill*CFG.OVERKILL_MULT);
    bossScoreRun+=pts; overkillRun+=okPts; bossKills++;
    floater(VW/2,300,'BOSS SLAIN  +'+pts,'#ffe37a',26);
    if(okPts>0) floater(VW/2,336,'OVERKILL '+overkill+' ×'+CFG.OVERKILL_MULT+'  +'+okPts,'#ff9a3a',20);
    SFX.win(); flash('#ffe37a',.5); shake(12,.6); stopTime(.25);
    boss.state='dying'; boss.stateT=0; boss._stg=0; hazards=[];   // now the kill animation plays
  } else {
    floater(VW/2,300,'NOT ENOUGH DAMAGE...','#ff4d3a',24); SFX.roar();
    boss.state='finisher'; boss.stateT=0; hazards=[];             // the bear answers. it does not miss.
  }
}
function updateBoss(dt){
  if(!boss) return;
  boss.stateT+=dt; boss.hurtT=Math.max(0,boss.hurtT-dt);
  if(boss.rise<1) boss.rise=Math.min(1,boss.rise+dt/1.3);          // pond bosses breach the surface
  /* poison & burn gnaw at it — relic damage, sharpened by RELIC POWER */
  if(boss.state!=='dying'&&boss.state!=='finisher'){
    let dps=0;
    if(boss.poisonT>0){ boss.poisonT-=dt; dps+=2*relicPower(); }
    if(boss.burnT>0){ boss.burnT-=dt; dps+=3*relicPower(); }
    if(dps>0){ boss.dotAcc+=dps*dt;
      if(boss.dotAcc>=2){ const n=Math.floor(boss.dotAcc); boss.dotAcc-=n;
        boss.hp-=n; if(boss.phase!=='dodge') boss.dealt+=n;
        const pD=proj(boss.z);
        floater(laneX(boss.x,pD.t)+rnd(-30,30),pD.y-130*pD.s,'-'+n,
          boss.poisonT>0?'#7ade6a':'#ff9a3a',13);
        if(boss.hp<=0&&boss.phase==='dodge'&&!boss._beaten){ boss._beaten=true;
          floater(VW/2,300,'IT STAGGERS — KEEP THE CHAIN GOING!','#ffe37a',18); } } }
  }
  boss.x+=(boss.xTarget-boss.x)*Math.min(1,5*dt);
  const st=boss.state, T=boss.stateT;
  if(st==='dying'){                          /* --- staged KILL ANIMATION --- */
    /* stage hits: three shuddering impacts, then collapse, then a burst of soul-light */
    const p=proj(boss.z), bx=laneX(boss.x,p.t);
    const marks=[0.25,0.55,0.85];
    for(let i=0;i<marks.length;i++){
      if(boss._stg===i&&T>=marks[i]){ boss._stg++;
        boss.hurtT=0.12; SFX.slash(); shake(6,.15); stopTime(.04);
        burst(bx+rnd(-30,30),p.y-rnd(30,90)*p.s,14,['#ffe37a','#ff4d3a','#ffffff'],220,120,4,.5); }
    }
    if(boss._stg===3&&T>=1.7){ boss._stg=4;   // the body bursts into embers + rising soul wisps
      SFX.hit(); flash('#e8e2d0',.45); shake(10,.4);
      burst(bx,p.y-50*p.s,46,['#3a3646','#ff4d3a','#ffe37a','#e8e2d0'],300,150,5,1.1);
      for(let i=0;i<14;i++) particles.push({x:bx+rnd(-40,40),y:p.y-rnd(20,90)*p.s,
        vx:rnd(-14,14),vy:rnd(-90,-40),life:1.4,maxLife:1.4,size:rnd(2,5),col:'#cfe0ff',grav:-16}); }
    if(T>2.5){
      if(pack>0){ floater(VW/2,340,BIO().byeLine,'#9ecbff',17); }
      pack=0; packTypes=[];                     // its debt is paid — the beast returns to its wild
      if(hasRelic('idol')){ gold+=40; floater(VW/2,368,'GOLDEN IDOL +40','#ffd23a',17); }
      boss=null; env='forest'; giveRelic();
    }
    return;
  }
  if(st==='finisher'){                       /* volley failed → one undodgeable claw. shield may eat it. */
    if(T>=1.15&&!boss._fin){ boss._fin=true; spawnHazard([0,1,2],'all',0.45,'boss'); }
    if(T>=2.4){ boss.state='finisher'; boss.stateT=0; boss._fin=false; } // repeats if a shield absorbed it
    return;
  }
  if(st==='volley'){                         /* --- PC's TURN: unleash every collected weapon --- */
    boss.volleyTimer-=dt;
    if(boss.volleyTimer<=0){
      boss.volleyTimer=CFG.VOLLEY_EVERY;
      let kind=null;
      if(arrows>0){ kind='arrow'; arrows--; }
      else if(lances>0){ kind='lance'; lances--; }
      if(kind){
        const base=dmgOf(kind);
        const dmg=Math.round(base*(1+chainBonus()*chainStacks));
        addChainStack();                     // arrows & lances feed the chain
        player.attackAnim=1;
        if(kind==='lance') SFX.lance(); else SFX.arrow();
        projectiles.push({kind,t:0,dmg});
      } else if(!wolfLeap && boss.packLeapt<pack){          // then the PACK: one leap at a time
        wolfLeap={idx:boss.packLeapt, phase:'fly', t:0};
        boss.packLeapt++; SFX.howl();
      } else if(projectiles.length===0 && !wolfLeap && (boss.packLeapt>=pack)){
        resolveVolley();                     // every shot landed, every wolf home → judge it
      }
    }
    return;
  }
  if(st==='idle'){
    if(boss.phase==='dodge'&&boss.attacksLeft<=0&&hazards.length===0){
      boss.phase='volley'; boss.state='volley'; boss.stateT=0; boss.volleyTimer=0.6;
      const total=arrows+lances+pack;
      floater(VW/2,280,total>0?'YOUR TURN — UNLEASH!':'YOUR TURN... BUT YOU CARRY NOTHING','#c0f79a',22);
      SFX.relic();
      return;
    }
    boss.atkTimer-=dt;
    if(boss.atkTimer<=0&&boss.attacksLeft>0){
      boss.attacksLeft--;
      boss.attack=chooseBossAttack(); boss.state='tele'; boss.stateT=0;
      boss.hazardLanes=boss.attack.pick();
      boss.xTarget=boss.attack.height==='mid'?boss.hazardLanes[0]:1;  // faces its target
      SFX.roar();
    }
  } else if(st==='tele'){
    if(T>=boss.attack.tele*teleMult()){
      boss.state='strike'; boss.stateT=0; SFX.slash();
      const a=boss.attack;
      if(a.height==='seq'){                  // howl combo: ground wave, THEN a high sweep
        spawnHazard([0,1,2],'low',a.travel,'boss');
        spawnHazard([0,1,2],'high',a.travel+0.95,'boss');
      } else spawnHazard(boss.hazardLanes,a.height,a.travel,'boss');
    }
  } else if(st==='strike'){
    if(T>=boss.attack.travel+(boss.attack.height==='seq'?1.05:0)){ boss.state='recover'; boss.stateT=0; }
  } else if(st==='recover'){
    if(T>=boss.attack.rec){
      boss.state='idle'; boss.stateT=0;
      const haste=Math.max(CFG.ATK_HASTE_MIN,1-(loop-1)*CFG.ATK_HASTE_LOOP);
      const comboCh=Math.min(CFG.COMBO_MAX,CFG.COMBO_BASE+(loop-1)*CFG.COMBO_LOOP);
      if(boss.attacksLeft>0&&Math.random()<comboCh){
        boss.atkTimer=0.12;                                // COMBO: it flows straight into the next
        floater(laneX(boss.x,proj(boss.z).t),proj(boss.z).y-170*proj(boss.z).s,'COMBO!','#ff9a3a',15);
      } else boss.atkTimer=rnd(0.5,1.1)*haste;
    }
  }
}
/* THE PACK LEAP: a wolf breaks from behind you, arcs into the bear, mauls, and returns */
function updateWolfLeap(dt){
  if(!wolfLeap||!boss) return;
  const L=wolfLeap; L.t+=dt;
  if(L.phase==='fly'&&L.t>=0.5){ L.phase='maul'; L.t=0;
    const dmg=packLeapDmg();
    hurtBoss(dmg,false);
    if(hasRelic('horn')) addChainStack();               // the horn lets fangs feed the chain
    if(hasRelic('alpha')){ addChainStack(); addChainStack(); }   // the alpha fang feeds it twice more
    const p=proj(boss.z);
    spawnSlash(laneX(boss.x,p.t),p.y-60*p.s,rnd(-0.6,0.6),'#9ecbff');
    shake(6,.2); stopTime(.05);
  }
  else if(L.phase==='maul'&&L.t>=0.35){ L.phase='back'; L.t=0; }
  else if(L.phase==='back'&&L.t>=0.4){ wolfLeap=null; }
}
function drawWolfLeap(){
  if(!wolfLeap||!boss) return;
  const L=wolfLeap;
  const p0={x:laneX(player.x,1)-58,y:PLAYER_Y+6,s:1.0};
  const pb=proj(boss.z), p1={x:laneX(boss.x,pb.t),y:pb.y-30*pb.s,s:pb.s*1.9};
  const typ=packTypes[L.idx]||'wolf';
  if(L.phase==='fly'){
    const k=easeOut(L.t/0.5), arc=Math.sin(k*Math.PI)*90;
    ALLY_BACK[typ](lerp(p0.x,p1.x,k),lerp(p0.y,p1.y,k)-arc,lerp(p0.s,p1.s,k),perfNow,9);
  } else if(L.phase==='maul'){
    const gn=Math.sin(L.t*40)*4;                        // savaging shudder
    ALLY_BACK[typ](p1.x+gn,p1.y,p1.s,perfNow,9);
  } else {
    const k=easeOut(L.t/0.4), arc=Math.sin(k*Math.PI)*60;
    ALLY_FRONT[typ](lerp(p1.x,p0.x,k),lerp(p1.y,p0.y,k)-arc+24,lerp(p1.s*0.8,1.1,k));
  }
}
function updateProjectiles(dt){
  for(let i=projectiles.length-1;i>=0;i--){ const pr=projectiles[i];
    pr.t+=dt/(pr.kind==='wolf'?0.55:0.42);             // the wolf's dash is slower, heavier
    if(pr.t>=1){ projectiles.splice(i,1);
      if(boss&&boss.state!=='dying'){
        if(pr.kind==='wolf'){                          // THE FINAL BLOW
          stopTime(.18); shake(12,.45); flash('#9ecbff',.5);
          const p=proj(boss.z);
          burst(laneX(boss.x,p.t),p.y-70*p.s,34,['#9ecbff','#ffffff','#ff4d3a'],300,140,5,1);
          floater(laneX(boss.x,p.t),p.y-150*p.s,FANG_LINE[packTypes[wolfLeap.idx]||'wolf'],'#9ecbff',24);
        }
        hurtBoss(pr.dmg,false);
      }
    }
  }
}
function drawProjectiles(){
  if(!boss) return;
  const p1={x:laneX(player.x,1),y:PLAYER_Y-70}, p2=proj(boss.z);

      /* a thrown JOUSTING LANCE: point leads, shaft tapers back to the vamplate */
      g.fillStyle='#e8f0ff'; g.beginPath(); g.moveTo(24,0); g.lineTo(16,-2.6); g.lineTo(16,2.6); g.closePath(); g.fill();
      g.fillStyle='#d9b878'; g.beginPath(); g.moveTo(16,-2); g.lineTo(-8,-3.4); g.lineTo(-8,3.4); g.lineTo(16,2); g.closePath(); g.fill();
      g.fillStyle='#8a6a3a'; g.fillRect(2,-2.6,3,5.2); g.fillRect(9,-2.2,3,4.4);   // spiral bands
      g.fillStyle='#9ecbff'; g.beginPath(); g.moveTo(-8,-5); g.lineTo(-3,-2.6) ; g.lineTo(-3,2.6); g.lineTo(-8,5); g.closePath(); g.fill(); // vamplate cone
      g.fillStyle='#5a4227'; g.fillRect(-15,-2,7,4); }   // grip trailing
    else { g.shadowColor='#c0f79a'; g.shadowBlur=8;
      drawArrowSprite(0,0,1.5,Math.PI/2,false); }        // flies head-first down the lane
    g.shadowBlur=0; g.restore();
  }
}

/* ============================== MINIBOSS: THE GREY WOLF ============================== */
let wolfFight=null, wolfSpawned=false;
let pack=0;                 // THE FOLLOWER: 0 or 1 — the beast tamed this stage
let wolfLeap=null;          // active leap: {idx, phase:'fly'|'maul'|'back', t}
const WOLF_ATTACKS=[
  {id:'bite',   w:30, tele:0.9,  travel:0.45, rec:0.7, height:'mid',  anim:'tele_bite', lunge:5,
   pick:()=>[Math.round(player.x)]},
  {id:'sweep',  w:24, tele:1.05, travel:0.55, rec:0.8, height:'low',  anim:'tele_sweep', lunge:5,
   pick:()=>[0,1,2]},
  {id:'double', w:22, tele:1.0,  travel:0.5,  rec:0.8, height:'mid',  anim:'tele_double', lunge:5,
   pick:()=>{const safe=(Math.random()*3)|0; return [0,1,2].filter(l=>l!==safe);}},
  {id:'leap',   w:16, tele:0.85, travel:0.5,  rec:0.8, height:'high', anim:'tele_leap', lunge:5,
   pick:()=>[0,1,2]},                                   // leaps over — duck under it
];
function startMiniboss(lane){
  wolfFight={
    z:10, x:lane, xTarget:1,
    state:'intro', stateT:0, attack:null, hurtT:0, atkTimer:2.2, lastIds:[],
    /* a counter duel: it attacks WOLF_DODGE_ATKS times — land WOLF_COUNTERS counters and it falls.
       fall short and it simply flees (no penalty). a hit still kills you, as always. */
    attacksLeft:CFG.WOLF_DODGE_ATKS, counters:0, _stg:0,
  };
  obstacles=[]; pickups=[];                  // WIPE the lanes: coins, weapons, obstacles — a clean duel
  /* but the forest stays: fill the treeline so the duel doesn't happen in a void */
  for(let tz=5;tz<CFG.Z_FAR;tz+=rnd(1.7,3.2))
    if(!trees.some(t=>Math.abs(t.z-tz)<1.4)) trees.push({z:tz,off:(Math.random()<.5?-1:1)*rnd(2.6,3.8),v:Math.random()});
  setMode('miniboss'); SFX.howl(); shake(6,.4);
}
/* a landed counter against the wolf: no HP — three of these and it yields */
function wolfCounterHit(dmg){
  const w=wolfFight; if(!w||w.state==='dying'||w.state==='flee') return;
  w.counters++; w.hurtT=0.14; SFX.thud();
  const p=proj(w.z);
  burst(laneX(w.x,p.t),p.y-40*p.s,10,['#aeb2c2','#ffe37a'],160,120,4,.5);
  floater(laneX(w.x,p.t),p.y-90*p.s,'COUNTER '+w.counters+'/'+countersNeeded()+'!','#ffe37a',18);
  if(w.counters>=countersNeeded()){
    /* score first, THEN the kill animation */
    bossScoreRun+=CFG.WOLF_SCORE;
    floater(VW/2,320,BIO().yieldLine+'  +'+CFG.WOLF_SCORE,'#9ecbff',24);
    SFX.win(); flash('#9ecbff',.4); stopTime(.18);
    w.state='dying'; w.stateT=0; w._stg=0; hazards=[];
  }
}
function updateMiniboss(dt){
  const w=wolfFight; if(!w) return;
  w.stateT+=dt; w.hurtT=Math.max(0,w.hurtT-dt);
  w.x+=(w.xTarget-w.x)*Math.min(1,5*dt);
  if(w.state==='intro'){                       // cinematic: the wolf bars your path
    if(w.stateT>2.2){ w.state='idle'; w.stateT=0; }
    return;
  }
  if(w.state==='flee'){                        // not enough counters — it melts into the trees
    if(w.stateT>1.0){
      wolfFight=null;
      floater(VW/2,300,BIO().fleeLine,'#8b8fa0',16);
      setMode('run');
    }
    return;
  }
  if(w.state==='dying'){                       /* --- the TAMING: it howls once, then comes to heel --- */
    const p=proj(w.z), wx=laneX(w.x,p.t);
    if(w._stg===0&&w.stateT>=0.2){ w._stg=1; SFX.howl(); }
    if(w._stg===1&&w.stateT>=1.1){ w._stg=2;   // a soft ring of light — a bond, not a wound
      burst(wx,p.y-30*p.s,16,['#9ecbff','#e8e2d0'],140,40,3,.7);
      w.xTarget=player.x;                       // it trots to your side
    }
    if(w.stateT>1.8){
      if(pack<CFG.PACK_MAX){ pack++; packTypes.push(BIO().ally);
        floater(VW/2,300,BIO().tameLine,'#9ecbff',20);
      } else { gold+=CFG.PACK_FULL_GOLD;
        floater(VW/2,300,'THE PACK IS FULL — IT OFFERS TRIBUTE  +'+CFG.PACK_FULL_GOLD+' gold','#ffd23a',17);
      }
      wolfFight=null; SFX.relic();
      setMode('run');
    }
    return;
  }
  /* wolf attack state machine (same telegraph framework as the boss) */
  if(w.state==='idle'){
    if(w.attacksLeft<=0&&hazards.length===0){  // out of attacks, not enough counters → it flees
      w.state='flee'; w.stateT=0; SFX.howl();
      return;
    }
    w.atkTimer-=dt;
    if(w.atkTimer<=0&&w.attacksLeft>0){
      w.attacksLeft--;
      let pool=WOLF_ATTACKS.filter(a=>w.lastIds.filter(x=>x===a.id).length<2);
      let tot=pool.reduce((s,a)=>s+a.w,0), r=Math.random()*tot; let sel=pool[0];
      for(const a of pool){ if((r-=a.w)<=0){ sel=a; break; } }
      w.lastIds.push(sel.id); if(w.lastIds.length>3)w.lastIds.shift();
      w.attack=sel; w.state='tele'; w.stateT=0; w.hazardLanes=sel.pick();
      w.xTarget=sel.height==='mid'?w.hazardLanes[0]:1;
    }
  } else if(w.state==='tele'){
    if(w.stateT>=w.attack.tele*teleMult()){
      w.state='strike'; w.stateT=0; SFX.slash();
      spawnHazard(w.hazardLanes,w.attack.height,w.attack.travel,'wolf');
    }
  } else if(w.state==='strike'){
    if(w.stateT>=w.attack.travel){ w.state='recover'; w.stateT=0; }
  } else if(w.state==='recover'){
    if(w.stateT>=w.attack.rec){ w.state='idle'; w.stateT=0; w.atkTimer=rnd(0.7,1.3); }
  }
}
/* --- the tamed wolf FOLLOWS the knight: it copies your movement on a short
       delay (lane changes, jumps), trotting between you and the camera so we
       see its haunches and wagging tail — back view, like the horse.
       during the boss fight it steps up and stands at your side. --- */
let allyTrail=[];
function updateAllyTrail(){
  allyTrail.push({t:perfNow,x:player.x,j:jumpHeight()});
  while(allyTrail.length&&allyTrail[0].t<perfNow-0.8) allyTrail.shift();
}
function trailSample(delay){
  const tt=perfNow-delay;
  for(let i=allyTrail.length-1;i>=0;i--) if(allyTrail[i].t<=tt) return allyTrail[i];
  return allyTrail[0]||{x:player.x,j:0};
}
function drawAllyWolf(){
  if(pack<=0) return;
  const side=[-58,58,-92];                    // formation spots beside you for the showdown
  for(let i=0;i<pack;i++){
    if(wolfLeap&&wolfLeap.idx===i) continue;  // this one is mid-leap — drawn by drawWolfLeap
    if(mode==='boss'||mode==='bossintro'){
      ALLY_BACK[packTypes[i]||'wolf'](laneX(player.x,1)+side[i],PLAYER_Y+6+(i===2?10:0),0.95,perfNow*0.6+i,0);
      continue;
    }
    /* the follow illusion: each wolf replays your path at its own SHORT delay */
    const sm=trailSample(0.16*(i+1));
    const x=laneX(sm.x,1)+(i===1?-14:i===2?14:0), y=PLAYER_Y+30+i*11-sm.j*0.85;
    g.globalAlpha=0.25*(1-sm.j/CFG.JUMP_H*.7); g.fillStyle='#000';
    g.beginPath(); g.ellipse(x,PLAYER_Y+40+i*11,17,4.5,0,0,TAU); g.fill(); g.globalAlpha=1;
    ALLY_BACK[packTypes[i]||'wolf'](x,y,1.0-i*0.07,perfNow+i*0.9,speed());
  }
}
/* ---- THE MARSH SERPENT: swamp miniboss + pack member ---- */
function drawSerpent(x,y,scale,state,t,hurtFlash){
  g.save(); g.translate(x,y); g.scale(scale,scale);
  const sc=hurtFlash?'#ffffff':'#3a5a3a', scD=hurtFlash?'#e8e8e8':'#25402a',
        scL=hurtFlash?'#ffffff':'#5a8a52', belly=hurtFlash?'#e8e8e8':'#8aa87a';
  if(state==='dying'){ if(t<0.4) g.translate(rnd(-2,2)*t*8,0);
    else { const c=(t-0.4)/0.6; g.globalAlpha=1-c*c; g.translate(0,easeOut(c)*22); g.scale(1,1-c*0.5); } }
  const slither=Math.sin(perfNow*7)*2.4;
  let rear=8, jaw=0, coil=0, lungeF=0;
  if(state==='run'){ rear=6; }
  else if(state==='flee'){ rear=3; }
  else if(state==='howl'){ rear=13; jaw=1; }                       // intro: it rises and hisses
  else if(state==='tele_bite'||state==='tele_double'){ rear=12+Math.sin(t*20)*0.6; jaw=0.7; coil=easeOut(t)*3; }
  else if(state==='tele_sweep'){ rear=3; coil=easeOut(t)*4; }
  else if(state==='tele_leap'){ rear=1.5; coil=easeOut(t)*5; jaw=0.2; }   // flattens to a spring — it will fly
  else if(state==='strike'){ lungeF=easeOut(t); rear=12-lungeF*9; jaw=1; }
  else if(state==='hit'){ rear=5; }
  /* coiled body: three loops, jittering with the slither */
  px(-9+slither*0.3,-5,18,5,sc); px(-9+slither*0.3,-5,18,1.6,scL);
  px(-7-slither*0.4,-9,15,5,sc); px(-7-slither*0.4,-9,15,1.4,scL);
  px(-5+slither*0.5,-13+coil,11,5,sc);
  for(let i=0;i<4;i++){ px(-7+i*4+slither*0.3,-4,1.8,1.6,scD); px(-5+i*4-slither*0.4,-8,1.8,1.6,scD); }
  px(6,-3,5,3,scD);                                                // tail tip out the back
  /* the raised neck + head */
  const nx=-1+lungeF*3, base=-13+coil;
  for(let k=0;k<4;k++){ const f=k/3;
    px(nx-1.6+Math.sin(f*Math.PI+perfNow*3)*1.2,base-f*rear,3.6-f*0.8,rear/3.2,sc);
    px(nx-1.6+Math.sin(f*Math.PI+perfNow*3)*1.2,base-f*rear,1.2,rear/3.2,scL); }
  for(let k=0;k<3;k++) px(nx-0.6,base-2-k*rear*0.3,1.4,1.6,belly);

     score (same scoring, it just ticks fast and feels big) */

     second), and the counter chases it at a steady rate — a stable, fast climb
     with no sprint-stop-sprint stutter; big bonuses still spin up quickly */

/* telegraph markers: red lane glows / ground & high bands, pulsing until impact */
function drawTelegraphs(){
  const actor=boss&&mode==='boss'?boss:wolfFight;
  if(actor&&actor.state==='tele'&&actor.hazardLanes){
    const a=actor.attack, pulse=0.35+Math.sin(perfNow*16)*0.2;
    if(a.height==='seq'){
      /* the combo telegraph alternates: ground trembles FIRST, then the raking
         head-shadow — the same order the waves will arrive in */
      const frac=actor.stateT/(a.tele*teleMult());
      const phase=(frac>0.55&&frac<0.78)?'high':'low';   // preview the duck mid-way, end on the jump
      for(const ln of [0,1,2]) drawLaneThreat(ln,phase,pulse);
    } else {
      for(const ln of actor.hazardLanes) drawLaneThreat(ln,a.height,pulse);
    }
  }
  /* the failed-volley finisher: every lane burns red — there is nowhere to go */
  if(boss&&boss.state==='finisher'&&boss.stateT<1.15){
    const pulse=0.4+Math.sin(perfNow*20)*0.25;
    for(const ln of [0,1,2]) drawLaneThreat(ln,'mid',pulse);
  }
  /* traveling strike waves */
  for(const h of hazards){
    if(h.done) continue;
    const t=clamp((perfNow-h.born)/(h.impact-h.born),0,1);
    const z=lerp(actor?actor.z:CFG.BOSS_Z,0,easeOut(t)), p=proj(z);
    for(const ln of h.lanes){
      const x=laneX(ln,p.t);
      g.save(); g.globalAlpha=0.85;
      if(h.height==='high'){ g.fillStyle='#ff9a3a'; g.shadowColor='#ff9a3a'; g.shadowBlur=14;
        g.fillRect(x-34*p.s,p.y-96*p.s,68*p.s,16*p.s);
        g.shadowBlur=0;
        /* long approach (the combo's second wave): the duck-shadow gathers early */
        if(h.impact-perfNow>0.3) drawLaneThreat(ln,'high',0.5); }
      else if(h.height==='low'){ g.fillStyle='#ffe37a'; g.shadowColor='#ffe37a'; g.shadowBlur=14;
        g.fillRect(x-36*p.s,p.y-14*p.s,72*p.s,14*p.s); }
      else { g.fillStyle='#ff4d3a'; g.shadowColor='#ff4d3a'; g.shadowBlur=16;
        g.fillRect(x-8*p.s,p.y-90*p.s,16*p.s,92*p.s); }
      g.shadowBlur=0; g.restore();
    }
  }
}
function drawLaneThreat(ln,height,alpha){
  /* physical anticipation: the ground trembles, dust rises, a claw-shadow gathers —
     no glowing beams. small JUMP/DUCK cues stay for readability. */
  g.save();
  const x=laneX(ln,1);
  if(height==='high'){
    /* a raking shadow band at head height */
    g.globalAlpha=alpha*0.8; g.fillStyle='#141414';
    g.fillRect(x-44,PLAYER_Y-102,88,10);
    g.fillStyle='#3a2a2a'; g.fillRect(x-44,PLAYER_Y-96,88,3);
    if(ln===1){ g.globalAlpha=1; g.font='bold 13px monospace'; g.textAlign='center';
      g.fillStyle='#ffd8a0'; g.fillText('▼ DUCK ▼',VW/2,PLAYER_Y-112); }
  } else {
    /* trembling dirt: pebbles jitter and dust motes rise along the lane */
    for(let i=0;i<7;i++){
      const z=1+i*1.3, pz=proj(z);
      const jx=laneX(ln,pz.t)+Math.sin(perfNow*34+i*2.1)*3.4*pz.s*(0.4+alpha);
      g.globalAlpha=alpha*(0.65-i*0.06);
      g.fillStyle=i%2?'#5c4a30':'#3f3522';
      g.fillRect(jx-2.6*pz.s,pz.y-1.5*pz.s,5.2*pz.s,3*pz.s);
      if(i%2===0){ g.globalAlpha=alpha*0.4; g.fillStyle='#8a744f';
        g.fillRect(jx,pz.y-(6+Math.sin(perfNow*10+i)*3)*pz.s,2.4*pz.s,2.4*pz.s); }
    }
    /* claw-shadow gathering at the impact point */
    g.globalAlpha=alpha*0.55; g.fillStyle='#101010';
    g.beginPath(); g.ellipse(x,PLAYER_Y+2,34,7,0,0,TAU); g.fill();
    g.globalAlpha=alpha*0.8; g.fillStyle='#1c1c1c';
    g.fillRect(x-16,PLAYER_Y-4,5,8); g.fillRect(x-3,PLAYER_Y-6,5,10); g.fillRect(x+10,PLAYER_Y-4,5,8);
    if(height==='low'&&ln===1){ g.globalAlpha=1; g.font='bold 13px monospace';
      g.textAlign='center'; g.fillStyle='#fff2b0'; g.fillText('▲ JUMP ▲',VW/2,PLAYER_Y-120); }
  }
  g.restore();
}

  g.textAlign='center';
